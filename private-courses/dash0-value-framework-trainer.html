<!DOCTYPE html>
<html lang="en">
<head>

<title>Dash0 Value Framework Trainer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:800;color:#e5e7eb}
.header .ver{font-size:9px;color:#6b7280;letter-spacing:.3px}
.header .sync-badge{font-size:11px;cursor:default}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button:hover{background:#374151}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
h2.sec-title{font-size:1.3rem;font-weight:700;margin-bottom:6px;color:#e5e7eb}
.sec-sub{color:#9ca3af;font-size:.82rem;margin-bottom:16px}
.sec-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin-bottom:5px}
.card{background:#1f2937;border:2px solid #374151;border-radius:16px;padding:20px;margin-bottom:12px;transition:all .2s}
.card:hover{border-color:#4b5563}
.card-fc{min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;text-align:center;user-select:none;-webkit-user-select:none}
.card-fc:hover{border-color:rgba(16,185,129,.4)}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:700}
.stat-label{font-size:11px;color:#6b7280}
.btn-primary{padding:10px 20px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;background:#10b981;color:#fff;transition:all .2s}
.btn-primary:hover{background:#059669;transform:translateY(-1px)}
.btn-secondary{padding:10px 20px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;background:#374151;color:#9ca3af;transition:all .2s}

.btn-danger{padding:10px 20px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;background:#ef4444;color:#fff;transition:all .2s}

.btn-full{width:100%;padding:14px;font-size:15px}

.pill{white-space:nowrap;padding:6px 14px;border-radius:999px;font-size:.75rem;font-weight:600;border:none;cursor:pointer;transition:all .2s}

.progress-bar{width:100%;height:5px;background:#374151;border-radius:999px;overflow:hidden;margin-bottom:14px}
.progress-fill{height:100%;border-radius:999px;transition:width .3s}
.quiz-opt{width:100%;text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#e5e7eb;font-size:.88rem;font-weight:500;cursor:pointer;margin-bottom:8px;transition:all .2s}

.quiz-opt.correct{background:rgba(16,185,129,.12);border-color:#10b981;color:#6ee7b7}
.quiz-opt.wrong{background:rgba(239,68,68,.12);border-color:#ef4444;color:#fca5a5}

.ibox-red{border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#fecaca}

.source-link{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;background:rgba(147,197,253,.08);border:1px solid rgba(147,197,253,.25);color:#93c5fd;font-size:.75rem;font-weight:500;text-decoration:none;transition:all .2s;margin-right:6px;margin-bottom:4px}
.source-link:hover{background:rgba(147,197,253,.18);border-color:rgba(147,197,253,.4)}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}

.form-input:focus{border-color:#10b981}
.form-input.mono{font-family:monospace}
.timer{font-size:2.5rem;font-weight:800;margin-bottom:12px}
.grade{font-size:3.5rem;font-weight:800;text-align:center}
.glossary-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
.glossary-card{max-width:400px;width:100%;background:#1f2937;border:1px solid #4b5563;border-radius:14px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.reset-confirm{background:rgba(239,68,68,.08);border:1px solid #ef4444;border-radius:10px;padding:16px}
.badge-cat{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.68rem;font-weight:600;background:rgba(16,185,129,.1);color:#10b981}
.res-link{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;background:rgba(147,197,253,.08);border:1px solid rgba(147,197,253,.25);color:#93c5fd;font-size:.75rem;font-weight:500;text-decoration:none;transition:all .2s;margin-right:6px;margin-bottom:4px}

.role-picker{max-width:520px;width:92%;padding:28px 20px;text-align:center}
.role-picker h2{font-size:22px;font-weight:700;margin-bottom:6px}
.role-picker .rp-sub{font-size:14px;color:#9ca3af;margin-bottom:24px;line-height:1.5}
.role-cards{display:flex;flex-direction:column;gap:12px}
.role-card{background:#1f2937;border:2px solid #374151;border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;text-align:left}
.role-card:hover{border-color:#10b981;background:#263040}
.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-current{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:#1f2937;border:1px solid #374151;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:#d1d5db}

.focus-box{background:#1f2937;border-radius:16px;padding:16px;margin-top:20px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
@media(min-width:600px){
  body{max-width:960px;padding:0 24px}
  .header{padding:20px 0 12px}
  .header h1{font-size:22px}
  .content{padding:20px 0 100px}
  .nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}
  .nav button{min-width:auto;padding:8px 14px;font-size:12px;flex-direction:row;gap:6px;border-radius:10px}
  .nav button span{font-size:16px;margin-bottom:0}
  .stat-grid{grid-template-columns:repeat(4,1fr);gap:16px}

  .card-fc{min-height:280px;padding:32px}

}
@media(min-width:800px){
  body{max-width:1100px}
  .nav{max-width:1100px}

}
.fs-s .card-text,.fs-s .lesson-text,.fs-s .quiz-opt,.fs-s .focus-text{font-size:13px}
.fs-m .card-text,.fs-m .lesson-text,.fs-m .quiz-opt,.fs-m .focus-text{font-size:15px}
.fs-l .card-text,.fs-l .lesson-text,.fs-l .quiz-opt,.fs-l .focus-text{font-size:17px}
.fs-xl .card-text,.fs-xl .lesson-text,.fs-xl .quiz-opt,.fs-xl .focus-text{font-size:20px}
.code-block{position:relative;background:#0d1117;border:1px solid #374151;border-radius:10px;padding:14px 16px;margin:10px 0;font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:13px;line-height:1.6;color:#e6edf3;overflow-x:auto;white-space:pre;-webkit-overflow-scrolling:touch}
.code-block:hover .code-copy{opacity:1}
.code-copy{position:absolute;top:8px;right:8px;background:#374151;border:none;border-radius:6px;color:#9ca3af;font-size:11px;padding:4px 8px;cursor:pointer;opacity:0;transition:opacity .2s;font-family:inherit}
.code-copy:hover{background:#4b5563;color:#e5e7eb}
.code-inline{background:#1f2937;padding:2px 6px;border-radius:4px;font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:.9em;color:#a5f3fc}
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const APP_VERSION = "v3.1";
const PLATFORM_VERSION = "v3.1";

const STORAGE_KEY = "vf-trainer-progress";

const RELATED_COURSES=[]; // internal-only
const DIFF_LABELS={1:'Beginner',2:'Intermediate',3:'Advanced'};
const DIFF_COLORS={1:'#10b981',2:'#f59e0b',3:'#ef4444'};

// ─── GLOBAL UTILITY FUNCTIONS (non-React, no state needed) ───
function copyCode(btn){
  var block=btn.parentElement;
  var text=block.textContent.replace(/^Copy/,'').replace(/^Copied!/,'').trim();
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!';
    setTimeout(function(){btn.textContent='Copy'},1500);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='Copied!';
    setTimeout(function(){btn.textContent='Copy'},1500);
  });
}
function highlightCode(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/(#.*$)/gm,'<span style="color:#6b7280">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|\'(?:[^\'\\]|\\.)*\')/g,'<span style="color:#a5f3fc">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|while|true|false|null|import|from|export|class|extends|new|this|async|await)\b/g,'<span style="color:#f97316">$1</span>');
}
function codeBlock(code){
  return '<div class="code-block"><button class="code-copy" onclick="copyCode(this)">Copy</button>'+highlightCode(code)+'</div>';
}
function applyFontSize(size){
  document.body.classList.remove('fs-s','fs-m','fs-l','fs-xl');
  document.body.classList.add(size);
  try{localStorage.setItem(STORAGE_KEY+'-fontsize',size)}catch(e){}
}

// ─── GOOGLE SHEETS SYNC (optional — set URL to enable) ───
let SYNC_SHEET_URL = '';
let SYNC_USER_ID = '';
try {
  const su = localStorage.getItem(STORAGE_KEY + '-sync-url');
  if (su) SYNC_SHEET_URL = su;
  const uid = localStorage.getItem(STORAGE_KEY + '-sync-user');
  if (uid) SYNC_USER_ID = uid;
} catch(e) {}

function syncEnabled() { return typeof SYNC_SHEET_URL === 'string' && SYNC_SHEET_URL.length > 10; }
function getSyncKey() { return SYNC_USER_ID ? (SYNC_USER_ID + '/' + STORAGE_KEY) : STORAGE_KEY; }
function isOnline() { return typeof navigator !== 'undefined' ? navigator.onLine : true; }

let syncStatus = 'idle', lastSyncAt = null, syncPending = false;
let syncTimer = null;

async function cloudSave() {
  if (!syncEnabled()) { syncPending = false; return; }
  if (!isOnline()) { syncStatus = 'offline'; syncPending = true; return; }
  syncStatus = 'syncing';
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : {};
    data.savedAt = new Date().toISOString();
    await fetch(SYNC_SHEET_URL + '?action=save&key=' + encodeURIComponent(getSyncKey()), {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ data, savedAt: data.savedAt })
    });
    syncStatus = 'synced'; lastSyncAt = new Date().toISOString(); syncPending = false;
  } catch(e) {
    syncStatus = isOnline() ? 'error' : 'offline'; syncPending = true;
    console.warn('Cloud sync save failed:', e);
  }
}

async function cloudLoad() {
  if (!syncEnabled()) return null;
  if (!isOnline()) { syncStatus = 'offline'; return null; }
  syncStatus = 'syncing';
  try {
    const resp = await fetch(SYNC_SHEET_URL + '?action=load&key=' + encodeURIComponent(getSyncKey()));
    const json = await resp.json();
    syncStatus = 'synced'; lastSyncAt = new Date().toISOString();
    if (json.ok && json.data) return json;
    return null;
  } catch(e) { syncStatus = isOnline() ? 'error' : 'offline'; console.warn('Cloud sync load failed:', e); return null; }
}

function debouncedCloudSave() {
  if (!syncEnabled()) return;
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => cloudSave(), 2000);
}

function saveSyncSettings(url, userId) {
  SYNC_SHEET_URL = url.trim();
  SYNC_USER_ID = (userId || '').trim();
  try {
    if (SYNC_SHEET_URL) localStorage.setItem(STORAGE_KEY + '-sync-url', SYNC_SHEET_URL);
    else localStorage.removeItem(STORAGE_KEY + '-sync-url');
    if (SYNC_USER_ID) localStorage.setItem(STORAGE_KEY + '-sync-user', SYNC_USER_ID);
    else localStorage.removeItem(STORAGE_KEY + '-sync-user');
  } catch(e) {}
}

if (typeof window !== 'undefined') {
  window.addEventListener('online', () => {
    if (syncEnabled() && syncPending) { console.log('☁️ Back online — syncing'); cloudSave(); }
    else if (syncEnabled()) { syncStatus = 'idle'; }
  });
  window.addEventListener('offline', () => {
    if (syncEnabled()) { syncStatus = 'offline'; }
  });
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveProgress(data) {
  try {
    data.savedAt = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    debouncedCloudSave();
  } catch (e) { console.error("Storage save failed:", e); }
}

function clearProgress() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) { console.error("Storage clear failed:", e); }
}
const ROLE_CONFIG = {
  ae: { label: "Account Executive", icon: "💼", desc: "Competitive positioning, discovery, objections, proof points.", coreCats: ["Pillars","Competitors","Objections","Proof Points"], coreLessons: ["pillars","vd","traps","objections","proof","discovery"], catOrder: ["All","Pillars","Value Drivers","Competitors","Objections","Proof Points","Discovery"] },
  se: { label: "Solutions Engineer", icon: "🔧", desc: "Technical depth, demo-ready knowledge, architecture.", coreCats: ["Pillars","Value Drivers","Competitors","Discovery"], coreLessons: ["pillars","otel","agent0","vd","traps","discovery"], catOrder: ["All","Pillars","Value Drivers","Discovery","Competitors","Objections","Proof Points"] },
  leadership: { label: "Leadership", icon: "📊", desc: "Strategic framing, proof points, market positioning.", coreCats: ["Pillars","Proof Points","Value Drivers"], coreLessons: ["pillars","vd","proof","traps"], catOrder: ["All","Pillars","Value Drivers","Proof Points","Competitors","Objections","Discovery"] }
};

const GLOSSARY = {
  "VD1":{ title:"Value Driver 1: Protect Revenue", def:"Reduce MTTR via Agent0 triage + resource-centric navigation. Every minute of downtime = lost revenue." },
  "VD2":{ title:"Value Driver 2: Radical Cost Control", def:"Eliminate bill shock, sampling anxiety, custom metric fees. SIFT framework: pay for data, not infrastructure." },
  "VD3":{ title:"Value Driver 3: Eliminate Lock-In", def:"Full data portability via OTel-native architecture. Proprietary agents trap data; OTel lets you switch backends in minutes." },
  "Agent0":{ title:"Agent0 — AI SRE Guild", def:"5 specialized AI agents: Seeker (root cause), Oracle (query generation), Threadweaver (trace narratives), Pathfinder (onboarding), Artist (dashboards). Not a chatbot — a guild." },
  "SIFT":{ title:"SIFT — Smart Ingestion & Filtering", def:"AI-powered spam filter that drops low-value telemetry (health checks, debug logs) before storage/billing. Filters 30-40% of log volume." },
  "MTTR":{ title:"Mean Time To Resolution", def:"How long from first alert to full resolution. The #1 metric for VD1 (Protect Revenue). Agent0 reduces this dramatically." },
  "OTel":{ title:"OpenTelemetry", def:"CNCF open-source observability framework. Vendor-neutral SDKs and collectors for metrics, logs, and traces. The industry standard Dash0 is built on." },
  "OTLP":{ title:"OpenTelemetry Protocol", def:"The native wire format for OTel data. Dash0 stores data as OTLP with zero translation. Competitors convert to proprietary schemas, losing attributes." },
  "PromQL":{ title:"Prometheus Query Language", def:"Industry-standard query language for metrics. Dash0 uses it for ALL signals (metrics, logs, traces). Grafana requires 3 different languages." },
  "LogQL":{ title:"LogQL — Grafana's Log Query Language", def:"Proprietary query language for Loki (Grafana logs). One of 3 languages Grafana users must learn. Not portable." },
  "TraceQL":{ title:"TraceQL — Grafana's Trace Query Language", def:"Proprietary query language for Tempo (Grafana traces). Yet another language on top of PromQL and LogQL." },
  "RUM":{ title:"Real User Monitoring", def:"Tracks actual user experience in browsers/apps — page loads, clicks, errors. Datadog charges per view/click, making it expensive at scale." },
  "NRQL":{ title:"New Relic Query Language", def:"New Relic's proprietary query language. Skills don't transfer. Dash0 uses industry-standard PromQL instead." },
  "DQL":{ title:"Dynatrace Query Language", def:"Dynatrace's proprietary query language. Another vendor lock-in vector — skills don't transfer." },
  "Perses":{ title:"Perses — CNCF Dashboard Standard", def:"Open-source CNCF project for dashboards-as-code. Version-controlled in git, no vendor lock-in on visualization." },
  "GitOps":{ title:"GitOps", def:"Managing infrastructure and config via git repos. Perses dashboards are GitOps-ready — unlike Grafana's proprietary JSON." },
  "IaC":{ title:"Infrastructure as Code", def:"Defining infrastructure in code (Terraform, Terragrunt). Enables automation, version control, and reproducibility." },
  "FinOps":{ title:"FinOps — Cloud Financial Operations", def:"Practice of bringing financial accountability to cloud spend. Observability is often the #2 cloud cost." },

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function SrcLink({url,label}){
  if(!url)return null;
  return <a href={url} target="_blank" rel="noopener" className="source-link">📖 {label||"Docs"}</a>;
}

function IBox({type="green",label,children}){
  const lbColors={green:"#10b981",red:"#ef4444",amber:"#f59e0b"};
  return <div className={`ibox ibox-${type}`}>{label&&<div className="ibox-label" style={{color:lbColors[type]}}>{label}</div>}{children}</div>;
}

  const [fontSize,setFontSize]=useState(()=>{try{const v=localStorage.getItem(STORAGE_KEY+'-fontsize');return v?parseInt(v):16}catch(e){return 16}});
  const [glossTerm,setGlossTerm]=useState(null);
  const [cardRatings,setCardRatings]=React.useState({});

  const glossRe = new RegExp("\\b("+Object.keys(GLOSSARY).join("|")+")\\b","g");
  const gt=(text)=>{
    if(!text) return null;
    const p=[];let last=0;let m;
    const re=new RegExp(glossRe.source,"g");
    while((m=re.exec(text))!==null){
      if(m.index>last) p.push(text.slice(last,m.index));
      const t=m[1],idx=m.index;
      p.push(<span key={idx} onClick={(e)=>{e.stopPropagation();setGlossTerm({key:t,...GLOSSARY[t]})}} style={{color:"#93c5fd",borderBottom:"1px dashed rgba(147,197,253,.4)",cursor:"pointer",fontWeight:500}}>{m[0]}</span>);
      last=re.lastIndex;
    }
    if(last<text.length) p.push(text.slice(last));
    return p;
  };

  const [syncSt, setSyncSt] = useState(syncEnabled() ? 'idle' : 'off');

  // Load progress from persistent storage on mount, then try cloud
  useEffect(()=>{
    // Apply saved font size class
    try{
      const fs=localStorage.getItem(STORAGE_KEY+'-fontsize');
      const validFs=['fs-s','fs-m','fs-l','fs-xl'];
      const applyFs=validFs.includes(fs)?fs:'fs-m';
      document.body.classList.remove(...validFs);
      document.body.classList.add(applyFs);
    }catch(e){document.body.classList.add('fs-m')}
    const data = loadProgress();
    if(data){
      if(data.stats) setStats(data.stats);
      if(data.role) setRole(data.role);
      if(data.exDone) setExDone(data.exDone);
      if(data.fcFavs) setFcFavs(new Set(data.fcFavs));
      if(data.lastCard){setFcCat(data.lastCard.cat||"All");setFcIdx(data.lastCard.idx||0)}
      if(data.cardRatings) setCardRatings(data.cardRatings);
    }
    setStorageReady(true);
    // Cloud sync on load
    if(syncEnabled()){
      setSyncSt('syncing');
      cloudLoad().then(cloud=>{
        if(cloud&&cloud.data){
          const local=loadProgress();
          const localTime=local&&local.savedAt?new Date(local.savedAt).getTime():0;
          const cloudTime=cloud.savedAt?new Date(cloud.savedAt).getTime():0;
          if(cloudTime>localTime){
            const d=cloud.data;
            if(d.stats) setStats(s=>({...s,...d.stats}));
            if(d.role) setRole(d.role);
            if(d.exDone) setExDone(d.exDone);
            if(d.fcFavs) setFcFavs(new Set(d.fcFavs));
            if(d.lastCard){setFcCat(d.lastCard.cat||"All");setFcIdx(d.lastCard.idx||0)}
            if(d.cardRatings) setCardRatings(d.cardRatings);
          }
        }
        setSyncSt(syncEnabled()?'synced':'off');
      }).catch(()=>setSyncSt('error'));
    }
  },[]);

  // Save progress whenever stats, role, exDone, or cardRatings change
  useEffect(()=>{
    if(!storageReady) return;
    saveProgress({stats,role,exDone,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings,version:8});
  },[stats,role,exDone,fcFavs,fcCat,fcIdx,cardRatings,storageReady]);

  // Persist font size (pixel value stored for state; CSS class applied via setFontSize global)
  useEffect(()=>{
    try{localStorage.setItem(STORAGE_KEY+'-fontsize',String(fontSize))}catch(e){}
    document.documentElement.style.fontSize=fontSize+'px';
  },[fontSize]);

  const resetAllProgress=()=>{
    clearProgress();
    setStats({quizzes:0,bestQuiz:0,cards:0,scenarios:0,rapid:0,bestRapid:0,quizScores:{}});
    setExDone({});
    setFcFavs(new Set());
    setRole(null);
    setTab("home");
    setShowResetConfirm(false);
  };

  const fcRate=(rating)=>{
    if(!filtered.length)return;
    const card=filtered[Math.min(fcIdx,filtered.length-1)];
    setCardRatings(prev=>({...prev,[card.f]:rating}));
    setStats(s=>({...s,cards:(s.cards||0)+1}));
    setFcFlip(false);
    setFcIdx(i=>Math.min(i+1,filtered.length-1));
  };
  const fcWeightedShuffle=()=>{
    if(!filtered.length)return;
    const weighted=[];
    filtered.forEach((c,i)=>{
      const r=cardRatings[c.f];
      const w=r==='missed'?3:r==='unsure'?2:1;
      for(let j=0;j<w;j++)weighted.push(i);
    });
    setFcIdx(weighted[Math.floor(Math.random()*weighted.length)]);
    setFcFlip(false);
  };

  const isCoreCat=c=>!role?true:ROLE_CONFIG[role].coreCats.includes(c);
  const isCoreLes=id=>!role?true:ROLE_CONFIG[role].coreLessons.includes(id);
  const getCats=()=>!role?["All",...CATS]:ROLE_CONFIG[role].catOrder;
  const filtered=(()=>{
    let cards=fcCat==="★ Favorites"?FC.filter(c=>fcFavs.has(c.f)):fcCat==="⚠ Weak"?FC.filter(c=>cardRatings[c.f]==='missed'||cardRatings[c.f]==='unsure'):(fcCat==="All"?FC:FC.filter(c=>c.c===fcCat));
    if(fcDiff!=="All Levels")cards=cards.filter(c=>DIFF_LABELS[c.d]===fcDiff);
    return cards;
  })();
  const weakCount=FC.filter(c=>cardRatings[c.f]==='missed'||cardRatings[c.f]==='unsure').length;
  const toggleFav=(cardF)=>{setFcFavs(prev=>{const n=new Set(prev);if(n.has(cardF))n.delete(cardF);else n.add(cardF);return n})};

  useEffect(()=>()=>clearInterval(rTimer.current),[]);

  const startQuiz=cat=>{const qs=cat==="final"?shuffle(QUIZ).slice(0,10):shuffle(QUIZ.filter(q=>q.cat===cat));setQCat(cat);setQQs(qs);setQIdx(0);setQScore(0);setQSel(null);setQMode("active")};
  const startRapid=()=>{const qs=shuffle(RAPID);setRQs(qs);setRIdx(0);setRScore(0);setRRev(false);setRRes([]);setRTime(qs[0].t);setRState("active");clearInterval(rTimer.current);rTimer.current=setInterval(()=>setRTime(t=>{if(t<=1){clearInterval(rTimer.current);setRRev(true);return 0}return t-1}),1000)};

  // Style helpers (minimal — most styling via CSS classes now)
  const cn = (...c) => c.filter(Boolean).join(' ');

  const PB=({pct,c="#10b981"})=><div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:c}}/></div>;

  const TABS=[{id:"home",i:"🏠",l:"Home"},{id:"learn",i:"📚",l:"Learn"},{id:"cards",i:"🃏",l:"Cards"},{id:"quiz",i:"✅",l:"Quiz"},{id:"drills",i:"🎯",l:"Drills"},{id:"rapid",i:"⚡",l:"Rapid"},{id:"more",i:"⚙️",l:"More"}];

  // HOME
  const Home=()=><div>
    <h2 className="sec-title">Value Framework Trainer</h2>
    <p className="sec-sub">Master the 4 Pillars, 3 Value Drivers, and competitive positioning.</p>
    <div className="stat-grid">
      {[{n:stats.quizzes,l:"Quizzes",c:"#10b981",i:"📝",t:"quiz"},{n:stats.bestQuiz?stats.bestQuiz+"%":"—",l:"Best Quiz",c:"#34d399",i:"🏆",t:"quiz"},{n:stats.cards,l:"Cards Flipped",c:"#93c5fd",i:"🃏",t:"cards"},{n:stats.scenarios,l:"Drills",c:"#f59e0b",i:"🎯",t:"drills"},{n:stats.rapid,l:"Rapid Rounds",c:"#fb923c",i:"⚡",t:"rapid"},{n:stats.bestRapid?stats.bestRapid+"%":"—",l:"Best Rapid",c:"#f472b6",i:"🌟",t:"rapid"},{n:weakCount,l:"Weak Cards",c:"#f59e0b",i:"⚠️",t:"cards"}].map((s,idx)=>
        <div key={idx} className="stat-card" onClick={()=>{setTab(s.t);if(s.l==="Weak Cards"){setFcCat("⚠ Weak");setFcIdx(0);setFcFlip(false)}}}><div className="stat-icon">{s.i}</div><div className="stat-val" style={{color:s.c}}>{s.n}</div><div className="stat-label">{s.l}</div></div>
      )}
    </div>
    <div className="focus-box"><div className="focus-title">Quick Start</div><div className="focus-text">{role?`Role: ${ROLE_CONFIG[role].label}. Start with Learn for fundamentals, then drill with Cards and Quizzes. Scenario Drills build real conversation fluency.`:"Pick a role above to get a tailored learning path. AEs focus on competitive positioning, SEs on technical depth, Leadership on strategic framing."}</div></div>
  </div>;

  // LEARN
  const Learn=()=>{
    if(lessonId){
      const l=LESSONS.find(x=>x.id===lessonId);if(!l)return <p>Not found</p>;
      const idx=LESSONS.indexOf(l);
      return <div>
        <button className="btn-secondary" onClick={()=>setLessonId(null)} style={{marginBottom:16,padding:"8px 14px",fontSize:".82rem"}}>← All Lessons</button>
        <h2 className="sec-title">{l.icon} {l.title}</h2>
        <p className="sec-sub">{l.time} · Week {l.week}</p>
        <div className="card"><p style={{fontSize:".88rem",lineHeight:1.7,color:"#d1d5db"}}>{gt(l.body)}</p></div>
        {l.highlights?.map((h,i)=><div key={i} className="lesson-highlight">{h}</div>)}
        {l.exercises?.length>0&&<><div className="sec-label">Exercises</div>{l.exercises.map((ex,i)=>{const k=`${l.id}-${i}`;return <div key={i} className="exercise-box"><input type="checkbox" checked={!!exDone[k]} onChange={()=>setExDone(d=>{const n={...d};if(n[k])delete n[k];else n[k]=true;return n})} style={{marginTop:3,accentColor:"#a78bfa",width:18,height:18}}/><span style={{fontSize:".85rem",color:"#e5e7eb"}}>{ex}</span></div>})}</>}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>
          {idx>0?<button className="btn-secondary" onClick={()=>setLessonId(LESSONS[idx-1].id)}>← Prev</button>:<span/>}
          {idx<LESSONS.length-1?<button className="btn-secondary" onClick={()=>setLessonId(LESSONS[idx+1].id)}>Next →</button>:<span/>}
        </div>
      </div>;
    }
    return <div>
      <h2 className="sec-title">Training Material</h2><p className="sec-sub">Read, practice, master.</p>
      {[1,2].map(w=><div key={w}><div className="sec-label" style={{marginBottom:8}}>Week {w}</div><div className="lesson-grid" style={{marginBottom:16}}>
        {LESSONS.filter(l=>l.week===w).map(l=>{const core=isCoreLes(l.id);const ed=l.exercises.filter((_,i)=>exDone[`${l.id}-${i}`]).length;
          return <div key={l.id} onClick={()=>setLessonId(l.id)} className="lesson-card" style={{opacity:core?1:.7}}>
            <span style={{fontSize:"1.6rem"}}>{l.icon}</span>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:".9rem"}}>{l.title}<span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:".6rem",fontWeight:700,marginLeft:8,background:core?"rgba(16,185,129,.1)":"#374151",color:core?"#10b981":"#6b7280",border:`1px solid ${core?"rgba(16,185,129,.3)":"#4b5563"}`}}>{core?"Core":"Bonus"}</span></div>
            <div style={{fontSize:".72rem",color:"#6b7280",marginTop:2}}>{l.time} · {ed}/{l.exercises.length} exercises</div></div>
          </div>})}
      </div></div>)}
    </div>;
  };

  // CARDS
  const Cards=()=>{
    const cats=getCats();
    const isFavMode=fcCat==="★ Favorites";
    const isWeakMode=fcCat==="⚠ Weak";
    if(isFavMode&&!filtered.length) return <div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:40,marginBottom:16}}>⭐</div>
      <div style={{fontSize:17,fontWeight:600,marginBottom:8}}>No favorites yet</div>
      <div style={{fontSize:14,color:"#6b7280",lineHeight:1.5}}>Tap the ★ on any flashcard to save it here for focused review.</div>
      <button className="btn-primary" style={{marginTop:20}} onClick={()=>{setFcCat("All");setFcIdx(0);setFcFlip(false)}}>Browse All Cards</button>
    </div>;
    if(isWeakMode&&!filtered.length) return <div>
      <div className="pills">
        {weakCount>0&&<button className={cn("pill",isWeakMode&&"active")} onClick={()=>{setFcCat("⚠ Weak");setFcIdx(0);setFcFlip(false)}} style={!isWeakMode?{background:"rgba(245,158,11,.1)",color:"#f59e0b",border:"1px solid rgba(245,158,11,.25)"}:{}}>⚠ Weak ({weakCount})</button>}
        {cats.map(c=><button key={c} className={cn("pill",fcCat===c&&"active")} onClick={()=>{setFcCat(c);setFcIdx(0);setFcFlip(false)}}>{c}</button>)}
      </div>
      <div style={{textAlign:"center",padding:"40px 20px",color:"#9ca3af"}}>No weak cards! Rate flashcards to see them here.</div>
    </div>;
    const card=filtered[fcIdx]||filtered[0];if(!card)return <p>No cards.</p>;const si=Math.min(fcIdx,filtered.length-1);
    const isFav=fcFavs.has(card.f);
    const currentRating=cardRatings[card.f];
    return <div>
      <h2 className="sec-title">Flashcards</h2><p className="sec-sub">Seen: {stats.cards} · {si+1}/{filtered.length}</p>
      <div className="pills">
        {fcFavs.size>0&&<button className={cn("pill",isFavMode&&"active")} onClick={()=>{setFcCat("★ Favorites");setFcIdx(0);setFcFlip(false)}} style={!isFavMode?{background:"rgba(251,191,36,.1)",color:"#fbbf24",border:"1px solid rgba(251,191,36,.25)"}:{}}>★ Favorites ({fcFavs.size})</button>}
        {weakCount>0&&<button className={cn("pill",isWeakMode&&"active")} onClick={()=>{setFcCat("⚠ Weak");setFcIdx(0);setFcFlip(false)}} style={!isWeakMode?{background:"rgba(245,158,11,.1)",color:"#f59e0b",border:"1px solid rgba(245,158,11,.25)"}:{}}>⚠ Weak ({weakCount})</button>}
        {cats.map(c=><button key={c} className={cn("pill",fcCat===c&&"active")} onClick={()=>{setFcCat(c);setFcIdx(0);setFcFlip(false)}}>{isCoreCat(c)&&c!=="All"&&<span style={{color:"#f59e0b",marginRight:2}}>★</span>}{c}</button>)}
      </div>
      <div className="pills" style={{marginTop:0}}>
        {["All Levels","Beginner","Intermediate","Advanced"].map(d=><button key={d} className={cn("pill",fcDiff===d&&"active")} onClick={()=>{setFcDiff(d);setFcIdx(0);setFcFlip(false)}}>{d}</button>)}
      </div>
      <PB pct={(si+1)/filtered.length*100}/>
      {!fcFlip?
        <div className="card card-fc" onClick={()=>{setFcFlip(true);setStats(s=>({...s,cards:s.cards+1}))}} style={{position:"relative"}}>
          <button className={cn("fav-btn",isFav&&"active")} onClick={(e)=>{e.stopPropagation();toggleFav(card.f)}} title={isFav?"Remove from favorites":"Add to favorites"}>{isFav?"★":"☆"}</button>
          <span className="badge-cat">{card.c}{card.d&&<span style={{background:DIFF_COLORS[card.d],color:"#fff",fontSize:"10px",padding:"2px 7px",borderRadius:10,marginLeft:6,fontWeight:600}}>{DIFF_LABELS[card.d]}</span>}</span>
          <div style={{fontSize:"1.3rem",fontWeight:700,marginBottom:8,marginTop:12}}>{card.f}</div>
          {currentRating&&<div style={{fontSize:".72rem",color:currentRating==='missed'?"#ef4444":currentRating==='unsure'?"#f59e0b":"#10b981",marginBottom:4}}>Last: {currentRating}</div>}
          <div style={{fontSize:".8rem",color:"#6b7280"}}>Tap to flip</div>
        </div>:
        <div className="card" style={{minHeight:260,position:"relative"}}>
          <button className={cn("fav-btn",isFav&&"active")} onClick={(e)=>{e.stopPropagation();toggleFav(card.f)}} title={isFav?"Remove from favorites":"Add to favorites"}>{isFav?"★":"☆"}</button>
          <span className="badge-cat" style={{marginBottom:8}}>{card.c}{card.d&&<span style={{background:DIFF_COLORS[card.d],color:"#fff",fontSize:"10px",padding:"2px 7px",borderRadius:10,marginLeft:6,fontWeight:600}}>{DIFF_LABELS[card.d]}</span>}</span>
          <div style={{fontSize:".95rem",fontWeight:600,marginBottom:8,color:"#34d399"}}>{card.f}</div>
          <p style={{fontSize:".88rem",color:"#d1d5db",lineHeight:1.6,marginBottom:12}}>{gt(card.b)}</p>
          {card.u&&<SrcLink url={card.u} label="Read the docs"/>}
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:14}}>
            <button onClick={(e)=>{e.stopPropagation();fcRate('missed')}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:"#ef4444",color:"#fff",fontWeight:600}}>Missed</button>
            <button onClick={(e)=>{e.stopPropagation();fcRate('unsure')}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:"#f59e0b",color:"#fff",fontWeight:600}}>Unsure</button>
            <button onClick={(e)=>{e.stopPropagation();fcRate('known')}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:"#10b981",color:"#fff",fontWeight:600}}>Know it</button>
          </div>
        </div>}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
        <button className="btn-secondary" disabled={si===0} onClick={()=>{setFcIdx(i=>i-1);setFcFlip(false)}}>← Prev</button>
        <button className="btn-secondary" onClick={fcWeightedShuffle}>🔀 Shuffle</button>
        <button className="btn-secondary" disabled={si>=filtered.length-1} onClick={()=>{setFcIdx(i=>i+1);setFcFlip(false)}}>Next →</button>
      </div>
    </div>;
  };

  // QUIZ
  const Quiz=()=>{
    if(qMode==="picker") return <div>
      <h2 className="sec-title">Quizzes</h2><p className="sec-sub">Section quizzes + Final Exam.</p>
      {QUIZ_CATS.map(cat=>{const qs=QUIZ.filter(q=>q.cat===cat);const best=stats.quizScores[cat];
        return <div key={cat} className="card" style={{cursor:"pointer",marginBottom:10}} onClick={()=>startQuiz(cat)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:600,fontSize:".9rem"}}>{cat}</div><div style={{fontSize:".72rem",color:"#6b7280"}}>{qs.length} questions</div></div>
            <div style={{textAlign:"right"}}>{best!=null?<><div style={{fontWeight:700,color:"#10b981"}}>{best}%</div><div style={{fontSize:".65rem",color:"#6b7280"}}>BEST</div></>:<div style={{fontSize:".78rem",color:"#6b7280"}}>Not taken</div>}</div>
          </div>
        </div>})}
      <div className="card" style={{cursor:"pointer",background:"linear-gradient(135deg,rgba(16,185,129,.12),rgba(99,102,241,.12))",borderColor:"#10b981"}} onClick={()=>startQuiz("final")}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:"1.1rem",fontWeight:700}}>🎓 Final Exam</div><div style={{fontSize:".75rem",color:"#d1d5db"}}>10 random from all sections</div></div>
          <div style={{textAlign:"right"}}>{stats.quizScores.final!=null?<><div style={{fontWeight:700,color:"#10b981"}}>{stats.quizScores.final}%</div></>:<div style={{fontSize:".78rem",color:"#6b7280"}}>Not taken</div>}</div>
        </div>
      </div>
    </div>;
    if(qMode==="results"){const pct=Math.round(qScore/qQs.length*100);const grade=pct>=90?"A":pct>=80?"B":pct>=70?"C":pct>=60?"D":"F";const clr=pct>=80?"#10b981":pct>=60?"#f59e0b":"#ef4444";
      return <div className="card" style={{textAlign:"center",padding:30}}>
        <div style={{fontSize:".82rem",color:"#6b7280",marginBottom:8}}>{qCat==="final"?"🎓 Final Exam":qCat}</div>
        <div className="grade" style={{color:clr}}>{grade}</div>
        <div style={{fontSize:"1.1rem",color:"#9ca3af",marginTop:8}}>{qScore}/{qQs.length} ({pct}%)</div>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:20}}>
          <button className="btn-primary" onClick={()=>startQuiz(qCat)}>Try Again</button>
          <button className="btn-secondary" onClick={()=>setQMode("picker")}>All Quizzes</button>
        </div>
      </div>}
    const q=qQs[qIdx];
    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button className="btn-secondary" onClick={()=>setQMode("picker")} style={{padding:"6px 12px",fontSize:".82rem"}}>← All Quizzes</button>
        <span style={{fontSize:".75rem",color:"#6b7280"}}>{qCat==="final"?"🎓 Final":qCat} · {qIdx+1}/{qQs.length}</span>
      </div>
      <PB pct={qIdx/qQs.length*100}/>
      <div className="card">
        <p style={{fontSize:"1.05rem",fontWeight:500,marginBottom:14}}>{q.q}</p>
        {q.o.map((o,i)=>{let st="";let prefix=String.fromCharCode(65+i)+'. ';if(qSel!==null){if(i===q.a){st="correct";prefix='✓ '}else if(i===qSel){st="wrong";prefix='✗ '}else st="dimmed"}
          return <button key={i} className={cn("quiz-opt",st)} onClick={()=>{if(qSel!==null)return;setQSel(i);if(i===q.a)setQScore(s=>s+1)}}>{prefix}{o}</button>})}
        {qSel!==null&&<>
          <IBox type={qSel===q.a?"green":"red"} label={qSel===q.a?"✓ Why this is correct":"✗ Explanation"}><p style={{fontSize:".82rem"}}>{gt(q.e)}</p></IBox>
          {q.u&&<SrcLink url={q.u} label="Learn more"/>}
          <button className="btn-primary btn-full" style={{marginTop:12}} onClick={()=>{
            if(qIdx+1>=qQs.length){const pct=Math.round((qScore)/qQs.length*100);setStats(s=>{const ns={...s,quizzes:s.quizzes+1};if(pct>s.bestQuiz)ns.bestQuiz=pct;const key=qCat==="final"?"final":qCat;ns.quizScores={...s.quizScores,[key]:Math.max(s.quizScores[key]||0,pct)};return ns});setQMode("results")}
            else{setQIdx(i=>i+1);setQSel(null)}
          }}>{qIdx+1<qQs.length?"Next →":"See Results"}</button>
        </>}
      </div>
    </div>;
  };

  // DRILLS
  const Drills=()=>{
    const s=SCENARIOS[dOrd[dIdx]];
    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <h2 className="sec-title">Scenario Drills</h2><span style={{fontSize:".75rem",color:"#6b7280"}}>{dIdx+1}/{SCENARIOS.length}</span>
      </div>
      <p className="sec-sub">Read the objection. Think first. Then reveal.</p>
      <PB pct={(dIdx+1)/SCENARIOS.length*100} c="#f59e0b"/>
      <IBox type="red" label="Prospect Says"><p style={{fontSize:"1.05rem",fontWeight:500}}>{s.q}</p></IBox>
      {!dRev?<button className="btn-primary btn-full" onClick={()=>{setDRev(true);setStats(st=>({...st,scenarios:st.scenarios+1}))}}>Reveal Response</button>:
        <><IBox type="green" label="Suggested Response"><p style={{fontSize:".88rem"}}>{gt(s.a)}</p></IBox>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{s.u.filter(Boolean).map((u,i)=><SrcLink key={i} url={u}/>)}</div></>}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
        <button className="btn-secondary" disabled={dIdx===0} onClick={()=>{setDIdx(i=>i-1);setDRev(false)}}>← Prev</button>
        <button className="btn-secondary" disabled={dIdx>=SCENARIOS.length-1} onClick={()=>{setDIdx(i=>i+1);setDRev(false)}}>Next →</button>
      </div>
    </div>;
  };

  // RAPID
  const Rapid=()=>{
    if(rState==="ready") return <div>
      <h2 className="sec-title">Rapid Fire</h2><p className="sec-sub">Timed pressure drill.</p>
      <div className="card" style={{textAlign:"center",padding:30}}>
        <div style={{fontSize:"3rem",marginBottom:12}}>⚡</div><h3 style={{color:"#e5e7eb"}}>Ready?</h3>
        <p style={{fontSize:".85rem",color:"#9ca3af",margin:"10px 0 20px"}}>{RAPID.length} questions. Timer per question.</p>
        <button className="btn-primary btn-full" onClick={startRapid}>Start Rapid Fire</button>
      </div>
    </div>;
    if(rState==="results"){const pct=Math.round(rScore/rQs.length*100);const clr=pct>=80?"#10b981":pct>=60?"#f59e0b":"#ef4444";
      return <div>
        <h2 className="sec-title">Rapid Fire — Results</h2>
        <div className="card" style={{textAlign:"center",padding:24}}><div className="grade" style={{color:clr}}>{pct}%</div><div style={{fontSize:"1rem",color:"#9ca3af",marginTop:8}}>{rScore}/{rQs.length}</div></div>
        <div className="sec-label">Breakdown</div>
        {rQs.map((q,i)=><div key={i} className="card" style={{padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:"1.1rem"}}>{rRes[i]?"✅":"❌"}</span><span style={{fontSize:".82rem",color:"#9ca3af"}}>{q.q}</span></div>)}
        <button className="btn-primary btn-full" style={{marginTop:14}} onClick={()=>setRState("ready")}>Try Again</button>
      </div>}
    const q=rQs[rIdx];const tc=rTime>q.t*.5?"#10b981":rTime>q.t*.25?"#f59e0b":"#ef4444";
    return <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <h2 className="sec-title">Rapid Fire</h2><span style={{fontSize:".75rem",color:"#6b7280"}}>{rIdx+1}/{rQs.length}</span>
      </div>
      <PB pct={rIdx/rQs.length*100}/>
      {!rRev?<div className="card" style={{textAlign:"center",padding:24}}>
        <div className="timer" style={{color:tc}}>{rTime}</div>
        <div style={{fontSize:".72rem",color:"#6b7280",textTransform:"uppercase",marginBottom:16}}>seconds</div>
        <p style={{fontSize:"1.1rem",fontWeight:600,marginBottom:20}}>{q.q}</p>
        <button className="btn-primary" onClick={()=>{clearInterval(rTimer.current);setRRev(true)}}>I've got my answer</button>
      </div>:
      <div className="card">
        <p style={{fontSize:"1rem",fontWeight:600,marginBottom:12}}>{q.q}</p>
        <IBox type="green" label="Answer"><p style={{fontSize:".88rem"}}>{q.a}</p></IBox>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button className="btn-primary" style={{flex:1}} onClick={()=>{
            const nr=[...rRes,true];setRRes(nr);const ns=rScore+1;setRScore(ns);
            if(rIdx+1>=rQs.length){setStats(s=>({...s,rapid:s.rapid+1,bestRapid:Math.max(s.bestRapid,Math.round(ns/rQs.length*100))}));setRState("results")}
            else{const ni=rIdx+1;setRIdx(ni);setRRev(false);setRTime(rQs[ni].t);clearInterval(rTimer.current);rTimer.current=setInterval(()=>setRTime(t=>{if(t<=1){clearInterval(rTimer.current);setRRev(true);return 0}return t-1}),1000)}
          }}>✓ Nailed it</button>
          <button className="btn-danger" style={{flex:1}} onClick={()=>{
            const nr=[...rRes,false];setRRes(nr);
            if(rIdx+1>=rQs.length){setStats(s=>({...s,rapid:s.rapid+1,bestRapid:Math.max(s.bestRapid,Math.round(rScore/rQs.length*100))}));setRState("results")}
            else{const ni=rIdx+1;setRIdx(ni);setRRev(false);setRTime(rQs[ni].t);clearInterval(rTimer.current);rTimer.current=setInterval(()=>setRTime(t=>{if(t<=1){clearInterval(rTimer.current);setRRev(true);return 0}return t-1}),1000)}
          }}>✗ Nope</button>
        </div>
      </div>}
    </div>;
  };

  // MORE
  const More=()=><div>
    <div className="pills" style={{marginBottom:16}}>
      {["settings","resources"].map(t=><button key={t} className={cn("pill",moreTab===t&&"active")} onClick={()=>setMoreTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
    </div>
    {moreTab==="settings"&&<>
      <div className="sec-label">Progress</div>
      <div className="card"><div style={{fontSize:".82rem",color:"#9ca3af",lineHeight:1.8}}>
        Quizzes: {stats.quizzes} · Best: {stats.bestQuiz}%<br/>Cards: {stats.cards} · Drills: {stats.scenarios}<br/>Rapid: {stats.rapid} · Best: {stats.bestRapid}%<br/>Exercises: {Object.keys(exDone).length}/{LESSONS.reduce((s,l)=>s+l.exercises.length,0)}
      </div></div>
      <p style={{fontSize:".72rem",color:"#10b981",marginTop:10}}>✓ Progress saves automatically across sessions.</p>

      <div style={{marginTop:18}}>
        <div className="sec-label">Font Size</div>
        <div className="card">
          <label style={{display:"block",fontSize:".78rem",color:"#9ca3af",marginBottom:8}}>Adjust text size across all screens</label>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {[{v:"fs-s",l:"S"},{v:"fs-m",l:"M"},{v:"fs-l",l:"L"},{v:"fs-xl",l:"XL"}].map(s=>
              <button key={s.v} className="pill" onClick={()=>applyFontSize(s.v)} style={{minWidth:40,textAlign:"center"}}>{s.l}</button>
            )}
          </div>
          <p style={{fontSize:".68rem",color:"#6b7280",marginTop:6}}>Setting saved per device. Applies immediately.</p>
        </div>
      </div>

      <div style={{marginTop:18}}>
        <div className="sec-label">Cloud Sync</div>
        <div className="card">
          <p style={{fontSize:".75rem",color:"#9ca3af",marginBottom:10}}>Sync progress across devices via a Google Sheet. <a href="https://barrysolomon.github.io/study-apps/google-sheets-sync-setup.md" target="_blank" rel="noopener" style={{color:"#10b981"}}>Setup guide</a></p>
          <label style={{display:"block",fontSize:".72rem",color:"#6b7280",marginBottom:3}}>Sync URL</label>
          <input id="syncUrlInput" className="form-input mono" defaultValue={SYNC_SHEET_URL} placeholder="https://script.google.com/macros/s/.../exec" style={{marginBottom:10}}/>
          <label style={{display:"block",fontSize:".72rem",color:"#6b7280",marginBottom:3}}>Your name</label>
          <input id="syncUserInput" className="form-input" defaultValue={SYNC_USER_ID} placeholder="e.g. barry" maxLength={40} style={{maxWidth:220,marginBottom:4}}/>
          <p style={{fontSize:".68rem",color:"#6b7280",marginBottom:10}}>Optional — keeps your data separate when sharing a sync sheet.</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn-primary" style={{fontSize:".8rem",padding:"8px 18px"}} onClick={()=>{
              const url=document.getElementById("syncUrlInput").value;
              const user=document.getElementById("syncUserInput").value;
              saveSyncSettings(url,user);
              setSyncSt(syncEnabled()?"idle":"off");
              if(syncEnabled()) cloudSave().then(()=>setSyncSt("synced")).catch(()=>setSyncSt("error"));
            }}>Save</button>
            <button className="btn-outline" style={{fontSize:".8rem",padding:"8px 18px"}} onClick={()=>{
              saveSyncSettings("","");
              document.getElementById("syncUrlInput").value="";
              document.getElementById("syncUserInput").value="";
              setSyncSt("off");
            }}>Disconnect</button>
          </div>
          <div style={{marginTop:10,fontSize:".72rem"}}>
            {syncSt==="synced"&&<span style={{color:"#10b981"}}>✓ Connected{lastSyncAt&&" · Last sync: "+new Date(lastSyncAt).toLocaleTimeString()}</span>}
            {syncSt==="syncing"&&<span style={{color:"#facc15"}}>⏳ Syncing…</span>}
            {syncSt==="error"&&<span style={{color:"#ef4444"}}>⚠ Sync error — check URL</span>}
            {syncSt==="offline"&&<span style={{color:"#f59e0b"}}>📴 Offline — will sync when reconnected</span>}
            {syncSt==="off"&&<span style={{color:"#6b7280"}}>Not connected</span>}
            {syncSt==="idle"&&syncEnabled()&&<span style={{color:"#6b7280"}}>Ready</span>}
          </div>
          {syncEnabled()&&<p style={{fontSize:".68rem",color:"#4b5563",marginTop:6}}>Sync key: <code style={{color:"#6b7280"}}>{getSyncKey()}</code></p>}
        </div>
      </div>

      <div style={{marginTop:18}}>
        <div className="sec-label">Danger Zone</div>
        {!showResetConfirm?<button className="btn-outline" style={{width:"100%",borderColor:"#ef4444",color:"#ef4444"}} onClick={()=>setShowResetConfirm(true)}>🗑 Reset All Progress</button>
        :<div className="reset-confirm">
          <p style={{color:"#fca5a5",fontSize:".85rem",fontWeight:600,marginBottom:4}}>Are you sure?</p>
          <p style={{color:"#9ca3af",fontSize:".78rem",marginBottom:12}}>This will erase all quiz scores, exercise completions, and drill progress. Can't be undone.</p>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-danger" style={{flex:1}} onClick={resetAllProgress}>Yes, Reset Everything</button>
            <button className="btn-outline" style={{flex:1}} onClick={()=>setShowResetConfirm(false)}>Cancel</button>
          </div>
        </div>}
      </div>
    </>}
    {moreTab==="resources"&&<>
      {[["Dash0 Core",[["Homepage","https://dash0.com"],["Pricing","https://dash0.com/pricing"],["Agent0","https://dash0.com/ai-sre-agent"],["Docs","https://dash0.com/docs/dash0"]]],
        ["Competitors",[["vs Datadog","https://dash0.com/datadog-alternative"],["vs New Relic","https://dash0.com/newrelic-alternative"],["vs Grafana","https://dash0.com/grafana-alternative"],["vs Dynatrace","https://dash0.com/dynatrace-alternative"]]],
        ["OpenTelemetry",[["OTel Docs","https://opentelemetry.io/docs/"],["OTelBin","https://otelbin.io"]]]
      ].map(([g,links])=><div key={g}><div className="sec-label" style={{marginBottom:8}}>{g}</div><div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>{links.map(([t,u])=><SrcLink key={u} url={u} label={t}/>)}</div></div>)}
    </>}
  </div>;

  return <div>
    <div className="header">
      <div><h1>Value Framework Trainer</h1><small style={{fontSize:12,color:"#6b7280"}}>Dash0 Sales Enablement</small></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {role&&<button className="role-current" onClick={()=>setRole(null)}>{ROLE_CONFIG[role].icon} {ROLE_CONFIG[role].label}</button>}
        <div className="badge">v3.1</div>
        {syncSt!=="off"&&<span className="sync-badge" title={syncSt==="synced"?"Cloud synced":"Sync: "+syncSt}>{syncSt==="syncing"?"⏳":syncSt==="synced"?"☁️":syncSt==="error"?"⚠️":syncSt==="offline"?"📴":"☁️"}</span>}
        <span className="ver">{PLATFORM_VERSION}</span>
      </div>
    </div>
    <div className="content">
      {tab==="home"&&<Home/>}{tab==="learn"&&<Learn/>}{tab==="cards"&&<Cards/>}{tab==="quiz"&&<Quiz/>}{tab==="drills"&&<Drills/>}{tab==="rapid"&&<Rapid/>}{tab==="more"&&<More/>}
    </div>
    <div className="nav">{TABS.map(t=><button key={t.id} className={cn(tab===t.id&&"active")} onClick={()=>setTab(t.id)}><span>{t.i}</span>{t.l}</button>)}</div>
    {!role&&<div className="role-overlay">
      <div className="role-picker">
        <h2>Choose Your Track</h2>
        <p className="rp-sub">Pick a learning path tailored to your role. You can switch anytime.</p>
        <div className="role-cards">
          {Object.entries(ROLE_CONFIG).map(([key,cfg])=>
            <div key={key} className="role-card" onClick={()=>setRole(key)}>
              <div className="rc-icon">{cfg.icon}</div>
              <div className="rc-title">{cfg.label}</div>
              <div className="rc-desc">{cfg.desc}</div>
            </div>
          )}
        </div>
      </div>
    </div>}
    {glossTerm&&<div className="glossary-overlay" onClick={()=>setGlossTerm(null)}>
      <div className="glossary-card" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:".65rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"#93c5fd",marginBottom:6}}>{glossTerm.key}</div>
        <div style={{fontSize:"1.05rem",fontWeight:700,color:"#e5e7eb",marginBottom:10}}>{glossTerm.title}</div>
        <p style={{fontSize:".88rem",color:"#d1d5db",lineHeight:1.65,margin:0}}>{glossTerm.def}</p>
        <button className="btn-outline btn-full" style={{marginTop:16}} onClick={()=>setGlossTerm(null)}>Got it</button>
      </div>
    </div>}
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
