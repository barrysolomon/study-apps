<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pairwise Testing Crash Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}.header small{font-size:12px;color:#6b7280}
.badge{background:rgba(16,185,129,.15);color:#6ee7b7;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
.card{border-radius:16px;padding:20px;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;-webkit-user-select:none}
.card.question{background:#1f2937;border:2px solid #374151}
.card.answer{background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.card-text{font-size:17px;line-height:1.5}
.card-hint{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1;filter:none}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#1f2937;color:#d1d5db}.btn-secondary:hover{background:#374151}
.btn-danger{background:rgba(239,68,68,.2);border:2px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:rgba(16,185,129,.2);border:2px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn-full{width:100%;padding:14px;font-size:15px}
.progress-bar{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{width:100%;background:#1f2937;border-radius:999px;height:8px}
.progress-fill{background:#10b981;height:8px;border-radius:999px;transition:width .5s}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.pill.active{background:#10b981;color:#fff}.pill:not(.active){background:#1f2937;color:#9ca3af}
.quiz-option{text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.quiz-option.correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.dimmed{background:rgba(31,41,55,.5);border-color:#1f2937;color:#4b5563}
.scenario-box{border-radius:16px;padding:20px;margin-bottom:16px}
.scenario-q{background:rgba(239,68,68,.08);border:2px solid rgba(153,27,27,.4)}
.scenario-a{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3)}
.scenario-reveal{background:#1f2937;border:2px solid #374151;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.timer{font-size:28px;font-family:monospace;font-weight:700}
.timer.green{color:#10b981}.timer.yellow{color:#f59e0b}.timer.red{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}.stat-val{font-size:20px;font-weight:700}.stat-label{font-size:11px;color:#6b7280}
.focus-box{background:#1f2937;border-radius:16px;padding:16px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
.results-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.grade{font-size:56px;font-weight:700;text-align:center;margin-bottom:8px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:50vh}
.mgmt-section{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:16px}
.mgmt-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#d1d5db}
.mgmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.mgmt-row:last-child{border-bottom:none}
.mgmt-row .label{font-size:13px;color:#9ca3af}
.mgmt-row .value{font-size:13px;font-weight:600;color:#fff}
.btn-outline{background:transparent;border:2px solid #374151;color:#9ca3af;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#6b7280;color:#d1d5db}
.btn-danger-solid{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-danger-solid:hover{background:#b91c1c}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-box{background:#1f2937;border:2px solid #374151;border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151;font-size:12px}
.history-item:last-child{border-bottom:none}
.export-box{background:#0d1117;border:1px solid #374151;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#6ee7b7;word-break:break-all;max-height:120px;overflow-y:auto;margin-top:8px}
.source-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.source-link:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.source-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.res-group{margin-bottom:20px}
.res-group h4{font-size:13px;font-weight:600;color:#6ee7b7;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.res-link{display:block;padding:10px 12px;border-radius:10px;background:#1f2937;margin-bottom:6px;text-decoration:none;color:#93c5fd;font-size:13px;font-weight:500;border:1px solid #374151;transition:all .2s}
.res-link:hover{background:#374151;border-color:#4b5563}
.res-link small{display:block;color:#6b7280;font-size:11px;font-weight:400;margin-top:2px}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.lesson-card{background:#1f2937;border-radius:16px;padding:16px;cursor:pointer;border:2px solid #374151;transition:all .2s}
.lesson-card:hover{border-color:#4b5563}
.lesson-card.completed{border-color:rgba(16,185,129,.3)}
.lesson-num{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.lesson-title{font-size:15px;font-weight:600;margin:4px 0}
.lesson-meta{font-size:12px;color:#6b7280;display:flex;gap:12px}
.lesson-body{padding:0}
.lesson-section{margin-bottom:20px}
.lesson-section h4{font-size:13px;font-weight:600;color:#6ee7b7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lesson-text{font-size:14px;color:#d1d5db;line-height:1.7}
.lesson-text p{margin-bottom:10px}
.lesson-highlight{background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:10px 14px;border-radius:0 10px 10px 0;margin:10px 0;font-size:13px;color:#d1fae5;line-height:1.5}
.lesson-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.lesson-compare-item{background:#0d1117;border-radius:10px;padding:10px;font-size:12px;line-height:1.5}
.lesson-compare-item .compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.exercise-box{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.exercise-box .ex-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.exercise-box .ex-task{font-size:13px;color:#ddd6fe;line-height:1.5;margin-bottom:8px}
.exercise-box .ex-hint{font-size:12px;color:#6b7280;font-style:italic}
.exercise-check{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
.exercise-check .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #374151;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.exercise-check .checkbox.checked{background:#10b981;border-color:#10b981}
.exercise-check .ex-text{font-size:13px;color:#d1d5db}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}
.sched-item{background:#1f2937;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #374151;transition:all .2s}
.sched-item.today{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.sched-item.past{opacity:.5}
.sched-item.done{border-color:rgba(16,185,129,.3);opacity:.7}
.sched-item .si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sched-item .si-date{font-size:11px;color:#6b7280;font-weight:600}
.sched-item .si-dur{font-size:10px;color:#4b5563;background:#0d1117;padding:2px 8px;border-radius:6px}
.sched-item .si-title{font-size:14px;font-weight:600;color:#e5e7eb;margin-bottom:2px}
.sched-item .si-desc{font-size:12px;color:#9ca3af;line-height:1.4}
.sched-item .si-actions{display:flex;gap:6px;margin-top:8px}
.sched-item .si-actions button{padding:6px 10px;border-radius:8px;border:none;font-size:11px;font-weight:500;cursor:pointer}
.cp-item{background:rgba(251,191,36,.06);border:2px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;margin-bottom:8px}
.cp-item.hit{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.cp-item .cp-target{font-size:14px;font-weight:600;color:#fde68a}
.cp-item.hit .cp-target{color:#6ee7b7;text-decoration:line-through}
.cp-item .cp-date{font-size:11px;color:#6b7280}
.form-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.form-sheet{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.form-sheet h3{font-size:16px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:14px;font-family:inherit}
.form-field textarea{min-height:60px;resize:vertical}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#10b981}
.ask-box{background:rgba(139,92,246,.06);border:2px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;margin-top:16px}
.ask-box .ask-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ask-box .ask-row{display:flex;gap:8px}
.ask-box input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:13px;font-family:inherit}
.ask-box input:focus{outline:none;border-color:#a78bfa}
.ask-box input::placeholder{color:#4b5563}
.ask-box button{padding:10px 14px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ask-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(124,58,237,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ics-panel{background:#111827;border:2px solid #374151;border-radius:16px;padding:16px;margin-bottom:16px}
.ics-panel h4{font-size:13px;font-weight:600;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ics-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ics-filters button{padding:5px 10px;border-radius:8px;border:2px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.ics-filters button.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#93c5fd}
.ics-list{max-height:320px;overflow-y:auto;margin-bottom:12px}
.ics-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.ics-item:last-child{border-bottom:none}
.ics-check{width:20px;height:20px;border-radius:5px;border:2px solid #374151;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:12px;color:transparent}
.ics-check.on{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.ics-item-info{flex:1;min-width:0}
.ics-item-title{font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ics-item-date{font-size:11px;color:#6b7280}
.ics-actions{display:flex;gap:8px;margin-top:4px}
.ics-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.ics-dl{background:#3b82f6;color:#fff}
.ics-dl:hover{background:#2563eb}
.ics-count{font-size:12px;color:#6b7280;margin-bottom:8px}
@media(min-width:600px){
body{max-width:960px;padding:0 24px}
.header{padding:20px 0 12px}
.header h1{font-size:22px}
.content{padding:20px 0 100px}
.nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}
.nav button{min-width:auto;padding:8px 14px;font-size:12px;flex-direction:row;gap:6px;border-radius:10px}
.nav button span{font-size:16px;margin-bottom:0}
.stat-grid{grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{padding:16px}
.stat-val{font-size:22px}
.card{max-width:640px;margin:0 auto;min-height:240px;padding:28px}
.card-text{font-size:18px}
.quiz-option{font-size:15px;padding:16px 20px}
.scenario-box{max-width:700px}
.lesson-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.lesson-card{margin-bottom:0}
.mgmt-section{max-width:700px}
.form-sheet{max-width:560px;border-radius:20px;margin:auto}
.form-overlay{align-items:center}
.res-group{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.res-group h4{grid-column:1/-1}
.focus-box{max-width:700px}
.sched-item{max-width:700px}
.ics-panel{max-width:700px}
.cp-item{max-width:700px}
.pills{flex-wrap:wrap}
.ask-box{max-width:640px;margin:16px auto 0}
.confirm-box{max-width:400px}
.source-links{justify-content:flex-start}
}
@media(min-width:800px){
body{max-width:1100px}
.nav{max-width:1100px}
.stat-grid{grid-template-columns:repeat(4,1fr)}
.lesson-grid{grid-template-columns:repeat(3,1fr)}
.card{max-width:700px}
.res-group{grid-template-columns:repeat(3,1fr)}
}
.role-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.role-picker{max-width:520px;width:92%;padding:28px 20px;text-align:center}
.role-picker h2{font-size:22px;font-weight:700;margin-bottom:6px}
.role-picker .rp-sub{font-size:14px;color:#9ca3af;margin-bottom:24px;line-height:1.5}
.role-cards{display:flex;flex-direction:column;gap:12px}
.role-card{background:#1f2937;border:2px solid #374151;border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;text-align:left}
.role-card:hover{border-color:#10b981;background:#263040}
.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-badge.core{background:rgba(16,185,129,.15);color:#6ee7b7}
.role-badge.bonus{background:rgba(107,114,128,.15);color:#6b7280}
.role-current{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:#1f2937;border:1px solid #374151;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:#d1d5db}
.role-current:hover{border-color:#10b981;background:#263040}
.fs-s .card-text,.fs-s .lesson-text,.fs-s .quiz-option,.fs-s .scenario-box,.fs-s .scenario-q,.fs-s .scenario-a,.fs-s .focus-text{font-size:13px}
.fs-m .card-text,.fs-m .lesson-text,.fs-m .quiz-option,.fs-m .scenario-box,.fs-m .scenario-q,.fs-m .scenario-a,.fs-m .focus-text{font-size:15px}

{f:"What is pairwise testing?",b:"A test design technique that generates test cases covering every combination of values between every pair of parameters. Also called all-pairs or 2-way combinatorial testing.",c:"Fundamentals",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"What percentage of bugs does pairwise (2-way) testing detect per NIST studies?",b:"~93% — most bugs are triggered by interactions of 1-2 parameters, with progressively fewer by 3+",c:"Fundamentals",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"What is a covering array?",b:"A mathematical structure CA(N; t, k, v) where N=rows, t=strength, k=parameters, v=values per parameter. Every t-way combination of values appears in at least one row.",c:"Fundamentals",u:"https://math.nist.gov/coveringarrays/ipof/ipof-results.html"},
{f:"What does t=2 mean in a covering array?",b:"Pairwise strength — every pair of values between any two parameters is covered at least once.",c:"Fundamentals",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"What is the combinatorial explosion problem?",b:"With k parameters of v values each, exhaustive testing requires v^k cases. 6 params of 3 values = 729 tests. Pairwise reduces this to ~15-20.",c:"Fundamentals",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"How does test count grow with more parameters in pairwise?",b:"Logarithmically — O(v² × log k). Going from 10 to 100 parameters roughly doubles the test count, not 10x.",c:"Fundamentals",u:"https://math.nist.gov/coveringarrays/ipof/ipof-results.html"},
{f:"What is PICT?",b:"Pairwise Independent Combinatorial Testing tool — open-source CLI from Microsoft. The most widely used pairwise test generator.",c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"How do you install PICT on macOS?",b:"brew install pict",c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"What is a PICT model file?",b:"A text file listing parameters and their values. Format: ParameterName: Value1, Value2, Value3 (one parameter per line).",c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"How do you generate 3-way tests with PICT?",b:"pict model.txt /o:3 — the /o flag sets interaction strength (default is 2 for pairwise).",c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"How do you add constraints in PICT?",b:'IF [Param1] = "Value" THEN [Param2] <> "Value"; — added at the bottom of the model file.',c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"What are PICT sub-models?",b:"Mixed-strength groups: {A, B, C} @ 3 tests those 3 params at 3-way while the rest stay at 2-way. Gives higher assurance where it matters.",c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"What are PICT weights?",b:"Bias toward certain values: Chrome (5), Firefox (1). Higher weight = appears in more test cases. Useful for popular configurations.",c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"What is ACTS?",b:"NIST's covering array generator — implements IPOG algorithm. Free (public domain), supports 2-way through 6-way. Java GUI/CLI. Email acts-info@nist.gov to download.",c:"Tools",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"What is allpairspy?",b:"A Python library for pairwise test generation. pip install allpairspy. Returns test cases as Python lists — easy to integrate with pytest.",c:"Tools",u:"https://github.com/thombashi/allpairspy"},
{f:"What is CTWedge?",b:"A web-based combinatorial testing tool — no install needed. Good for quick generation and academic use.",c:"Tools",u:"https://foselab.unibg.it/ctwedge/"},
{f:"What is the IPOG algorithm?",b:"In-Parameter-Order-General — extends a covering array one parameter at a time via horizontal growth (fill existing rows) then vertical growth (add new rows). Used in ACTS.",c:"Algorithms",u:"https://math.nist.gov/coveringarrays/ipof/ipof-results.html"},
{f:"How does the greedy algorithm for pairwise work?",b:"Generate all required pairs. Repeatedly pick the test case that covers the most uncovered pairs. Simple but not optimal.",c:"Algorithms",u:"https://www.pairwise.org/tools.html"},
{f:"What is simulated annealing in pairwise context?",b:"Start with a random test suite, make small random changes, keep improvements and sometimes keep worse changes (to escape local optima). Produces very compact arrays but is slow and non-deterministic.",c:"Algorithms",u:"https://www.pairwise.org/tools.html"},
{f:"What is a mixed covering array?",b:"A covering array where parameters have different numbers of values — e.g., one param has 2 values, another has 5. Written MCA(N; t, k, (v1, v2, ..., vk)). This is the real-world case.",c:"Algorithms",u:"https://math.nist.gov/coveringarrays/ipof/ipof-results.html"},
{f:"What is the lower bound for a CA(N; 2, k, v)?",b:"N ≥ v² — you need at least v² rows to cover all pairs of any two v-valued parameters.",c:"Algorithms",u:"https://math.nist.gov/coveringarrays/ipof/ipof-results.html"},
{f:"What cumulative bug detection does 3-way testing achieve?",b:"~98% per NIST studies (vs ~93% for 2-way).",c:"Fundamentals",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"What cumulative bug detection does 6-way testing achieve?",b:"~100% — virtually all bugs are caused by interactions of 6 or fewer parameters.",c:"Fundamentals",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"When is pairwise testing NOT a good fit?",b:"Sequential/workflow testing (order matters more than combos), very few params (just test exhaustively), or when specific 3+ way interactions are known critical (use higher t).",c:"Practice",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"How do you handle constraints in pairwise testing?",b:"Exclude invalid combinations (e.g., Safari only on macOS). In PICT: IF/THEN constraints. Reduces test count but ensures no impossible test cases.",c:"Practice",u:"https://github.com/microsoft/pict"},
{f:"How do you integrate pairwise output with test automation?",b:"Generate CSV with PICT (pict model.txt > tests.csv), then use data-driven/parameterized tests in your framework (pytest, JUnit, TestNG) to read and execute each row.",c:"Practice",u:"https://github.com/microsoft/pict"},
{f:"What is pair coverage?",b:"The percentage of all valid parameter-value pairs covered by your test suite. Formula: covered_pairs / total_valid_pairs × 100%.",c:"Practice",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"How do you measure coverage of an existing test suite?",b:"Map each test to parameter values, enumerate all valid pairs, check which are covered. PICT /c flag or CAMetrics web tool can help.",c:"Practice",u:"https://www.pairwise.org/tools.html"},
{f:"What is boundary value analysis (BVA) combined with pairwise?",b:"Use boundary values as the parameter values in your pairwise model — e.g., for a 1-999 range, use {1, 500, 999} as values. Combines two powerful techniques.",c:"Practice",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"What is equivalence partitioning combined with pairwise?",b:"Group parameter values into equivalence classes, pick one representative from each class as your pairwise parameter values. Keeps value count low for practical test suites.",c:"Practice",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"What is the NIST publication on combinatorial testing?",b:"SP 800-142 'Practical Combinatorial Testing' (2010) — the best overview/tutorial. By Kuhn, Kacker, and Lei.",c:"Fundamentals",u:"https://csrc.nist.gov/pubs/sp/800/142/final"},
{f:"What was the foundational empirical study for pairwise testing?",b:"Kuhn, Wallace, Gallo (2004) 'Software Fault Interactions and Implications for Software Testing' — analyzed FDA recalls, browser bugs, server failures.",c:"Fundamentals",u:"https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"},
{f:"How do you identify parameters for a pairwise model?",b:"List all: config values, UI controls, API params, environment factors (OS/browser), user states (role/locale), feature flags. Then enumerate values for each.",c:"Practice",u:"https://github.com/microsoft/pict"},
{f:"What is the PICT /r flag for?",b:"Sets a random seed for reproducible output. pict model.txt /r:42 always produces the same test suite.",c:"Tools",u:"https://github.com/microsoft/pict"},
{f:"What is the PICT /e flag for?",b:"Seeding file — forces specific rows to appear in the output. Useful when certain configurations must always be tested.",c:"Tools",u:"https://github.com/microsoft/pict"},
];

{q:"We have 500 manual test cases for this feature. Management says we need to reduce the test suite but maintain quality. How do you approach this?",a:"First, map the existing 500 tests to their parameter values and measure current pairwise coverage. You will likely find that many tests cover the same pairs. Generate a pairwise suite with PICT — it might produce 20-30 tests with 100% pair coverage. Compare: your 500 tests probably only have 80-90% pair coverage despite being 20x larger. Present this data: fewer tests, better systematic coverage, 93% bug detection per NIST research.",u:["https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software","https://github.com/microsoft/pict"]},
{q:"A developer says: 'Pairwise testing misses bugs that only appear with specific 3-parameter combinations. It is not thorough enough.'",a:"They are technically correct — pairwise only guarantees 2-way coverage (~93% detection). But: (1) NIST data shows 3-way gets you to 98%, and PICT supports this with /o:3. (2) You can use sub-models to test critical parameter trios at 3-way strength while keeping the rest at 2-way. (3) If they know specific 3-way interactions matter, add them as seeded test cases with PICT /e flag. Pairwise is a floor, not a ceiling.",u:["https://github.com/microsoft/pict","https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"]},

{q:"How do I convince my team to adopt pairwise testing when they are happy with their current ad-hoc approach?",a:"Measure first, then show. Take one of their existing test suites and calculate its pairwise coverage — it is probably 60-80%. Then generate a pairwise suite for the same feature. Show: (1) the generated suite is smaller, (2) it has 100% pair coverage, (3) it likely found parameter combinations nobody was testing. The NIST data (93% bug detection with massive test reduction) is your business case. Start with one feature as a pilot.",u:["https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software","https://github.com/microsoft/pict"]},
{q:"We use pairwise for our API tests, but we keep finding bugs that involve specific 4-parameter interactions in our payment processing flow. What should we change?",a:"For the payment flow specifically, increase the interaction strength. Use PICT sub-models: {PaymentMethod, Currency, Amount, Region} @ 4 to test that critical group at 4-way strength, while keeping other parameters at 2-way. The 4-way suite for 4 parameters is still manageable. You can also seed known problematic combinations with /e. For the rest of your API tests, 2-way is fine — reserve higher strength for where the bugs actually are.",u:["https://github.com/microsoft/pict","https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"]},
{q:"Our test parameters have many dependencies — e.g., payment type determines which fields are required, country determines available payment types. Is pairwise still useful?",a:"Yes, but constraints are essential. Model the dependencies as PICT IF/THEN constraints. Example: IF [PaymentType] = 'CreditCard' THEN [CardField] <> 'N/A'; IF [Country] = 'US' THEN [PaymentType] IN {'Credit','Debit','ACH'}. PICT will only generate valid combinations. Heavily constrained models produce smaller test suites (fewer valid combos to cover) and are more realistic.",u:["https://github.com/microsoft/pict"]},
{q:"How do I integrate pairwise-generated test cases into our CI pipeline?",a:"Three approaches: (1) Generate a CSV (pict model.txt -d, > matrix.csv), commit it, and use data-driven tests that read it. (2) Run PICT in CI itself — install via brew/apt, generate fresh on each run. (3) Use allpairspy in Python to generate inline within your test code. Option 1 is simplest for stable parameters. Option 2 handles model changes automatically. Parameterize your tests (pytest @parametrize, JUnit @MethodSource, TestNG DataProvider) to iterate over the matrix rows.",u:["https://github.com/microsoft/pict","https://github.com/thombashi/allpairspy"]},

body:`<div class="lesson-section"><h4>The Core Idea</h4><div class="lesson-text"><p>Pairwise testing (also called <strong>all-pairs</strong> or <strong>2-way combinatorial testing</strong>) generates test cases that cover every combination of values between every <em>pair</em> of parameters. Instead of testing all possible combinations (exhaustive), you test a much smaller set that still exercises every 2-way interaction.</p>
<p>This works because most software bugs are triggered by interactions between only 1-2 parameters. NIST research found:</p>
<ul><li><strong>~67%</strong> of bugs: single parameter values (1-way)</li><li><strong>~93%</strong> cumulative: pairwise interactions (2-way)</li><li><strong>~98%</strong> cumulative: 3-way interactions</li><li><strong>~100%</strong> by 6-way interactions</li></ul></div></div>
<div class="lesson-highlight">Pairwise testing achieves ~93% bug detection with a 20x to 700x reduction in test cases compared to exhaustive testing (NIST).</div>
<div class="lesson-section"><h4>The Combinatorial Explosion</h4><div class="lesson-text"><p>Consider a web app tested across 4 browsers × 3 operating systems × 3 screen sizes × 5 languages × 3 auth methods × 2 themes. Exhaustive = <strong>1,080 test cases</strong>. Pairwise = <strong>~15-20 test cases</strong>. That is a 50-70x reduction while still covering every pair of parameter values.</p>
<p>The key insight: test count grows <strong>logarithmically</strong> with the number of parameters — O(v² × log k). Adding more parameters barely increases the test suite.</p></div></div>`},
{id:"lesson-2",title:"Covering Arrays and the Math",time:"10 min read",week:1,icon:"📐",
sources:["https://math.nist.gov/coveringarrays/ipof/ipof-results.html","https://csrc.nist.gov/pubs/sp/800/142/final"],
exercises:[
{task:"Take 3 binary parameters (A: 0/1, B: 0/1, C: 0/1). List all 12 pairs. By hand, find the minimum set of rows that covers all pairs.",hint:"You should need exactly 4 rows. This is a CA(4; 2, 3, 2)."},
{task:"Verify: for 4 parameters with 3 values each, the lower bound is 3²=9 rows. Use CTWedge to generate the actual pairwise suite. How close is it to the lower bound?",hint:"Go to foselab.unibg.it/ctwedge and define a simple model.",url:"https://foselab.unibg.it/ctwedge/"}
],
body:`<div class="lesson-section"><h4>Covering Array Notation</h4><div class="lesson-text"><p>A <strong>covering array</strong> CA(N; t, k, v) guarantees that for any t columns, every possible combination of values appears in at least one row.</p>
<ul><li><strong>N</strong> = number of rows (test cases)</li><li><strong>t</strong> = strength (2 for pairwise, 3 for 3-way, etc.)</li><li><strong>k</strong> = number of parameters (columns)</li><li><strong>v</strong> = number of values per parameter</li></ul>
<p>For pairwise (t=2): every pair of values between any two parameters appears in at least one test case.</p>
<p><strong>Mixed covering arrays</strong> handle real-world cases where parameters have different numbers of values. Written as MCA(N; t, k, (v₁, v₂, ..., vₖ)).</p></div></div>
<div class="lesson-highlight">Lower bound: N ≥ v². Upper bound: N ≤ v² × ⌈ln(k)⌉. Test count grows logarithmically in k — going from 10 to 100 parameters roughly doubles the suite.</div>
<div class="lesson-section"><h4>Approximate Sizes</h4><div class="lesson-text"><p>For uniform parameters (all v values, k parameters):</p>
<ul><li><strong>t=2, v=2, k=10:</strong> 6-10 tests</li><li><strong>t=2, v=3, k=10:</strong> 15-20 tests</li><li><strong>t=2, v=5, k=10:</strong> 30-40 tests</li><li><strong>t=3, v=3, k=10:</strong> 50-80 tests</li></ul>
<p>Growth is dominated by v^t. This is why <strong>keeping value counts small</strong> (via equivalence partitioning) is critical for practical test suites.</p></div></div>`},

sources:["https://github.com/microsoft/pict"],

{task:"Install PICT (brew install pict or build from GitHub). Create a model with 5 parameters and generate a pairwise suite.",hint:"Start simple: Browser, OS, ScreenSize, Language, Theme.",url:"https://github.com/microsoft/pict"},
{task:"Add 2-3 realistic constraints to your model (e.g., Safari only on macOS). Re-run and compare test counts.",hint:"Use IF [Param] = 'Val' THEN [Param2] <> 'Val2'; syntax."},
{task:"Try /o:3 for 3-way. How much bigger is the suite? Try a sub-model: {Browser, OS, ScreenSize} @ 3.",hint:"Compare test counts: default (2-way) vs /o:3 vs sub-model."}
],
body:`<div class="lesson-section"><h4>Model File Syntax</h4><div class="lesson-text"><pre>Browser: Chrome, Firefox, Safari, Edge
OS: Windows, macOS, Linux
Size: Mobile, Tablet, Desktop
Language: EN, ES, FR, DE, JA
Auth: Password, SSO, MFA
Theme: Light, Dark</pre>
<p>Run: <code>pict model.txt</code> — outputs tab-separated test cases.</p></div></div>
<div class="lesson-section"><h4>Key Flags</h4><div class="lesson-text"><ul><li><code>/o:N</code> — interaction strength (default 2)</li><li><code>/d:,</code> — change output delimiter</li><li><code>/r:N</code> — random seed for reproducibility</li><li><code>/e:file</code> — seeding file (force specific rows)</li><li><code>/c</code> — show pair coverage statistics</li></ul></div></div>
<div class="lesson-section"><h4>Constraints</h4><div class="lesson-text"><pre># Safari only on macOS
IF [Browser] = "Safari" THEN [OS] = "macOS";

# MFA requires desktop
IF [Auth] = "MFA" THEN [Size] <> "Mobile";</pre>
<p>Constraints ensure no invalid combinations appear. They may slightly reduce or increase the total test count.</p></div></div>
<div class="lesson-highlight">Sub-models for mixed strength: <code>{Browser, OS, Size} @ 3</code> tests that trio at 3-way while the rest stays at the default 2-way. Higher assurance where it matters.</div>
<div class="lesson-section"><h4>Weights</h4><div class="lesson-text"><pre>Browser: Chrome (5), Firefox (3), Safari (1), Edge (1)</pre>
<p>Higher weight = appears in more test cases. Useful for biasing toward popular configurations while still covering all pairs.</p></div></div>`},
{id:"lesson-4",title:"Algorithms Under the Hood",time:"12 min read",week:2,icon:"⚙️",
sources:["https://math.nist.gov/coveringarrays/ipof/ipof-results.html","https://csrc.nist.gov/pubs/sp/800/142/final"],
exercises:[
{task:"Implement a simple greedy pairwise generator in Python for 3 binary parameters. Verify it produces 4 rows.",hint:"Generate all pairs, then greedily pick rows that cover the most uncovered pairs."},
{task:"Compare PICT output vs ACTS output for the same model. Which produces fewer rows?",hint:"You can use CTWedge as an ACTS proxy if you do not have ACTS installed.",url:"https://foselab.unibg.it/ctwedge/"}
],
body:`<div class="lesson-section"><h4>Greedy Algorithm</h4><div class="lesson-text"><p>The simplest approach:</p>
<ol><li>Generate all required pairs</li><li>Repeat until all pairs covered: pick the test case covering the most uncovered pairs</li><li>Add it to the suite, mark pairs as covered</li></ol>
<p><strong>Pros:</strong> Simple, fast. <strong>Cons:</strong> Not optimal — greedy choices may not minimize the final count.</p></div></div>
<div class="lesson-section"><h4>IPOG (In-Parameter-Order-General)</h4><div class="lesson-text"><p>Used by NIST's ACTS. More sophisticated:</p>
<ol><li>Start with a full covering array for the first t parameters</li><li>For each additional parameter: <strong>horizontal growth</strong> (fill values in existing rows to cover new tuples) then <strong>vertical growth</strong> (add new rows for remaining uncovered tuples)</li></ol>
<p>By extending one parameter at a time, IPOG makes better global decisions and often produces smaller arrays than greedy.</p></div></div>
<div class="lesson-section"><h4>Simulated Annealing</h4><div class="lesson-text"><p>Start with a random suite, make small random changes, keep improvements and sometimes keep worse changes (escaping local optima). Produces very compact arrays but is <strong>slow and non-deterministic</strong>.</p></div></div>
<div class="lesson-highlight">IPOG (ACTS) generally produces smaller arrays than greedy (AllPairs). Simulated annealing can produce the smallest but at high computational cost. For practical use, PICT or ACTS is sufficient.</div>`},
{id:"lesson-5",title:"Real-World Application",time:"10 min read",week:2,icon:"🎯",
sources:["https://github.com/microsoft/pict","https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software"],

{task:"Pick a real feature at work. Identify 6-10 parameters with their values. Build a complete PICT model with constraints.",hint:"Include environment, user state, and feature config parameters."},
{task:"Generate the pairwise suite. Calculate the reduction ratio vs exhaustive. Would 3-way be feasible?",hint:"exhaustive = product of all value counts. Compare with PICT output line count."},
{task:"For the same feature, measure your existing test suite's pairwise coverage. Map each test to parameter values and count covered pairs.",hint:"If you have 50 tests, what percentage of all valid pairs do they cover?"}
],
body:`<div class="lesson-section"><h4>Identifying Parameters</h4><div class="lesson-text"><p>Be thorough. Common sources of parameters:</p>
<ul><li><strong>Config:</strong> feature flags, environment variables, settings</li><li><strong>UI:</strong> dropdowns, toggles, radio buttons, input fields</li><li><strong>API:</strong> query params, headers, body fields</li><li><strong>Environment:</strong> OS, browser, hardware, network condition</li><li><strong>User state:</strong> logged in/out, role, permissions, locale</li></ul></div></div>
<div class="lesson-section"><h4>Reducing Value Counts</h4><div class="lesson-text"><p>For continuous values, use <strong>equivalence partitioning + boundary value analysis</strong>:</p>
<ul><li>Quantity 1-999 → {1, 500, 999} (min, mid, max)</li><li>Age field → {0, 17, 18, 65, 120} (boundaries of equivalence classes)</li><li>Boolean → {True, False}</li></ul>
<p>Keeping v small is critical — test count scales as v².</p></div></div>
<div class="lesson-section"><h4>Handling Constraints</h4><div class="lesson-text"><p><strong>Hard constraints:</strong> physically impossible (Safari on Linux). Must exclude.</p>
<p><strong>Soft constraints:</strong> technically possible but not worth testing (extremely rare config). May exclude.</p>
<p>Model all hard constraints in PICT. This ensures no impossible test cases and often reduces the suite size.</p></div></div>
<div class="lesson-highlight">Pairwise is most powerful combined with BVA and equivalence partitioning. Use boundary values as your parameter values in the PICT model.</div>`},
{id:"lesson-6",title:"Automation Integration",time:"8 min read",week:2,icon:"🤖",
sources:["https://github.com/microsoft/pict","https://github.com/thombashi/allpairspy"],
exercises:[
{task:"Generate a CSV from PICT (pict model.txt -d, > matrix.csv). Write a parameterized test in your framework that reads it.",hint:"pytest: @pytest.mark.parametrize with csv.reader. JUnit: @MethodSource."},
{task:"Try allpairspy: pip install allpairspy. Generate test cases inline in a Python test file.",hint:"from allpairspy import AllPairs; for pairs in AllPairs(parameters): ...",url:"https://github.com/thombashi/allpairspy"},
{task:"Set up PICT in a CI pipeline step (GitHub Actions, GitLab CI, or local script) that regenerates the test matrix on each run.",hint:"Install PICT, run against model file, pipe to CSV, pass to test runner."}
],
body:`<div class="lesson-section"><h4>Pattern 1: PICT → CSV → Data-Driven Tests</h4><div class="lesson-text"><pre>pict model.txt -d, > test-matrix.csv</pre>
<p>Then parameterize your test framework to read from the CSV. Works with any language/framework.</p></div></div>
<div class="lesson-section"><h4>Pattern 2: Python Library Integration</h4><div class="lesson-text"><pre>from allpairspy import AllPairs

parameters = [
    ["Chrome", "Firefox", "Safari"],
    ["Windows", "macOS", "Linux"],
    ["Mobile", "Desktop"],
]

for i, pairs in enumerate(AllPairs(parameters)):
    print(f"Test {i}: {pairs}")</pre></div></div>
<div class="lesson-section"><h4>Pattern 3: CI Pipeline</h4><div class="lesson-text"><pre># GitHub Actions example
- name: Generate pairwise tests
  run: |
    brew install pict
    pict model.txt -d, > test-matrix.csv

- name: Run parameterized tests
  run: pytest --csv test-matrix.csv</pre></div></div>
<div class="lesson-highlight">Commit the model file, not the generated CSV. Regenerate in CI so the matrix always matches the current model.</div>`},
{id:"lesson-7",title:"Measuring Coverage and Making the Case",time:"8 min read",week:3,icon:"📊",
sources:["https://csrc.nist.gov/projects/automated-combinatorial-testing-for-software","https://www.pairwise.org/tools.html"],
exercises:[
{task:"Take your existing test suite for a real feature. Calculate its pairwise coverage percentage.",hint:"Map tests to parameter values, enumerate all valid pairs, count covered ones."},
{task:"Build a one-page pitch for your team: problem (combinatorial explosion), solution (pairwise), evidence (NIST data), proof (your coverage measurement).",hint:"Include before/after numbers: test count, coverage percentage, estimated time savings."}
],
body:`<div class="lesson-section"><h4>Pair Coverage Metric</h4><div class="lesson-text"><p><strong>Formula:</strong> coverage = covered_pairs / total_valid_pairs × 100%</p>
<p>Even without generating a new pairwise suite, measuring your existing test suite's pair coverage is valuable. Tools:</p>
<ul><li><strong>PICT /c flag</strong> — shows coverage stats</li><li><strong>CAMetrics</strong> — web tool for measuring t-way coverage</li><li><strong>Manual</strong> — enumerate pairs in your test matrix</li></ul></div></div>
<div class="lesson-section"><h4>The Business Case</h4><div class="lesson-text"><p>Present this data: <em>"Our current 200 manual tests achieve only 74% pairwise coverage. A PICT-generated suite of 25 tests achieves 100%. We can run fewer tests, find more bugs, and do it faster."</em></p>
<p>Key talking points:</p>
<ul><li>NIST research: 93% bug detection at 2-way</li><li>20x-700x test reduction vs exhaustive</li><li>Systematic coverage vs ad-hoc selection</li><li>Tools are free and open-source (PICT, allpairspy)</li></ul></div></div>
<div class="lesson-highlight">The strongest argument for pairwise testing is measuring your existing suite and showing the coverage gaps. Numbers beat opinions.</div>`},

const STORAGE_KEY="pairwise-testing-v1";
function saveState(){
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};

}catch(e){}
debouncedCloudSave();
}
function loadState(){
try{
const raw=localStorage.getItem(STORAGE_KEY);
if(!raw)return null;
return JSON.parse(raw);
}catch(e){return null}
}
function exportState(){
try{return localStorage.getItem(STORAGE_KEY)||"{}"}catch(e){return"{}"}
}
function importState(json){
try{
const data=JSON.parse(json);
if(data.stats){stats={...stats,...data.stats}}
if(data.history){sessionHistory=data.history}
saveState();render();return true;

}
// ─── CLOUD SYNC ENGINE (offline-resilient) ───
let syncStatus='idle',lastSyncAt=null,syncPending=false;
function syncEnabled(){return typeof SYNC_SHEET_URL==='string'&&SYNC_SHEET_URL.length>10}
function getSyncKey(){return SYNC_USER_ID?(SYNC_USER_ID+'/'+STORAGE_KEY):STORAGE_KEY}
function isOnline(){return typeof navigator!=='undefined'?navigator.onLine:true}
async function cloudSave(){
if(!syncEnabled()){syncPending=false;return}
if(!isOnline()){syncStatus='offline';syncPending=true;updateSyncUI();return}
syncStatus='syncing';updateSyncUI();
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
await fetch(SYNC_SHEET_URL+'?action=save&key='+encodeURIComponent(getSyncKey()),{
method:'POST',headers:{'Content-Type':'text/plain'},
body:JSON.stringify({data,savedAt:data.savedAt})
});
syncStatus='synced';lastSyncAt=new Date().toISOString();syncPending=false;
}catch(e){
syncStatus=isOnline()?'error':'offline';syncPending=true;
console.warn('Cloud sync save failed:',e);
}
updateSyncUI();
}
async function cloudLoad(){
if(!syncEnabled())return null;
if(!isOnline()){syncStatus='offline';updateSyncUI();return null}
syncStatus='syncing';updateSyncUI();
try{
const resp=await fetch(SYNC_SHEET_URL+'?action=load&key='+encodeURIComponent(getSyncKey()));
const json=await resp.json();
syncStatus='synced';lastSyncAt=new Date().toISOString();updateSyncUI();
if(json.ok&&json.data)return json;
return null;
}catch(e){syncStatus=isOnline()?'error':'offline';updateSyncUI();console.warn('Cloud sync load failed:',e);return null}
}
function updateSyncUI(){
const el=document.getElementById('sync-badge');
if(!el)return;
const icons={idle:'☁️',syncing:'⟳',synced:'✓',error:'✕',offline:'⏸'};
const colors={idle:'#6b7280',syncing:'#f59e0b',synced:'#10b981',error:'#ef4444',offline:'#6b7280'};
const titles={idle:'Cloud sync ready',syncing:'Syncing...',synced:'Synced'+(lastSyncAt?' '+new Date(lastSyncAt).toLocaleTimeString():''),error:'Sync error — will retry when online',offline:'Offline — will sync when reconnected'};
el.textContent=icons[syncStatus]||'☁️';el.style.color=colors[syncStatus]||'#6b7280';el.title=titles[syncStatus]||'';
}
let syncTimer=null;
function debouncedCloudSave(){
if(!syncEnabled())return;
if(syncTimer)clearTimeout(syncTimer);
syncTimer=setTimeout(()=>cloudSave(),2000);
}
function saveSyncSettings(url,userId){
SYNC_SHEET_URL=url.trim();
SYNC_USER_ID=(userId||'').trim();
try{
if(SYNC_SHEET_URL)localStorage.setItem(STORAGE_KEY+'-sync-url',SYNC_SHEET_URL);
else localStorage.removeItem(STORAGE_KEY+'-sync-url');
if(SYNC_USER_ID)localStorage.setItem(STORAGE_KEY+'-sync-user',SYNC_USER_ID);
else localStorage.removeItem(STORAGE_KEY+'-sync-user');
}catch(e){}
updateSyncUI();
if(syncEnabled())cloudLoad().then(cloud=>{
if(cloud&&cloud.data){
const local=loadState();
const localTime=local&&local.savedAt?new Date(local.savedAt).getTime():0;
const cloudTime=cloud.savedAt?new Date(cloud.savedAt).getTime():0;
if(cloudTime>localTime){
const d=cloud.data;
if(d.stats){stats={...stats,...d.stats};if(!stats.quizScores)stats.quizScores={}}
if(d.history)sessionHistory=d.history;
if(d.exercisesDone)exercisesDone=d.exercisesDone;
if(d.schedule)schedule=d.schedule;
if(d.checkpoints)checkpoints=d.checkpoints;
if(d.sessionsDone)sessionsDone=d.sessionsDone;
if(d.userRole)userRole=d.userRole;
if(d.fcFavs)fcFavs=new Set(d.fcFavs);
if(d.lastCard){fcCat=d.lastCard.cat||"All";fcIdx=d.lastCard.idx||0}
if(d.cardRatings)cardRatings=d.cardRatings;
saveState();
}
render();
}
});
}
// Auto-sync when coming back online
if(typeof window!=='undefined'){
window.addEventListener('online',()=>{
if(syncEnabled()&&syncPending){console.log('☁️ Back online — syncing pending changes');cloudSave()}
else if(syncEnabled()){syncStatus='idle';updateSyncUI()}
});
window.addEventListener('offline',()=>{
if(syncEnabled()){syncStatus='offline';updateSyncUI()}
});
}

function copyCode(btn){
  var block=btn.parentElement;
  var text=block.textContent.replace(/^Copy/,'').replace(/^Copied!/,'').trim();
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  });
}
function highlightCode(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/(#.*$)/gm,'<span style="color:#6b7280">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span style="color:#a5f3fc">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|while|true|false|null|import|from|export|class|extends|new|this|async|await)\b/g,'<span style="color:#f97316">$1</span>');

function fcRate(rating){

function fcWeightedShuffle(){
  var cards=fcGetCards();
  if(!cards.length)return;
  var weighted=[];
  cards.forEach(function(c,i){
    var r=cardRatings[c.f];
    var w=r==='missed'?3:r==='unsure'?2:1;
    for(var j=0;j<w;j++)weighted.push(i);
  });
  fcIdx=weighted[Math.floor(Math.random()*weighted.length)];
  fcFlipped=false;
  render();
}

// ─── SCHEDULE TAB ───
function renderScheduleTab(){
const today=new Date().toISOString().slice(0,10);
const sorted=[...schedule].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const upcoming=sorted.filter(s=>s.date>=today);
const past=sorted.filter(s=>s.date<today).reverse();
const doneCount=Object.keys(sessionsDone).length;
let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div style="font-size:14px;font-weight:600">${doneCount}/${schedule.length} sessions completed</div>
<div style="display:flex;gap:6px">
<button class="btn-outline" style="padding:6px 10px;font-size:11px" onclick="toggleIcsPanel()">📅 Export</button>
<button class="btn btn-primary" style="padding:8px 14px;font-size:12px" onclick="openSessionForm()">+ Add</button>
</div>
</div>`;
h+=renderIcsPanel();
h+=`<div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width:${schedule.length?Math.round(doneCount/schedule.length*100):0}%"></div></div></div>`;
if(upcoming.length){
h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Upcoming</div>`;
upcoming.forEach(s=>{
const isToday=s.date===today;const done=sessionsDone[s.id];
h+=`<div class="sched-item${isToday?' today':''}${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min${s.phase?' · Phase '+s.phase:''}</div></div>
<div class="si-title">${s.title}</div>
<div class="si-desc">${s.desc}</div>
<div class="si-actions">
${!done?`<button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Done</button>`:`<button style="background:#374151;color:#6ee7b7" onclick="unmarkSession('${s.id}')">✓ Done</button>`}
<button style="background:#374151;color:#9ca3af" onclick="openSessionForm('${s.id}')">Edit</button>
<button style="background:#374151;color:#fca5a5" onclick="deleteSession('${s.id}')">Del</button>
</div></div>`});
}
if(past.length){
h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px">Past</div>`;
past.slice(0,5).forEach(s=>{
const done=sessionsDone[s.id];
h+=`<div class="sched-item past${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min</div></div>
<div class="si-title">${s.title}</div>
${!done?`<div class="si-actions"><button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Mark Done</button></div>`:
`<div style="font-size:11px;color:#6ee7b7;margin-top:4px">✓ Completed</div>`}
</div>`});
if(past.length>5)h+=`<div style="text-align:center;color:#4b5563;font-size:12px;padding:8px">+ ${past.length-5} more past sessions</div>`;
}
return h;
}
function unmarkSession(id){delete sessionsDone[id];saveState();render()}
function deleteSession(id){schedule=schedule.filter(s=>s.id!==id);delete sessionsDone[id];saveState();render()}
function openSessionForm(editingId){
if(editingId){const s=schedule.find(x=>x.id===editingId);if(s)formData={...s};editId=editingId}
else{formData={id:'s-'+Date.now(),date:new Date().toISOString().slice(0,10),time:'09:00',dur:30,title:'',desc:'',phase:0};editId=null}
showForm='session';render();
}
function closeForm(){showForm=null;editId=null;formData={};render()}
function saveSessionForm(){
if(!formData.title){alert('Title required');return}
if(editId){const idx=schedule.findIndex(s=>s.id===editId);if(idx>=0)schedule[idx]={...formData}}
else{schedule.push({...formData})}
saveState();closeForm();
}
function renderFormOverlay(){
if(showForm==='session')return renderSessionFormSheet();
if(showForm==='checkpoint')return renderCheckpointFormSheet();
return'';
}
function renderSessionFormSheet(){
return`<div class="form-overlay" onclick="closeForm()"><div class="form-sheet" onclick="event.stopPropagation()">
<h3>${editId?'Edit':'Add'} Study Session</h3>

<div style="display:flex;gap:8px">

</div>
<div style="display:flex;gap:8px">

// ─── CHECKPOINTS TAB ───
function renderCheckpointsTab(){
const today=new Date().toISOString().slice(0,10);
let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<div style="font-size:14px;font-weight:600">Milestones & Targets</div>
<button class="btn btn-primary" style="padding:8px 14px;font-size:12px" onclick="openCheckpointForm()">+ Add Checkpoint</button>
</div>`;
const sorted=[...checkpoints].sort((a,b)=>a.by.localeCompare(b.by));
sorted.forEach(cp=>{
const val=getMetricVal(cp.metric);
const hit=val>=cp.threshold;
const overdue=!hit&&cp.by<today;
h+=`<div class="cp-item${hit?' hit':''}">
<div style="display:flex;justify-content:space-between;align-items:center">
<div class="cp-target">${hit?'✓ ':''}${cp.target}</div>
<div style="display:flex;gap:4px">
<button style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:12px;padding:4px" onclick="openCheckpointForm('${cp.id}')">Edit</button>
<button style="background:none;border:none;color:#fca5a5;cursor:pointer;font-size:12px;padding:4px" onclick="deleteCheckpoint('${cp.id}')">Del</button>
</div>
</div>
<div class="cp-date">${hit?'Achieved!':'Target by '+fmtDate(cp.by)} · Current: ${val}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''} / ${cp.threshold}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''}</div>
${!hit?`<div style="margin-top:6px"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(100,Math.round(val/cp.threshold*100))}%;${overdue?'background:#ef4444':''}"></div></div></div>`:''}
</div>`});
return h;
}
function openCheckpointForm(editingId){
if(editingId){const c=checkpoints.find(x=>x.id===editingId);if(c)formData={...c};editId=editingId}
else{formData={id:'cp-'+Date.now(),target:'',by:new Date().toISOString().slice(0,10),metric:'bestQuiz',threshold:80};editId=null}
showForm='checkpoint';render();
}

else{checkpoints.push({...formData})}

function deleteCheckpoint(id){checkpoints=checkpoints.filter(c=>c.id!==id);saveState();render()}

// ─── ASK CLAUDE ───
function askClaudeBox(context){
return`<div class="ask-box">
<div class="ask-label">🔍 Go deeper — ask Claude</div>
<div class="ask-row">
<input type="text" id="askInput" placeholder="e.g., How does Workload Identity actually work?" onkeydown="if(event.key==='Enter')askClaude('${context.replace(/'/g,"\\'")}')">
<button onclick="askClaude('${context.replace(/'/g,"\\'")}')">Ask</button>
</div>
</div>`}
function askClaude(context){
const input=document.getElementById('askInput');
if(!input||!input.value.trim())return;
const q=input.value.trim();
const prompt=`I'm studying pairwise (combinatorial) testing for practical application at work. Context: ${context}\n\nMy question: ${q}\n\nPlease give a clear, practical answer. Include PICT model examples, covering array math, or tool commands where relevant.`;
navigator.clipboard.writeText(prompt).then(()=>{
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
}).catch(()=>{
const ta=document.createElement('textarea');ta.value=prompt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
});
input.value='';
}
function showToast(msg){
const existing=document.querySelector('.ask-toast');if(existing)existing.remove();
const t=document.createElement('div');t.className='ask-toast';t.textContent=msg;document.body.appendChild(t);
setTimeout(()=>t.remove(),3000);
}
// ─── ICS EXPORT ───
function toggleIcsPanel(){
icsOpen=!icsOpen;
if(icsOpen){icsSelected=new Set();icsPhaseFilter='all';schedule.forEach(s=>icsSelected.add(s.id))}
render();
}
function icsFilterPhase(p){
icsPhaseFilter=p;
icsSelected=new Set();
const filtered=p==='all'?schedule:schedule.filter(s=>s.phase==p);
filtered.forEach(s=>icsSelected.add(s.id));
render();
}
function icsToggle(id){if(icsSelected.has(id))icsSelected.delete(id);else icsSelected.add(id);render()}
function icsSelectAll(){const visible=icsVisibleSessions();visible.forEach(s=>icsSelected.add(s.id));render()}
function icsSelectNone(){icsSelected.clear();render()}
function icsVisibleSessions(){return icsPhaseFilter==='all'?[...schedule]:schedule.filter(s=>s.phase==icsPhaseFilter)}
function renderIcsPanel(){
if(!icsOpen)return'';
const visible=icsVisibleSessions().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const phases=[...new Set(schedule.map(s=>s.phase).filter(Boolean))].sort();
let h=`<div class="ics-panel">
<h4>📅 Export to Calendar</h4>
<div class="ics-filters">
<button class="${icsPhaseFilter==='all'?'active':''}" onclick="icsFilterPhase('all')">All Sessions</button>
${phases.map(p=>`<button class="${icsPhaseFilter==p?'active':''}" onclick="icsFilterPhase(${p})">Phase ${p}</button>`).join('')}
</div>
<div style="display:flex;gap:8px;margin-bottom:8px">
<button style="background:none;border:none;color:#3b82f6;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectAll()">Select all</button>
<span style="color:#374151;font-size:12px">|</span>
<button style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectNone()">Select none</button>
</div>
<div class="ics-count">${icsSelected.size} of ${visible.length} session${visible.length!==1?'s':''} selected</div>
<div class="ics-list">`;
visible.forEach(s=>{
const on=icsSelected.has(s.id);
h+=`<div class="ics-item" onclick="icsToggle('${s.id}')">
<div class="ics-check${on?' on':''}">${on?'✓':''}</div>
<div class="ics-item-info"><div class="ics-item-title">${s.title}</div><div class="ics-item-date">${fmtDate(s.date)} · ${s.time} · ${s.dur} min</div></div>
</div>`});
h+=`</div>
<div class="ics-actions">
<button class="btn btn-secondary" onclick="toggleIcsPanel()">Cancel</button>
<button class="ics-dl" ${icsSelected.size===0?'disabled style="opacity:.4;cursor:default" ':''}onclick="${icsSelected.size?'downloadIcs()':''}">Download .ics (${icsSelected.size})</button>
</div></div>`;
return h;
}
function downloadIcs(){
const selected=schedule.filter(s=>icsSelected.has(s.id)).sort((a,b)=>a.date.localeCompare(b.date));
if(!selected.length)return;
const pad=n=>(n<10?'0':'')+n;
const toIcsDate=(d,t,dur)=>{
const[y,m,dy]=d.split('-').map(Number);
const[h,mi]=(t||'09:00').split(':').map(Number);
const start=new Date(y,m-1,dy,h,mi);
const end=new Date(start.getTime()+dur*60000);
const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
return{start:fmt(start),end:fmt(end)};
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
let cal=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CrashCourse//StudyApp//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:Pairwise Testing Study Sessions\r\n`;
selected.forEach(s=>{
const{start,end}=toIcsDate(s.date,s.time,s.dur);
const desc=(s.desc||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
cal+=`BEGIN:VEVENT\r\nUID:${uid()}@crashcourse\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:${s.title.replace(/,/g,'\\,')}\r\nDESCRIPTION:${desc}\r\n`;
if(s.phase)cal+=`CATEGORIES:Phase ${s.phase}\r\n`;
cal+=`STATUS:CONFIRMED\r\nBEGIN:VALARM\r\nTRIGGER:-PT10M\r\nACTION:DISPLAY\r\nDESCRIPTION:Study session starting soon\r\nEND:VALARM\r\nEND:VEVENT\r\n`;
});
cal+=`END:VCALENDAR`;
const blob=new Blob([cal],{type:'text/calendar;charset=utf-8'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='pairwise-testing-study.ics';a.click();
URL.revokeObjectURL(url);
showToast(`Downloaded ${selected.length} session${selected.length!==1?'s':''} as .ics`);
icsOpen=false;render();
}
// ─── INIT ───
render();
</script>
