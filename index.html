<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Courses</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .container { max-width: 480px; width: 100%; padding: 2rem; }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #f8fafc; }
  p { color: #94a3b8; margin-bottom: 2rem; }
  .cards { display: flex; flex-direction: column; gap: 1rem; }
  a.card {
    display: block; padding: 1.5rem; border-radius: 12px;
    background: #1e293b; border: 1px solid #334155;
    text-decoration: none; color: #e2e8f0;
    transition: border-color 0.2s, transform 0.15s;
  }
  a.card:hover { border-color: #60a5fa; transform: translateY(-2px); }
  .card h2 { font-size: 1.1rem; margin-bottom: 0.3rem; }
  .card span { font-size: 0.85rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <h1>Crash Courses</h1>
  <p>Pick a course to study</p>
  <div class="cards">
    <a class="card" href="https://barrysolomon.github.io/study-apps/gke-study-app.html">
      <h2>Google Kubernetes Engine (GKE)</h2>
      <span>Cloud-native Kubernetes on Google Cloud</span>
    </a>
    <a class="card" href="https://barrysolomon.github.io/study-apps/otca-study-app.html">
      <h2>OpenTelemetry Certified Associate (OTCA)</h2>
      <span>Observability &amp; distributed tracing certification</span>
    </a>
  </div>
</div>
</body>
</html>
