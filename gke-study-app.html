<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GKE Crash Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}.header small{font-size:12px;color:#6b7280}
.badge{background:rgba(16,185,129,.15);color:#6ee7b7;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
.card{border-radius:16px;padding:20px;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;-webkit-user-select:none}
.card.question{background:#1f2937;border:2px solid #374151}
.card.answer{background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.card-text{font-size:17px;line-height:1.5}
.card-hint{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1;filter:none}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#1f2937;color:#d1d5db}.btn-secondary:hover{background:#374151}
.btn-danger{background:rgba(239,68,68,.2);border:2px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:rgba(16,185,129,.2);border:2px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn-full{width:100%;padding:14px;font-size:15px}
.progress-bar{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{width:100%;background:#1f2937;border-radius:999px;height:8px}
.progress-fill{background:#10b981;height:8px;border-radius:999px;transition:width .5s}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.pill.active{background:#10b981;color:#fff}.pill:not(.active){background:#1f2937;color:#9ca3af}
.quiz-option{text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.quiz-option.correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.dimmed{background:rgba(31,41,55,.5);border-color:#1f2937;color:#4b5563}
.scenario-box{border-radius:16px;padding:20px;margin-bottom:16px}
.scenario-q{background:rgba(239,68,68,.08);border:2px solid rgba(153,27,27,.4)}
.scenario-a{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3)}
.scenario-reveal{background:#1f2937;border:2px solid #374151;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.timer{font-size:28px;font-family:monospace;font-weight:700}
.timer.green{color:#10b981}.timer.yellow{color:#f59e0b}.timer.red{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}.stat-val{font-size:20px;font-weight:700}.stat-label{font-size:11px;color:#6b7280}
.focus-box{background:#1f2937;border-radius:16px;padding:16px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
.results-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.grade{font-size:56px;font-weight:700;text-align:center;margin-bottom:8px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:50vh}
.mgmt-section{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:16px}
.mgmt-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#d1d5db}
.mgmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.mgmt-row:last-child{border-bottom:none}
.mgmt-row .label{font-size:13px;color:#9ca3af}
.mgmt-row .value{font-size:13px;font-weight:600;color:#fff}
.btn-outline{background:transparent;border:2px solid #374151;color:#9ca3af;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#6b7280;color:#d1d5db}
.btn-danger-solid{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-danger-solid:hover{background:#b91c1c}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-box{background:#1f2937;border:2px solid #374151;border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151;font-size:12px}
.history-item:last-child{border-bottom:none}
.export-box{background:#0d1117;border:1px solid #374151;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#6ee7b7;word-break:break-all;max-height:120px;overflow-y:auto;margin-top:8px}
.source-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.source-link:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.source-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.res-group{margin-bottom:20px}
.res-group h4{font-size:13px;font-weight:600;color:#6ee7b7;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.res-link{display:block;padding:10px 12px;border-radius:10px;background:#1f2937;margin-bottom:6px;text-decoration:none;color:#93c5fd;font-size:13px;font-weight:500;border:1px solid #374151;transition:all .2s}
.res-link:hover{background:#374151;border-color:#4b5563}
.res-link small{display:block;color:#6b7280;font-size:11px;font-weight:400;margin-top:2px}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.lesson-card{background:#1f2937;border-radius:16px;padding:16px;cursor:pointer;border:2px solid #374151;transition:all .2s}
.lesson-card:hover{border-color:#4b5563}
.lesson-card.completed{border-color:rgba(16,185,129,.3)}
.lesson-num{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.lesson-title{font-size:15px;font-weight:600;margin:4px 0}
.lesson-meta{font-size:12px;color:#6b7280;display:flex;gap:12px}
.lesson-body{padding:0}
.lesson-section{margin-bottom:20px}
.lesson-section h4{font-size:13px;font-weight:600;color:#6ee7b7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lesson-text{font-size:14px;color:#d1d5db;line-height:1.7}
.lesson-text p{margin-bottom:10px}
.lesson-highlight{background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:10px 14px;border-radius:0 10px 10px 0;margin:10px 0;font-size:13px;color:#d1fae5;line-height:1.5}
.lesson-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.lesson-compare-item{background:#0d1117;border-radius:10px;padding:10px;font-size:12px;line-height:1.5}
.lesson-compare-item .compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.exercise-box{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.exercise-box .ex-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.exercise-box .ex-task{font-size:13px;color:#ddd6fe;line-height:1.5;margin-bottom:8px}
.exercise-box .ex-hint{font-size:12px;color:#6b7280;font-style:italic}
.exercise-check{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
.exercise-check .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #374151;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.exercise-check .checkbox.checked{background:#10b981;border-color:#10b981}
.exercise-check .ex-text{font-size:13px;color:#d1d5db}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}
.sched-item{background:#1f2937;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #374151;transition:all .2s}
.sched-item.today{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.sched-item.past{opacity:.5}
.sched-item.done{border-color:rgba(16,185,129,.3);opacity:.7}
.sched-item .si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sched-item .si-date{font-size:11px;color:#6b7280;font-weight:600}
.sched-item .si-dur{font-size:10px;color:#4b5563;background:#0d1117;padding:2px 8px;border-radius:6px}
.sched-item .si-title{font-size:14px;font-weight:600;color:#e5e7eb;margin-bottom:2px}
.sched-item .si-desc{font-size:12px;color:#9ca3af;line-height:1.4}
.sched-item .si-actions{display:flex;gap:6px;margin-top:8px}
.sched-item .si-actions button{padding:6px 10px;border-radius:8px;border:none;font-size:11px;font-weight:500;cursor:pointer}
.cp-item{background:rgba(251,191,36,.06);border:2px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;margin-bottom:8px}
.cp-item.hit{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.cp-item .cp-target{font-size:14px;font-weight:600;color:#fde68a}
.cp-item.hit .cp-target{color:#6ee7b7;text-decoration:line-through}
.cp-item .cp-date{font-size:11px;color:#6b7280}
.form-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.form-sheet{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.form-sheet h3{font-size:16px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:14px;font-family:inherit}
.form-field textarea{min-height:60px;resize:vertical}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#10b981}
.ask-box{background:rgba(139,92,246,.06);border:2px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;margin-top:16px}
.ask-box .ask-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ask-box .ask-row{display:flex;gap:8px}
.ask-box input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:13px;font-family:inherit}
.ask-box input:focus{outline:none;border-color:#a78bfa}
.ask-box input::placeholder{color:#4b5563}
.ask-box button{padding:10px 14px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ask-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(124,58,237,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ics-panel{background:#111827;border:2px solid #374151;border-radius:16px;padding:16px;margin-bottom:16px}
.ics-panel h4{font-size:13px;font-weight:600;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ics-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ics-filters button{padding:5px 10px;border-radius:8px;border:2px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.ics-filters button.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#93c5fd}
.ics-list{max-height:320px;overflow-y:auto;margin-bottom:12px}
.ics-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.ics-item:last-child{border-bottom:none}
.ics-check{width:20px;height:20px;border-radius:5px;border:2px solid #374151;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:12px;color:transparent}
.ics-check.on{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.ics-item-info{flex:1;min-width:0}
.ics-item-title{font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ics-item-date{font-size:11px;color:#6b7280}
.ics-actions{display:flex;gap:8px;margin-top:4px}
.ics-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.ics-dl{background:#3b82f6;color:#fff}
.ics-dl:hover{background:#2563eb}
.ics-count{font-size:12px;color:#6b7280;margin-bottom:8px}
@media(min-width:600px){
body{max-width:960px;padding:0 24px}
.header{padding:20px 0 12px}
.header h1{font-size:22px}
.content{padding:20px 0 100px}
.nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}
.nav button{min-width:auto;padding:8px 14px;font-size:12px;flex-direction:row;gap:6px;border-radius:10px}
.nav button span{font-size:16px;margin-bottom:0}
.stat-grid{grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{padding:16px}
.stat-val{font-size:22px}
.card{max-width:640px;margin:0 auto;min-height:240px;padding:28px}
.card-text{font-size:18px}
.quiz-option{font-size:15px;padding:16px 20px}
.scenario-box{max-width:700px}
.lesson-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.lesson-card{margin-bottom:0}
.mgmt-section{max-width:700px}
.form-sheet{max-width:560px;border-radius:20px;margin:auto}
.form-overlay{align-items:center}
.res-group{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.res-group h4{grid-column:1/-1}
.focus-box{max-width:700px}
.sched-item{max-width:700px}
.ics-panel{max-width:700px}
.cp-item{max-width:700px}
.pills{flex-wrap:wrap}
.ask-box{max-width:640px;margin:16px auto 0}
.confirm-box{max-width:400px}
.source-links{justify-content:flex-start}
}
@media(min-width:800px){
body{max-width:1100px}
.nav{max-width:1100px}
.stat-grid{grid-template-columns:repeat(4,1fr)}
.lesson-grid{grid-template-columns:repeat(3,1fr)}
.card{max-width:700px}
.res-group{grid-template-columns:repeat(3,1fr)}
}
.role-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.role-picker{max-width:520px;width:92%;padding:28px 20px;text-align:center}
.role-picker h2{font-size:22px;font-weight:700;margin-bottom:6px}
.role-picker .rp-sub{font-size:14px;color:#9ca3af;margin-bottom:24px;line-height:1.5}
.role-cards{display:flex;flex-direction:column;gap:12px}
.role-card{background:#1f2937;border:2px solid #374151;border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;text-align:left}
.role-card:hover{border-color:#10b981;background:#263040}
.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-badge.core{background:rgba(16,185,129,.15);color:#6ee7b7}
.role-badge.bonus{background:rgba(107,114,128,.15);color:#6b7280}
.role-current{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:#1f2937;border:1px solid #374151;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:#d1d5db}
.role-current:hover{border-color:#10b981;background:#263040}
</style>

<script>
// ─── DATA ───
const FLASHCARDS=[
{f:"What is GKE?",b:"Google Kubernetes Engine — Google's managed K8s service. Google invented Kubernetes (from internal 'Borg'). Released 2015, before EKS or AKS.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/kubernetes-engine-overview"},
{f:"GKE Standard vs Autopilot",b:"Standard: you manage nodes, pick machine types, handle node pools. Autopilot: Google manages everything, per-pod billing, no node management.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-overview"},

{f:"GKE networking advantage",b:"VPC-native by default with global load balancing. AWS EKS uses VPC CNI and is regional by default.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/alias-ips"},
{f:"GKE auto-scaling advantage",b:"Node Auto-Provisioning + Autopilot. EKS has Karpenter which is newer and catching up.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/node-auto-provisioning"},
{f:"GKE Gateway API",b:"Replaces deprecated Ingress. Fully managed traffic routing with HTTP routing, traffic splitting, and multi-cluster ingress. More flexible than Ingress resources.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/gateway-api"},
{f:"GKE release channels",b:"Rapid (4-8 wks after K8s release), Regular (8-12 wks, default), Stable (12-16 wks). Versions auto-progress Rapid → Regular → Stable.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/release-channels"},
{f:"GKE Enterprise vs Standard tier",b:"Standard: flat $0.10/cluster/hour. Enterprise: ~$0.00822/hr per vCPU, includes multi-team ops, advanced security, service mesh, unified console.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/pricing"},
{f:"GKE Fleet management",b:"Logical grouping of K8s clusters managed as one unit. Unified policy, centralized observability, Config Sync and Policy Controller across all clusters.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/fleets-overview"},
{f:"Autopilot cost optimization",b:"Flex CUDs: 28% off (1-yr) or 46% off (3-yr). Spot Pods: 60-91% savings for fault-tolerant workloads. Can save up to 57% overall.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-overview"},
{f:"Backup for GKE",b:"Fully managed backup of cluster state (manifests) + persistent volumes. Cross-project restore, zone-redundant replication, point-in-time recovery.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/add-on/backup-for-gke/concepts/backup-for-gke"},
{f:"GKE Security Posture Dashboard",b:"Scans workloads for OS/app vulnerabilities (NIST CVE database) and misconfigurations. Shows risk at a glance across all clusters.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/about-security-posture-dashboard"},
{f:"Multi-cluster Services (MCS)",b:"Extends K8s Service discovery across GKE clusters. Export a Service via ServiceExport → Cloud DNS + firewall auto-configured. Pod-to-pod cross-cluster.",c:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/multi-cluster-services"},
{f:"Why can't any o11y tool run on Autopilot?",b:"Autopilot restricts privileged workloads for security. Most agents need DaemonSets, host network. Blocked unless you're an approved partner.",c:"Dash0+GKE",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-security#privileged-workloads"},
{f:"Dash0's Autopilot partnership",b:"Since operator 0.86.0, Dash0 runs as a privileged workload in Autopilot. Auto-instruments all workloads, OTel collector out of the box.",c:"Dash0+GKE",u:"https://www.dash0.com/changelog/dash0-operator-gke-autopilot-support"},
{f:"Dash0 GKE install story",b:"helm install dash0-operator → auto-instruments workloads → OTel collector deployed → telemetry flows to Dash0. 5 minutes.",c:"Dash0+GKE",u:"https://www.dash0.com/docs/dash0/monitoring/kubernetes/about-kubernetes"},
{f:"Who else is on the Autopilot partners list?",b:"27 verified partners including Datadog, Dynatrace, Elastic, CrowdStrike, Sysdig, Splunk, Wiz, and others. Dash0 is one of 19 with allowlist support (privileged workloads). Dash0's edge: OTel-native, no proprietary agents, transparent pricing.",c:"Dash0+GKE",u:"https://cloud.google.com/kubernetes-engine/docs/resources/autopilot-partners"},
{f:"Dash0 key numbers",b:"600+ customers (Zalando, Taco Bell, The Telegraph). Autopilot saves up to 57% with CUDs. GKE free, EKS $73/mo.",c:"Dash0+GKE",u:"https://www.dash0.com/pricing"},
{f:"Who drove the Autopilot partnership?",b:"Bastian Krol. Marcel Birkner = GCP infra/access. Michele Mancioppi = product.",c:"Dash0+GKE",u:"https://www.dash0.com/kubernetes-monitoring"},
{f:"Dash0 operator vs manual OTel setup",b:"Dash0 operator auto-instruments all workloads in enabled namespaces — no code changes. Manual OTel requires SDK integration + K8s attribute config per app.",c:"Dash0+GKE",u:"https://www.dash0.com/guides/kubernetes-observability-opentelemetry-operator"},
{f:"What is OTLP?",b:"OpenTelemetry Protocol — vendor-neutral protocol for transmitting traces, metrics, logs. Uses gRPC or HTTP with Protocol Buffers. Supports backpressure signaling.",c:"Dash0+GKE",u:"https://opentelemetry.io/docs/specs/otlp/"},
{f:"What is the OTel Collector?",b:"Vendor-agnostic pipeline that receives, processes, and exports telemetry. Decouples apps from backends, filters sensitive data, batches for throughput, supports multiple backends.",c:"Dash0+GKE",u:"https://opentelemetry.io/docs/collector/"},
{f:"OTel auto-instrumentation in K8s",b:"OTel Operator uses K8s admission webhooks to inject instrumentation at pod creation. Adds init-container with SDK config. No app code changes needed.",c:"Dash0+GKE",u:"https://opentelemetry.io/docs/platforms/kubernetes/operator/automatic/"},
{f:"Why OTel-native matters on GKE",b:"Google is a core OTel contributor. GKE workloads increasingly emit OTel signals natively. Dash0 consumes them directly — no translation layer, no lock-in on collection. Datadog puts its own agent in front of OTel, adding cost + complexity.",c:"Dash0+GKE",u:"https://www.dash0.com/docs/dash0/monitoring/kubernetes/about-kubernetes"},
{f:"Dash0 Operator = zero-touch observability",b:"Deploy once via Helm. Automatically instruments all workloads in the GKE cluster — no code changes, no sidecar sprawl. For platform/SRE teams: 'you instrument once at the cluster level, everything inside gets observed.'",c:"Dash0+GKE",u:"https://www.dash0.com/docs/dash0/monitoring/kubernetes/about-kubernetes"},
{f:"Dash0 cost model on GKE",b:"Datadog charges per host/node. On GKE with autoscaling, node count spikes = surprise bills. Dash0's usage-based pricing follows actual signal volume, not node count. You're not penalized for scaling out.",c:"Dash0+GKE",u:"https://www.dash0.com/transparent-cost"},
{f:"No lock-in on the way in or out",b:"Because everything is OTel-native, if a customer has existing OTel Collectors in GKE, Dash0 just becomes the backend. Low adoption friction. If they leave, instrumentation goes with them. Trust message for platform engineers who've been burned.",c:"Dash0+GKE",u:"https://www.dash0.com/docs/dash0/monitoring/kubernetes/about-kubernetes"},
{f:"SA talking track (30 sec)",b:"'Running workloads on GKE? Deploy our operator, and within minutes you've got traces, metrics, and logs — without touching a single service. We're built entirely on OpenTelemetry, so there's no proprietary agent, your instrumentation is portable, and you're not paying Datadog's per-node tax every time GKE autoscales. It's observability that fits how GKE actually works.'",c:"Event Prep",u:"https://www.dash0.com/docs/integrations/int_gcp_container_gke/overview"},
{f:"Objection: 'We're OTel-first already'",b:"Then Dash0 is the natural backend. No friction, no re-instrumentation. Your existing OTel Collectors just point to Dash0 — one config change. We store data as native OTLP, so nothing gets lost in translation.",c:"Event Prep",u:"https://www.dash0.com/docs/dash0/monitoring/kubernetes/about-kubernetes"},
{f:"Objection: 'We're evaluating Datadog'",b:"Datadog works. The question is cost at scale and OTel compatibility. On GKE with autoscaling, per-host pricing gets unpredictable fast. Dash0 is usage-based — you pay for signal volume, not node count.",c:"Event Prep",u:"https://www.dash0.com/datadog-alternative"},
{f:"What was Stackdriver?",b:"Google's original observability brand → now 'Google Cloud Observability' / 'Cloud Operations Suite'. Cloud Monitoring, Logging, Trace, Profiler, Error Reporting.",c:"Competition",u:"https://cloud.google.com/products/operations"},
{f:"Gemini Cloud Assist",b:"Google's AI on top of observability. Summarizes logs, explains errors, 'AI-powered Investigations' for root cause. Their answer to Agent0.",c:"Competition",u:"https://cloud.google.com/gemini/docs/cloud-assist/overview"},
{f:"Managed OpenTelemetry for GKE",b:"Google's managed OTLP endpoint in GKE clusters. Routes to Cloud Operations. It's plumbing — sends to separate stores, not unified observability.",c:"Competition",u:"https://cloud.google.com/products/observability"},
{f:"Dash0 vs Google Cloud Monitoring",b:"GCM is siloed (separate tools), GCP-locked, no correlation. Dash0: unified, multi-cloud, OTel-native, Agent0 for autonomous investigation.",c:"Competition",u:"https://www.dash0.com/docs/integrations"},
{f:"Dash0 vs Datadog on GKE",b:"Both Autopilot partners. DD uses proprietary agents, unpredictable pricing. Dash0: OTel-native (portable), transparent pricing. Can migrate DD dashboards.",c:"Competition",u:"https://www.dash0.com/datadog-alternative"},
{f:"Dash0 vs Dynatrace on GKE",b:"Dynatrace uses proprietary OneAgent — heavy, vendor-locked. Dash0: lightweight OTel-native operator, no proprietary agents, portable telemetry.",c:"Competition",u:"https://www.dash0.com/dynatrace-alternative"},
{f:"Cloud Service Mesh on GKE",b:"Google's managed Istio-based mesh. Provides mTLS, traffic management, observability dashboards in Console. No control plane management needed.",c:"Competition",u:"https://cloud.google.com/service-mesh/docs/overview"},
{f:"DORA metrics — what are they?",b:"Deployment Frequency, Lead Time for Changes, Change Failure Rate, Mean Time to Recovery. Google-backed research showing these predict org performance.",c:"Competition",u:"https://cloud.google.com/blog/products/devops-sre/using-the-four-keys-to-measure-your-devops-performance"},
{f:"GCP Project",b:"Fundamental organizational unit. All resources live in a project. Like an AWS account but lighter weight.",c:"GCP Vocab",u:"https://cloud.google.com/resource-manager/docs/creating-managing-projects"},
{f:"GCP VPC vs AWS VPC",b:"Same concept, but GCP VPCs are GLOBAL (not regional like AWS).",c:"GCP Vocab",u:"https://cloud.google.com/vpc/docs/overview"},
{f:"Cloud Run",b:"Serverless containers (like Fargate but simpler). Rapidly growing at Google.",c:"GCP Vocab",u:"https://cloud.google.com/run/docs/overview/what-is-cloud-run"},
{f:"Workload Identity",b:"GKE pods auth to GCP services without static creds. Maps K8s service accounts to GCP IAM. Like AWS IRSA/Pod Identity.",c:"GCP Vocab",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/workload-identity"},
{f:"Binary Authorization",b:"Policy: only trusted container images can deploy. Supply chain security.",c:"GCP Vocab",u:"https://cloud.google.com/binary-authorization/docs/overview"},
{f:"Compute Engine",b:"GCP's VM service. The EC2 equivalent.",c:"GCP Vocab",u:"https://cloud.google.com/compute/docs/overview"},
{f:"Artifact Registry",b:"Container image registry. The ECR equivalent.",c:"GCP Vocab",u:"https://cloud.google.com/artifact-registry/docs/overview"},
{f:"Cloud Armor",b:"WAF/DDoS protection. AWS Shield + WAF combined.",c:"GCP Vocab",u:"https://cloud.google.com/armor/docs/cloud-armor-overview"},
{f:"Vertex AI",b:"Google's ML platform. Big push at Next. SageMaker equivalent.",c:"GCP Vocab",u:"https://cloud.google.com/vertex-ai/docs/start/introduction-unified-platform"},
{f:"Anthos",b:"Google's hybrid/multi-cloud K8s platform. Being repositioned — ask carefully.",c:"GCP Vocab",u:"https://cloud.google.com/kubernetes-engine/enterprise/docs"},
{f:"BigQuery",b:"Serverless data warehouse. Auto-scales for ad-hoc queries. Redshift equivalent but no cluster management. Supports 10K columns vs Redshift's 1,600.",c:"GCP Vocab",u:"https://cloud.google.com/bigquery/docs/introduction"},
{f:"Cloud Pub/Sub",b:"Messaging service combining SNS + SQS in one. Topics + subscriptions. At-least-once delivery, dead-letter queues, 7-day message retention.",c:"GCP Vocab",u:"https://cloud.google.com/pubsub/docs/overview"},
{f:"AlloyDB",b:"PostgreSQL-compatible managed DB. 4x faster for transactions, 100x faster for analytics via built-in columnar engine. HTAP workloads.",c:"GCP Vocab",u:"https://cloud.google.com/alloydb/docs/overview"},
{f:"Cloud Deploy",b:"Managed CD service for GKE. Works with Cloud Build, orchestrates deployments across environments, release tracking, rollback. Like ArgoCD managed.",c:"GCP Vocab",u:"https://cloud.google.com/deploy/docs/overview"},
{f:"Config Connector",b:"Manage 150+ GCP resources as K8s Custom Resources. Define Cloud SQL, Storage, IAM in YAML manifests. GitOps-friendly infrastructure-as-code.",c:"GCP Vocab",u:"https://cloud.google.com/config-connector/docs/overview"},
{f:"Gemini Code Assist",b:"AI coding assistant (was Duet AI). Powered by Gemini 2.5. Inline code gen, conversational help, source citations. Free for individuals. VS Code + JetBrains.",c:"GCP Vocab",u:"https://developers.google.com/gemini-code-assist/docs/overview"},
{f:"Cloud Functions vs Cloud Run",b:"Cloud Functions = Lambda equivalent (event-driven, sub-9-min timeout). Cloud Run = containerized workloads (like Fargate). Functions now run ON Cloud Run.",c:"GCP Vocab",u:"https://cloud.google.com/functions/docs/concepts/overview"},
{f:"Google Next 2026 likely themes",b:"Gemini everywhere, Managed OTel expansion, Autopilot as default, Cloud Run+GKE convergence, multi-cloud, supply chain security.",c:"Event Prep",u:"https://cloud.withgoogle.com/next"},
{f:"Booth networking strategy",b:"Lead with questions, not pitches. 'What's your observability stack?' → listen → connect to pain. Collect context not just badges. Follow up within 48 hrs.",c:"Event Prep",u:"https://cloud.withgoogle.com/next"},
{f:"Session picking strategy",b:"Prioritize hands-on labs and deep dives over keynotes (watch keynotes later). Target GKE, observability, and platform engineering tracks. Leave gaps for hallway conversations.",c:"Event Prep",u:"https://cloud.withgoogle.com/next"},
{f:"Dash0 elevator pitch (30 sec)",b:"Dash0 is the only observability platform built OTel-native from the ground up — on GKE, you get full-stack visibility (metrics, logs, traces) with zero proprietary agents, auto-instrumentation via the Dash0 operator, and no per-host pricing surprises.",c:"Event Prep",u:"https://www.dash0.com/docs/dash0/ai/agent0"},
{f:"Objection: 'We already use Datadog'",b:"Totally valid. Ask: are you happy with pricing predictability? Vendor lock-in concerns? We're OTel-native — your telemetry stays portable. We can even migrate your DD dashboards.",c:"Event Prep",u:"https://www.dash0.com/datadog-alternative"},
{f:"Objection: 'Google Cloud Monitoring is free'",b:"It's included, not free (you pay via resource costs). It's siloed — separate tools for metrics, logs, traces. No correlation, no AI investigation. Works for basic, breaks at scale.",c:"Event Prep",u:"https://cloud.google.com/products/operations"},

// ── GKE Basics (7 questions) ──
{q:"What year was GKE released?",o:["2013","2014","2015","2017"],a:2,cat:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/kubernetes-engine-overview",
e:"GKE launched in 2015 as the first managed K8s service — before EKS (2018) or AKS (2018). Google built K8s from their internal 'Borg' system. 2013 is too early (K8s didn't exist yet), and 2017 is when competitors were still catching up. 🟢 Dash0 angle: Google invented K8s and Dash0 is an official GKE partner — this heritage story reinforces the credibility of the Dash0+GKE combination."},
{q:"GKE Autopilot bills per-___",o:["Node","Pod","Cluster","Namespace"],a:1,cat:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/pricing#autopilot_mode",
e:"Autopilot charges per pod resource request (CPU, memory, ephemeral storage) — you never pay for idle node capacity. Standard GKE bills per node. Cluster-level fees exist ($0.10/hr) but that's the management fee, not the compute model. 🟢 Dash0 angle: Dash0 monitors pod-level resource consumption — aligning perfectly with Autopilot's per-pod billing. Help customers see what they're paying for."},
{q:"GKE control plane for one zonal cluster?",o:["$0.10/hr","$36/mo","Free","$10/mo"],a:2,cat:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/pricing",
e:"GKE provides $74.40 in monthly free tier credits, covering the $0.10/hr management fee for your first zonal or Autopilot cluster — effectively free. EKS charges the same rate with no free tier. 🟢 Dash0 angle: Dash0 also has a free tier — the 'free + free' story (free GKE control plane + free Dash0 tier) is a strong entry point for POCs."},
{q:"GKE auto-scaling edge over EKS?",o:["Spot instances","Node Auto-Provisioning + Autopilot","Fargate","Manual scaling"],a:1,cat:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/node-auto-provisioning",
e:"GKE's advantage is Node Auto-Provisioning (auto-creates node pools from pod requirements) plus Autopilot (fully managed per-pod scaling). EKS has Karpenter catching up, but GKE's integration is more mature. Fargate is AWS, not GKE. 🟢 Dash0 angle: Dash0 observes scaling events in real time — when NAP creates new node pools or Autopilot scales pods, you see it in traces and metrics instantly."},
{q:"GKE Standard vs Autopilot — who manages nodes?",o:["You in both","Google in both","You in Standard, Google in Autopilot","Google in Standard, you in Autopilot"],a:2,cat:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-overview",
e:"In Standard mode, you create and manage node pools, pick machine types, handle upgrades. In Autopilot, Google manages the entire node layer — you only define pods. This is the core distinction that drives Autopilot's lower ops overhead. 🟢 Dash0 angle: Dash0 works on both, but Autopilot is the partnership story. Standard clusters don't need partner approval — Autopilot's restrictions are where Dash0's partner status shines."},
{q:"What internal Google system did Kubernetes evolve from?",o:["MapReduce","Borg","Colossus","Omega"],a:1,cat:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/kubernetes-engine-overview",
e:"Kubernetes evolved from Google's internal system called Borg, which ran production workloads for over a decade. Omega was a research successor to Borg but K8s draws directly from Borg's design. MapReduce is for batch processing, Colossus is Google's filesystem. 🟢 Dash0 angle: Heritage matters in sales — 'Google built K8s from Borg, and Dash0 is their chosen observability partner' connects the origin story to partnership credibility."},
{q:"GKE release channels control what?",o:["Pricing tiers","Kubernetes version auto-upgrade cadence","Network policies","Storage classes"],a:1,cat:"GKE Basics",u:"https://cloud.google.com/kubernetes-engine/docs/concepts/release-channels",
e:"Release channels (Rapid, Regular, Stable) control how quickly your cluster gets Kubernetes version upgrades. Rapid gets new versions first, Stable waits longest. This lets you balance new features vs stability. They don't affect pricing, networking, or storage. 🟢 Dash0 angle: Dash0's operator is tested against all release channels. Knowing which channel a prospect uses helps scope compatibility conversations."},

{q:"Dash0's AI investigation copilot is called?",o:["Dash0 AI","Agent0","GeminiOps","AutoInvestigate"],a:1,cat:"Dash0+GKE",u:"https://www.dash0.com/docs/dash0/ai/agent0",

{q:"How does Dash0's operator instrument workloads?",o:["Manual SDK integration per app","Sidecar container injection","Auto-instrumentation via webhook","eBPF kernel probes"],a:2,cat:"Dash0+GKE",u:"https://www.dash0.com/docs/dash0/monitoring/kubernetes/about-kubernetes",

body:`<p>OpenTelemetry (OTel) is the open-source observability framework that Dash0 is built on. It's the second most active CNCF project after Kubernetes itself. Understanding OTel is key because it's Dash0's core differentiator: <strong>OTel-native means no vendor lock-in.</strong></p>
<p>OTel has three signal types: <strong>traces</strong> (request flows across services), <strong>metrics</strong> (measurements over time), and <strong>logs</strong> (event records). The goal is to correlate all three into a unified picture.</p>
<p>The OTLP (OpenTelemetry Protocol) is the standard wire format. Any OTLP-compatible backend can receive the data. This is why Dash0 customers can switch backends without changing instrumentation — the data format is universal.</p>`,
highlights:[
"OTel Collector: The pipeline component that receives, processes, and exports telemetry. Dash0's operator deploys this automatically.",
"Auto-instrumentation: OTel can automatically instrument common libraries and frameworks. Dash0's operator handles this — teams don't configure OTel directly.",
"OTLP is the standard. Google's Managed OTel uses it. Dash0 uses it. Even Datadog accepts it now. But only Dash0 is OTel-native end to end."
],
compare:{left:{label:"OTel-native (Dash0)",items:["Portable instrumentation","Standard wire format","Switch backends freely","Community-driven","Growing ecosystem"]},right:{label:"Proprietary (DD/DT)",items:["Locked-in agents","Custom protocols","Re-instrument to switch","Vendor-driven","Closed ecosystem"]}},
exercises:[
{task:"Read the OTel getting started overview. Understand the three signal types: traces, metrics, logs.",hint:"Focus on understanding what each signal type captures and how they relate",url:"https://opentelemetry.io/docs/concepts/signals/"},
{task:"Look at the OTel Collector architecture diagram. Understand receivers → processors → exporters pipeline.",hint:"This is exactly what Dash0's operator sets up automatically",url:"https://opentelemetry.io/docs/collector/"},
{task:"Find the OTel auto-instrumentation docs for one language you know (Java, Python, Node.js). Note the setup steps — then compare to 'helm install dash0-operator.'",hint:"The contrast between manual OTel setup and Dash0's one-command install is a selling point",url:"https://opentelemetry.io/docs/languages/"}
],
sources:["https://opentelemetry.io/docs/","https://opentelemetry.io/docs/collector/","https://opentelemetry.io/docs/concepts/signals/"]
},

// ─── CLOUD SYNC ENGINE (offline-resilient) ───
let syncStatus='idle',lastSyncAt=null,syncPending=false;
function syncEnabled(){return typeof SYNC_SHEET_URL==='string'&&SYNC_SHEET_URL.length>10}
function getSyncKey(){return SYNC_USER_ID?(SYNC_USER_ID+'/'+STORAGE_KEY):STORAGE_KEY}
function isOnline(){return typeof navigator!=='undefined'?navigator.onLine:true}
async function cloudSave(){
if(!syncEnabled()){syncPending=false;return}
if(!isOnline()){syncStatus='offline';syncPending=true;updateSyncUI();return}
syncStatus='syncing';updateSyncUI();
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},savedAt:new Date().toISOString(),version:7};
await fetch(SYNC_SHEET_URL+'?action=save&key='+encodeURIComponent(getSyncKey()),{
method:'POST',headers:{'Content-Type':'text/plain'},
body:JSON.stringify({data,savedAt:data.savedAt})
});
syncStatus='synced';lastSyncAt=new Date().toISOString();syncPending=false;
}catch(e){
syncStatus=isOnline()?'error':'offline';syncPending=true;
console.warn('Cloud sync save failed:',e);
}
updateSyncUI();
}
async function cloudLoad(){
if(!syncEnabled())return null;
if(!isOnline()){syncStatus='offline';updateSyncUI();return null}
syncStatus='syncing';updateSyncUI();
try{
const resp=await fetch(SYNC_SHEET_URL+'?action=load&key='+encodeURIComponent(getSyncKey()));
const json=await resp.json();
syncStatus='synced';lastSyncAt=new Date().toISOString();updateSyncUI();
if(json.ok&&json.data)return json;
return null;
}catch(e){syncStatus=isOnline()?'error':'offline';updateSyncUI();console.warn('Cloud sync load failed:',e);return null}
}
function updateSyncUI(){
const el=document.getElementById('sync-badge');
if(!el)return;
const icons={idle:'☁️',syncing:'⟳',synced:'✓',error:'✕',offline:'⏸'};
const colors={idle:'#6b7280',syncing:'#f59e0b',synced:'#10b981',error:'#ef4444',offline:'#6b7280'};
const titles={idle:'Cloud sync ready',syncing:'Syncing...',synced:'Synced'+(lastSyncAt?' '+new Date(lastSyncAt).toLocaleTimeString():''),error:'Sync error — will retry when online',offline:'Offline — will sync when reconnected'};
el.textContent=icons[syncStatus]||'☁️';el.style.color=colors[syncStatus]||'#6b7280';el.title=titles[syncStatus]||'';
}
let syncTimer=null;
function debouncedCloudSave(){
if(!syncEnabled())return;
if(syncTimer)clearTimeout(syncTimer);
syncTimer=setTimeout(()=>cloudSave(),2000);
}
function saveSyncSettings(url,userId){
SYNC_SHEET_URL=url.trim();
SYNC_USER_ID=(userId||'').trim();
try{
if(SYNC_SHEET_URL)localStorage.setItem(STORAGE_KEY+'-sync-url',SYNC_SHEET_URL);
else localStorage.removeItem(STORAGE_KEY+'-sync-url');
if(SYNC_USER_ID)localStorage.setItem(STORAGE_KEY+'-sync-user',SYNC_USER_ID);
else localStorage.removeItem(STORAGE_KEY+'-sync-user');
}catch(e){}
updateSyncUI();
if(syncEnabled())cloudLoad().then(cloud=>{
if(cloud&&cloud.data){
const local=loadState();
const localTime=local&&local.savedAt?new Date(local.savedAt).getTime():0;
const cloudTime=cloud.savedAt?new Date(cloud.savedAt).getTime():0;
if(cloudTime>localTime){
const d=cloud.data;
if(d.stats){stats={...stats,...d.stats};if(!stats.quizScores)stats.quizScores={}}
if(d.history)sessionHistory=d.history;
if(d.exercisesDone)exercisesDone=d.exercisesDone;
if(d.schedule)schedule=d.schedule;
if(d.checkpoints)checkpoints=d.checkpoints;
if(d.sessionsDone)sessionsDone=d.sessionsDone;
if(d.userRole)userRole=d.userRole;
if(d.fcFavs)fcFavs=new Set(d.fcFavs);
if(d.lastCard){fcCat=d.lastCard.cat||"All";fcIdx=d.lastCard.idx||0}
saveState();
}
render();
}
});
}
// Auto-sync when coming back online
if(typeof window!=='undefined'){
window.addEventListener('online',()=>{
if(syncEnabled()&&syncPending){console.log('☁️ Back online — syncing pending changes');cloudSave()}
else if(syncEnabled()){syncStatus='idle';updateSyncUI()}
});
window.addEventListener('offline',()=>{
if(syncEnabled()){syncStatus='offline';updateSyncUI()}
});
}

if(nextSession){

navigator.clipboard.writeText(prompt).then(()=>{
showToast('Copied to clipboard — opening Claude...');

}).catch(()=>{
const ta=document.createElement('textarea');ta.value=prompt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);

function showToast(msg){

const t=document.createElement('div');t.className='ask-toast';t.textContent=msg;document.body.appendChild(t);
setTimeout(()=>t.remove(),3000);
}
// ─── ICS EXPORT ───
function toggleIcsPanel(){
icsOpen=!icsOpen;
if(icsOpen){icsSelected=new Set();icsPhaseFilter='all';schedule.forEach(s=>icsSelected.add(s.id))}
render();
}
function icsFilterPhase(p){
icsPhaseFilter=p;
icsSelected=new Set();
const filtered=p==='all'?schedule:schedule.filter(s=>s.phase==p);
filtered.forEach(s=>icsSelected.add(s.id));
render();
}
function icsToggle(id){if(icsSelected.has(id))icsSelected.delete(id);else icsSelected.add(id);render()}
function icsSelectAll(){const visible=icsVisibleSessions();visible.forEach(s=>icsSelected.add(s.id));render()}
function icsSelectNone(){icsSelected.clear();render()}
function icsVisibleSessions(){return icsPhaseFilter==='all'?[...schedule]:schedule.filter(s=>s.phase==icsPhaseFilter)}
function renderIcsPanel(){
if(!icsOpen)return'';
const visible=icsVisibleSessions().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const phases=[...new Set(schedule.map(s=>s.phase).filter(Boolean))].sort();
let h=`<div class="ics-panel">
<h4>📅 Export to Calendar</h4>
<div class="ics-filters">
<button class="${icsPhaseFilter==='all'?'active':''}" onclick="icsFilterPhase('all')">All Sessions</button>
${phases.map(p=>`<button class="${icsPhaseFilter==p?'active':''}" onclick="icsFilterPhase(${p})">Phase ${p}</button>`).join('')}
</div>
<div style="display:flex;gap:8px;margin-bottom:8px">
<button style="background:none;border:none;color:#3b82f6;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectAll()">Select all</button>
<span style="color:#374151;font-size:12px">|</span>
<button style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectNone()">Select none</button>
</div>
<div class="ics-count">${icsSelected.size} of ${visible.length} session${visible.length!==1?'s':''} selected</div>
<div class="ics-list">`;
visible.forEach(s=>{
const on=icsSelected.has(s.id);
h+=`<div class="ics-item" onclick="icsToggle('${s.id}')">
<div class="ics-check${on?' on':''}">${on?'✓':''}</div>
<div class="ics-item-info"><div class="ics-item-title">${s.title}</div><div class="ics-item-date">${fmtDate(s.date)} · ${s.time} · ${s.dur} min</div></div>
</div>`});
h+=`</div>
<div class="ics-actions">
<button class="btn btn-secondary" onclick="toggleIcsPanel()">Cancel</button>
<button class="ics-dl" ${icsSelected.size===0?'disabled style="opacity:.4;cursor:default" ':''}onclick="${icsSelected.size?'downloadIcs()':''}">Download .ics (${icsSelected.size})</button>
</div></div>`;
return h;
}
function downloadIcs(){
const selected=schedule.filter(s=>icsSelected.has(s.id)).sort((a,b)=>a.date.localeCompare(b.date));
if(!selected.length)return;
const pad=n=>(n<10?'0':'')+n;
const toIcsDate=(d,t,dur)=>{
const[y,m,dy]=d.split('-').map(Number);
const[h,mi]=(t||'09:00').split(':').map(Number);
const start=new Date(y,m-1,dy,h,mi);
const end=new Date(start.getTime()+dur*60000);
const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
return{start:fmt(start),end:fmt(end)};
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
let cal=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CrashCourse//StudyApp//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:Study Sessions\r\n`;
selected.forEach(s=>{
const{start,end}=toIcsDate(s.date,s.time,s.dur);
const desc=(s.desc||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
cal+=`BEGIN:VEVENT\r\nUID:${uid()}@crashcourse\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:${s.title.replace(/,/g,'\\,')}\r\nDESCRIPTION:${desc}\r\n`;
if(s.phase)cal+=`CATEGORIES:Phase ${s.phase}\r\n`;
cal+=`STATUS:CONFIRMED\r\nBEGIN:VALARM\r\nTRIGGER:-PT10M\r\nACTION:DISPLAY\r\nDESCRIPTION:Study session starting soon\r\nEND:VALARM\r\nEND:VEVENT\r\n`;
});
cal+=`END:VCALENDAR`;
const blob=new Blob([cal],{type:'text/calendar;charset=utf-8'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='study-sessions.ics';a.click();
URL.revokeObjectURL(url);
showToast(`Downloaded ${selected.length} session${selected.length!==1?'s':''} as .ics`);
icsOpen=false;render();
}
// ─── INIT ───
render();
</script>
