<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dash0 MCP Crash Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}.header small{font-size:12px;color:#6b7280}
.badge{background:rgba(16,185,129,.15);color:#6ee7b7;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
.card{border-radius:16px;padding:20px;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;-webkit-user-select:none}
.card.question{background:#1f2937;border:2px solid #374151}
.card.answer{background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.card-text{font-size:17px;line-height:1.5}
.card-hint{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1;filter:none}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#1f2937;color:#d1d5db}.btn-secondary:hover{background:#374151}
.btn-danger{background:rgba(239,68,68,.2);border:2px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:rgba(16,185,129,.2);border:2px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn-full{width:100%;padding:14px;font-size:15px}
.progress-bar{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{width:100%;background:#1f2937;border-radius:999px;height:8px}
.progress-fill{background:#10b981;height:8px;border-radius:999px;transition:width .5s}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.pill.active{background:#10b981;color:#fff}.pill:not(.active){background:#1f2937;color:#9ca3af}
.quiz-option{text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.quiz-option.correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.dimmed{background:rgba(31,41,55,.5);border-color:#1f2937;color:#4b5563}
.scenario-box{border-radius:16px;padding:20px;margin-bottom:16px}
.scenario-q{background:rgba(239,68,68,.08);border:2px solid rgba(153,27,27,.4)}
.scenario-a{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3)}
.scenario-reveal{background:#1f2937;border:2px solid #374151;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.timer{font-size:28px;font-family:monospace;font-weight:700}
.timer.green{color:#10b981}.timer.yellow{color:#f59e0b}.timer.red{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}.stat-val,.stat-num{font-size:20px;font-weight:700}.stat-label{font-size:11px;color:#6b7280}
.focus-box{background:#1f2937;border-radius:16px;padding:16px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
.results-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.grade{font-size:56px;font-weight:700;text-align:center;margin-bottom:8px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:50vh}
.mgmt-section{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:16px}
.mgmt-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#d1d5db}
.mgmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.mgmt-row:last-child{border-bottom:none}
.mgmt-row .label{font-size:13px;color:#9ca3af}
.mgmt-row .value{font-size:13px;font-weight:600;color:#fff}
.btn-outline{background:transparent;border:2px solid #374151;color:#9ca3af;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#6b7280;color:#d1d5db}
.btn-danger-solid{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-danger-solid:hover{background:#b91c1c}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-box{background:#1f2937;border:2px solid #374151;border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151;font-size:12px}
.history-item:last-child{border-bottom:none}
.export-box{background:#0d1117;border:1px solid #374151;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#6ee7b7;word-break:break-all;max-height:120px;overflow-y:auto;margin-top:8px}
.source-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.source-link:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.source-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.res-group{margin-bottom:20px}
.res-group h4{font-size:13px;font-weight:600;color:#6ee7b7;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.res-link{display:block;padding:10px 12px;border-radius:10px;background:#1f2937;margin-bottom:6px;text-decoration:none;color:#93c5fd;font-size:13px;font-weight:500;border:1px solid #374151;transition:all .2s}
.res-link:hover{background:#374151;border-color:#4b5563}
.res-link small{display:block;color:#6b7280;font-size:11px;font-weight:400;margin-top:2px}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.lesson-card{background:#1f2937;border-radius:16px;padding:16px;cursor:pointer;border:2px solid #374151;transition:all .2s}
.lesson-card:hover{border-color:#4b5563}
.lesson-card.completed{border-color:rgba(16,185,129,.3)}
.lesson-num{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.lesson-title{font-size:15px;font-weight:600;margin:4px 0}
.lesson-meta{font-size:12px;color:#6b7280;display:flex;gap:12px}
.lesson-body{padding:0}
.lesson-section{margin-bottom:20px}
.lesson-section h4{font-size:13px;font-weight:600;color:#6ee7b7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lesson-text{font-size:14px;color:#d1d5db;line-height:1.7}
.lesson-text p{margin-bottom:10px}
.lesson-highlight{background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:10px 14px;border-radius:0 10px 10px 0;margin:10px 0;font-size:13px;color:#d1fae5;line-height:1.5}
.lesson-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.lesson-compare-item{background:#0d1117;border-radius:10px;padding:10px;font-size:12px;line-height:1.5}
.lesson-compare-item .compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.exercise-box{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.exercise-box .ex-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.exercise-box .ex-task{font-size:13px;color:#ddd6fe;line-height:1.5;margin-bottom:8px}
.exercise-box .ex-hint{font-size:12px;color:#6b7280;font-style:italic}
.exercise-check{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
.exercise-check .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #374151;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.exercise-check .checkbox.checked{background:#10b981;border-color:#10b981}
.exercise-check .ex-text{font-size:13px;color:#d1d5db}
.ex-steps-toggle{background:none;border:1px solid rgba(139,92,246,.25);color:#a78bfa;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;margin-top:6px;font-family:inherit;transition:all .2s}
.ex-steps-toggle:hover{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.4)}
.ex-steps{display:none;margin-top:8px;padding:10px 12px;background:rgba(139,92,246,.04);border-radius:8px;border:1px solid rgba(139,92,246,.12)}
.ex-steps.open{display:block}
.ex-steps ol{margin:0;padding-left:20px;font-size:13px;color:#c4b5fd;line-height:1.7}
.ex-steps li{margin-bottom:4px}
.ex-steps code{background:#1f2937;padding:2px 6px;border-radius:4px;font-size:12px;color:#a5f3fc}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}
.sched-item{background:#1f2937;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #374151;transition:all .2s}
.sched-item.today{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.sched-item.past{opacity:.5}
.sched-item.done{border-color:rgba(16,185,129,.3);opacity:.7}
.sched-item .si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sched-item .si-date{font-size:11px;color:#6b7280;font-weight:600}
.sched-item .si-dur{font-size:10px;color:#4b5563;background:#0d1117;padding:2px 8px;border-radius:6px}
.sched-item .si-title{font-size:14px;font-weight:600;color:#e5e7eb;margin-bottom:2px}
.sched-item .si-desc{font-size:12px;color:#9ca3af;line-height:1.4}
.sched-item .si-actions{display:flex;gap:6px;margin-top:8px}
.sched-item .si-actions button{padding:6px 10px;border-radius:8px;border:none;font-size:11px;font-weight:500;cursor:pointer}
.cp-item{background:rgba(251,191,36,.06);border:2px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;margin-bottom:8px}
.cp-item.hit{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.cp-item .cp-target{font-size:14px;font-weight:600;color:#fde68a}
.cp-item.hit .cp-target{color:#6ee7b7;text-decoration:line-through}
.cp-item .cp-date{font-size:11px;color:#6b7280}
.form-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.form-sheet{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.form-sheet h3{font-size:16px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:14px;font-family:inherit}
.form-field textarea{min-height:60px;resize:vertical}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#10b981}
.ask-box{background:rgba(139,92,246,.06);border:2px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;margin-top:16px}
.ask-box .ask-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ask-box .ask-row{display:flex;gap:8px}
.ask-box input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:13px;font-family:inherit}
.ask-box input:focus{outline:none;border-color:#a78bfa}
.ask-box input::placeholder{color:#4b5563}
.ask-box button{padding:10px 14px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ask-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(124,58,237,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ics-panel{background:#111827;border:2px solid #374151;border-radius:16px;padding:16px;margin-bottom:16px}
.ics-panel h4{font-size:13px;font-weight:600;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ics-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ics-filters button{padding:5px 10px;border-radius:8px;border:2px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.ics-filters button.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#93c5fd}
.ics-list{max-height:320px;overflow-y:auto;margin-bottom:12px}
.ics-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.ics-item:last-child{border-bottom:none}
.ics-check{width:20px;height:20px;border-radius:5px;border:2px solid #374151;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:12px;color:transparent}
.ics-check.on{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.ics-item-info{flex:1;min-width:0}
.ics-item-title{font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ics-item-date{font-size:11px;color:#6b7280}
.ics-actions{display:flex;gap:8px;margin-top:4px}
.ics-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.ics-dl{background:#3b82f6;color:#fff}
.ics-dl:hover{background:#2563eb}
.ics-count{font-size:12px;color:#6b7280;margin-bottom:8px}
@media(min-width:600px){
body{max-width:960px;padding:0 24px}
.header{padding:20px 0 12px}
.header h1{font-size:22px}
.content{padding:20px 0 100px}
.nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}

.nav{max-width:1100px}

.card{max-width:700px}
.res-group{grid-template-columns:repeat(3,1fr)}
}
.role-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

.role-cards{display:flex;flex-direction:column;gap:12px}

.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-badge.core{background:rgba(16,185,129,.15);color:#6ee7b7}
.role-badge.bonus{background:rgba(107,114,128,.15);color:#6b7280}

// ── Fundamentals (8) ──
{f:"What is MCP?",b:"Model Context Protocol — an open standard (by Anthropic) for connecting LLMs to external tools and data sources via a structured tool-calling interface.",c:"Fundamentals",u:"https://modelcontextprotocol.io/introduction",d:1},
{f:"What transport does the Dash0 MCP server use?",b:"Streamable HTTP transport (remote hosted). No local install needed — the server runs on Dash0's infrastructure.",c:"Fundamentals",u:"https://github.com/dash0hq/mcp-dash0",d:1},
{f:"How many tools does the Dash0 MCP server expose?",b:"23 tools covering service discovery, logs, traces, metrics/PromQL, synthetic checks, web vitals, Kubernetes events, dashboards, and more.",c:"Fundamentals",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:1},
{f:"What authentication does the Dash0 MCP server require?",b:"A Dash0 auth token passed as an Authorization: Bearer header. The token must have permissions on the target dataset(s).",c:"Fundamentals",u:"https://github.com/dash0hq/mcp-dash0",d:1},
{f:"What is the key difference between MCP and a REST API?",b:"With MCP, the LLM autonomously decides which tools to call and when based on natural language intent — no need to memorize endpoints, parameters, or query syntax.",c:"Fundamentals",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},
{f:"Where does the Dash0 MCP endpoint URL come from?",b:"From the Dash0 app: Organization Settings → Endpoints → MCP. The URL is region-specific.",c:"Fundamentals",u:"https://github.com/dash0hq/mcp-dash0",d:2},
{f:"What signal types can the Dash0 MCP server access?",b:"Logs, traces, metrics (including PromQL), synthetic check results, web vitals, and Kubernetes events — the full Dash0 observability dataset.",c:"Fundamentals",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"How does the Dash0 MCP server differ from the Dash0 CLI?",b:"The CLI is human-native (terminal commands). The MCP server is AI-native — it exposes structured tools that LLMs call directly, enabling natural language observability without remembering any command syntax.",c:"Fundamentals",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},

// ── Setup & Config (7) ──
{f:"What config format does Claude Code use for MCP servers?",b:"A .mcp.json file in the project root (or ~/.claude/mcp.json globally). It uses the mcpServers key with the server name, type, url, and headers.",c:"Setup & Config",u:"https://github.com/dash0hq/mcp-dash0",d:1},
{f:"Show the minimal Claude Code .mcp.json for Dash0 MCP.",b:'{"mcpServers":{"dash0":{"type":"streamableHttp","url":"<endpoint_mcp>","headers":{"Authorization":"Bearer <token>"}}}}',c:"Setup & Config",u:"https://github.com/dash0hq/mcp-dash0",d:1},
{f:"What fallback config works for clients that don't support Streamable HTTP?",b:'Use npx mcp-remote as a local bridge: {"command":"npx","args":["-y","mcp-remote","<endpoint>","--header","Authorization: Bearer ${DASH0_AUTH_TOKEN}"],"env":{"DASH0_AUTH_TOKEN":"<token>"}}',c:"Setup & Config",u:"https://github.com/dash0hq/mcp-dash0",d:2},
{f:"Where do you find per-IDE MCP setup instructions for Dash0?",b:"The Dash0 Integrations Hub at dash0.com/hub/integrations?tag=AI — each supported tool (Claude, Cursor, Windsurf, Cline, GitHub Copilot, Zed, etc.) has a dedicated copy-paste config page.",c:"Setup & Config",u:"https://www.dash0.com/hub/integrations",d:1},
{f:"What auth token permissions are required for the Dash0 MCP server?",b:"'All permissions' on the dataset(s) you want to work with. Read-only tokens will block write operations like creating/updating dashboards.",c:"Setup & Config",u:"https://github.com/dash0hq/mcp-dash0",d:2},
{f:"How do you verify the Dash0 MCP server is connected in your IDE?",b:"Check the IDE's MCP server list (e.g., Claude Code sidebar or Cursor settings). Browse available tools — you should see the 23 Dash0 tools listed with their descriptions.",c:"Setup & Config",u:"https://www.dash0.com/docs/dash0/ai/mcp/use-mcp",d:2},
{f:"Which IDE config file location is used for VS Code / GitHub Copilot MCP servers?",b:"settings.json — either in the workspace .vscode/ directory or user-level settings. The mcpServers key is nested under the relevant extension config.",c:"Setup & Config",u:"https://www.dash0.com/hub/integrations",d:2},

// ── Service Discovery (10) ──
{f:"What MCP tool lists all services instrumented in Dash0?",b:"list_services — returns a list of all service names visible in your Dash0 dataset, along with metadata like last seen timestamp.",c:"Service Discovery",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},
{f:"How do you ask the MCP server about service dependencies?",b:"Use natural language: 'Show me the dependencies for payment-service' — the LLM calls the appropriate topology/service tools to build the dependency graph.",c:"Service Discovery",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},
{f:"What does service topology data from the MCP server tell you?",b:"Which services call which, upstream/downstream relationships, and communication patterns — enabling impact analysis when a service degrades.",c:"Service Discovery",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"How do you find all services that call the payment-service using MCP?",b:"Ask: 'Which services have upstream dependencies on payment-service?' The LLM will call list_services and topology tools to map callers.",c:"Service Discovery",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"What is the RED method and how does MCP surface it?",b:"RED = Rate (requests/sec), Errors (error rate %), Duration (latency). MCP tools expose these metrics per service and per operation through natural language queries.",c:"Service Discovery",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:2},
{f:"How do you use MCP to find recently deployed services?",b:"Ask: 'Which services appeared in the last 24 hours?' The LLM combines list_services with timestamp filtering to surface new services.",c:"Service Discovery",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"What natural language prompt discovers high-error services?",b:"'Show me all services with an error rate above 1% in the last hour' — the LLM maps this to service health queries across all instrumented services.",c:"Service Discovery",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"How does MCP enable pre-feature-development service discovery?",b:"Before building a new feature, ask 'What existing endpoints does checkout-service expose?' The MCP server retrieves service metadata and recent span data to answer.",c:"Service Discovery",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},
{f:"What MCP tool returns details about a specific service's health?",b:"The LLM combines multiple tools — service metadata, recent error rates via get_metrics, and current latency — to compose a health summary for a specific service.",c:"Service Discovery",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:3},
{f:"How does the Dash0 MCP triage tool help with incident analysis?",b:"The triage tool (mentioned in changelog) helps AI agents navigate from a symptom to a root cause by correlating service health, affected resources, and failed health checks automatically.",c:"Service Discovery",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:3},

// ── Logs & Traces (9) ──
{f:"What MCP tool retrieves logs from Dash0?",b:"get_logs — accepts natural language time ranges, service names, log levels, and attribute filters. Returns structured log records.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},
{f:"What MCP tool retrieves distributed traces?",b:"get_traces — retrieves trace data including spans, duration, service hops, and error status for a given service, time window, or trace ID.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},
{f:"How do you get error logs for payment-service in the last hour via MCP?",b:"Ask: 'Show me error logs for payment-service in the last hour' — the LLM calls get_logs with the appropriate service filter, time range, and severity=ERROR.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"How do you find slow traces (>2s) for checkout-service via MCP?",b:"Ask: 'Find traces for checkout-service that took longer than 2 seconds in the last 30 minutes' — the LLM calls get_traces with duration threshold filtering.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"What is the advantage of MCP log queries vs. raw PromQL log queries?",b:"MCP accepts plain English — you don't need to know Dash0's log query syntax or filter attribute names. The LLM translates intent to the right query parameters.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"How do you correlate a specific trace ID with its logs using MCP?",b:"Ask: 'Show me logs correlated with trace ID abc123' — the LLM calls get_traces for the trace ID and then get_logs filtered by the same trace ID to show the full picture.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"How does MCP handle log volume — does it return all matching logs?",b:"The LLM typically retrieves a sample or uses limit/sort to return the most relevant logs. You can ask for 'the most recent 50 error logs' or 'just the last 10 failures'.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},
{f:"How do you investigate a distributed transaction across 5 services using only MCP?",b:"Ask: 'Show me the full trace for the failed checkout at 3:45pm including all service hops' — the LLM assembles the end-to-end trace using get_traces with trace-following capabilities.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},
{f:"What context does MCP add to log results that raw log queries don't?",b:"The LLM can summarize patterns across log results, identify anomalies, compare with previous time windows, and suggest investigation steps — all in the same response.",c:"Logs & Traces",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},

// ── Metrics & PromQL (9) ──
{f:"What MCP tool queries raw metrics from Dash0?",b:"get_metrics — retrieves time series metric data for a given service, metric name, and time window in plain English.",c:"Metrics & PromQL",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},
{f:"What MCP tool executes PromQL expressions against Dash0?",b:"query_promql — executes a PromQL expression directly and returns the result. This unlocks the full power of Prometheus Query Language for real-time analysis.",c:"Metrics & PromQL",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:1},
{f:"How do you get the p99 latency for api-gateway over the last hour via MCP?",b:"Ask: 'What is the p99 latency for api-gateway over the last hour?' The LLM generates a PromQL expression using histogram_quantile and calls query_promql.",c:"Metrics & PromQL",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:2},
{f:"How does MCP help engineers who don't know PromQL?",b:"The LLM generates the PromQL expression from natural language — the user describes what they want in English and the MCP server handles the query syntax.",c:"Metrics & PromQL",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:2},
{f:"What PromQL metric type would you use for request rate in Dash0 MCP?",b:"rate() on a counter metric, e.g., rate(http_requests_total[5m]). The LLM constructs this expression from 'show me request rate for X' prompts.",c:"Metrics & PromQL",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:2},
{f:"How do you compare error rates between two services using MCP?",b:"Ask: 'Compare the error rate for payment-service vs. checkout-service over the last 2 hours' — the LLM runs two get_metrics or query_promql calls and summarizes the comparison.",c:"Metrics & PromQL",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"What is the MCP 'Query Builder' capability?",b:"An interface for constructing observability queries mentioned in the changelog — helps AI agents build and execute PromQL queries directly through the MCP server for real-time analysis.",c:"Metrics & PromQL",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:3},
{f:"How do you get a high-availability summary (request volume, error count, latency) via MCP?",b:"Ask: 'Give me a high-level stats summary for order-service: request volume, error count, and p95 latency over the last 24 hours' — the LLM orchestrates multiple metric queries.",c:"Metrics & PromQL",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:3},
{f:"How does MCP handle PromQL expression optimization?",b:"The LLM can suggest more efficient PromQL expressions when asked to optimize — e.g., replacing recording rules patterns, adjusting step resolution, or reducing label cardinality.",c:"Metrics & PromQL",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:3},

// ── Synthetic & Web (7) ──
{f:"Can the Dash0 MCP server access synthetic check results?",b:"Yes — synthetic check data is part of the full observability dataset accessible through MCP tools, including availability status and historical results.",c:"Synthetic & Web",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},
{f:"What are web vitals and can MCP query them?",b:"Web vitals (LCP, FID, CLS, INP, TTFB) are performance metrics for frontend user experience. Dash0 collects them and MCP can query availability and web vitals data.",c:"Synthetic & Web",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:1},

{f:"How do you find endpoints with degraded availability using MCP?",b:"Ask: 'Which synthetic checks have had failures in the last 4 hours?' — the MCP tools return historical check results filtered by failure status.",c:"Synthetic & Web",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"What natural language prompt checks if a specific URL is currently up?",b:"'Is the checkout page at checkout.example.com currently passing its synthetic check?' — the LLM calls synthetic check tools for that specific endpoint.",c:"Synthetic & Web",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:2},
{f:"How do you correlate web vitals degradation with a deployment using MCP?",b:"Ask: 'Did the LCP score for the homepage worsen after the 2pm deployment today?' — the LLM queries web vitals time series and correlates with the deployment timestamp.",c:"Synthetic & Web",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},

// ── K8s & Dashboards (8) ──

{f:"How do you correlate K8s node pressure with application latency using MCP?",b:"Ask: 'Did node memory pressure on cluster-prod coincide with latency spikes in checkout-service today?' — the LLM combines get_kubernetes_events with get_metrics queries.",c:"K8s & Dashboards",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},
{f:"Can the MCP server create or update Dash0 dashboards?",b:"Yes — based on the MCP tool catalog, dashboard management (including creation and updates) is included in the 23 tools, enabling AI agents to automate dashboard workflows.",c:"K8s & Dashboards",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},
{f:"What K8s deployment workflow benefits from MCP integration?",b:"Post-deploy validation: 'Did the 3pm deploy to payment-service cause any K8s restarts or error rate increases in the 15 minutes following rollout?' — automated post-deploy health checks.",c:"K8s & Dashboards",u:"https://www.dash0.com/docs/dash0/ai/mcp",d:3},

// ── Pitch & Positioning (7) ──
{f:"What is the core 'AI-native observability' pitch for Dash0 MCP?",b:"Instead of learning query languages or memorizing UI navigation, engineers ask questions in plain English. The MCP server handles the translation — making observability as easy as asking a colleague.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:1},
{f:"How does Dash0 MCP compare to 'Grafana + ChatGPT'?",b:"Grafana + ChatGPT is disconnected — you copy/paste data between tools. Dash0 MCP is integrated — the LLM directly queries live data, no copy-paste, no context loss, real-time answers.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:1},
{f:"What is the MECE argument for MCP over a traditional observability UI?",b:"(1) No context switching — stay in your IDE. (2) No syntax learning — natural language. (3) Intelligent analysis — the LLM doesn't just return data, it interprets it. (4) Composable — combine multiple signals in one response.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:2},
{f:"Why did Dash0 launch the MCP server as remote/hosted rather than local?",b:"Zero install friction — no npm packages, no local binary, no version management. One config block and the server is live. Easier for enterprise customers to adopt across large teams.",c:"Pitch & Positioning",u:"https://github.com/dash0hq/mcp-dash0",d:2},
{f:"How do you position Dash0 MCP against Datadog's AI Assistant?",b:"Dash0 MCP is open protocol (MCP standard) — works in any MCP-compatible IDE/agent. Datadog's AI is proprietary and locked to their UI. Dash0 MCP brings observability into developer workflows, not the other way around.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:2},
{f:"What security concern does a CISO have about MCP and how do you respond?",b:"Concern: the MCP server has access to all observability data. Response: access is scoped to specific datasets via auth token permissions. No write access to application infrastructure — only to Dash0 assets (dashboards, synthetic checks).",c:"Pitch & Positioning",u:"https://github.com/dash0hq/mcp-dash0",d:1},
{f:"What one-sentence value statement captures the Dash0 MCP proposition?",b:"'Dash0 MCP turns your AI coding assistant into an observability expert — with live access to logs, traces, metrics, and Kubernetes events, all in plain English.'",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-mcp-server",d:1},
];

// ── Sales Scenarios (3) ──
{q:"A prospect says: 'We already have Datadog with an AI assistant built in. Why would we need Dash0 MCP?'",
a:"This is a great opportunity to highlight the open protocol advantage. Datadog's AI assistant is proprietary and locked to their UI — it doesn't live in your IDE, it requires you to go to Datadog. Dash0 MCP is built on the Model Context Protocol open standard, which means it works natively in Claude Code, Cursor, Windsurf, Cline, and any other MCP-compatible tool your engineers already use.\n\nThe workflow difference is significant: with Datadog's AI, engineers switch context to the Datadog UI, ask a question, then go back to their code. With Dash0 MCP, they never leave their IDE. They ask in Claude Code: 'What's causing the error spike in checkout-service?' and get a live answer from your actual Dash0 data — no context switch, no copy-paste.\n\nAlso worth noting: Dash0 MCP exposes all 23 tools including PromQL execution, Kubernetes event correlation, and synthetic check queries — this is a full observability interface, not just a dashboard search feature.\n\nAsk them: 'How often does your team stay in Datadog's interface versus coding? If observability lived in their IDE, would they use it more?'",
u:["https://www.dash0.com/changelog/dash0-mcp-server","https://github.com/dash0hq/mcp-dash0"]},

{q:"A customer's security team wants to know exactly what data the MCP server can access before approving it.",
a:"This is a legitimate and important question — here's the precise answer:\n\nThe Dash0 MCP server accesses only your Dash0 observability dataset: logs, distributed traces, metrics (including PromQL queries), synthetic check results, web vitals, Kubernetes events, and your Dash0 asset metadata (dashboards, synthetic check definitions). It does NOT have access to your application infrastructure, cloud provider APIs, databases, code repositories, or any system outside of Dash0.\n\nAccess is scoped to specific datasets via the auth token you configure. You create a token with 'All permissions' on the datasets you choose — nothing more. If you want read-only access to logs and traces but no dashboard modification, you can create a token with restricted dataset permissions.\n\nThe server is remote-hosted on Dash0's infrastructure (not local), which means the auth token is passed as an HTTP header on each request — it's never stored on the developer's machine beyond the IDE config file.\n\nFor the security team review, I'd recommend starting with a read-heavy dataset in a non-production environment and validating the access scope before granting production dataset permissions.",
u:["https://github.com/dash0hq/mcp-dash0","https://www.dash0.com/docs/dash0/ai/mcp"]},

{q:"A prospect asks: 'Why should we use MCP instead of just giving engineers access to the Dash0 UI and the Dash0 CLI?'",
a:"Great question — MCP, the CLI, and the UI serve different contexts, and the answer is 'use all three,' but MCP fills a gap the others don't.\n\nThe CLI is great for scripted workflows, CI/CD pipelines, and GitOps operations — managing assets, querying from the terminal, sending telemetry. The UI is best for exploration, building dashboards, and visual investigation. But both require deliberate context switching — you have to stop coding and go to another tool.\n\nMCP is the zero-context-switch option. When an engineer is in Claude Code debugging a function and notices something odd in the logs, they can ask 'What's the error rate for this service?' without opening a browser or running a terminal command. The answer comes back in the same conversation thread they're already in.\n\nThe bigger picture: as AI coding agents become standard in engineering workflows, the tools that integrate with those agents gain compounding value. MCP is how observability enters the AI coding loop — it means your AI assistant can reference real production data when helping debug or design code. That's fundamentally new.\n\nAsk them: 'When was the last time an engineer stopped coding to check observability data because it was too much friction to switch tools?'",
u:["https://www.dash0.com/docs/dash0/ai/mcp","https://www.dash0.com/changelog/dash0-mcp-server"]},

{q:"A solutions architect demo: Show me how to debug a service degradation in payment-service using only natural language.",
a:"Here's the workflow (demonstrate in Claude Code or Cursor with Dash0 MCP configured):\n\nStep 1 — Identify the problem: 'Show me the error rate and latency for payment-service over the last 2 hours. Has anything changed in the last 30 minutes?'\nThe LLM calls get_metrics / query_promql and returns a time series comparison showing when the degradation started.\n\nStep 2 — Get logs: 'Show me error logs for payment-service from the last 30 minutes.'\nThe LLM calls get_logs and returns the top errors with timestamps, message patterns, and stack traces.\n\nStep 3 — Find the slowest traces: 'Show me the slowest traces for payment-service in the last 30 minutes — what operation is taking the longest?'\nThe LLM calls get_traces with duration sorting and identifies the bottleneck operation.\n\nStep 4 — Check dependencies: 'Are any of the services that payment-service calls also showing elevated errors?'\nThe LLM uses service topology and metric tools to check upstream services.\n\nStep 5 — Check K8s: 'Are there any Kubernetes events for pods running payment-service in the last hour?'\nThe LLM calls get_kubernetes_events and surfaces any restarts, OOMKills, or scheduling issues.\n\nTotal time: ~2 minutes. Zero UI navigation. Zero PromQL written. All in the IDE.",
u:["https://www.dash0.com/docs/dash0/ai/mcp","https://www.dash0.com/changelog/dash0-mcp-server"]},

{q:"A customer asks: 'Can we use MCP to automate post-deployment health checks in our CI/CD pipeline?'",
a:"Yes — this is one of the highest-value production use cases for Dash0 MCP. Here's the pattern:\n\nIn your CI/CD pipeline (GitHub Actions, GitLab CI, etc.), after a deployment completes, trigger a step that invokes an AI agent (e.g., Claude via the API) with the Dash0 MCP server configured. The agent prompt: 'The payment-service was just deployed at {TIMESTAMP} with version {VERSION}. Check for the following in the 15 minutes following deployment: (1) error rate increase above 1%, (2) p99 latency increase above 20%, (3) any Kubernetes restarts or OOMKilled events. Report status as HEALTHY or DEGRADED with evidence.'\n\nThe agent autonomously calls get_metrics, query_promql, and get_kubernetes_events through MCP and returns a structured health assessment. You can gate the deployment promotion or send a Slack notification based on the result.\n\nThis is fundamentally different from writing custom health check scripts — you describe the check in natural language, the LLM figures out which MCP tools to call, and the result is actionable.\n\nPrerequisites: MCP server configured, Dash0 auth token with appropriate dataset permissions, and a Claude API key or similar LLM with MCP support.",
u:["https://www.dash0.com/docs/dash0/ai/mcp","https://github.com/dash0hq/mcp-dash0"]},

{q:"An engineer asks: 'I need to compare metrics for payment-service across three different time windows — before, during, and after an incident. Can MCP do this?'",
a:"Yes — multi-window comparison is a natural use case for conversational PromQL via MCP. Here's how to frame the request:\n\n'Compare the following for payment-service: (1) error rate and p99 latency during the 2 hours before the incident (yesterday 10pm-midnight), (2) during the incident (midnight to 2am), and (3) the 2 hours after resolution (2am-4am). Summarize what changed and when it normalized.'\n\nThe LLM will generate the appropriate PromQL expressions with time range offsets and call query_promql three times (or use PromQL offset modifier), then synthesize a comparative summary.\n\nThis kind of cross-window comparison typically requires either: writing multiple PromQL queries with offset modifiers manually, or building a Grafana panel with multiple time range overrides. MCP reduces this to a single natural language request.\n\nFor engineers who are comfortable with PromQL, MCP also lets you validate your own queries — 'Run this PromQL and tell me if the result looks correct for a service recovering from a database timeout'.",
u:["https://www.dash0.com/changelog/dash0-mcp-server","https://www.dash0.com/docs/dash0/ai/mcp"]},

{q:"During an incident, the on-call engineer uses Dash0 MCP to investigate. Walk through a realistic incident investigation workflow.",
a:"Context: Alert fires — checkout-service p99 latency exceeds 5 seconds at 11:47pm. On-call engineer opens Claude Code.\n\n1. 'What's the current error rate and latency for checkout-service? When did it start spiking?'\n→ LLM: query_promql for latency time series → 'Latency started rising at 11:42pm, currently 7.3s p99, baseline is 340ms'\n\n2. 'Show me the most recent error logs for checkout-service from the last 20 minutes.'\n→ LLM: get_logs → Returns errors: 'Connection pool exhausted — upstream: database-primary'\n\n3. 'Is database-primary showing any issues? Check its error rate and latency.'\n→ LLM: get_metrics → 'database-primary showing 40% error rate, query latency 12s avg — started same time'\n\n4. 'Show me K8s events for database-primary pods in the last 30 minutes.'\n→ LLM: get_kubernetes_events → 'OOMKilled on database-primary-0 at 11:41pm, restart took 90s'\n\n5. 'Which other services are calling database-primary and might also be affected?'\n→ LLM: service topology tools → Lists 4 other services with upstream dependency\n\nRoot cause identified: 11:41pm OOMKill on database-primary caused connection pool exhaustion cascading to checkout-service. Total investigation time: ~4 minutes. No browser opened.",
u:["https://www.dash0.com/docs/dash0/ai/mcp","https://www.dash0.com/changelog/dash0-mcp-server"]},

{q:"A customer's platform team wants to give all engineers access to Dash0 observability via MCP. What does the rollout look like?",
a:"The Dash0 MCP rollout is unusually simple compared to traditional observability tool adoption:\n\nPhase 1 — Auth setup (Platform team, 1 hour): Create a Dash0 auth token with appropriate dataset permissions (recommend read-only for logs/traces/metrics initially, full permissions for trusted engineers who need dashboard management). Get the regional MCP endpoint URL from Organization Settings → Endpoints → MCP.\n\nPhase 2 — Config distribution: Distribute the .mcp.json config to engineers for their IDE of choice. The Dash0 Integrations Hub (dash0.com/hub/integrations?tag=AI) has copy-paste configs for Claude Code, Cursor, Windsurf, VS Code + GitHub Copilot, Cline, Zed, and more. Engineers add the file to their project root (or globally) and restart their IDE.\n\nPhase 3 — Validation: Each engineer confirms the Dash0 MCP server appears in their IDE's tool list. They can run a simple test: 'List all services in Dash0' — if they see their service catalog, MCP is working.\n\nPhase 4 — Enablement: Share a short guide with example prompts for the most common workflows: log queries, trace investigation, metric comparison, K8s event lookup. The learning curve is minimal — it's just asking questions.\n\nNo per-engineer installs, no SDK dependencies, no version management. One config block, works for the whole team.",
u:["https://github.com/dash0hq/mcp-dash0","https://www.dash0.com/hub/integrations"]},

// ── Technical Deep-Dive (4) ──
{q:"An engineer asks: 'How does MCP actually work under the hood when I ask a natural language question?'",
a:"Here's the technical flow:\n\n1. You type: 'Show me error logs for payment-service in the last hour' in Claude Code.\n\n2. Claude (the LLM) sees this request in the context of a conversation where Dash0 MCP tools are available. It reviews the tool catalog — 23 tools with descriptions and parameter schemas — and determines that get_logs is the right tool.\n\n3. Claude generates a structured tool call: get_logs({service: 'payment-service', timeRange: 'last 1 hour', severity: 'ERROR'})\n\n4. The MCP client (Claude Code) sends this tool call to the Dash0 MCP server via Streamable HTTP — an HTTP request to your regional Dash0 MCP endpoint with your auth token in the Authorization header.\n\n5. The Dash0 MCP server translates this into the appropriate Dash0 API calls (log query API with the specified parameters).\n\n6. The server returns the log results as structured JSON to the MCP client.\n\n7. Claude receives the log data and formats a human-readable response: 'I found 47 errors in payment-service in the last hour. The most common error is...'\n\nKey insight: The LLM never sees raw Dash0 API credentials beyond the tool definition metadata. The MCP layer handles authentication. The LLM only works with the tool inputs/outputs.",
u:["https://modelcontextprotocol.io/introduction","https://github.com/dash0hq/mcp-dash0"]},

{q:"An engineer wants to write a custom MCP integration that calls Dash0 MCP from a Python script for automated reporting. Is this possible?",
a:"Yes — because Dash0 MCP is built on the open MCP standard using Streamable HTTP transport, any MCP-compatible client can call it. For Python automation:\n\nOption 1 — Claude API with MCP: Use the Anthropic Python SDK to create an agent with the Dash0 MCP server configured. Pass the agent a prompt like 'Generate a weekly service health report for the following services: ...' — the agent will call the MCP tools and return the report.\n\nOption 2 — Direct HTTP (if you prefer to call MCP tools manually): The Streamable HTTP transport accepts standard HTTP POST requests with the MCP protocol payload. You can call the Dash0 MCP endpoint directly with your auth token and the appropriate tool name + parameters as JSON.\n\nOption 3 — mcp-remote package: For Python/Node clients that implement the stdio MCP transport, use the mcp-remote bridge package to connect to the Dash0 remote HTTP endpoint.\n\nPractical use case: A weekly cron job that runs an AI agent prompt — 'For each service in the production dataset, summarize: error rate trend over 7 days, any SLO breaches, notable K8s events' — and posts the result to a Slack channel or generates a PDF report. No custom dashboard needed.",
u:["https://github.com/dash0hq/mcp-dash0","https://www.dash0.com/docs/dash0/ai/mcp"]},

// ── Additional Sales Scenario (4th) ──
{q:"A prospect at a large enterprise says: 'We have 500 engineers. How do we govern who can access observability data through MCP?'",
a:"Governance at scale is a legitimate concern — here's the answer:\n\nDash0 MCP uses token-based access control, and you have full control over what each token can access. For a 500-engineer organization, the typical approach is:\n\n1. Platform team creates role-based tokens: read-only tokens for developers (logs, traces, metrics queries only), full-permission tokens for SREs and senior engineers (includes dashboard management and synthetic check operations). These map to the standard least-privilege principle.\n\n2. Token distribution: Engineers add the token to their IDE config once. Since the token is in a local config file (not shared), the blast radius of a compromised token is limited to one person's dataset access.\n\n3. Token scoping per environment: Create separate tokens for production and staging datasets. Most developers only need staging access; production data access is restricted to on-call SREs and senior engineers.\n\n4. Auditability: All MCP tool calls go through the Dash0 API with the auth token — Dash0's audit log captures who accessed what data. This is equivalent to any direct API access audit trail.\n\nThe practical answer: MCP has the same governance model as direct API access — because that's what it is under the hood. The MCP layer doesn't bypass any access controls; it calls the same Dash0 APIs with the same token permissions.\n\nFor very strict environments: start with read-only staging access for all engineers and escalate to production access through a standard request process.",
u:["https://github.com/dash0hq/mcp-dash0","https://www.dash0.com/docs/dash0/ai/mcp"]},

// ── Additional SA/Technical Scenario (4th) ──
{q:"A solutions architect customer asks: 'Can we embed Dash0 MCP in our custom internal AI tooling — not Claude Code, but our own internal agent framework?'",
a:"Yes — because Dash0 MCP is built on the open Model Context Protocol standard with Streamable HTTP transport, any MCP-compatible client can connect to it. Here's how this works for a custom agent framework:\n\n1. If your framework supports MCP natively: Add the Dash0 endpoint as a remote MCP server in your framework's MCP client configuration. Use the 'streamableHttp' transport type, the regional endpoint URL, and an Authorization Bearer header. Your agents will automatically discover and call the 23 Dash0 tools.\n\n2. If your framework uses a different protocol: Use the mcp-remote bridge package (npx mcp-remote). It translates stdio or HTTP+SSE transport to the Dash0 Streamable HTTP endpoint. This handles older agent frameworks that predate the Streamable HTTP standard.\n\n3. Direct HTTP calls (without an MCP client library): The Streamable HTTP transport is standard HTTP POST. You can call the Dash0 MCP endpoint directly with the MCP protocol JSON payload, your auth token in the Authorization header, and handle the response. This is useful for lightweight integrations that don't need a full MCP client library.\n\nPractical example: A custom internal 'ops assistant' agent that uses LangChain or a proprietary LLM framework can add Dash0 as a tool provider. The agent then gains natural language access to logs, traces, metrics, and K8s events — integrated into whatever internal workflow the team has built.\n\nKey point: MCP's open protocol design specifically enables this ecosystem use case. Dash0 invested in remote hosting precisely so any agent — not just Claude Code — can access observability data without additional infrastructure.",
u:["https://github.com/dash0hq/mcp-dash0","https://modelcontextprotocol.io/introduction"]},
];

{id:"lesson-1",title:"What is MCP?",time:"8 min read",week:1,icon:"🧠",
sources:["https://modelcontextprotocol.io/introduction","https://www.dash0.com/changelog/dash0-mcp-server","https://github.com/dash0hq/mcp-dash0"],
exercises:[
{task:"Read the Dash0 MCP changelog entry and list 3 specific use cases mentioned.",hint:"Look for troubleshooting, statistics, implementation planning, and service listing.",url:"https://www.dash0.com/changelog/dash0-mcp-server"},
{task:"Explain MCP to a colleague in one sentence without using the word 'protocol'.",hint:"Focus on what it enables: natural language → observability data."},
{task:"Identify which of the 23 Dash0 MCP tools you'd use for each: (a) finding error logs, (b) querying PromQL, (c) listing Kubernetes events.",hint:"Hint: get_logs, query_promql, get_kubernetes_events.",url:"https://www.dash0.com/docs/dash0/ai/mcp"}
],
body:`<div class="lesson-section"><h4>What is the Model Context Protocol?</h4><div class="lesson-text"><p>MCP (Model Context Protocol) is an open standard by Anthropic that defines how Large Language Models connect to external tools and data sources. Think of it as USB-C for AI — a universal connector that lets LLMs use tools without custom integration code.</p><p>Before MCP, connecting an LLM to observability data required either: (a) copy-pasting data from monitoring UIs into the chat, (b) writing custom function-calling integrations for each tool, or (c) accepting that the LLM would answer based on outdated training data. MCP solves all three problems with a standardized tool protocol.</p></div></div>
<div class="lesson-highlight">Key insight: With MCP, the LLM autonomously decides <em>which</em> tool to call and <em>when</em> based on your natural language request. You don't call tools — the AI does.</div>
<div class="lesson-section"><h4>Dash0 MCP: The AI-Native Observability Interface</h4><div class="lesson-text"><p>The Dash0 MCP server is a remote, hosted implementation of the MCP standard. It exposes <strong>23 tools</strong> covering every observability signal in the Dash0 platform: logs, distributed traces, metrics (including full PromQL), synthetic check results, web vitals, Kubernetes events, and dashboard management.</p><p>Critically: the server is <em>remote</em> — there's nothing to install locally. One config block in your IDE and the full Dash0 observability dataset is available through natural language in every project.</p></div></div>
<div class="lesson-section"><h4>The 23 Tools at a Glance</h4><div class="lesson-text"><p>The 23 Dash0 MCP tools fall into 7 categories:</p></div>
<div class="lesson-compare"><div class="lesson-compare-item"><div class="compare-label" style="color:#10b981">Service Discovery</div>list_services, topology tools, service health</div><div class="lesson-compare-item"><div class="compare-label" style="color:#3b82f6">Logs & Traces</div>get_logs, get_traces, correlation tools</div><div class="lesson-compare-item"><div class="compare-label" style="color:#f59e0b">Metrics & PromQL</div>get_metrics, query_promql, Query Builder</div><div class="lesson-compare-item"><div class="compare-label" style="color:#8b5cf6">Synthetic & Web</div>synthetic check results, web vitals</div><div class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Kubernetes</div>get_kubernetes_events, pod management</div><div class="lesson-compare-item"><div class="compare-label" style="color:#6b7280">Dashboards</div>list_dashboards, dashboard management</div></div></div>
<div class="lesson-section"><h4>Four Primary Use Cases</h4><div class="lesson-text"><p>The Dash0 docs highlight four use cases where MCP provides distinct value over the UI or CLI:</p><ol style="padding-left:20px;line-height:2"><li><strong>Troubleshooting</strong> — pull error rates, latency, and service health for contextual issue diagnosis without leaving your IDE</li><li><strong>High-level statistics</strong> — get service availability summaries, request volumes, or error distributions on-demand</li><li><strong>Implementation planning</strong> — query dependencies, endpoints, and baselines before building new features</li><li><strong>Service listing</strong> — retrieve structured service catalogs for architecture discussions or documentation</li></ol></div></div>`},

{id:"lesson-2",title:"Setup & Configuration",time:"10 min read",week:1,icon:"⚙️",
sources:["https://github.com/dash0hq/mcp-dash0","https://www.dash0.com/hub/integrations","https://www.dash0.com/docs/dash0/ai/mcp/use-mcp"],
exercises:[
{task:"Follow the setup guide for your IDE and confirm the Dash0 MCP server appears in your tool list.",hint:"Check the Dash0 Integrations Hub for your specific IDE's instructions.",url:"https://www.dash0.com/hub/integrations"},
{task:"Test your connection by asking: 'List all services in Dash0.' Verify you see your service catalog.",hint:"If you see a list of your instrumented services, the connection is working."},
{task:"Try the npx mcp-remote fallback config — understand when you'd need it and what problem it solves.",hint:"Think about IDE clients that implemented the stdio transport before Streamable HTTP was added.",url:"https://github.com/dash0hq/mcp-dash0"}
],
body:`<div class="lesson-section"><h4>Step 1: Get Your Credentials</h4><div class="lesson-text"><p>Before configuring any IDE, you need two things from the Dash0 app:</p><ol style="padding-left:20px;line-height:2"><li><strong>MCP Endpoint URL</strong> — Go to Organization Settings → Endpoints → MCP. Copy the URL for your region. Each Dash0 region (US, EU, AP) has a different endpoint.</li><li><strong>Auth Token</strong> — Go to Organization Settings → Auth Tokens. Create a new token or reuse an existing one. The token must have <code class="code-inline">All permissions</code> on the dataset(s) you want to access.</li></ol></div></div>
<div class="lesson-highlight">Security note: Your auth token scopes access to specific datasets. Only grant permissions on the datasets your IDE needs — typically your production and/or staging observability datasets.</div>
<div class="lesson-section"><h4>Claude Code Configuration</h4><div class="lesson-text"><p>Create a <code class="code-inline">.mcp.json</code> file in your project root (or <code class="code-inline">~/.claude/mcp.json</code> for global access):</p></div>
<div class="code-block">{\n  "mcpServers": {\n    "dash0": {\n      "type": "streamableHttp",\n      "url": "https://your-region.mcp.dash0.com",\n      "headers": {\n        "Authorization": "Bearer YOUR_AUTH_TOKEN"\n      }\n    }\n  }\n}</div>
<div class="lesson-text"><p>Restart Claude Code after adding this file. The Dash0 server will appear in the MCP tools panel.</p></div></div>
<div class="lesson-section"><h4>Fallback Config (for legacy clients)</h4><div class="lesson-text"><p>Some MCP clients implemented the older stdio transport before Streamable HTTP was standardized. For these, use the <code class="code-inline">mcp-remote</code> bridge:</p></div>
<div class="code-block">{\n  "mcpServers": {\n    "dash0": {\n      "command": "npx",\n      "args": ["-y", "mcp-remote", "https://your-region.mcp.dash0.com",\n               "--header", "Authorization: Bearer ${DASH0_AUTH_TOKEN}"],\n      "env": {\n        "DASH0_AUTH_TOKEN": "YOUR_AUTH_TOKEN"\n      }\n    }\n  }\n}</div>
<div class="lesson-text"><p>The <code class="code-inline">mcp-remote</code> package runs locally as a bridge process. It connects your IDE's stdio MCP client to the Dash0 remote HTTP endpoint.</p></div></div>
<div class="lesson-section"><h4>Other Supported IDEs</h4><div class="lesson-text"><p>The Dash0 Integrations Hub provides copy-paste configs for: <strong>Claude Code, Cline, Cursor, GitHub Copilot (VS Code), Windsurf, Zed, LangChain, OpenCode, OpenLIT, OpenLLMetry, Kiro, Kagent</strong>. Visit <a href="https://www.dash0.com/hub/integrations?tag=AI" target="_blank" class="source-link">dash0.com/hub/integrations</a> and select your tool.</p></div></div>`},

],
body:`<div class="lesson-section"><h4>Service Discovery: Your Starting Point for Any Investigation</h4><div class="lesson-text"><p>Before investigating a specific service, you need to understand what's in your environment. The Dash0 MCP server's service discovery tools give you a complete picture of your instrumented service catalog, their relationships, and their current health — all through natural language.</p></div></div>
<div class="lesson-highlight">Resource-Centric SRE Automation: AI agents can navigate between services, view RED metrics for every operation, and identify resources affected by failed health checks — all through the MCP service discovery tools.</div>
<div class="lesson-section"><h4>The list_services Tool</h4><div class="lesson-text"><p>The foundational service discovery tool. Use it to:</p><ul style="padding-left:20px;line-height:2"><li>'Show me all services in Dash0' — returns your full service catalog</li><li>'Which services appeared in the last 24 hours?' — surface newly deployed services</li><li>'How many services do we have in production?' — infrastructure sizing questions</li></ul></div></div>
<div class="lesson-section"><h4>Service Topology & Dependencies</h4><div class="lesson-text"><p>Understanding service dependencies is critical for impact analysis. When checkout-service starts failing, you need to know: which services does it call? Which services call it? The MCP topology tools answer these questions conversationally:</p><ul style="padding-left:20px;line-height:2"><li>'What services does checkout-service depend on?'</li><li>'Which services have upstream dependencies on payment-service?'</li><li>'If database-primary goes down, which services are affected?'</li></ul></div></div>
<div class="lesson-section"><h4>RED Metrics per Service</h4><div class="lesson-text"><p>RED metrics (Rate, Errors, Duration) are the standard SRE lens for service health. The Dash0 MCP server surfaces these per service and per operation:</p></div>
<div class="lesson-compare"><div class="lesson-compare-item"><div class="compare-label" style="color:#10b981">Rate</div>Requests per second — volume and traffic patterns</div><div class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Errors</div>Error rate % — service reliability</div><div class="lesson-compare-item"><div class="compare-label" style="color:#f59e0b">Duration</div>Latency (p50/p95/p99) — user experience</div></div>
<div class="lesson-text"><p>Combine these: 'Show me all services with error rate above 0.5% and p99 latency above 2s in the last hour' — the LLM orchestrates multiple metric queries and returns a prioritized list.</p></div></div>`},

],
body:`<div class="lesson-section"><h4>get_logs: Natural Language Log Queries</h4><div class="lesson-text"><p>The <code class="code-inline">get_logs</code> tool accepts natural language queries and returns structured log records. You don't need to know Dash0's log query syntax, attribute names, or filter operators — describe what you want.</p></div>
<div class="lesson-compare"><div class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Traditional approach</div>Learn query syntax, know attribute paths like service.name, severity_text, and time range formats</div><div class="lesson-compare-item"><div class="compare-label" style="color:#10b981">MCP approach</div>'Show me error logs for payment-service in the last hour' — the LLM handles the translation</div></div></div>
<div class="lesson-highlight">The LLM doesn't just retrieve logs — it summarizes patterns, identifies anomalies, compares with previous time windows, and suggests investigation steps, all in one response.</div>
<div class="lesson-section"><h4>get_traces: Distributed Trace Retrieval</h4><div class="lesson-text"><p>The <code class="code-inline">get_traces</code> tool retrieves distributed trace data — end-to-end request flows across multiple services. Use it to investigate slow requests, identify bottleneck operations, and trace error propagation across service boundaries.</p><p>Key natural language patterns:</p><ul style="padding-left:20px;line-height:2"><li>'Show me the slowest traces for checkout-service in the last 30 minutes'</li><li>'Find all failed traces for payment-service today'</li><li>'Show me the full trace for trace ID abc123 including all service hops'</li><li>'Which operation in order-service takes the most time on average?'</li></ul></div></div>
<div class="lesson-section"><h4>Log-Trace Correlation</h4><div class="lesson-text"><p>One of MCP's most powerful capabilities: correlating logs and traces in a single query. Traditional observability requires switching between log and trace views in the UI and manually matching trace IDs. MCP handles this orchestration automatically:</p><p>'Show me logs correlated with trace ID abc123' — the LLM calls <code class="code-inline">get_traces</code> for the trace ID, then calls <code class="code-inline">get_logs</code> filtered by the same trace ID, and presents both in a unified view.</p></div></div>`},

body:`<div class="lesson-section"><h4>Two Ways to Query Metrics with MCP</h4><div class="lesson-text"><p>The Dash0 MCP server provides two complementary tools for metrics:</p></div>
<div class="lesson-compare"><div class="lesson-compare-item"><div class="compare-label" style="color:#10b981">get_metrics</div>Natural language metric retrieval — 'what's the request rate for X?' Returns time series data without requiring PromQL</div><div class="lesson-compare-item"><div class="compare-label" style="color:#3b82f6">query_promql</div>Direct PromQL execution — the LLM generates the expression from natural language, then runs it via this tool</div></div></div>
<div class="lesson-highlight">PromQL without the learning curve: the LLM generates histogram_quantile expressions, rate() calculations, and multi-label selectors from plain English. You get the full power of PromQL without memorizing the syntax.</div>
<div class="lesson-section"><h4>Common Metrics Queries via MCP</h4><div class="lesson-text"><p>Example natural language queries and what happens under the hood:</p></div>
<div class="lesson-compare"><div class="lesson-compare-item"><div class="compare-label" style="color:#a5f3fc">'p99 latency for api-gateway'</div>LLM generates: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))</div><div class="lesson-compare-item"><div class="compare-label" style="color:#a5f3fc">'Error rate for payment-service'</div>LLM generates: rate(http_requests_total{status=~"5..",service="payment-service"}[5m])</div><div class="lesson-compare-item"><div class="compare-label" style="color:#a5f3fc">'Request volume last 24h'</div>LLM generates: sum(increase(http_requests_total[24h])) by (service)</div><div class="lesson-compare-item"><div class="compare-label" style="color:#a5f3fc">'Memory usage by pod'</div>LLM generates: container_memory_usage_bytes grouped by pod</div></div></div>
<div class="lesson-section"><h4>The Query Builder Capability</h4><div class="lesson-text"><p>The Dash0 changelog describes the Query Builder as an interface for constructing and executing PromQL queries directly through MCP for real-time analysis. This goes beyond simple metric retrieval — it enables iterative query refinement in natural language: 'That query is too broad — can you filter it to only the production namespace?' The LLM refines the PromQL and re-runs it.</p></div></div>`},

{id:"lesson-6",title:"Synthetic & Web Vitals",time:"8 min read",week:2,icon:"🌐",
sources:["https://www.dash0.com/docs/dash0/ai/mcp","https://www.dash0.com/changelog/dash0-mcp-server"],

{task:"Ask MCP for the current status of all synthetic checks. Identify any that have failed in the last 24 hours.",hint:"'Show me the current status of all synthetic checks. Have any failed in the last 24 hours?'"},
{task:"Ask MCP about Core Web Vitals for a web property. Specifically: LCP and CLS.",hint:"'What is the current LCP and CLS for [your web app]? How do they compare to the recommended thresholds?'"},
{task:"Correlate a web vitals degradation with a recent event (deployment, config change).",hint:"'Did LCP for the homepage worsen after [time of recent change]? Show me the trend.'",url:"https://www.dash0.com/docs/dash0/ai/mcp"}
],
body:`<div class="lesson-section"><h4>Synthetic Monitoring via MCP</h4><div class="lesson-text"><p>Synthetic checks are automated tests that periodically probe your endpoints — HTTP checks, API tests, multi-step browser flows — to verify availability and performance before real users report problems.</p><p>The Dash0 MCP server exposes synthetic check data, enabling conversational availability monitoring:</p><ul style="padding-left:20px;line-height:2"><li>'Show me the current status of all synthetic checks'</li><li>'Which synthetic checks have been failing intermittently in the last 4 hours?'</li><li>'What is the average response time for the /checkout endpoint synthetic check?'</li><li>'Is the payment gateway URL check passing right now?'</li></ul></div></div>
<div class="lesson-highlight">The real value of MCP for synthetic monitoring: you get availability status embedded in your IDE workflow — no switching to a monitoring dashboard. And the LLM explains why a check might be failing, not just that it is.</div>
<div class="lesson-section"><h4>Core Web Vitals</h4><div class="lesson-text"><p>Web Vitals measure the quality of user experience on web pages. Dash0 collects these metrics and the MCP server makes them queryable:</p></div>
<div class="lesson-compare"><div class="lesson-compare-item"><div class="compare-label" style="color:#10b981">LCP</div>Largest Contentful Paint — loading performance. Good: &lt;2.5s</div><div class="lesson-compare-item"><div class="compare-label" style="color:#3b82f6">CLS</div>Cumulative Layout Shift — visual stability. Good: &lt;0.1</div><div class="lesson-compare-item"><div class="compare-label" style="color:#f59e0b">INP</div>Interaction to Next Paint — responsiveness. Good: &lt;200ms</div><div class="lesson-compare-item"><div class="compare-label" style="color:#8b5cf6">TTFB</div>Time to First Byte — server response. Good: &lt;800ms</div></div>
<div class="lesson-text"><p>Use MCP to correlate web vitals with deployments: 'Did the LCP score for the homepage worsen after the 2pm deployment today?' The LLM queries web vitals time series and correlates with the deployment timestamp automatically.</p></div></div>`},

],
body:`<div class="lesson-section"><h4>get_kubernetes_events: K8s Troubleshooting via Natural Language</h4><div class="lesson-text"><p>Kubernetes events are the first place to look when application behavior is abnormal. CrashLoopBackOff, OOMKilled, ImagePullBackOff, pending pods — these events tell the story of what K8s is doing with your workloads.</p><p>The <code class="code-inline">get_kubernetes_events</code> MCP tool makes K8s event investigation conversational:</p><ul style="padding-left:20px;line-height:2"><li>'Which pods are in CrashLoopBackOff right now?'</li><li>'Show me OOMKilled events from the last hour'</li><li>'Were there any scheduling failures in the production namespace today?'</li><li>'Show me all Kubernetes events for the payment-service pods in the last 30 minutes'</li></ul></div></div>
<div class="lesson-highlight">K8s + telemetry correlation: Ask MCP to correlate K8s events with application metrics in a single query — 'Did the OOMKill at 3:42pm cause the error spike in checkout-service?' The LLM calls both get_kubernetes_events and get_metrics and connects the dots.</div>
<div class="lesson-section"><h4>Post-Deploy Health Validation</h4><div class="lesson-text"><p>One of the highest-value automated workflows: after a deployment, ask MCP to validate health. This can run in CI/CD as an AI agent step:</p><p>'The payment-service was just deployed at 14:32. Check for the following in the 15 minutes following deployment: (1) error rate increase above 1%, (2) p99 latency increase above 20%, (3) any Kubernetes restarts. Report HEALTHY or DEGRADED.'</p><p>The LLM autonomously calls query_promql and get_kubernetes_events and returns a structured health assessment — enabling automated deployment gates.</p></div></div>
<div class="lesson-section"><h4>Dashboard Navigation with list_dashboards</h4><div class="lesson-text"><p>The <code class="code-inline">list_dashboards</code> tool returns all dashboards in your Dash0 organization. Use it for:</p><ul style="padding-left:20px;line-height:2"><li>'Which dashboards do we have for the payment service?'</li><li>'List all dashboards created in the last month'</li><li>'Is there a SLO dashboard for checkout-service?'</li></ul><p>This enables AI agents to navigate to relevant dashboards during investigation or build context for generating new ones.</p></div></div>`},

{id:"lesson-8",title:"Competitive Positioning",time:"9 min read",week:3,icon:"🏆",
sources:["https://www.dash0.com/changelog/dash0-mcp-server","https://www.dash0.com/docs/dash0/ai/mcp"],
exercises:[
{task:"Write a 2-sentence pitch for Dash0 MCP to a customer currently using Datadog's AI assistant.",hint:"Focus on the key differentiators: open protocol, IDE integration, no context switching."},
{task:"Anticipate and answer the security objection: 'We don't want our AI assistant to have access to production data.'",hint:"Cover: data scope (only Dash0 data), token permissions (you control the scope), no write access to infrastructure."},
{task:"Compare Dash0 MCP to 'Grafana + ChatGPT' in three specific dimensions.",hint:"Integration (live data vs. copy-paste), context (IDE vs. separate tool), intelligence (interpreted vs. raw data).",url:"https://www.dash0.com/changelog/dash0-mcp-server"}
],
body:`<div class="lesson-section"><h4>Why MCP is a Category Shift, Not a Feature</h4><div class="lesson-text"><p>Most observability tools are evolving to add AI features — AI-assisted query builders, natural language search, auto-generated summaries. But these are AI features bolted onto existing tools. MCP is different: it's an open protocol that brings observability data into the AI tools engineers already use.</p><p>The distinction matters: instead of observability tools getting smarter, your AI coding assistant gains observability superpowers. The engineer never leaves their workflow.</p></div></div>
<div class="lesson-highlight">The key positioning: Dash0 MCP meets engineers where they are — in their IDE, in their development workflow — rather than requiring them to learn and navigate yet another tool.</div>
<div class="lesson-section"><h4>Competitive Comparisons</h4><div class="lesson-text"></div>
<div class="lesson-compare"><div class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Datadog AI Assistant</div>Proprietary, UI-locked. Requires switching to Datadog interface. Not available in your IDE.</div><div class="lesson-compare-item"><div class="compare-label" style="color:#10b981">Dash0 MCP</div>Open protocol. Works in Claude Code, Cursor, Windsurf, and any MCP-compatible tool. Stays in your IDE.</div><div class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Grafana + ChatGPT</div>Disconnected. You manually copy data from Grafana into ChatGPT. No live data access, no real-time answers.</div><div class="lesson-compare-item"><div class="compare-label" style="color:#10b981">Dash0 MCP</div>Integrated. The LLM queries live Dash0 data directly. No copy-paste. Real-time answers with LLM interpretation.</div></div></div>
<div class="lesson-section"><h4>Handling the Security Objection</h4><div class="lesson-text"><p>Security teams will ask: "What data does the MCP server have access to?" The answer is precise and bounded:</p><ul style="padding-left:20px;line-height:2"><li><strong>In scope:</strong> Your Dash0 observability data — logs, traces, metrics, synthetic checks, web vitals, K8s events, dashboards</li><li><strong>Out of scope:</strong> Your application infrastructure, databases, cloud provider APIs, source code, any system outside Dash0</li><li><strong>Access control:</strong> Scoped to specific datasets via auth token permissions — you control exactly what's accessible</li><li><strong>No infrastructure write access:</strong> The MCP server can only modify Dash0 assets (dashboards, synthetic checks) — not your application infrastructure</li></ul></div></div>
<div class="lesson-section"><h4>The AI-Native Observability Story</h4><div class="lesson-text"><p>The larger narrative: observability has always been high-friction. You need to learn query languages, navigate complex UIs, and context-switch constantly. This friction means most engineers use observability only when something breaks — not proactively.</p><p>MCP changes this. When observability is as easy as asking a question in your IDE, engineers use it continuously — before writing code, during development, and during incidents. The result is better software, faster debugging, and more resilient systems.</p><p>This is the Dash0 bet: AI-native observability isn't a product feature, it's a platform strategy.</p></div></div>`},
];
