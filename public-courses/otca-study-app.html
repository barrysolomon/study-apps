const SCENARIOS=[

{q:"Your traces show gaps between services — context isn't flowing.",a:"Context propagation issue. Check: (1) Clients send W3C traceparent header? (2) Servers extract and propagate? (3) All services use OTel? (4) Network middleware strips headers? Use debug exporter or zPages/tracez to verify span context.",u:["https://opentelemetry.io/docs/concepts/context-propagation/","https://www.w3.org/TR/trace-context/","https://opentelemetry.io/docs/collector/"]},
{q:"Collector is consuming too much memory and OOMKilling.",a:"First: check memory_limiter config (is it first processor?). Set hard limit below container limit. Second: reduce batch size or export interval. Third: tail_sampling to reduce spans stored. Monitor Collector self-metrics on port 8888.",u:["https://opentelemetry.io/docs/collector/","https://opentelemetry.io/docs/collector/troubleshooting/"]},
{q:"Need to add custom attributes to all spans without code changes.",a:"Use Collector's attributes processor. In config: processors[attributes] → add or update actions. Place before exporter. Or use attributes processor in Gateway to enrich all traces.",u:["https://opentelemetry.io/docs/collector/configuration/"]},
{q:"How do we correlate logs with traces?",a:"Use OTel Log Bridge API to attach trace context (trace_id, span_id) to log records. Then your backend can query: 'show logs for this trace'. Also: ensure trace_id propagates to logging libraries via context.",u:["https://opentelemetry.io/docs/specs/otel/logs/","https://opentelemetry.io/docs/concepts/context-propagation/"]},
{q:"Want to sample error traces at 100%, normal traces at 10%.",a:"Use tail_sampling processor in Gateway. Sees full trace, then samples based on span attributes (e.g., error=true → keep, else 10%). Requires keeping all spans briefly before decision.",u:["https://opentelemetry.io/docs/collector/"]},
{q:"Customer asks: auto vs manual instrumentation?",a:"Manual: per-library integration, fine control, takes effort. Auto: language/framework specific, less code, coverage gaps. OTel provides both. Auto is faster to start, manual for critical paths.",u:["https://opentelemetry.io/docs/zero-code/","https://opentelemetry.io/docs/concepts/instrumentation/"]},
{q:"Spans are dropping but we can't locate where.",a:"Enable Collector debug logging (OTEL_LOG_LEVEL=debug). Check self-metrics on port 8888. Use debug exporter to stdout. Check BatchSpanProcessor buffer size, exporter errors, sampler rejection rate, memory limiter hard limit.",u:["https://opentelemetry.io/docs/collector/troubleshooting/","https://opentelemetry.io/docs/collector/"]},
{q:"Need to route metrics to one backend, traces to another.",a:"Define separate pipelines: metrics[prometheus] and traces[jaeger] with different exporters. Or use Collector connectors to cross-signal workflows.",u:["https://opentelemetry.io/docs/collector/configuration/"]},
{q:"Should we deploy agent, gateway, or both?",a:"Agent: per-host collection (DaemonSet), local buffering. Gateway: central hub behind LB. Use both in large deployments: agents batch locally, forward to Gateway. Gateway scales horizontally.",u:["https://opentelemetry.io/docs/collector/deployment/","https://opentelemetry.io/docs/collector/scaling/"]},
{q:"Migrating from Jaeger/Zipkin to OTLP — how?",a:"Both systems can export OTLP or ingest OTLP. Run Collector with Jaeger receiver to ingest old format, OTLP exporter to send new format. Gradual cutover by shifting traffic to Collector.",u:["https://opentelemetry.io/docs/collector/","https://opentelemetry.io/docs/collector/deployment/"]},
{q:"Team wants to track request duration across endpoints — which instrument type?",a:"Histogram. Histograms record distributions of values (like latency) across configurable buckets. This lets backends compute percentiles (p50, p95, p99). A Counter only counts occurrences; a Gauge captures point-in-time snapshots. Histogram is the standard choice for latency/duration measurements per OTel semantic conventions.",u:["https://opentelemetry.io/docs/specs/otel/metrics/api/","https://opentelemetry.io/docs/specs/otel/metrics/supplementary-guidelines/"]},
{q:"Need to count active HTTP connections that go up and down.",a:"UpDownCounter. Unlike Counter (monotonic, only increases), UpDownCounter can both increase and decrease. Active connections fluctuate as requests open and close. Gauge could work if you poll periodically, but UpDownCounter is the synchronous instrument that lets you call add(+1) on connect and add(-1) on disconnect in real time.",u:["https://opentelemetry.io/docs/specs/otel/metrics/api/","https://opentelemetry.io/docs/specs/otel/metrics/supplementary-guidelines/"]},
{q:"Want to add custom attributes to all spans from a specific library without modifying that library's code.",a:"Use the Collector's attributes processor to insert/update attributes on matching spans. Configure include rules to target spans by library name (InstrumentationScope). Alternatively, configure the SDK's auto-instrumentation to inject attributes via OTEL_RESOURCE_ATTRIBUTES or programmatic SpanProcessor. The Collector approach is preferred because it requires zero app changes and works across all services.",u:["https://opentelemetry.io/docs/collector/configuration/","https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/attributesprocessor"]},
{q:"Application emits OTel data but the backend shows no service name — just 'unknown_service'.",a:"The OTEL_SERVICE_NAME environment variable is not set, and the Resource is missing the required service.name attribute. Fix: set OTEL_SERVICE_NAME=my-service or add it via OTEL_RESOURCE_ATTRIBUTES=service.name=my-service. The OTel spec requires service.name on every Resource. Without it, backends fall back to 'unknown_service:<process_name>'. This is one of the most common misconfigurations.",u:["https://opentelemetry.io/docs/specs/otel/resource/semantic_conventions/","https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"]},
{q:"Metrics show in Prometheus but traces don't appear in Jaeger — both go through the same Collector.",a:"Traces and metrics are separate pipelines in the Collector. Check: (1) Is the traces pipeline configured with the correct exporter (e.g., otlp/jaeger)? (2) Is the traces receiver actually receiving data (check self-metrics otelcol_receiver_accepted_spans)? (3) Is the Jaeger exporter endpoint correct and reachable? Common mistake: configuring receivers/exporters in the metrics pipeline but forgetting to add them to the traces pipeline. Each signal type needs its own pipeline definition under service.pipelines.",u:["https://opentelemetry.io/docs/collector/configuration/","https://opentelemetry.io/docs/collector/troubleshooting/"]},
{q:"Need to reduce cardinality of a high-cardinality metric without changing application code.",a:"Two approaches: (1) Collector attributes processor — remove or hash high-cardinality attributes (like user_id or URL path) before export. Use include/exclude filters to target specific metrics. (2) SDK Views — configure a View in the MeterProvider to drop specific attributes or rename metrics. Views are more precise (per-instrument) but require SDK config. Collector approach is easier for ops teams. Also consider the filter processor to drop entire metric series matching a pattern.",u:["https://opentelemetry.io/docs/specs/otel/metrics/sdk/","https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/attributesprocessor"]},
{q:"Team argues about head sampling vs tail sampling — what are the tradeoffs?",a:"Head sampling (at SDK): Decision made at trace start. Pro: efficient, no buffering needed, low overhead. Con: you might drop interesting traces (errors, slow requests) because you don't know the outcome yet. Tail sampling (at Collector): Decision made after seeing all spans. Pro: can keep 100% of errors and sample normal traces. Con: requires buffering all spans until trace completes, needs a gateway Collector, higher memory/CPU cost. Best practice: use head sampling for high-volume services, tail sampling at gateway for intelligent retention. They can be combined.",u:["https://opentelemetry.io/docs/specs/otel/trace/sdk/","https://opentelemetry.io/docs/collector/"]},
{q:"Collector keeps OOMing under load — how do we fix it?",a:"Checklist: (1) memory_limiter MUST be the FIRST processor — if it is not first, other processors consume memory before limits apply. (2) Set limit_mib to 70-80% of container memory limit (leave headroom for spikes). (3) Configure spike_limit_mib (e.g., 25% of limit). (4) Tune batch processor: reduce send_batch_size and timeout to flush more frequently. (5) Check sending_queue size on exporters — large queues consume memory. (6) If using tail_sampling, it buffers entire traces — consider reducing decision_wait or moving to head sampling for some traffic. Monitor otelcol_process_runtime_total_alloc_bytes on port 8888.",u:["https://opentelemetry.io/docs/collector/","https://opentelemetry.io/docs/collector/troubleshooting/"]},
{q:"Want to migrate from a proprietary monitoring agent to OTel — what is the strategy?",a:"Phased approach: (1) Deploy OTel Collector as a gateway alongside existing agent. (2) Configure Collector with receivers matching your current agent's protocol (many proprietary formats have Collector receivers). (3) Dual-export period: send data to BOTH old and new backends via multiple exporters. Validate data parity. (4) Gradually switch apps to emit OTLP directly (or use OTel auto-instrumentation). (5) Once validated, remove proprietary agent. Key: the Collector's multi-receiver/multi-exporter design makes it a universal translation layer. Never do a big-bang cutover.",u:["https://opentelemetry.io/docs/collector/deployment/","https://opentelemetry.io/docs/migration/"]},
{q:"How do we ensure traces are connected across an async message queue (e.g., Kafka)?",a:"Use Span Links, not parent-child relationships. The producer creates a PRODUCER span and injects trace context into message headers (using TextMapPropagator). The consumer creates a CONSUMER span and extracts context from headers, adding it as a Span Link (not a parent). Why links instead of parent? Because the consumer may process messages in batch, and a single consumer span may link to many producer spans. Links preserve the relationship without forcing a single-parent hierarchy. Ensure your messaging library's OTel instrumentation handles this — most auto-instrumentation libraries for Kafka, RabbitMQ, etc. do this correctly.",u:["https://opentelemetry.io/docs/specs/otel/trace/api/","https://opentelemetry.io/docs/concepts/signals/traces/"]},

];

{id:"what-is-otel",title:"What is OpenTelemetry?",time:"8 min read",week:1,icon:"🔭",
body:`<div class="lesson-section"><h4>The Origin Story</h4><p class="lesson-text">OpenTelemetry started when two competing projects — OpenTracing (created by Uber) and OpenCensus (created by Google) — merged under the CNCF umbrella. Why merge? The observability community realized that having two standards competing was worse than having one.</p><p class="lesson-text">OpenTelemetry is now THE open standard for collecting telemetry (traces, metrics, logs) from applications and infrastructure. It's vendor-neutral, language-agnostic, and managed by the Cloud Native Computing Foundation (CNCF).</p></div><div class="lesson-section"><h4>What OTel Is and Isn't</h4><p class="lesson-text"><strong>OTel is NOT a backend.</strong> It doesn't store, visualize, or alert on data. OTel is:</p><ul><li>A standard for how to instrument code</li><li>SDKs in 12+ languages</li><li>APIs that decouple instrumentation from vendors</li><li>A collector to process and route telemetry</li></ul><p class="lesson-text">Think of it like HTTP: HTTP defines how clients and servers talk, but you need a web server (nginx, Apache) to use it. OTel defines how apps instrument, but you need a backend (Dash0, Datadog, etc.) to process the data.</p></div><div class="lesson-section"><h4>Key Benefits</h4><p class="lesson-highlight"><strong>Portability:</strong> Once you instrument with OTel, you can send data to any backend. Switch from Datadog to Grafana? Your instrumentation stays the same. This is huge.</p></div><p class="lesson-highlight"><strong>Reduced Vendor Lock-in:</strong> You're not writing Datadog-specific code or Prometheus-specific exporters. Standard APIs + open source = freedom.</p><p class="lesson-highlight"><strong>Unified Observability:</strong> One standard for traces, metrics, logs. Not three competing projects.</p></div>`,

{id:"three-signals",title:"The Three Signals",time:"9 min read",week:1,icon:"📊",
body:`<div class="lesson-section"><h4>Metrics: The Quantitative Lens</h4><p class="lesson-text">Metrics are numeric measurements: request count, latency, memory usage, error rate. They're aggregated at collection time, so they're compact and queryable.</p><table class="lesson-table"><tr><th>Metric Type</th><th>Use Case</th><th>Example</th></tr><tr><td>Counter</td><td>Monotonic increasing</td><td>Total requests, errors, bytes</td></tr><tr><td>Gauge</td><td>Point-in-time snapshot</td><td>CPU%, memory, queue depth</td></tr><tr><td>Histogram</td><td>Distribution of values</td><td>Request latency buckets</td></tr><tr><td>UpDownCounter</td><td>Up and down</td><td>Active connections, threads</td></tr></table></div><div class="lesson-section"><h4>Logs: The Event Record</h4><p class="lesson-text">Logs are structured event records: when did something happen, what was the state, who was involved. OTel's log bridge API lets you attach trace context to logs, enabling correlation.</p><p class="lesson-text">Key insight: logs + traces together answer 'what happened and why?' Logs alone are noise. Logs + associated traces are investigation gold.</p></div><div class="lesson-section"><h4>Traces: The Request Flow</h4><p class="lesson-text">A trace follows one request end-to-end across services. It's made of spans — units of work. Each span has timing, attributes, and can link to other spans.</p><p class="lesson-highlight"><strong>The magic:</strong> A trace is how you answer 'my request took 5 seconds and hit service A → B → C. Where was the bottleneck?' Metrics tell you the request was slow. Traces tell you why.</p></div><div class="lesson-section"><h4>How They Work Together</h4><p class="lesson-text">• Metrics: 'Service X avg latency = 200ms'<br>• Traces: 'Request abc123 took 5s; spent 4.9s waiting on DB call'<br>• Logs: 'DB connection timeout at 10:34:56; trace_id=abc123'</p><p class="lesson-text">Unified view = root cause in minutes instead of hours.</p></div>`,

],
sources:["https://opentelemetry.io/docs/concepts/signals/"]

{id:"tracing",title:"Tracing Deep Dive",time:"10 min read",week:1,icon:"🔍",
body:`<div class="lesson-section"><h4>Spans and Traces</h4><p class="lesson-text">A <strong>span</strong> is a unit of work: a function call, an HTTP request, a database query. It has:</p><ul><li>Start and end time (duration)</li><li>Attributes (key-value metadata)</li><li>Events (things that happened during the span)</li><li>Links (references to other spans)</li><li>Status (OK, Error, Unset)</li><li>SpanContext (trace ID, span ID, flags)</li></ul><p class="lesson-text">A <strong>trace</strong> is a collection of spans that form a request's path. Spans are linked by parent-child relationship via trace ID and parent span ID.</p></div><div class="lesson-section"><h4>Span Kinds</h4><table class="lesson-table"><tr><th>Kind</th><th>Meaning</th></tr><tr><td>INTERNAL</td><td>Work within a process (function call, internal operation)</td></tr><tr><td>SERVER</td><td>Receiving an inbound request (HTTP handler)</td></tr><tr><td>CLIENT</td><td>Making an outbound call (HTTP client, gRPC stub)</td></tr><tr><td>PRODUCER</td><td>Sending to a queue/topic (Kafka producer)</td></tr><tr><td>CONSUMER</td><td>Receiving from queue/topic (Kafka consumer)</td></tr></table></div><div class="lesson-section"><h4>SpanContext and W3C TraceContext</h4><p class="lesson-text">SpanContext contains:<br>• Trace ID (128-bit unique identifier for the entire trace)<br>• Span ID (64-bit identifier for this span)<br>• Trace flags (sampled bit: was this trace sampled?)<br>• Trace state (vendor-specific extensions)</p><p class="lesson-text"><strong>W3C TraceContext</strong> defines how to serialize this into an HTTP header:</p><p class="lesson-highlight">traceparent: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01</p><p class="lesson-text">Breaking it down: 00=version, 4bf9...=trace ID, 00f0...=span ID, 01=sampled flag.</p></div><div class="lesson-section"><h4>Context Propagation</h4><p class="lesson-text">When your app calls another service, it MUST pass the W3C traceparent header. The receiving service extracts it and creates child spans. This links the entire request flow.</p><p class="lesson-highlight"><strong>If propagation breaks:</strong> The trace breaks. You see isolated spans but no end-to-end view. This is THE most common distributed tracing issue.</p></div>`,
exercises:[
{task:"Write a W3C traceparent header by hand. Pick a trace ID, span ID, and sampled flag. Format it correctly.",hint:"Format: version-traceid-spanid-flags"},
{task:"Identify the span kinds in this flow: Client app → HTTP call to Service A (SERVER) → Service A queries DB (INTERNAL) → publishes to Kafka (PRODUCER). Label each.",hint:"5 spans total"}
],
sources:["https://opentelemetry.io/docs/concepts/signals/traces/","https://www.w3.org/TR/trace-context/"]
},
{id:"metrics-logs",title:"Metrics & Logs Deep Dive",time:"11 min read",week:2,icon:"📈",
body:`<div class="lesson-section"><h4>Metric Instruments</h4><p class="lesson-text">OTel defines four base instrument types, plus async variants (Observable*):</p><table class="lesson-table"><tr><th>Instrument</th><th>Behavior</th><th>Example</th></tr><tr><td>Counter</td><td>Monotonic increasing</td><td>HTTP requests, errors, bytes sent</td></tr><tr><td>UpDownCounter</td><td>Can increase/decrease</td><td>Active connections, queue length</td></tr><tr><td>Histogram</td><td>Samples and creates distribution</td><td>Request latency, response size</td></tr><tr><td>Gauge</td><td>Point-in-time async snapshot</td><td>Memory usage, temperature, CPU</td></tr></table></div><div class="lesson-section"><h4>Instrument Selection Flowchart</h4><p class="lesson-text">Q: Is the value monotonically increasing?<br>→ Yes: Counter<br>→ No, does it go up/down frequently?<br>  → Yes: UpDownCounter<br>  → No, is it a sample/snapshot?<br>    → Yes: Gauge<br>    → No, is it a measurement of distribution?<br>      → Yes: Histogram</p></div><div class="lesson-section"><h4>Histogram Buckets</h4><p class="lesson-text">Histograms don't store every sample. Instead, they bucket ranges and count samples in each bucket. Example for HTTP latency:</p><p class="lesson-highlight">Buckets: 1ms, 5ms, 10ms, 50ms, 100ms, 500ms, 1000ms<br>Samples: [2ms, 3ms, 8ms, 95ms, 1200ms]<br>Result: 1ms(0), 5ms(2), 10ms(1), 50ms(0), 100ms(1), 500ms(0), 1000ms(0), +Inf(1)</p><p class="lesson-text">Backends compute percentiles from bucket data. This compression is why histograms scale better than storing every value.</p></div><div class="lesson-section"><h4>OTel Log Bridge API</h4><p class="lesson-text">The log bridge API lets you emit structured logs WITH trace context attached. Instead of just:</p><p class="lesson-highlight">level=ERROR msg="DB timeout"</p><p class="lesson-text">You log:</p><p class="lesson-highlight">level=ERROR msg="DB timeout" trace_id=abc123 span_id=def456</p><p class="lesson-text">Now your backend can link this log to the trace. Investigation becomes instant.</p></div>`,
exercises:[
{task:"Choose instruments: (1) API calls made, (2) current active users, (3) request latency, (4) cache hits. Label each.",hint:"(1)Counter, (2)Gauge (async), (3)Histogram, (4)Counter"},
{task:"Write a log entry with trace context. Include: level, message, trace_id, span_id.",hint:"Format: field1=value1 field2=value2 ..."}
],
sources:["https://opentelemetry.io/docs/concepts/signals/metrics/","https://opentelemetry.io/docs/specs/otel/logs/"]
},
{id:"context-prop",title:"Context Propagation & Baggage",time:"8 min read",week:2,icon:"🔗",
body:`<div class="lesson-section"><h4>Context Propagation Mechanisms</h4><p class="lesson-text">Context propagation is how trace IDs, span IDs, and sampling decisions travel between processes. OTel supports multiple formats:</p><table class="lesson-table"><tr><th>Format</th><th>Use Case</th><th>Default?</th></tr><tr><td>W3C TraceContext</td><td>HTTP headers (standard)</td><td>Yes</td></tr><tr><td>Jaeger</td><td>Jaeger systems</td><td>Legacy</td></tr><tr><td>B3 (Zipkin)</td><td>Zipkin systems</td><td>Legacy</td></tr><tr><td>OTLP</td><td>OTel-to-OTel</td><td>Native</td></tr></table><p class="lesson-text"><strong>If propagation breaks:</strong> Spans become orphaned. You see local spans in isolation, not connected across services.</p></div><div class="lesson-section"><h4>Baggage</h4><p class="lesson-text">Baggage is request-scoped context that travels alongside the trace. Unlike trace context, baggage is application-specific.</p><p class="lesson-text">Good uses: user ID, tenant ID, request origin, deployment version.</p><p class="lesson-highlight"><strong>BAD uses:</strong> API keys, passwords, PII. Baggage is logged and visible in transaction detail pages.</p><p class="lesson-text">Example: User A's request has baggage 'user_id=12345'. Every span, log, metric in that request chain sees user_id=12345. Enables analysis like 'show slow requests for user 12345'.</p></div><div class="lesson-section"><h4>Resource + InstrumentationScope</h4><p class="lesson-text"><strong>Resource:</strong> Describes the thing being monitored (service name, version, environment, K8s pod name, etc.). Set once at app startup.</p><p class="lesson-text"><strong>InstrumentationScope:</strong> Metadata about the instrumentation library (e.g., '@opentelemetry/instrumentation-http' v0.40.0). Attached to every signal from that library.</p><p class="lesson-text">Backends use both to contextualize signals. A metric from service X library Y in environment prod is different from the same metric from service X library Z.</p></div>`,
exercises:[
{task:"Identify what's a Resource vs InstrumentationScope: (1) service.name=api, (2) library=@otel/http, (3) k8s.pod.name=api-123, (4) version=1.0.0",hint:"(1)(3) Resource, (2)(4) InstrumentationScope-ish"},
{task:"Design baggage for a multi-tenant SaaS. What context should flow with requests?",hint:"tenant_id, user_id, deployment. NOT secrets."}
],
sources:["https://opentelemetry.io/docs/concepts/context-propagation/","https://opentelemetry.io/docs/specs/otel/baggage/api/"]
},
{id:"sdk-pipeline",title:"The SDK Pipeline",time:"12 min read",week:2,icon:"⚙️",
body:`<div class="lesson-section"><h4>TracerProvider and SDKs</h4><p class="lesson-text">The SDK is how you instrument an application. It's different from the API. The API defines interfaces; the SDK implements them.</p><table class="lesson-table"><tr><th>Component</th><th>Job</th></tr><tr><td>TracerProvider</td><td>Create Tracer instances, manage SpanProcessors</td></tr><tr><td>Tracer</td><td>Create spans</td></tr><tr><td>SpanProcessor</td><td>Process spans (batch, filter, modify)</td></tr><tr><td>SpanExporter</td><td>Send spans to backend (OTLP, Jaeger, etc.)</td></tr><tr><td>Sampler</td><td>Decide which traces to keep</td></tr></table></div><div class="lesson-section"><h4>SpanProcessor Types</h4><p class="lesson-text"><strong>SimpleSpanProcessor:</strong> Calls exporter.export() immediately when a span ends. Blocks the app thread. NEVER use in production — kills throughput.</p><p class="lesson-text"><strong>BatchSpanProcessor:</strong> Buffers spans, exports in batches every N seconds or when buffer is full. Async, doesn't block. USE THIS.</p><p class="lesson-text">Configuration: batch size (default 512), export interval (default 5s), timeout (default 10s).</p></div><div class="lesson-section"><h4>Sampler Types</h4><table class="lesson-table"><tr><th>Sampler</th><th>Decision</th><th>Use Case</th></tr><tr><td>AlwaysOn</td><td>100% (keep all)</td><td>Dev, testing</td></tr><tr><td>AlwaysOff</td><td>0% (drop all)</td><td>Disable tracing</td></tr><tr><td>TraceIdRatio</td><td>Percentage (0-1)</td><td>10% sampling in prod</td></tr><tr><td>ParentBased</td><td>Inherit parent decision</td><td>Distributed tracing (standard)</td></tr><tr><td>JaegerRemote</td><td>Dynamic, from remote</td><td>Runtime sampling policy</td></tr></table><p class="lesson-text"><strong>ParentBased is the default.</strong> If your app receives a sampled=1 from upstream, it keeps the trace. This maintains trace integrity across services.</p></div><div class="lesson-section"><h4>MetricReader and MetricExporter</h4><p class="lesson-text">Metrics use a different pipeline:</p><p class="lesson-highlight">MeterProvider → MetricReader → MetricExporter<br>or<br>MeterProvider → View (transformation) → MetricExporter</p><p class="lesson-text"><strong>Views:</strong> Transform metric attributes, rename metrics, filter. Huge for controlling cardinality.</p><p class="lesson-text"><strong>PeriodicExportingMetricReader:</strong> Collects metrics on interval (default 60s), exports. No buffer (metrics are periodic anyway).</p></div><div class="lesson-section"><h4>Configuration</h4><p class="lesson-text">OTel SDKs support environment variable configuration:</p><p class="lesson-highlight">OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4317<br>OTEL_TRACES_SAMPLER=traceIdRatio<br>OTEL_TRACES_SAMPLER_ARG=0.1<br>OTEL_SERVICE_NAME=my-service<br>OTEL_RESOURCE_ATTRIBUTES=env=prod,version=1.0</p><p class="lesson-text">No code changes needed. This is powerful for containerized apps.</p></div>`,
exercises:[
{task:"Design an SDK config for a production service. Choose: sampler type, batch size, export interval, service name. Justify choices.",hint:"ParentBased sampler, batch=512, interval=5s, service=api-prod"},
{task:"Compare SimpleSpanProcessor vs BatchSpanProcessor: which blocks? Which scales? Why never use Simple in prod?",hint:"Simple blocks on every span end"}
],
sources:["https://opentelemetry.io/docs/specs/otel/trace/sdk/","https://opentelemetry.io/docs/specs/otel/metrics/api/"]
},
{id:"collector",title:"The OTel Collector",time:"13 min read",week:3,icon:"🔀",
body:`<div class="lesson-section"><h4>Collector Architecture</h4><p class="lesson-text">The OTel Collector is a standalon process that receives, processes, and exports telemetry. It sits between apps and backends.</p><p class="lesson-highlight">Apps → Collector (Receivers → Processors → Exporters) → Backends</p><p class="lesson-text">Why use a Collector?</p><ul><li>Single place to add custom attributes to all traces</li><li>Reusable configuration (no per-app setup)</li><li>Batching and buffering for efficiency</li><li>Filtering sensitive data</li><li>Multi-backend support (one trace → multiple destinations)</li></ul></div><div class="lesson-section"><h4>Receivers</h4><p class="lesson-text">Receivers ingest telemetry from various sources:</p><p class="lesson-highlight">OTLP (OTel native, gRPC/HTTP) • Prometheus (scrape metrics) • Jaeger (legacy traces) • Zipkin (legacy traces) • hostmetrics (OS metrics) • syslog (logs) • Kafka • AWS X-Ray • GCP, Azure SDKs</p><p class="lesson-text">Each receiver listens on a port and parses that format into OTel's canonical format.</p></div><div class="lesson-section"><h4>Processors</h4><p class="lesson-text">Processors transform telemetry. Key ones:</p><table class="lesson-table"><tr><th>Processor</th><th>Does</th></tr><tr><td>batch</td><td>Batches signals for export efficiency</td></tr><tr><td>memory_limiter</td><td>Hard memory cap (MUST be first!)</td></tr><tr><td>attributes</td><td>Add/modify/delete attributes</td></tr><tr><td>filter</td><td>Drop signals based on criteria</td></tr><tr><td>tail_sampling</td><td>Sample based on full trace (after exit)</td></tr><tr><td>transform</td><td>Custom transformations</td></tr></table><p class="lesson-highlight"><strong>Critical:</strong> memory_limiter MUST be first processor. It enforces hard limits before any other processing.</p></div><div class="lesson-section"><h4>Exporters</h4><p class="lesson-text">Exporters send signals to backends:</p><p class="lesson-highlight">OTLP • Prometheus (push/remote write) • Jaeger • Zipkin • logging (debug) • Datadog • New Relic • Splunk • CloudWatch • etc.</p><p class="lesson-text">Multiple exporters = send same data to multiple backends. No duplication needed in apps.</p></div><div class="lesson-section"><h4>Service Configuration</h4><p class="lesson-text">The service section wires it all together:</p><p class="lesson-highlight">service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [otlp, jaeger]
    metrics:
      receivers: [prometheus, hostmetrics]
      processors: [memory_limiter, batch]
      exporters: [prometheus]</p></div><div class="lesson-section"><h4>Connectors</h4><p class="lesson-text">Connectors bridge pipelines. Example:</p><p class="lesson-highlight">spans_to_metrics connector: input=traces, output=metrics</p><p class="lesson-text">Use case: Extract a counter metric from spans ('http.requests' counter from every HTTP SERVER span). One pipeline feeds another.</p></div>`,
exercises:[
{task:"Design a Collector config for: ingest OTLP traces, add 'environment=prod' attribute, sample errors 100% and normal traces 1%, export to Jaeger and Prometheus. Write the YAML.",hint:"receivers[otlp], processors[memory_limiter, attributes, tail_sampling], exporters[jaeger, prometheus]"},
{task:"Explain why memory_limiter must be first processor.",hint:"Prevent OOMKill by enforcing hard memory limit before any processing"}
],
sources:["https://opentelemetry.io/docs/collector/","https://opentelemetry.io/docs/collector/configuration/","https://opentelemetry.io/docs/collector/deployment/"]
},
{id:"debugging",title:"Debugging & Exam Prep",time:"11 min read",week:3,icon:"🐛",
body:`<div class="lesson-section"><h4>zPages: The Hidden Gem</h4><p class="lesson-text">The Collector has built-in web endpoints for debugging at localhost:55679 (default):</p><table class="lesson-table"><tr><th>Endpoint</th><th>Shows</th></tr><tr><td>/debug/servicez</td><td>Service name, version, build info</td></tr><tr><td>/debug/tracez</td><td>Recent sample traces (last 100 or so)</td></tr><tr><td>/debug/pipelinez</td><td>Pipeline configuration and status</td></tr><tr><td>/debug/logging</td><td>Current log level + ability to change it live</td></tr></table><p class="lesson-text">Use /debug/tracez when you suspect spans are being dropped. Use /debug/logging to enable debug logs without restart.</p></div><div class="lesson-section"><h4>Self-Metrics on Port 8888</h4><p class="lesson-text">The Collector exports metrics about itself on port 8888. Metrics like:</p><p class="lesson-highlight">otelcol_receiver_accepted_spans (total spans accepted)<br>otelcol_processor_batch_send_size (batch export size)<br>otelcol_exporter_send_failed_spans (export failures)<br>process_runtime_go_goroutines (Collector's own go routines)</p><p class="lesson-text">Scrape port 8888 with Prometheus to monitor your Collector's health. If export failures spike, you found a problem.</p></div><div class="lesson-section"><h4>Debug Exporter</h4><p class="lesson-text">A simple exporter that prints telemetry to stdout/logs:</p><p class="lesson-highlight">exporters:
  logging:
    loglevel: debug</p><p class="lesson-text">In Collector config, route a small percentage of traces to logging exporter. You'll see actual span data. Never do this with 100% of traces in production (too noisy).</p></div><div class="lesson-section"><h4>Span Drop Diagnosis</h4><p class="lesson-text">If spans aren't reaching the backend:</p><ol><li>Check sampler: did HeadSampling reject them? (check /debug/tracez for sample traces)</li><li>Check BatchSpanProcessor buffer: did it fill up? (monitor self-metrics otelcol_processor_batch_send_size)</li><li>Check exporter errors: use debug exporter or check error logs (OTEL_LOG_LEVEL=debug)</li><li>Check network: can Collector reach backend? (firewall, DNS, credentials)</li><li>Check Collector memory: is it OOMKilled? (check node/pod logs, monitor process_runtime_go_memory_alloc)</li></ol></div><div class="lesson-section"><h4>Memory Management</h4><p class="lesson-text">memory_limiter processor enforces hard limit:</p><p class="lesson-highlight">processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128</p><p class="lesson-text">This Collector won't exceed 512 MB. If it hits limit, queued spans are dropped (logged). Set limit 20-30% below container/pod memory limit.</p></div><div class="lesson-section"><h4>Exam Strategy</h4><p class="lesson-text">60 questions, 90 minutes. Strategy:</p><ol><li>Read question fully before looking at options (avoids trap answers)</li><li>OTel API & SDK is 46% of exam — spend time there</li><li>Know span kinds, metric types, W3C format cold</li><li>Memory limiter placement and processors order are common gotchas</li><li>Flag questions you're unsure about, come back</li><li>Last 10 minutes: review flagged questions</li></ol></div>`,
exercises:[
{task:"Spin up a Collector locally. Enable debug exporter. Send some test traces. Check /debug/tracez and stdout. What do you see?",hint:"Collector docs have quickstart guide"},
{task:"Write a Collector config with memory_limiter at 256 MB. Test it by generating lots of spans. Does it hit the limit?",hint:"Monitor port 8888 self-metrics"}
],
sources:["https://opentelemetry.io/docs/collector/troubleshooting/","https://opentelemetry.io/docs/collector/"]
},
{id:"env-vars",title:"Environment Variables & Configuration",time:"12 min read",week:2,icon:"🔧",
body:`<div class="lesson-section"><h4>Why Env Vars Matter for the Exam</h4><p class="lesson-text">The OTCA exam heavily tests default values and configuration. OTel SDKs are designed to be configured via environment variables -- no code changes needed. This is critical for containerized deployments where you set env vars in Kubernetes manifests or Docker Compose files.</p><p class="lesson-highlight"><strong>Exam tip:</strong> The exam LOVES default values. Know these cold.</p></div><div class="lesson-section"><h4>Service Identity</h4><p class="lesson-text"><strong>OTEL_SERVICE_NAME</strong> -- Sets service.name on the Resource. If unset, SDK uses "unknown_service:&lt;process_name&gt;". This is THE most common misconfiguration.</p><p class="lesson-text"><strong>OTEL_RESOURCE_ATTRIBUTES</strong> -- Comma-separated key=value pairs added to the Resource. Example: <code>service.version=1.2.0,deployment.environment=production</code></p></div><div class="lesson-section"><h4>Sampler Configuration</h4><table class="lesson-table"><tr><th>Variable</th><th>Default</th><th>Purpose</th></tr><tr><td>OTEL_TRACES_SAMPLER</td><td>parentbased_always_on</td><td>Which sampler to use</td></tr><tr><td>OTEL_TRACES_SAMPLER_ARG</td><td>(none)</td><td>Sampler argument (e.g., 0.1 for 10%)</td></tr></table><p class="lesson-text">Valid sampler values: always_on, always_off, traceidratio, parentbased_always_on, parentbased_always_off, parentbased_traceidratio.</p></div><div class="lesson-section"><h4>Exporter Selection</h4><table class="lesson-table"><tr><th>Variable</th><th>Default</th><th>Purpose</th></tr><tr><td>OTEL_TRACES_EXPORTER</td><td>otlp</td><td>Trace exporter</td></tr><tr><td>OTEL_METRICS_EXPORTER</td><td>otlp</td><td>Metrics exporter</td></tr><tr><td>OTEL_LOGS_EXPORTER</td><td>otlp</td><td>Logs exporter</td></tr><tr><td>OTEL_EXPORTER_OTLP_ENDPOINT</td><td>http://localhost:4317 (gRPC) or :4318 (HTTP)</td><td>OTLP endpoint</td></tr><tr><td>OTEL_EXPORTER_OTLP_PROTOCOL</td><td>grpc</td><td>Transport protocol</td></tr></table></div><div class="lesson-section"><h4>BatchSpanProcessor Tuning</h4><table class="lesson-table"><tr><th>Variable</th><th>Default</th><th>Purpose</th></tr><tr><td>OTEL_BSP_SCHEDULE_DELAY</td><td>5000 (ms)</td><td>Export interval</td></tr><tr><td>OTEL_BSP_MAX_QUEUE_SIZE</td><td>2048</td><td>Max spans in queue</td></tr><tr><td>OTEL_BSP_MAX_EXPORT_BATCH_SIZE</td><td>512</td><td>Max spans per batch</td></tr><tr><td>OTEL_BSP_EXPORT_TIMEOUT</td><td>30000 (ms)</td><td>Export timeout</td></tr></table></div><div class="lesson-section"><h4>Attribute and Span Limits</h4><table class="lesson-table"><tr><th>Variable</th><th>Default</th></tr><tr><td>OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT</td><td>128</td></tr><tr><td>OTEL_SPAN_EVENT_COUNT_LIMIT</td><td>128</td></tr><tr><td>OTEL_SPAN_LINK_COUNT_LIMIT</td><td>128</td></tr><tr><td>OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT</td><td>no limit</td></tr><tr><td>OTEL_ATTRIBUTE_COUNT_LIMIT</td><td>128</td></tr></table><p class="lesson-highlight"><strong>Why limits matter:</strong> Without limits, a buggy instrumentation library could attach thousands of attributes to a span, causing memory issues in the SDK and Collector. Limits are a safety net.</p></div><div class="lesson-section"><h4>Propagator Configuration</h4><p class="lesson-text"><strong>OTEL_PROPAGATORS</strong> -- Default: <code>tracecontext,baggage</code>. Controls which context propagation formats are used. Other options: b3, b3multi, jaeger, xray, ottrace.</p></div>`,
exercises:[
{task:"List all OTEL_BSP_* environment variables and their defaults from memory. Check your answers against the OTel spec.",hint:"There are 4: schedule delay, queue size, batch size, export timeout",url:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"},
{task:"Set OTEL_SERVICE_NAME and OTEL_RESOURCE_ATTRIBUTES in a Docker Compose file for a sample app. Verify the service name appears in your backend.",hint:"Use environment: section in docker-compose.yml"},
{task:"Configure a traceIdRatio sampler at 25% using only environment variables. What two vars do you need?",hint:"OTEL_TRACES_SAMPLER=traceidratio and OTEL_TRACES_SAMPLER_ARG=0.25"}
],
sources:["https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/","https://opentelemetry.io/docs/specs/otel/trace/sdk/"]
},
{id:"semconv",title:"Semantic Conventions Deep Dive",time:"11 min read",week:3,icon:"📏",
body:`<div class="lesson-section"><h4>Why Semantic Conventions Exist</h4><p class="lesson-text">Without standards, team A names their attribute "http.status" while team B calls it "response_code" and team C uses "statusCode". Backends cannot correlate or build dashboards. Semantic conventions solve this by defining standard attribute names, values, and requirements across all languages and frameworks.</p><p class="lesson-highlight"><strong>Key insight:</strong> Semantic conventions enable cross-vendor correlation and out-of-the-box dashboards. This is one of OTel's biggest value propositions.</p></div><div class="lesson-section"><h4>HTTP Span Conventions</h4><p class="lesson-text">For HTTP server spans (kind=SERVER):</p><table class="lesson-table"><tr><th>Attribute</th><th>Status</th><th>Example</th></tr><tr><td>http.request.method</td><td>Required</td><td>GET, POST</td></tr><tr><td>url.scheme</td><td>Required</td><td>https</td></tr><tr><td>url.path</td><td>Required</td><td>/api/users</td></tr><tr><td>http.response.status_code</td><td>Required</td><td>200, 404, 500</td></tr><tr><td>server.address</td><td>Recommended</td><td>api.example.com</td></tr><tr><td>http.route</td><td>Recommended</td><td>/api/users/:id</td></tr></table><p class="lesson-text">For HTTP client spans (kind=CLIENT), add: server.address, server.port, url.full.</p></div><div class="lesson-section"><h4>Database Conventions</h4><table class="lesson-table"><tr><th>Attribute</th><th>Status</th><th>Example</th></tr><tr><td>db.system</td><td>Required</td><td>postgresql, mysql, redis</td></tr><tr><td>db.statement</td><td>Recommended</td><td>SELECT * FROM users WHERE id=?</td></tr><tr><td>db.operation.name</td><td>Recommended</td><td>SELECT, INSERT</td></tr><tr><td>db.collection.name</td><td>Recommended</td><td>users</td></tr></table><p class="lesson-highlight"><strong>Security note:</strong> db.statement should use parameterized queries, NOT raw values. Never log user input in attributes.</p></div><div class="lesson-section"><h4>Messaging Conventions</h4><p class="lesson-text">For message queue operations (Kafka, RabbitMQ, etc.):</p><table class="lesson-table"><tr><th>Attribute</th><th>Example</th></tr><tr><td>messaging.system</td><td>kafka, rabbitmq</td></tr><tr><td>messaging.operation</td><td>publish, receive, process</td></tr><tr><td>messaging.destination.name</td><td>orders-topic</td></tr></table></div><div class="lesson-section"><h4>Resource Semantic Conventions</h4><table class="lesson-table"><tr><th>Attribute</th><th>Status</th><th>Example</th></tr><tr><td>service.name</td><td>Required</td><td>payment-service</td></tr><tr><td>service.version</td><td>Recommended</td><td>2.1.0</td></tr><tr><td>deployment.environment.name</td><td>Recommended</td><td>production</td></tr><tr><td>telemetry.sdk.name</td><td>Required</td><td>opentelemetry</td></tr><tr><td>telemetry.sdk.language</td><td>Required</td><td>java, python, go</td></tr><tr><td>telemetry.sdk.version</td><td>Required</td><td>1.25.0</td></tr></table></div><div class="lesson-section"><h4>Stability Levels</h4><p class="lesson-text">Semantic conventions have maturity levels:</p><ul><li><strong>Stable:</strong> Will not change (HTTP, Resource basics)</li><li><strong>Experimental:</strong> May change in breaking ways (many messaging, DB attributes)</li></ul><p class="lesson-text">The exam focuses on stable conventions. Know HTTP and Resource attributes well.</p></div>`,
exercises:[
{task:"From memory, list the required attributes for an HTTP SERVER span. Then check the semconv spec.",hint:"http.request.method, url.scheme, url.path, http.response.status_code",url:"https://opentelemetry.io/docs/specs/semconv/http/http-spans/"},
{task:"Explain why service.name is the single most important Resource attribute.",hint:"Without it, backends show 'unknown_service' and cannot group telemetry by service."},
{task:"Design semantic attributes for a gRPC span. What attributes would you include?",hint:"rpc.system=grpc, rpc.service, rpc.method, rpc.grpc.status_code"}
],
sources:["https://opentelemetry.io/docs/specs/semconv/","https://opentelemetry.io/docs/specs/semconv/http/http-spans/","https://opentelemetry.io/docs/specs/semconv/resource/"]
},
{id:"adv-instrumentation",title:"Advanced Instrumentation Patterns",time:"14 min read",week:3,icon:"🎯",
body:`<div class="lesson-section"><h4>Span Events</h4><p class="lesson-text">Span events are timestamped annotations within a span. They mark something that happened at a specific point in time during the span's lifetime.</p><p class="lesson-text"><strong>AddEvent:</strong> Add a custom event with attributes. Example: marking when a cache miss occurred within a DB query span.</p><p class="lesson-text"><strong>RecordException:</strong> A convenience method that creates an event with semconv exception attributes (exception.type, exception.message, exception.stacktrace). Always call this when catching errors.</p><p class="lesson-highlight"><strong>Key distinction:</strong> Events are WITHIN a span. They do not create new spans. Use them for notable occurrences that do not represent separate units of work.</p></div><div class="lesson-section"><h4>Span Links</h4><p class="lesson-text">Links connect a span to other span contexts. Unlike parent-child (which forms a tree), links form a graph.</p><p class="lesson-text">Use cases:</p><ul><li><strong>Batch processing:</strong> One processing span links to many input spans</li><li><strong>Fan-out/fan-in:</strong> Aggregation span links to all worker spans</li><li><strong>Message queues:</strong> Consumer span links to producer span (PRODUCER/CONSUMER pattern)</li><li><strong>Retries:</strong> Retry span links to the original failed span</li></ul></div><div class="lesson-section"><h4>Span Status Management</h4><p class="lesson-text">Three status codes: <strong>Unset</strong> (default), <strong>Error</strong>, <strong>Ok</strong>.</p><table class="lesson-table"><tr><th>Rule</th><th>Detail</th></tr><tr><td>Default is Unset</td><td>Most spans stay Unset -- this is fine</td></tr><tr><td>Set Error on failure</td><td>SetStatus(Error, "description") when operation fails</td></tr><tr><td>Ok overrides Error</td><td>Application code can set Ok to override Error from instrumentation</td></tr><tr><td>Unset does not override</td><td>Setting Unset never changes an existing Error or Ok</td></tr></table><p class="lesson-highlight"><strong>Exam gotcha:</strong> Ok status means "this span was explicitly validated as successful by the application." It is NOT the default. The default is Unset. Most successful spans should stay Unset.</p></div><div class="lesson-section"><h4>Views (Metrics)</h4><p class="lesson-text">Views customize how metrics are collected in the SDK:</p><ul><li><strong>Rename metrics:</strong> Change the name of an instrument</li><li><strong>Drop attributes:</strong> Remove high-cardinality attributes before aggregation</li><li><strong>Change aggregation:</strong> Switch from default to explicit bucket histogram</li><li><strong>Filter instruments:</strong> Disable specific instruments entirely</li></ul><p class="lesson-text">Views are configured on MeterProvider at SDK initialization. They are the SDK-side answer to cardinality control.</p></div><div class="lesson-section"><h4>Exemplars</h4><p class="lesson-text">An Exemplar is a metric measurement with attached trace context (trace ID + span ID). It bridges metrics and traces.</p><p class="lesson-text">Example: A histogram bucket shows p99 latency = 500ms. The exemplar points to trace abc123 so you can investigate exactly what happened in that slow request.</p><p class="lesson-highlight"><strong>Exemplars require:</strong> (1) An active span context at measurement time, (2) A backend that supports exemplar storage/display (Grafana, Dash0).</p></div><div class="lesson-section"><h4>Metric Temporality</h4><p class="lesson-text"><strong>Cumulative:</strong> Each data point is the running total since process start. Value only increases (for counters). Backends compute rate from consecutive points.</p><p class="lesson-text"><strong>Delta:</strong> Each data point is the change since the last export. Resets each interval. Simpler math but requires stateful collection.</p><p class="lesson-highlight"><strong>OTLP default:</strong> Cumulative for counters and histograms. Prometheus always expects Cumulative. Some backends prefer Delta. The exporter configuration controls this.</p></div><div class="lesson-section"><h4>API vs SDK Boundary</h4><p class="lesson-text"><strong>Libraries MUST only use the API, never the SDK.</strong> This is a fundamental OTel design principle.</p><p class="lesson-text">Why? If a library depends on the SDK, it forces a specific SDK version on all consumers. The API is stable and lightweight. The application owner configures the SDK (sampler, exporter, processors). Libraries just call API methods (create spans, record metrics).</p><p class="lesson-highlight"><strong>If no SDK is configured:</strong> API calls become no-ops. Zero overhead. This is by design -- safe to leave OTel API calls in library code even if the consumer does not use OTel.</p></div>`,
exercises:[
{task:"Write pseudocode that creates a span, adds an event for a cache miss, records an exception, and sets the span status to Error.",hint:"span.addEvent('cache.miss', {key: 'user:123'}); try {...} catch(e) { span.recordException(e); span.setStatus(Error, e.message); }"},
{task:"Design a View that drops the 'user.id' attribute from a histogram named 'http.server.duration' to reduce cardinality.",hint:"View(instrumentName='http.server.duration', attributeFilter=exclude('user.id'))"},
{task:"Explain when you would use a Span Link instead of a parent-child relationship. Give two real-world examples.",hint:"Batch processing (1 consumer, many producers) and fan-out/fan-in patterns",url:"https://opentelemetry.io/docs/specs/otel/trace/api/"}
],
sources:["https://opentelemetry.io/docs/specs/otel/trace/api/","https://opentelemetry.io/docs/specs/otel/metrics/sdk/","https://opentelemetry.io/docs/specs/otel/overview/"]
},
{id:"collector-adv",title:"Collector Advanced & Deployment",time:"13 min read",week:3,icon:"🏗️",
body:`<div class="lesson-section"><h4>Core vs Contrib Distributions</h4><p class="lesson-text">The Collector ships in two official distributions:</p><table class="lesson-table"><tr><th>Distribution</th><th>Contents</th><th>Use When</th></tr><tr><td>Core</td><td>OTLP receiver/exporter, batch, memory_limiter, logging/debug exporter, basic processors</td><td>You only need standard OTLP pipelines</td></tr><tr><td>Contrib</td><td>Everything in Core + 100+ community receivers, exporters, processors, connectors</td><td>You need Prometheus, Kafka, Datadog, tail_sampling, etc.</td></tr></table><p class="lesson-highlight"><strong>Best practice:</strong> In production, build a custom Collector with only the components you need using the OpenTelemetry Collector Builder (ocb). Smaller binary = smaller attack surface.</p></div><div class="lesson-section"><h4>Custom Builds with OCB</h4><p class="lesson-text">The OpenTelemetry Collector Builder (ocb) creates custom Collector binaries from a manifest YAML. You specify exactly which receivers, processors, exporters, extensions, and connectors to include. The builder compiles a Go binary with only those components. This is the production best practice.</p></div><div class="lesson-section"><h4>Connectors: Cross-Pipeline Magic</h4><p class="lesson-text">Connectors act as both an exporter in one pipeline and a receiver in another:</p><ul><li><strong>spanmetrics connector:</strong> Generates RED metrics (Rate, Errors, Duration) from trace spans. Input: traces pipeline. Output: metrics pipeline.</li><li><strong>routing connector:</strong> Routes telemetry to different pipelines based on attributes, resource, or other criteria.</li><li><strong>count connector:</strong> Counts spans/logs/metrics and emits as metrics.</li></ul><p class="lesson-text">Connectors eliminate the need for separate instrumentation to get metrics from traces.</p></div><div class="lesson-section"><h4>Security: TLS and Authentication</h4><p class="lesson-text"><strong>TLS:</strong> Configure cert_file, key_file, ca_file on receivers and exporters. Use for all production deployments.</p><p class="lesson-text"><strong>mTLS:</strong> Mutual TLS where both client and server present certificates. Required for zero-trust environments.</p><p class="lesson-text"><strong>Auth extensions:</strong> bearertokenauth (static token), oauth2clientauth (OAuth2), headerssetter. Applied to receivers (incoming auth) and exporters (outgoing auth).</p></div><div class="lesson-section"><h4>Multi-Pipeline Routing</h4><p class="lesson-text">A single Collector can route different signals to different backends:</p><p class="lesson-highlight">traces: OTLP receiver -> Jaeger exporter (traces backend)<br>metrics: Prometheus receiver -> Prometheus remote write (metrics backend)<br>logs: OTLP receiver -> Elasticsearch exporter (logs backend)</p><p class="lesson-text">You can also have multiple named pipelines of the same type: traces/fast and traces/slow with different sampling.</p></div><div class="lesson-section"><h4>Scaling Patterns</h4><ul><li><strong>Horizontal scaling:</strong> Run multiple Gateway Collector instances behind a load balancer. OTLP gRPC supports multiplexing.</li><li><strong>Agent + Gateway:</strong> Agents on each node (DaemonSet) forward to Gateway (Deployment). Agents handle local buffering; Gateway handles enrichment and routing.</li><li><strong>Tail sampling at Gateway:</strong> Only the Gateway does tail sampling (it needs to see full traces). Agents do head sampling or no sampling.</li></ul></div><div class="lesson-section"><h4>Validation and Debugging</h4><p class="lesson-text"><strong>otelcol validate</strong> -- Validates your Collector config YAML without starting the Collector. Catches syntax errors and invalid configurations. Always run before deploying.</p><p class="lesson-text"><strong>Feature gates:</strong> Enable/disable experimental features with --feature-gates flag. Check the Collector changelog for current gates.</p></div>`,
exercises:[
{task:"Write an ocb manifest YAML that includes only: OTLP receiver, batch processor, memory_limiter processor, OTLP exporter, and health_check extension.",hint:"dist: name: custom-collector, module: go.opentelemetry.io/custom, then receivers/processors/exporters/extensions sections",url:"https://opentelemetry.io/docs/collector/custom-collector/"},
{task:"Design a Collector deployment for a company with 50 microservices, 3 backends (traces to Jaeger, metrics to Prometheus, logs to Elasticsearch). Include agents and gateway.",hint:"DaemonSet agents with OTLP receiver + OTLP exporter -> Gateway Deployment with OTLP receiver + 3 exporters + 3 pipelines"},
{task:"Configure mTLS between an agent Collector and a gateway Collector. What files do you need?",hint:"CA cert, server cert+key on gateway, client cert+key on agent. Configure tls: settings on both receiver and exporter."}
],
sources:["https://opentelemetry.io/docs/collector/custom-collector/","https://opentelemetry.io/docs/collector/deployment/","https://opentelemetry.io/docs/collector/configuration/"]
},
{id:"exam-strategy",title:"Exam Strategy & Practice",time:"10 min read",week:4,icon:"🎓",
body:`<div class="lesson-section"><h4>Domain Weight Review</h4><p class="lesson-text">The OTCA exam has 60 questions in 90 minutes. Domain weights:</p><table class="lesson-table"><tr><th>Domain</th><th>Weight</th><th>~Questions</th></tr><tr><td>OTel API & SDK</td><td>46%</td><td>~28 questions</td></tr><tr><td>OTel Collector</td><td>26%</td><td>~16 questions</td></tr><tr><td>Observability Fundamentals</td><td>18%</td><td>~11 questions</td></tr><tr><td>Pipeline Debugging</td><td>10%</td><td>~6 questions</td></tr></table><p class="lesson-highlight"><strong>Strategy:</strong> API and SDK is nearly half the exam. If you nail this domain, you can pass even with weaker Collector knowledge. But do not ignore Collector -- 26% is significant.</p></div><div class="lesson-section"><h4>Top 20 Most Likely Exam Questions</h4><ol><li>What is the default OTEL_TRACES_SAMPLER? (parentbased_always_on)</li><li>Name the 5 span kinds (INTERNAL, CLIENT, SERVER, PRODUCER, CONSUMER)</li><li>W3C traceparent format (version-traceid-parentid-traceflags)</li><li>Counter vs Gauge vs Histogram vs UpDownCounter use cases</li><li>What does service.name do? Where is it set?</li><li>BatchSpanProcessor vs SimpleSpanProcessor tradeoffs</li><li>Collector pipeline order (Receivers, Processors, Exporters)</li><li>memory_limiter must be first processor -- why?</li><li>OTLP gRPC port (4317) vs HTTP port (4318)</li><li>What is a Resource? What is InstrumentationScope?</li><li>Head sampling vs tail sampling tradeoffs</li><li>Agent vs Gateway deployment patterns</li><li>What is context propagation? What breaks without it?</li><li>Default OTEL_PROPAGATORS (tracecontext,baggage)</li><li>Span status codes (Unset, Error, Ok) and when to use each</li><li>API vs SDK boundary -- why libraries must only use API</li><li>What is an Exemplar? How does it connect metrics to traces?</li><li>Cumulative vs Delta temporality</li><li>Semantic conventions purpose (standard attribute names)</li><li>ForceFlush -- when and why to call it</li></ol></div><div class="lesson-section"><h4>Common Traps and Gotchas</h4><ul><li><strong>Trap:</strong> "Ok" status means the span succeeded. <strong>Reality:</strong> Ok means the APPLICATION explicitly validated success. The default (Unset) is fine for normal success.</li><li><strong>Trap:</strong> Auto-instrumentation covers everything. <strong>Reality:</strong> It covers common frameworks but misses custom business logic. You still need manual instrumentation for critical paths.</li><li><strong>Trap:</strong> Baggage is safe for sensitive data. <strong>Reality:</strong> Baggage is propagated in HTTP headers and visible in logs. NEVER put secrets in Baggage.</li><li><strong>Trap:</strong> The Collector is required for OTel. <strong>Reality:</strong> SDKs can export directly to backends. The Collector is recommended but optional.</li><li><strong>Trap:</strong> Metrics and traces use the same pipeline. <strong>Reality:</strong> Each signal type has its own pipeline in the Collector. You must configure each separately.</li></ul></div><div class="lesson-section"><h4>Time Management</h4><p class="lesson-text"><strong>90 minutes / 60 questions = 1.5 minutes per question.</strong></p><p class="lesson-text">Strategy:</p><ol><li>First pass (60 min): Answer all questions you know immediately. Flag uncertain ones.</li><li>Second pass (20 min): Return to flagged questions. Eliminate wrong answers, make best guess.</li><li>Final pass (10 min): Review any changed answers. Trust your first instinct unless you found a clear error.</li></ol><p class="lesson-highlight"><strong>Do NOT leave blanks.</strong> There is no penalty for wrong answers. Always guess.</p></div><div class="lesson-section"><h4>Env Var Defaults Cheat Sheet</h4><table class="lesson-table"><tr><th>Variable</th><th>Default</th></tr><tr><td>OTEL_TRACES_SAMPLER</td><td>parentbased_always_on</td></tr><tr><td>OTEL_PROPAGATORS</td><td>tracecontext,baggage</td></tr><tr><td>OTEL_TRACES_EXPORTER</td><td>otlp</td></tr><tr><td>OTEL_METRICS_EXPORTER</td><td>otlp</td></tr><tr><td>OTEL_LOGS_EXPORTER</td><td>otlp</td></tr><tr><td>OTEL_BSP_SCHEDULE_DELAY</td><td>5000ms</td></tr><tr><td>OTEL_BSP_MAX_QUEUE_SIZE</td><td>2048</td></tr><tr><td>OTEL_BSP_MAX_EXPORT_BATCH_SIZE</td><td>512</td></tr><tr><td>OTEL_BSP_EXPORT_TIMEOUT</td><td>30000ms</td></tr><tr><td>OTEL_ATTRIBUTE_COUNT_LIMIT</td><td>128</td></tr><tr><td>OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT</td><td>128</td></tr><tr><td>OTEL_SPAN_EVENT_COUNT_LIMIT</td><td>128</td></tr><tr><td>OTEL_SPAN_LINK_COUNT_LIMIT</td><td>128</td></tr></table></div>`,
exercises:[
{task:"Take a timed practice test: set a 90-minute timer and answer all quiz questions in this app. Record your score and time.",hint:"Aim for 80%+ in under 75 minutes to have buffer on exam day."},
{task:"Create flashcards (physical or digital) for all environment variable defaults listed in the cheat sheet. Quiz yourself daily.",hint:"Focus on the ones you get wrong. The exam loves default values."},
{task:"Explain to a friend (or rubber duck) the difference between API and SDK, head and tail sampling, and Cumulative vs Delta temporality.",hint:"If you can explain it simply, you understand it deeply."}
],
sources:["https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/","https://www.cncf.io/certification/otca/"]

// ─── DEFAULT SCHEDULE ───
// TODO: Add 10-20 study sessions. Each: {id, date, time, dur (minutes), title, desc, phase}
const DEFAULT_SESSIONS=[
{id:"s1",date:"2026-04-03",time:"09:00",dur:45,title:"Session 1",desc:"Overview and foundations",phase:"Learn"},
{id:"s2",date:"2026-04-04",time:"14:00",dur:30,title:"Session 2",desc:"Core concepts deep dive",phase:"Learn"},
{id:"s3",date:"2026-04-05",time:"10:00",dur:60,title:"Practice Quiz",desc:"Test your knowledge",phase:"Practice"},
];
// TODO: Add 5-8 checkpoints. Each: {id, target, by (date), metric, threshold}
// Metrics: 'bestQuiz','bestRapid','cards','scenarios','exercises'
const DEFAULT_CHECKPOINTS=[
{id:"cp1",target:"Learn Category A",by:"2026-04-10",metric:"bestQuiz",threshold:80},
{id:"cp2",target:"Master all scenarios",by:"2026-04-12",metric:"scenarios",threshold:100},
{id:"cp3",target:"Rapid fire fluency",by:"2026-04-15",metric:"bestRapid",threshold:75},
];
// ─── PERSISTENCE ───
// TODO: Change storage key to something unique for your course
const STORAGE_KEY='otca-crash-course';
function saveState(){
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}catch(e){}
debouncedCloudSave();
}
function loadState(){
try{
const raw=localStorage.getItem(STORAGE_KEY);
if(!raw)return null;
return JSON.parse(raw);
}catch(e){return null}
}
function exportState(){
try{return localStorage.getItem(STORAGE_KEY)||"{}"}catch(e){return"{}"}
}
function importState(json){
try{
const data=JSON.parse(json);
if(data.stats){stats={...stats,...data.stats}}
if(data.history){sessionHistory=data.history}
saveState();render();return true;
}catch(e){return false}
}
// ─── CLOUD SYNC ENGINE (offline-resilient) ───
let syncStatus='idle',lastSyncAt=null,syncPending=false;
function syncEnabled(){return typeof SYNC_SHEET_URL==='string'&&SYNC_SHEET_URL.length>10}
function getSyncKey(){return SYNC_USER_ID?(SYNC_USER_ID+'/'+STORAGE_KEY):STORAGE_KEY}
function isOnline(){return typeof navigator!=='undefined'?navigator.onLine:true}
async function cloudSave(){
if(!syncEnabled()){syncPending=false;return}
if(!isOnline()){syncStatus='offline';syncPending=true;updateSyncUI();return}
syncStatus='syncing';updateSyncUI();
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
await fetch(SYNC_SHEET_URL+'?action=save&key='+encodeURIComponent(getSyncKey()),{
method:'POST',headers:{'Content-Type':'text/plain'},
body:JSON.stringify({data,savedAt:data.savedAt})
});
syncStatus='synced';lastSyncAt=new Date().toISOString();syncPending=false;
}catch(e){
syncStatus=isOnline()?'error':'offline';syncPending=true;
console.warn('Cloud sync save failed:',e);
}
updateSyncUI();
}
async function cloudLoad(){
if(!syncEnabled())return null;
if(!isOnline()){syncStatus='offline';updateSyncUI();return null}
syncStatus='syncing';updateSyncUI();
try{
const resp=await fetch(SYNC_SHEET_URL+'?action=load&key='+encodeURIComponent(getSyncKey()));
const json=await resp.json();
syncStatus='synced';lastSyncAt=new Date().toISOString();updateSyncUI();
if(json.ok&&json.data)return json;
return null;
}catch(e){syncStatus=isOnline()?'error':'offline';updateSyncUI();console.warn('Cloud sync load failed:',e);return null}
}
function updateSyncUI(){
const el=document.getElementById('sync-badge');
if(!el)return;
const icons={idle:'☁️',syncing:'⟳',synced:'✓',error:'✕',offline:'⏸'};
const colors={idle:'#6b7280',syncing:'#f59e0b',synced:'#10b981',error:'#ef4444',offline:'#6b7280'};
const titles={idle:'Cloud sync ready',syncing:'Syncing...',synced:'Synced'+(lastSyncAt?' '+new Date(lastSyncAt).toLocaleTimeString():''),error:'Sync error — will retry when online',offline:'Offline — will sync when reconnected'};
el.textContent=icons[syncStatus]||'☁️';el.style.color=colors[syncStatus]||'#6b7280';el.title=titles[syncStatus]||'';
}
let syncTimer=null;
function debouncedCloudSave(){
if(!syncEnabled())return;
if(syncTimer)clearTimeout(syncTimer);
syncTimer=setTimeout(()=>cloudSave(),2000);
}
function saveSyncSettings(url,userId){
SYNC_SHEET_URL=url.trim();
SYNC_USER_ID=(userId||'').trim();
try{
if(SYNC_SHEET_URL)localStorage.setItem(STORAGE_KEY+'-sync-url',SYNC_SHEET_URL);
else localStorage.removeItem(STORAGE_KEY+'-sync-url');
if(SYNC_USER_ID)localStorage.setItem(STORAGE_KEY+'-sync-user',SYNC_USER_ID);
else localStorage.removeItem(STORAGE_KEY+'-sync-user');
}catch(e){}
updateSyncUI();
if(syncEnabled())cloudLoad().then(cloud=>{
if(cloud&&cloud.data){
const local=loadState();
const localTime=local&&local.savedAt?new Date(local.savedAt).getTime():0;
const cloudTime=cloud.savedAt?new Date(cloud.savedAt).getTime():0;
if(cloudTime>localTime){
const d=cloud.data;
if(d.stats){stats={...stats,...d.stats};if(!stats.quizScores)stats.quizScores={}}
if(d.history)sessionHistory=d.history;
if(d.exercisesDone)exercisesDone=d.exercisesDone;
if(d.schedule)schedule=d.schedule;
if(d.checkpoints)checkpoints=d.checkpoints;
if(d.sessionsDone)sessionsDone=d.sessionsDone;
if(d.userRole)userRole=d.userRole;
if(d.fcFavs)fcFavs=new Set(d.fcFavs);
if(d.lastCard){fcCat=d.lastCard.cat||"All";fcIdx=d.lastCard.idx||0}
if(d.cardRatings)cardRatings=d.cardRatings;
saveState();
}
render();
}
});
}
// Auto-sync when coming back online
if(typeof window!=='undefined'){
window.addEventListener('online',()=>{
if(syncEnabled()&&syncPending){console.log('☁️ Back online — syncing pending changes');cloudSave()}
else if(syncEnabled()){syncStatus='idle';updateSyncUI()}
});
window.addEventListener('offline',()=>{
if(syncEnabled()){syncStatus='offline';updateSyncUI()}
});
}
function resetAll(){
stats={quizzes:0,bestQuiz:0,cards:0,scenarios:0,rapid:0,bestRapid:0};
sessionHistory=[];exercisesDone={};schedule=JSON.parse(JSON.stringify(DEFAULT_SESSIONS));checkpoints=JSON.parse(JSON.stringify(DEFAULT_CHECKPOINTS));sessionsDone={};userRole=null;cardRatings={};
try{localStorage.removeItem(STORAGE_KEY)}catch(e){}
showConfirm=false;mode="dashboard";render();
}
function resetSection(key){
if(key==="quiz"){stats.quizzes=0;stats.bestQuiz=0;stats.quizScores={}}
else if(key==="cards"){stats.cards=0;cardRatings={}}
else if(key==="scenarios"){stats.scenarios=0}
else if(key==="rapid"){stats.rapid=0;stats.bestRapid=0}
else if(key==="exercises"){exercisesDone={}}
sessionHistory=sessionHistory.filter(h=>h.type!==key);
saveState();render();
}
// ─── SESSION HISTORY ───
let sessionHistory=[];
function logSession(type,detail){
sessionHistory.push({type,detail,ts:new Date().toISOString()});
if(sessionHistory.length>50)sessionHistory=sessionHistory.slice(-50);
saveState();
}
// ─── STATE ───
let mode="dashboard",fcCat="All",fcDiff="All Levels",fcIdx=0,fcFlipped=false,fcSeen=new Set(),fcFavs=new Set();
let qzQs=[],qzIdx=0,qzSel=null,qzShow=false,qzScore=0,qzDone=false,qzMode=null; // qzMode: null=picker, category string, or "final"
let scIdx=0,scRevealed=false,scPracticed=new Set();
let rfState="ready",rfQs=[],rfIdx=0,rfTimer=0,rfResults=[],rfInterval=null;
let stats={quizzes:0,bestQuiz:0,cards:0,scenarios:0,rapid:0,bestRapid:0,quizScores:{}};
let showConfirm=false,confirmAction=null,confirmMsg="",showExport=false;
let learnView="list",learnIdx=0,exercisesDone={};
let schedule=[],checkpoints=[],sessionsDone={},showForm=null,editId=null,formData={};
let schedView="upcoming",icsOpen=false,icsSelected=new Set(),icsPhaseFilter='all';
let userRole=null,showRolePicker=false;
let cardRatings={};
// ─── LOAD SAVED STATE ───
(function(){
const saved=loadState();
if(saved){
if(saved.stats){stats={...stats,...saved.stats};if(!stats.quizScores)stats.quizScores={}}
if(saved.history)sessionHistory=saved.history;
if(saved.exercisesDone)exercisesDone=saved.exercisesDone;
if(saved.schedule)schedule=saved.schedule;
if(saved.checkpoints)checkpoints=saved.checkpoints;
if(saved.sessionsDone)sessionsDone=saved.sessionsDone;
if(saved.userRole)userRole=saved.userRole;
if(saved.fcFavs)fcFavs=new Set(saved.fcFavs);
if(saved.lastCard){fcCat=saved.lastCard.cat||"All";fcIdx=saved.lastCard.idx||0}
if(saved.cardRatings)cardRatings=saved.cardRatings;
}
if(!schedule.length)schedule=JSON.parse(JSON.stringify(DEFAULT_SESSIONS));
if(!checkpoints.length)checkpoints=JSON.parse(JSON.stringify(DEFAULT_CHECKPOINTS));
try{const syncUrl=localStorage.getItem(STORAGE_KEY+'-sync-url');if(syncUrl)SYNC_SHEET_URL=syncUrl;const syncUser=localStorage.getItem(STORAGE_KEY+'-sync-user');if(syncUser)SYNC_USER_ID=syncUser}catch(e){}
try{const fs=localStorage.getItem(STORAGE_KEY+'-fontsize');const validFs=['fs-s','fs-m','fs-l','fs-xl'];const applyFs=validFs.includes(fs)?fs:'fs-m';document.body.classList.remove(...validFs);document.body.classList.add(applyFs)}catch(e){document.body.classList.add('fs-m')}
})();
// ─── CLOUD SYNC ON LOAD ───
(async function(){
if(!syncEnabled())return;

function copyCode(btn){
  var block=btn.parentElement;
  var text=block.textContent.replace(/^Copy/,'').replace(/^Copied!/,'').trim();
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  });
}
function highlightCode(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/(#.*$)/gm,'<span style="color:#6b7280">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span style="color:#a5f3fc">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|while|true|false|null|import|from|export|class|extends|new|this|async|await)\b/g,'<span style="color:#f97316">$1</span>');
}
function codeBlock(code){

function fcRate(rating){
  var cards=fcGetCards();
  if(!cards.length)return;
  var card=cards[fcIdx%cards.length];
  cardRatings[card.f]=rating;
  stats.cards=(stats.cards||0)+1;
  saveState();
  fcFlipped=false;
  var next=fcGetCards();
  if(next.length>0)fcIdx=(fcIdx+1)%next.length;
  render();
}
function fcWeightedShuffle(){
  var cards=fcGetCards();
  if(!cards.length)return;
  var weighted=[];
  cards.forEach(function(c,i){
    var r=cardRatings[c.f];
    var w=r==='missed'?3:r==='unsure'?2:1;
    for(var j=0;j<w;j++)weighted.push(i);
  });
  fcIdx=weighted[Math.floor(Math.random()*weighted.length)];
  fcFlipped=false;
  render();
}

// ─── SCHEDULE TAB ───
function renderScheduleTab(){
const today=new Date().toISOString().slice(0,10);
const sorted=[...schedule].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const upcoming=sorted.filter(s=>s.date>=today);
const past=sorted.filter(s=>s.date<today).reverse();
const doneCount=Object.keys(sessionsDone).length;
let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div style="font-size:14px;font-weight:600">${doneCount}/${schedule.length} sessions completed</div>
<div style="display:flex;gap:6px">
<button class="btn-outline" style="padding:6px 10px;font-size:11px" onclick="toggleIcsPanel()">📅 Export</button>
<button class="btn btn-primary" style="padding:8px 14px;font-size:12px" onclick="openSessionForm()">+ Add</button>
</div>
</div>`;
h+=renderIcsPanel();
h+=`<div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width:${schedule.length?Math.round(doneCount/schedule.length*100):0}%"></div></div></div>`;
if(upcoming.length){
h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Upcoming</div>`;
upcoming.forEach(s=>{
const isToday=s.date===today;const done=sessionsDone[s.id];
h+=`<div class="sched-item${isToday?' today':''}${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min${s.phase?' · Phase '+s.phase:''}</div></div>
<div class="si-title">${s.title}</div>
<div class="si-desc">${s.desc}</div>
<div class="si-actions">
${!done?`<button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Done</button>`:`<button style="background:#374151;color:#6ee7b7" onclick="unmarkSession('${s.id}')">✓ Done</button>`}
<button style="background:#374151;color:#9ca3af" onclick="openSessionForm('${s.id}')">Edit</button>
<button style="background:#374151;color:#fca5a5" onclick="deleteSession('${s.id}')">Del</button>
</div></div>`});
}
if(past.length){
h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px">Past</div>`;
past.slice(0,5).forEach(s=>{
const done=sessionsDone[s.id];
h+=`<div class="sched-item past${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min</div></div>
<div class="si-title">${s.title}</div>
${!done?`<div class="si-actions"><button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Mark Done</button></div>`:
`<div style="font-size:11px;color:#6ee7b7;margin-top:4px">✓ Completed</div>`}
</div>`});
if(past.length>5)h+=`<div style="text-align:center;color:#4b5563;font-size:12px;padding:8px">+ ${past.length-5} more past sessions</div>`;
}
return h;
}
function unmarkSession(id){delete sessionsDone[id];saveState();render()}
function deleteSession(id){schedule=schedule.filter(s=>s.id!==id);delete sessionsDone[id];saveState();render()}
function openSessionForm(editingId){
if(editingId){const s=schedule.find(x=>x.id===editingId);if(s)formData={...s};editId=editingId}
else{formData={id:'s-'+Date.now(),date:new Date().toISOString().slice(0,10),time:'09:00',dur:30,title:'',desc:'',phase:0};editId=null}
showForm='session';render();
}
function closeForm(){showForm=null;editId=null;formData={};render()}
function saveSessionForm(){
if(!formData.title){alert('Title required');return}
if(editId){const idx=schedule.findIndex(s=>s.id===editId);if(idx>=0)schedule[idx]={...formData}}
else{schedule.push({...formData})}
saveState();closeForm();
}
function renderFormOverlay(){
if(showForm==='session')return renderSessionFormSheet();
if(showForm==='checkpoint')return renderCheckpointFormSheet();
return'';
}

// ─── CHECKPOINTS TAB ───
function renderCheckpointsTab(){
const today=new Date().toISOString().slice(0,10);
let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<div style="font-size:14px;font-weight:600">Milestones & Targets</div>
<button class="btn btn-primary" style="padding:8px 14px;font-size:12px" onclick="openCheckpointForm()">+ Add Checkpoint</button>
</div>`;
const sorted=[...checkpoints].sort((a,b)=>a.by.localeCompare(b.by));
sorted.forEach(cp=>{
const val=getMetricVal(cp.metric);
const hit=val>=cp.threshold;
const overdue=!hit&&cp.by<today;
h+=`<div class="cp-item${hit?' hit':''}">
<div style="display:flex;justify-content:space-between;align-items:center">
<div class="cp-target">${hit?'✓ ':''}${cp.target}</div>
<div style="display:flex;gap:4px">
<button style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:12px;padding:4px" onclick="openCheckpointForm('${cp.id}')">Edit</button>
<button style="background:none;border:none;color:#fca5a5;cursor:pointer;font-size:12px;padding:4px" onclick="deleteCheckpoint('${cp.id}')">Del</button>
</div>
</div>
<div class="cp-date">${hit?'Achieved!':'Target by '+fmtDate(cp.by)} · Current: ${val}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''} / ${cp.threshold}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''}</div>
${!hit?`<div style="margin-top:6px"><div class="progress-track"><div class="progress-fill" style="width:${Math.min(100,Math.round(val/cp.threshold*100))}%;${overdue?'background:#ef4444':''}"></div></div></div>`:''}
</div>`});
return h;
}
function openCheckpointForm(editingId){

else{formData={id:'cp-'+Date.now(),target:'',by:new Date().toISOString().slice(0,10),metric:'bestQuiz',threshold:80};editId=null}
showForm='checkpoint';render();
}
