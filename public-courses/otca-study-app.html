function askClaudeBox(context){
return`<div class="ask-box">
<div class="ask-label">🔍 Go deeper — ask Claude</div>
<div class="ask-row">
<input type="text" id="askInput" placeholder="e.g., How does Workload Identity actually work?" onkeydown="if(event.key==='Enter')askClaude('${context.replace(/'/g,"\\'")}')">
<button onclick="askClaude('${context.replace(/'/g,"\\'")}')">Ask</button>
</div>
</div>`}
function askClaude(context){
const input=document.getElementById('askInput');
if(!input||!input.value.trim())return;
const q=input.value.trim();
const prompt=`I'm studying for Google Cloud Next 2026 (preparing as a Solutions Architect at Dash0, an observability company). I'm currently studying: ${context}\n\nMy question: ${q}\n\nPlease give me a clear, practical answer. Include specific details, examples, or comparisons where helpful. If this relates to GKE, Dash0, or observability, include relevant context for my role.`;
navigator.clipboard.writeText(prompt).then(()=>{
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
}).catch(()=>{
const ta=document.createElement('textarea');ta.value=prompt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
});
input.value='';
}
function showToast(msg){
const existing=document.querySelector('.ask-toast');if(existing)existing.remove();
const t=document.createElement('div');t.className='ask-toast';t.textContent=msg;document.body.appendChild(t);
setTimeout(()=>t.remove(),3000);
}
// ─── ICS EXPORT ───
function toggleIcsPanel(){
icsOpen=!icsOpen;
if(icsOpen){icsSelected=new Set();icsPhaseFilter='all';schedule.forEach(s=>icsSelected.add(s.id))}
render();
}
function icsFilterPhase(p){
icsPhaseFilter=p;
icsSelected=new Set();
const filtered=p==='all'?schedule:schedule.filter(s=>s.phase==p);
filtered.forEach(s=>icsSelected.add(s.id));
render();
}
function icsToggle(id){if(icsSelected.has(id))icsSelected.delete(id);else icsSelected.add(id);render()}
function icsSelectAll(){const visible=icsVisibleSessions();visible.forEach(s=>icsSelected.add(s.id));render()}
function icsSelectNone(){icsSelected.clear();render()}
function icsVisibleSessions(){return icsPhaseFilter==='all'?[...schedule]:schedule.filter(s=>s.phase==icsPhaseFilter)}
function renderIcsPanel(){
if(!icsOpen)return'';
const visible=icsVisibleSessions().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const phases=[...new Set(schedule.map(s=>s.phase).filter(Boolean))].sort();
let h=`<div class="ics-panel">
<h4>📅 Export to Calendar</h4>
<div class="ics-filters">
<button class="${icsPhaseFilter==='all'?'active':''}" onclick="icsFilterPhase('all')">All Sessions</button>
${phases.map(p=>`<button class="${icsPhaseFilter==p?'active':''}" onclick="icsFilterPhase(${p})">Phase ${p}</button>`).join('')}
</div>
<div style="display:flex;gap:8px;margin-bottom:8px">
<button style="background:none;border:none;color:#3b82f6;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectAll()">Select all</button>
<span style="color:#374151;font-size:12px">|</span>
<button style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectNone()">Select none</button>
</div>
<div class="ics-count">${icsSelected.size} of ${visible.length} session${visible.length!==1?'s':''} selected</div>
<div class="ics-list">`;
visible.forEach(s=>{
const on=icsSelected.has(s.id);
h+=`<div class="ics-item" onclick="icsToggle('${s.id}')">
<div class="ics-check${on?' on':''}">${on?'✓':''}</div>
<div class="ics-item-info"><div class="ics-item-title">${s.title}</div><div class="ics-item-date">${fmtDate(s.date)} · ${s.time} · ${s.dur} min</div></div>
</div>`});
h+=`</div>
<div class="ics-actions">
<button class="btn btn-secondary" onclick="toggleIcsPanel()">Cancel</button>
<button class="ics-dl" ${icsSelected.size===0?'disabled style="opacity:.4;cursor:default" ':''}onclick="${icsSelected.size?'downloadIcs()':''}">Download .ics (${icsSelected.size})</button>
</div></div>`;
return h;
}
function downloadIcs(){
const selected=schedule.filter(s=>icsSelected.has(s.id)).sort((a,b)=>a.date.localeCompare(b.date));
if(!selected.length)return;
const pad=n=>(n<10?'0':'')+n;
const toIcsDate=(d,t,dur)=>{
const[y,m,dy]=d.split('-').map(Number);
const[h,mi]=(t||'09:00').split(':').map(Number);
const start=new Date(y,m-1,dy,h,mi);
const end=new Date(start.getTime()+dur*60000);
const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
return{start:fmt(start),end:fmt(end)};
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
let cal=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CrashCourse//StudyApp//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:Study Sessions\r\n`;
selected.forEach(s=>{
const{start,end}=toIcsDate(s.date,s.time,s.dur);
const desc=(s.desc||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
cal+=`BEGIN:VEVENT\r\nUID:${uid()}@crashcourse\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:${s.title.replace(/,/g,'\\,')}\r\nDESCRIPTION:${desc}\r\n`;
if(s.phase)cal+=`CATEGORIES:Phase ${s.phase}\r\n`;
cal+=`STATUS:CONFIRMED\r\nBEGIN:VALARM\r\nTRIGGER:-PT10M\r\nACTION:DISPLAY\r\nDESCRIPTION:Study session starting soon\r\nEND:VALARM\r\nEND:VEVENT\r\n`;
});
cal+=`END:VCALENDAR`;
const blob=new Blob([cal],{type:'text/calendar;charset=utf-8'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='study-sessions.ics';a.click();
URL.revokeObjectURL(url);
showToast(`Downloaded ${selected.length} session${selected.length!==1?'s':''} as .ics`);
icsOpen=false;render();
}
// ─── INIT ───
render();
</script>
