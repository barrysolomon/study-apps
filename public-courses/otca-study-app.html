<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OTCA Crash Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}.header small{font-size:12px;color:#6b7280}
.badge{background:rgba(16,185,129,.15);color:#6ee7b7;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
.card{border-radius:16px;padding:20px;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;-webkit-user-select:none}
.card.question{background:#1f2937;border:2px solid #374151}
.card.answer{background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.card-text{font-size:17px;line-height:1.5}
.card-hint{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1;filter:none}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#1f2937;color:#d1d5db}.btn-secondary:hover{background:#374151}
.btn-danger{background:rgba(239,68,68,.2);border:2px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:rgba(16,185,129,.2);border:2px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn-full{width:100%;padding:14px;font-size:15px}
.progress-bar{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{width:100%;background:#1f2937;border-radius:999px;height:8px}
.progress-fill{background:#10b981;height:8px;border-radius:999px;transition:width .5s}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.pill.active{background:#10b981;color:#fff}.pill:not(.active){background:#1f2937;color:#9ca3af}
.quiz-option{text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.quiz-option.correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.dimmed{background:rgba(31,41,55,.5);border-color:#1f2937;color:#4b5563}
.scenario-box{border-radius:16px;padding:20px;margin-bottom:16px}
.scenario-q{background:rgba(239,68,68,.08);border:2px solid rgba(153,27,27,.4)}
.scenario-a{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3)}
.scenario-reveal{background:#1f2937;border:2px solid #374151;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.timer{font-size:28px;font-family:monospace;font-weight:700}
.timer.green{color:#10b981}.timer.yellow{color:#f59e0b}.timer.red{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}.stat-val{font-size:20px;font-weight:700}.stat-label{font-size:11px;color:#6b7280}
.focus-box{background:#1f2937;border-radius:16px;padding:16px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
.results-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.grade{font-size:56px;font-weight:700;text-align:center;margin-bottom:8px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:50vh}
.mgmt-section{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:16px}
.mgmt-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#d1d5db}
.mgmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.mgmt-row:last-child{border-bottom:none}
.mgmt-row .label{font-size:13px;color:#9ca3af}
.mgmt-row .value{font-size:13px;font-weight:600;color:#fff}
.btn-outline{background:transparent;border:2px solid #374151;color:#9ca3af;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#6b7280;color:#d1d5db}
.btn-danger-solid{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-danger-solid:hover{background:#b91c1c}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-box{background:#1f2937;border:2px solid #374151;border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151;font-size:12px}
.history-item:last-child{border-bottom:none}
.export-box{background:#0d1117;border:1px solid #374151;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#6ee7b7;word-break:break-all;max-height:120px;overflow-y:auto;margin-top:8px}
.source-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.source-link:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.source-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.res-group{margin-bottom:20px}
.res-group h4{font-size:13px;font-weight:600;color:#6ee7b7;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.res-link{display:block;padding:10px 12px;border-radius:10px;background:#1f2937;margin-bottom:6px;text-decoration:none;color:#93c5fd;font-size:13px;font-weight:500;border:1px solid #374151;transition:all .2s}
.res-link:hover{background:#374151;border-color:#4b5563}
.res-link small{display:block;color:#6b7280;font-size:11px;font-weight:400;margin-top:2px}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.lesson-card{background:#1f2937;border-radius:16px;padding:16px;cursor:pointer;border:2px solid #374151;transition:all .2s}
.lesson-card:hover{border-color:#4b5563}
.lesson-card.completed{border-color:rgba(16,185,129,.3)}
.lesson-num{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.lesson-title{font-size:15px;font-weight:600;margin:4px 0}
.lesson-meta{font-size:12px;color:#6b7280;display:flex;gap:12px}
.lesson-body{padding:0}
.lesson-section{margin-bottom:20px}
.lesson-section h4{font-size:13px;font-weight:600;color:#6ee7b7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lesson-text{font-size:14px;color:#d1d5db;line-height:1.7}
.lesson-text p{margin-bottom:10px}
.lesson-highlight{background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:10px 14px;border-radius:0 10px 10px 0;margin:10px 0;font-size:13px;color:#d1fae5;line-height:1.5}
.lesson-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.lesson-compare-item{background:#0d1117;border-radius:10px;padding:10px;font-size:12px;line-height:1.5}
.lesson-compare-item .compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.exercise-box{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.exercise-box .ex-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.exercise-box .ex-task{font-size:13px;color:#ddd6fe;line-height:1.5;margin-bottom:8px}
.exercise-box .ex-hint{font-size:12px;color:#6b7280;font-style:italic}
.exercise-check{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
.exercise-check .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #374151;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.exercise-check .checkbox.checked{background:#10b981;border-color:#10b981}
.exercise-check .ex-text{font-size:13px;color:#d1d5db}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}
.sched-item{background:#1f2937;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #374151;transition:all .2s}
.sched-item.today{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.sched-item.past{opacity:.5}
.sched-item.done{border-color:rgba(16,185,129,.3);opacity:.7}
.sched-item .si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sched-item .si-date{font-size:11px;color:#6b7280;font-weight:600}
.sched-item .si-dur{font-size:10px;color:#4b5563;background:#0d1117;padding:2px 8px;border-radius:6px}
.sched-item .si-title{font-size:14px;font-weight:600;color:#e5e7eb;margin-bottom:2px}
.sched-item .si-desc{font-size:12px;color:#9ca3af;line-height:1.4}
.sched-item .si-actions{display:flex;gap:6px;margin-top:8px}
.sched-item .si-actions button{padding:6px 10px;border-radius:8px;border:none;font-size:11px;font-weight:500;cursor:pointer}
.cp-item{background:rgba(251,191,36,.06);border:2px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;margin-bottom:8px}
.cp-item.hit{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.cp-item .cp-target{font-size:14px;font-weight:600;color:#fde68a}
.cp-item.hit .cp-target{color:#6ee7b7;text-decoration:line-through}
.cp-item .cp-date{font-size:11px;color:#6b7280}
.form-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.form-sheet{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.form-sheet h3{font-size:16px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:14px;font-family:inherit}
.form-field textarea{min-height:60px;resize:vertical}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#10b981}
.ask-box{background:rgba(139,92,246,.06);border:2px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;margin-top:16px}
.ask-box .ask-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ask-box .ask-row{display:flex;gap:8px}
.ask-box input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:13px;font-family:inherit}
.ask-box input:focus{outline:none;border-color:#a78bfa}
.ask-box input::placeholder{color:#4b5563}
.ask-box button{padding:10px 14px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ask-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(124,58,237,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ics-panel{background:#111827;border:2px solid #374151;border-radius:16px;padding:16px;margin-bottom:16px}
.ics-panel h4{font-size:13px;font-weight:600;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ics-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ics-filters button{padding:5px 10px;border-radius:8px;border:2px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.ics-filters button.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#93c5fd}
.ics-list{max-height:320px;overflow-y:auto;margin-bottom:12px}
.ics-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.ics-item:last-child{border-bottom:none}
.ics-check{width:20px;height:20px;border-radius:5px;border:2px solid #374151;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:12px;color:transparent}
.ics-check.on{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.ics-item-info{flex:1;min-width:0}
.ics-item-title{font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ics-item-date{font-size:11px;color:#6b7280}
.ics-actions{display:flex;gap:8px;margin-top:4px}
.ics-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.ics-dl{background:#3b82f6;color:#fff}
.ics-dl:hover{background:#2563eb}
.ics-count{font-size:12px;color:#6b7280;margin-bottom:8px}
@media(min-width:600px){
body{max-width:960px;padding:0 24px}
.header{padding:20px 0 12px}
.header h1{font-size:22px}
.content{padding:20px 0 100px}
.nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}
.nav button{min-width:auto;padding:8px 14px;font-size:12px;flex-direction:row;gap:6px;border-radius:10px}
.nav button span{font-size:16px;margin-bottom:0}
.stat-grid{grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{padding:16px}
.stat-val{font-size:22px}
.card{max-width:640px;margin:0 auto;min-height:240px;padding:28px}
.card-text{font-size:18px}
.quiz-option{font-size:15px;padding:16px 20px}
.scenario-box{max-width:700px}
.lesson-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.lesson-card{margin-bottom:0}
.mgmt-section{max-width:700px}
.form-sheet{max-width:560px;border-radius:20px;margin:auto}
.form-overlay{align-items:center}
.res-group{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.res-group h4{grid-column:1/-1}
.focus-box{max-width:700px}
.sched-item{max-width:700px}
.ics-panel{max-width:700px}
.cp-item{max-width:700px}
.pills{flex-wrap:wrap}
.ask-box{max-width:640px;margin:16px auto 0}
.confirm-box{max-width:400px}
.source-links{justify-content:flex-start}
}
@media(min-width:800px){
body{max-width:1100px}
.nav{max-width:1100px}
.stat-grid{grid-template-columns:repeat(4,1fr)}
.lesson-grid{grid-template-columns:repeat(3,1fr)}
.card{max-width:700px}
.res-group{grid-template-columns:repeat(3,1fr)}
}
.role-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.role-picker{max-width:520px;width:92%;padding:28px 20px;text-align:center}
.role-picker h2{font-size:22px;font-weight:700;margin-bottom:6px}
.role-picker .rp-sub{font-size:14px;color:#9ca3af;margin-bottom:24px;line-height:1.5}
.role-cards{display:flex;flex-direction:column;gap:12px}
.role-card{background:#1f2937;border:2px solid #374151;border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;text-align:left}
.role-card:hover{border-color:#10b981;background:#263040}
.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-badge.core{background:rgba(16,185,129,.15);color:#6ee7b7}
.role-badge.bonus{background:rgba(107,114,128,.15);color:#6b7280}
.role-current{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:#1f2937;border:1px solid #374151;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:#d1d5db}
.role-current:hover{border-color:#10b981;background:#263040}
.fs-s .card-text,.fs-s .lesson-text,.fs-s .quiz-option,.fs-s .scenario-box,.fs-s .scenario-q,.fs-s .scenario-a,.fs-s .focus-text{font-size:13px}
.fs-m .card-text,.fs-m .lesson-text,.fs-m .quiz-option,.fs-m .scenario-box,.fs-m .scenario-q,.fs-m .scenario-a,.fs-m .focus-text{font-size:15px}
.fs-l .card-text,.fs-l .lesson-text,.fs-l .quiz-option,.fs-l .scenario-box,.fs-l .scenario-q,.fs-l .scenario-a,.fs-l .focus-text{font-size:17px}

// ─── DATA ───
const FLASHCARDS=[

{f:"What is OpenTelemetry?",b:"Open standard for collecting telemetry data (traces, metrics, logs) from applications and infrastructure. Vendor-neutral, managed by CNCF. Separates instrumentation from backend.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/what-is-opentelemetry/"},
{f:"The three pillars of observability",b:"Metrics (quantitative measurements), Logs (event records), Traces (request flows). Together they answer 'what happened, when, and why.'",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/"},
{f:"Semantic conventions — why?",b:"Standardized attribute names across languages/frameworks (e.g., 'http.method', 'db.system'). Enables correlation and reduces backend config.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/semantic-conventions/"},
{f:"Manual vs auto-instrumentation tradeoff",b:"Manual: fine control, library-specific. Auto: less code, coverage gaps, sometimes vendor-specific.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/instrumentation/"},
{f:"What is a span?",b:"Unit of work in a trace. Has start/end times, attributes, events, links, status. SpanContext includes trace ID, span ID, flags.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/traces/"},
{f:"What is a metric?",b:"Quantitative measurement: counter (monotonic, increasing), histogram (distribution), gauge (point-in-time), observable (async callback).",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/metrics/"},
{f:"Trace vs Span",b:"Trace = end-to-end request flow across services. Span = single operation within trace. Many spans form one trace.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/traces/"},
{f:"MELT acronym",b:"Metrics, Events (span events), Logs, Traces. The four types of observability signals OTel collects.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/"},
{f:"SLI vs SLO vs SLA",b:"SLI = Service Level Indicator (what you measure). SLO = Service Level Objective (target). SLA = Service Level Agreement (contract).",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/"},
{f:"Distributed tracing core problem",b:"How do you follow a request across services when there's no single machine? Answer: trace context propagation (W3C TraceContext header).",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/context-propagation/"},
{f:"TracerProvider role",b:"Factory that creates Tracer instances. Manages SpanProcessor, Sampler, Resource, InstrumentationScope. One per app.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/"},
{f:"MeterProvider role",b:"Factory for Meter instances. Manages MetricReader, views, aggregations, cardinality controls. One per app.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/"},
{f:"Span kinds — 5 types?",b:"INTERNAL (default), CLIENT (outbound), SERVER (inbound), PRODUCER (queuing), CONSUMER (dequeuing).",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/"},
{f:"SpanContext contents",b:"Trace ID (128-bit), Span ID (64-bit), Trace flags (sampled bit), Trace state (vendor extensions). W3C standard.",c:"OTel API & SDK",u:"https://www.w3.org/TR/trace-context/"},
{f:"W3C traceparent header format",b:"version-traceid-parentid-traceflags (e.g., '00-abc123...-def456...-01'). Propagates trace context across process boundaries.",c:"OTel API & SDK",u:"https://www.w3.org/TR/trace-context/"},
{f:"Sampler types",b:"AlwaysOn (100%), AlwaysOff (0%), TraceIdRatio (%), ParentBased (follow parent), JaegerRemote (dynamic).",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/"},
{f:"SimpleSpanProcessor vs BatchSpanProcessor",b:"Simple: immediate export (blocks, not scalable). Batch: buffers spans, exports in batches (async, efficient).",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/"},
{f:"Counter metric type",b:"Monotonically increasing value (always goes up or stays same). E.g., request count, errors, bytes sent.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/"},
{f:"Histogram metric type",b:"Records distribution of values across buckets. E.g., request latency, message size. Configurable boundaries.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/"},
{f:"Gauge metric type",b:"Point-in-time snapshot (can go up/down). E.g., memory usage, queue length. Usually async callback.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/"},
{f:"UpDownCounter metric type",b:"Like counter but can increase AND decrease. E.g., active requests, thread pool size.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/"},
{f:"Resource in OTel",b:"Describes the app/service being monitored (name, version, environment, K8s pod name, etc.). Set once at SDK init.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/resource/sdk/"},
{f:"InstrumentationScope",b:"Metadata about the instrumentation library (name, version). Different from Resource. Attached to every signal.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/overview/"},
{f:"Baggage use cases",b:"Pass request-scoped context (user ID, tenant ID) without using spans. NOT for sensitive data — visible in logs.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/concepts/signals/"},
{f:"LoggerProvider purpose",b:"Factory for Logger instances. Manages LogRecordProcessor and LogRecordExporter. Log bridge API for structured logs.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/logs/"},
{f:"OTLP protocol",b:"OpenTelemetry Line Protocol. Can use gRPC (binary, low latency) or HTTP/JSON (simpler). Default OTLP gRPC port 4317.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otlp/"},
{f:"Auto-instrumentation in OTel",b:"Language-specific agents/packages that inject instrumentation without code changes. Works with admission webhooks in K8s.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/zero-code/"},
{f:"Context propagation",b:"Passing trace context (span ID, trace ID) across process/service boundaries via headers. Enables distributed tracing.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/concepts/context-propagation/"},
{f:"OTel Collector architecture",b:"Receivers → Processors → Exporters. Can be deployed as agent (sidecar/DaemonSet) or gateway (standalone service).",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/"},
{f:"OTel Collector receivers",b:"OTLP (native), Prometheus, Jaeger, Zipkin, hostmetrics, syslog, FluentBit, Kafka, AWS X-Ray, GCP, Azure, etc.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/"},
{f:"OTel Collector processors",b:"batch, memory_limiter, attributes, filter, tail_sampling, transform, span_to_metrics, etc.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/"},
{f:"memory_limiter processor placement",b:"MUST be first processor in pipeline. Enforces hard limit on Collector memory to prevent OOM.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/"},
{f:"tail_sampling processor",b:"Samples based on span attributes at exit (e.g., only keep error traces). Requires seeing full trace before decision.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/"},
{f:"OTel Collector connectors",b:"Bridge between pipelines. E.g., spans-to-metrics: convert spans to metric events. Enables unified telemetry workflows.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/"},
{f:"OTel Collector extensions",b:"Add features: health_check, pprof, zpages (profiling & inspection), memory_ballast (tuning).",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/"},
{f:"YAML service.pipelines",b:"Defines data flow: pipelines[metrics/traces/logs][name] → receivers + processors + exporters chain.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/"},
{f:"Agent vs Gateway deployment",b:"Agent: runs per-host/pod (DaemonSet), local collection. Gateway: centralized (Deployment), receives from agents/apps.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/deployment/"},
{f:"Collector scaling patterns",b:"Multiple gateway instances behind load balancer. Enable otlp.receiver.transport to gRPC for multiplexing.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/scaling/"},
{f:"zPages endpoints",b:"/debug/servicez (service info), /debug/tracez (recent traces), /debug/pipelinez (pipeline config), /debug/logging (log levels).",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/"},
{f:"Collector self-metrics port",b:"8888 (default). Collector emits metrics about itself: receivers/processors/exporters performance. Scrape with Prometheus.",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/troubleshooting/"},
{f:"Debug exporter use case",b:"Prints telemetry to stdout/logs. Used in dev and troubleshooting to see actual data flowing through pipeline.",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/"},
{f:"Span drop causes",b:"Sampler rejecting, BatchSpanProcessor buffer full, export timeout, exporter rejected, OOMKilled collector.",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/troubleshooting/"},
{f:"FeatureGates in Collector",b:"Flag to enable/disable experimental features. Set via OTEL_EXPERIMENTAL_* env vars. Check docs for current gates.",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/"},
{f:"Collector log levels",b:"debug, info, warn, error. Set via --log-level or OTEL_LOG_LEVEL. Debug logs everything (verbose).",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/troubleshooting/"},

// ─── OTel API & SDK — Span Events ───
{f:"Span events (AddEvent)",b:"Timestamped annotations on a span. Use AddEvent(name, attributes?, timestamp?) to record something that happened during a span. RecordException is a special event with exception.type, exception.message, exception.stacktrace attributes.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#add-events"},
{f:"Span links",b:"Connect spans across traces without parent-child relationship. Use cases: batch processing (one span triggers many), fan-out, linking a consumer span back to the producer span across traces. Created at span start.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#specifying-links"},
{f:"Span status codes",b:"Three values: Unset (default, no explicit status), Error (operation failed), Ok (operation confirmed successful). Once set to Ok, status cannot be changed. SDK should only set Error; Ok is reserved for application code that knows the operation succeeded.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#set-status"},
{f:"API vs SDK separation",b:"API = interfaces only (no-op by default). SDK = implementation (TracerProvider, exporters, samplers). Instrumentation libraries depend ONLY on the API, never the SDK. This lets end users choose their SDK/vendor without library changes.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/overview/"},
{f:"Tracer creation parameters",b:"tracer = tracerProvider.get(name, version?, schema_url?). Name is required (usually the instrumentation library name). Version and schema_url are optional. Name + version form the InstrumentationScope.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#get-a-tracer"},
{f:"Meter creation parameters",b:"meter = meterProvider.get(name, version?, schema_url?). Name is required (instrumentation library name). Version is optional. These identify the InstrumentationScope for all instruments created from this Meter.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/#get-a-meter"},
{f:"Instrument naming rules",b:"Max 255 characters. Must start with a letter. Allowed: a-z, A-Z, 0-9, underscore (_), dot (.), hyphen (-), slash (/). Names should be lowercase with dots as namespace separators (e.g., http.server.request.duration).",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/#instrument-name"},
{f:"Sync vs Async metric instruments",b:"Sync instruments: Counter, UpDownCounter, Histogram — called inline with application code. Async (Observable) instruments: ObservableCounter, ObservableUpDownCounter, ObservableGauge — use callbacks invoked at collection time. 7 instruments total.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/"},
{f:"ObservableCounter",b:"Async version of Counter. Registered with a callback that returns the current cumulative total. SDK computes delta between collections. Use for values you can only read as a total (e.g., process CPU time, disk reads).",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/#asynchronous-counter"},
{f:"ObservableGauge",b:"Async instrument. Callback returns current value at collection time. No aggregation—last value wins. Use for system metrics like memory usage, temperature, or any value you poll rather than push.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/#asynchronous-gauge"},
{f:"ObservableUpDownCounter",b:"Async version of UpDownCounter. Callback returns current cumulative value that can go up or down. SDK computes delta. Use for values like connection pool size read from a system API.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/#asynchronous-updowncounter"},
{f:"Metric temporality: Cumulative vs Delta",b:"Cumulative: each export includes the total since process start (stateless receiver). Delta: each export includes only the change since last export (stateful receiver). OTLP default is Cumulative for sync counters. Prometheus only supports Cumulative.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/data-model/#temporality"},
{f:"Exemplars",b:"Sample trace IDs attached to metric data points. Link a specific metric measurement to the trace that produced it. Enables 'click this latency spike to see the trace.' Collected automatically when tracing and metrics are both active.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/data-model/#exemplars"},
{f:"Views in the Metrics SDK",b:"Views let you customize metric output: rename instruments, drop/allow specific attributes, change aggregation type (e.g., Histogram → Sum), set custom bucket boundaries. Applied in MeterProvider config. Crucial for controlling cardinality.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/sdk/#view"},
{f:"OTEL_SERVICE_NAME env var",b:"Sets the service.name resource attribute. Equivalent to setting OTEL_RESOURCE_ATTRIBUTES=service.name=my-svc. If both are set, OTEL_SERVICE_NAME takes precedence.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"},
{f:"OTEL_TRACES_SAMPLER default",b:"Default value: parentbased_always_on. Meaning: if parent span is sampled, sample this too; if no parent, always sample. Other values: always_on, always_off, traceidratio, parentbased_traceidratio.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"},
{f:"OTEL_PROPAGATORS default",b:"Default value: tracecontext,baggage. Sets which context propagation formats to use. tracecontext = W3C TraceContext. Other options: b3, b3multi, jaeger, xray, ottrace.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"},
{f:"OTEL_TRACES_EXPORTER / OTEL_METRICS_EXPORTER / OTEL_LOGS_EXPORTER defaults",b:"All default to 'otlp'. Other options: console (for debug), none (disable), zipkin (traces only), prometheus (metrics only). Set to 'none' to disable a signal entirely.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"},
{f:"BatchSpanProcessor env vars",b:"OTEL_BSP_SCHEDULE_DELAY=5000 (ms between exports), OTEL_BSP_MAX_QUEUE_SIZE=2048 (max queued spans), OTEL_BSP_MAX_EXPORT_BATCH_SIZE=512 (max spans per batch), OTEL_BSP_EXPORT_TIMEOUT=30000 (export timeout ms).",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"},
{f:"Attribute limits env vars",b:"OTEL_ATTRIBUTE_COUNT_LIMIT=128 (max attributes per span/event/link), OTEL_SPAN_EVENT_COUNT_LIMIT=128 (max events per span), OTEL_SPAN_LINK_COUNT_LIMIT=128 (max links per span), OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT=none (no default limit).",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/"},
{f:"ForceFlush and Shutdown lifecycle",b:"ForceFlush(): export all buffered telemetry immediately (e.g., before process exits). Shutdown(): calls ForceFlush then releases resources. After Shutdown, the provider becomes no-op. Always call Shutdown on graceful exit.",c:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/#forceflush-1"},

// ─── OTel Collector — Additional cards ───
{f:"Collector distributions: Core vs Contrib vs Custom",b:"Core: minimal, stable components only. Contrib: community-maintained receivers/processors/exporters. Custom: build your own with OpenTelemetry Collector Builder (ocb). Use ocb to include only what you need for smaller, more secure binaries.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/distributions/"},
{f:"Common receivers: otlp, prometheus, filelog, hostmetrics, kafka",b:"otlp: native OTel (gRPC 4317, HTTP 4318). prometheus: scrapes Prometheus endpoints. filelog: tails log files. hostmetrics: CPU/memory/disk/network from host OS. kafkareceiver: consumes from Kafka topics.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/"},
{f:"Common processors: batch, memory_limiter, attributes, filter, resource, transform",b:"batch: groups signals for efficient export. memory_limiter: caps memory (first!). attributes: add/update/delete/hash span/metric attributes. filter: drop signals by conditions. resource: modify resource attributes. transform: OTTL-based transformations.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/"},
{f:"Common exporters: otlp, otlphttp, debug, prometheus, file",b:"otlp: gRPC to OTLP backend. otlphttp: HTTP/protobuf or HTTP/JSON to OTLP backend. debug: prints to stdout (was 'logging'). prometheusremotewrite: push metrics to Prometheus. file: writes JSON to disk (useful for debugging/archival).",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/"},
{f:"Collector environment variable support",b:"YAML config supports ${env:VAR_NAME} syntax with optional defaults: ${env:PORT:-4317}. Also supports ${file:path} to read from file. Useful for secrets (don't hardcode API keys in config).",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/#environment-variables"},
{f:"TLS/mTLS configuration in Collector",b:"Configured per-receiver and per-exporter. Fields: cert_file (public cert), key_file (private key), ca_file (CA cert for verification). For mTLS, set all three on both sides. Receivers use tls: block under server config.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/"},
{f:"Connector use cases",b:"Connectors are both exporter (from pipeline A) and receiver (into pipeline B). count connector: counts spans and emits metrics. routing connector: routes data to different pipelines based on attributes. spanmetrics connector: generates RED metrics from spans.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/connectors/"},
{f:"otelcol validate command",b:"Run 'otelcol validate --config=config.yaml' to check config syntax and semantic validity before deploying. Catches typos, missing required fields, invalid component references. Use in CI/CD pipelines.",c:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/"},

// ─── Observability Fundamentals — Additional cards ───
{f:"HTTP semantic conventions (stable)",b:"http.request.method (GET/POST/etc.), url.full (complete URL), http.response.status_code (200/404/500), server.address (hostname), server.port. Note: old 'http.method' renamed to 'http.request.method' in semconv v1.20+.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/semconv/http/"},
{f:"DB semantic conventions",b:"db.system (mysql/postgresql/redis/etc.), db.statement (the query text — sanitize!), db.name (database name), db.operation (SELECT/INSERT/etc.). Span name should be '{db.operation} {db.name}.{db.sql.table}'.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/semconv/database/"},
{f:"OTel signal maturity model",b:"Each signal per language has a stability level: Stable (API frozen, backward-compatible), Beta (may change), Experimental (will change). Traces: Stable in most languages. Metrics: Stable in most. Logs: Mixed (many still Beta/Experimental).",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/status/"},
{f:"OpenTracing + OpenCensus merger",b:"OpenTracing (Uber, 2016): tracing API standard. OpenCensus (Google, 2018): tracing + metrics with built-in exporters. Merged in 2019 to form OpenTelemetry under CNCF. OTel inherits best of both: vendor-neutral API + integrated signals.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/what-is-opentelemetry/"},
{f:"Instrumentation scope vs Resource",b:"Resource: describes the entity producing telemetry (service name, version, host, K8s pod). Shared across ALL signals. InstrumentationScope: identifies the instrumentation library (name, version). Multiple scopes per resource. Think: Resource = 'who', Scope = 'how'.",c:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/otel/overview/"},

// ─── Pipeline Debugging — Additional cards ───
{f:"Schema management and schema_url",b:"schema_url identifies which version of semantic conventions a signal uses. Allows backends to auto-transform old attribute names to new ones (e.g., http.method → http.request.method). Set on Resource and InstrumentationScope.",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/specs/otel/schemas/"},
{f:"Exporter retry and error handling",b:"When an exporter fails: retryable errors (network timeout, 503) are retried with exponential backoff. Non-retryable errors (400, 401) are dropped. BatchSpanProcessor queues spans; if queue is full, oldest spans are dropped. Monitor otelcol_exporter_send_failed_spans.",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/specs/otel/protocol/exporter/"},
{f:"Collector health_check extension",b:"Provides an HTTP endpoint (default :13133) returning 200 when healthy. Used for Kubernetes liveness/readiness probes. Config: extensions: { health_check: { endpoint: '0.0.0.0:13133' } }. Must be listed in service.extensions.",c:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/configuration/"},

];

const QUIZ=[

{q:"What is OpenTelemetry's primary goal?",o:["A backend for observability","Vendor-neutral standard for instrumentation","Replace Prometheus","Be the fastest collector"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/what-is-opentelemetry/",e:"OpenTelemetry is a standard and a set of SDKs/collectors—not a backend. It decouples instrumentation from vendors, letting your telemetry stay portable."},
{q:"The three signals are?",o:["Traces, events, logs","Metrics, logs, traces","Metrics, events, stores","Requests, responses, errors"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/",e:"OTel's three core signals: Metrics (quantitative), Logs (events), Traces (requests). Events are part of spans, not a separate signal."},
{q:"What does semantic conventions prevent?",o:["Distributed tracing","Attribute naming chaos across apps","Exporter misconfiguration","Sampler confusion"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/semantic-conventions/",e:"Semantic conventions define standard names like 'http.method' and 'db.system'. Without them, backends can't correlate or analyze data."},
{q:"Distributed tracing solves what core problem?",o:["Faster queries","Following requests across services","Smaller log files","Real-time alerting"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/traces/",e:"In microservices, one request spans multiple services. Distributed tracing follows it end-to-end via trace IDs in context headers."},
{q:"MELT stands for?",o:["Metrics, Events, Logs, Traces","Management, Errors, Latency, Traffic","Measurement, Events, Logging, Tracking","Models, Examples, Logs, Tests"],a:0,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/",e:"MELT = Metrics, Events (as part of spans), Logs, Traces. It's the complete observability model OTel covers."},
{q:"SLO differs from SLI because?",o:["SLOs are percentages, SLIs are raw numbers","SLI is measured, SLO is the target","They're synonyms","SLO is internal, SLI is external"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/",e:"SLI = the metric you measure (e.g., 99.9% uptime). SLO = your target for that SLI (e.g., we target 99.95%). SLA = the contract."},
{q:"What is a TracerProvider?",o:["A backend that stores traces","Factory for creating Tracer instances","Configuration for trace sampling","Protocol for sending traces"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/",e:"TracerProvider is the entry point: creates Tracer instances, manages SpanProcessors, Samplers, Resource, InstrumentationScope."},
{q:"Span kinds — PRODUCER means?",o:["Server producing a response","App publishing to a queue/topic","Generating synthetic data","Creating new spans"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/",e:"PRODUCER span = sending message to queue/Kafka. CONSUMER = receiving from queue. CLIENT = outbound call. SERVER = inbound. INTERNAL = within process."},
{q:"W3C traceparent format (example)?",o:["traceid-spanid-flags","version-traceid-spanid-flags","trace-id,span-id","traceid:spanid:flags"],a:1,cat:"OTel API & SDK",u:"https://www.w3.org/TR/trace-context/",e:"W3C format: '00-abc123...-def456...-01' where 00=version, abc123=trace ID, def456=parent span ID, 01=sampled flag."},
{q:"Counter metric always?",o:["Can increase and decrease","Increases monotonically (stays same or up)","Resets every minute","Is async callback"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/",e:"Counter is monotonic: only increases or stays flat. For values that go up/down, use UpDownCounter. For point-in-time, use Gauge."},
{q:"Which metric type for memory usage?",o:["Counter","Histogram","Gauge","UpDownCounter"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/",e:"Memory usage fluctuates up/down at each measurement. Gauge captures a point-in-time snapshot. Use async callback to query system metrics."},
{q:"Histogram buckets serve what purpose?",o:["Store exact values","Distribute samples evenly","Create distribution of latencies across ranges","Nothing, they're arbitrary"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/",e:"Histogram divides measurements into buckets (e.g., <10ms, <50ms, <100ms) to show distribution. Backends compute percentiles from buckets."},
{q:"Baggage should NOT contain?",o:["User ID","Tenant ID","API keys","Request ID"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/concepts/signals/",e:"Baggage is visible in logs and propagated widely. Never put sensitive data (passwords, keys, PII). Use it for non-sensitive context like user ID."},
{q:"SimpleSpanProcessor vs BatchSpanProcessor?",o:["Simple is faster","Batch blocks, Simple doesn't","Simple exports immediately (blocks), Batch buffers and exports asynchronously","They're the same"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/",e:"SimpleSpanProcessor calls export() immediately (blocks, hurts performance). BatchSpanProcessor buffers spans and exports async. Use Batch in production."},
{q:"OTLP default gRPC port?",o:["5000","8888","4317","9411"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otlp/",e:"OTLP gRPC listens on 4317 by default. HTTP is 4318. 8888 is the Collector's metrics port, 9411 is Zipkin."},
{q:"ParentBased sampler does?",o:["Always samples","Follows parent span's sampled flag","Samples based on trace ID hash","Disables sampling"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/",e:"ParentBased sampler: if there's a parent span, inherit its sampled decision. If no parent, use fallback sampler. Maintains trace integrity."},
{q:"Auto-instrumentation in K8s uses?",o:["eBPF probes","Admission webhooks to inject SDK","Manual code changes","Environment variables only"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/zero-code/",e:"OTel K8s Operator uses mutating admission webhooks to inject SDKs and config as pods are created. No app code changes needed."},
{q:"Resource vs InstrumentationScope?",o:["Resource describes the service, InstrumentationScope describes the library","They're the same thing","InstrumentationScope is deprecated","Resource is for metrics only"],a:0,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/resource/sdk/",e:"Resource = app/service metadata (name, version, K8s pod, environment). InstrumentationScope = metadata of the instrumentation library (name, version)."},
{q:"Log bridge API enables?",o:["Exporting raw logs without OTel","Parsing logs into traces","Converting logs to structured with trace context","Filtering logs"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/logs/",e:"Log bridge API lets you attach trace context (trace ID, span ID) to log records. Enables correlation between logs and traces."},
{q:"What order in Collector pipeline?",o:["Exporters, Processors, Receivers","Receivers, Exporters, Processors","Receivers, Processors, Exporters","Processors, Receivers, Exporters"],a:2,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/",e:"Data flow: Receivers ingest → Processors transform → Exporters send out. memory_limiter processor MUST be first."},
{q:"Tail sampling processor enables?",o:["Sampling based on sampling rate","Sampling based on span attributes after seeing full trace","Sampling randomly at head","Sampling at egress only"],a:1,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/",e:"Tail sampling decides whether to keep a trace AFTER seeing all spans. Lets you sample: keep 100% errors, 10% normal. Head sampling can't do this."},
{q:"Connectors in Collector bridge?",o:["Receivers and Exporters","Pipelines to enable cross-signal workflows","Processors and Exporters","Nothing, they don't exist"],a:1,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/",e:"Connectors connect pipelines. E.g., spans_to_metrics bridges traces→metrics. Useful for extracting metrics from trace data."},
{q:"memory_limiter placement?",o:["End of pipeline","Flexible, anywhere safe","First processor in pipeline","Per-exporter only"],a:2,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/",e:"memory_limiter MUST be first processor to enforce hard limits before any processing. Prevents OOMKill."},
{q:"Agent vs Gateway deployment?",o:["Agent is centralized, Gateway per-host","Agent per-host/pod, Gateway centralized","Both centralized","Both per-host"],a:1,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/deployment/",e:"Agent: DaemonSet/sidecar on each host/pod. Gateway: Deployment as service. Agent collects locally, Gateway receives from agents/apps."},
{q:"zPages /debug/tracez shows?",o:["Service config","Recent sample traces","Pipeline definition","Health status"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/",e:"zPages endpoints: /debug/tracez = recent traces, /debug/servicez = service info, /debug/pipelinez = pipeline config, /debug/logging = log control."},
{q:"Collector self-metrics on port?",o:["4317","4318","8888","9090"],a:2,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/troubleshooting/",e:"Collector exports its own metrics (receivers/processors/exporters perf) on port 8888. Scrape with Prometheus for internal health."},
{q:"Why spans drop in Collector?",o:["Exporter is slow","Sampler rejected, buffer full, export timeout, exporter error, or OOMKill","Bad YAML config","Trace context missing"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/troubleshooting/",e:"Spans drop due to: sampler (HeadSampling), batch buffer overflow, export timeout, exporter rejected, Collector OOMKilled, bad processors."},
{q:"Debug exporter shows?",o:["Sample of telemetry","All telemetry on stdout/logs","Summary statistics","Only errors"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/",e:"Debug exporter prints full telemetry to logs. Used in dev to verify data is flowing. Never use in production (too verbose)."},
{q:"What is the purpose of the InstrumentationScope?",o:["Identifies the instrumentation library (name+version)","Defines network scope","Sets metric aggregation boundaries","Configures sampling rules"],a:0,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/overview/",e:"InstrumentationScope identifies which instrumentation library generated a signal, including the library name and version."},
{q:"Which environment variable sets the OTLP exporter endpoint?",o:["OTEL_EXPORTER_OTLP_ENDPOINT","OTLP_ENDPOINT","OTEL_ENDPOINT","OTEL_TRACE_ENDPOINT"],a:0,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otlp/",e:"OTEL_EXPORTER_OTLP_ENDPOINT is the standard environment variable for configuring the OTLP exporter's target backend address."},
{q:"Which Collector extension provides a health check endpoint?",o:["pprof","zpages","health_check","diagnostics"],a:2,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/",e:"The health_check extension provides an HTTP endpoint to monitor Collector health, commonly used in Kubernetes liveness/readiness probes."},
{q:"What is the default OTLP gRPC receiver port?",o:["4317","4318","8888","9090"],a:0,cat:"OTel Collector",u:"https://opentelemetry.io/docs/specs/otlp/",e:"Port 4317 is the default for OTLP gRPC receivers. Port 4318 is for OTLP HTTP receivers."},
{q:"What does MELT stand for in observability?",o:["Metrics Events Logs Traces","Monitoring Events Logging Tracing","Metrics Errors Logs Traces","Metrics Events Links Traces"],a:0,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/",e:"MELT = Metrics, Events (as part of spans), Logs, Traces. These are the core observability signals."},
{q:"Which OTel component is NOT a signal type?",o:["Traces","Metrics","Events","Logs"],a:2,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/concepts/signals/",e:"Events are not a separate signal type; they are captured within spans as timestamped data."},
{q:"The debug exporter replaced which deprecated exporter?",o:["console","logging","stdout","print"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/troubleshooting/",e:"The logging exporter (formerly called debug) prints telemetry to stdout for troubleshooting Collector pipelines."},

{q:"What are the three possible span status codes?",o:["Open, Closed, Error","Unset, Error, Ok","Active, Inactive, Failed","Started, Completed, Error"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#set-status",e:"Span status has exactly three values: Unset (default, no explicit status), Error (operation failed), and Ok (confirmed success). Once set to Ok, it cannot be overridden."},
{q:"What happens if you set a span's status to Ok and then try to set it to Error?",o:["Error overwrites Ok","Ok stays — status cannot change after Ok is set","Both are recorded","An exception is thrown"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#set-status",e:"Once a span status is set to Ok, it is final. The spec says Ok is 'the highest priority' status — subsequent SetStatus calls (including Error) are ignored. This prevents instrumentation libraries from overriding an application's explicit success signal."},
{q:"Instrumentation libraries should depend on which OTel component?",o:["The SDK only","Both API and SDK","The API only","The Collector"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/overview/",e:"Instrumentation libraries must depend ONLY on the API (which is no-op by default). The SDK is chosen by the application owner. This separation allows swapping SDK implementations without changing instrumentation code."},
{q:"What is the default value of OTEL_TRACES_SAMPLER?",o:["always_on","always_off","traceidratio","parentbased_always_on"],a:3,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/",e:"Default is parentbased_always_on: if parent span is sampled, sample this too; if no parent, always sample. This maintains trace integrity across services while collecting everything by default."},
{q:"What is the default value of OTEL_PROPAGATORS?",o:["b3,jaeger","tracecontext,baggage","tracecontext","w3c,baggage"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/",e:"Default propagators are 'tracecontext,baggage' — W3C TraceContext for trace/span IDs and W3C Baggage for request-scoped context. Other options include b3 (Zipkin) and jaeger."},
{q:"What is the default OTEL_BSP_MAX_EXPORT_BATCH_SIZE?",o:["128","256","512","1024"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/",e:"BatchSpanProcessor defaults: max batch size = 512, schedule delay = 5000ms, max queue size = 2048, export timeout = 30000ms. These balance throughput with memory usage."},
{q:"What is the default OTEL_BSP_MAX_QUEUE_SIZE?",o:["512","1024","2048","4096"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/",e:"The BSP max queue size defaults to 2048. When the queue is full, new spans are dropped. Monitor queue utilization to detect backpressure from slow exporters."},
{q:"OTEL_ATTRIBUTE_COUNT_LIMIT defaults to?",o:["32","64","128","256"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/",e:"Default is 128 attributes per span, event, or link. Attributes beyond this limit are dropped. OTEL_SPAN_EVENT_COUNT_LIMIT and OTEL_SPAN_LINK_COUNT_LIMIT also default to 128."},
{q:"Which instrument should you use for 'number of currently active HTTP requests'?",o:["Counter","Histogram","UpDownCounter","ObservableGauge"],a:2,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/",e:"Active requests go up (new request) and down (request completes), so UpDownCounter is correct. Counter is monotonic (up only). Gauge is for point-in-time snapshots via callback. Histogram is for distributions."},
{q:"Which instrument should you use to report process CPU time read from the OS?",o:["Counter","ObservableCounter","Histogram","Gauge"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/#asynchronous-counter",e:"Process CPU time is monotonically increasing and read from the OS (not pushed inline). ObservableCounter uses a callback to report the cumulative total; the SDK computes deltas. Regular Counter requires inline Add() calls."},
{q:"What are exemplars in OTel metrics?",o:["Example metric names from the spec","Sample trace IDs linked to metric data points","Template metric configurations","Test data for metric validation"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/data-model/#exemplars",e:"Exemplars link metrics to traces by attaching sample trace/span IDs to metric data points. This enables 'click this latency spike to see the exact trace that caused it' in backends that support exemplars."},
{q:"What can Views in the Metrics SDK NOT do?",o:["Rename an instrument","Drop specific attributes","Change aggregation type","Add new attributes not present in the measurement"],a:3,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/sdk/#view",e:"Views can rename instruments, drop/allow-list attributes, and change aggregation. They cannot add attributes that weren't recorded with the measurement — Views filter and transform, they don't enrich."},
{q:"What does ForceFlush() do on a TracerProvider?",o:["Restarts the provider","Exports all buffered spans immediately","Clears the span buffer without exporting","Resets sampling decisions"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/#forceflush-1",e:"ForceFlush tells all registered SpanProcessors to export buffered spans immediately. Use before process exit to avoid losing telemetry. Shutdown() calls ForceFlush then releases resources permanently."},
{q:"After calling Shutdown() on TracerProvider, what happens to new spans?",o:["They queue until restart","They are silently dropped (provider becomes no-op)","An error is thrown","They export normally"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/#shutdown",e:"After Shutdown(), the provider becomes a no-op. New spans are silently discarded. This is by design — the provider has released its resources. Always call Shutdown() only during graceful process termination."},
{q:"Span links are used to?",o:["Replace parent-child relationships","Connect spans across traces without parent-child relationship","Export spans faster","Sample spans based on attributes"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#specifying-links",e:"Links connect causally related spans that are NOT in a parent-child relationship. Common use: a batch processor span links to all the individual request spans it processes, even if they're in different traces."},
{q:"RecordException on a span does what?",o:["Sets span status to Error and ends the span","Adds an event with exception.type, exception.message, exception.stacktrace","Drops the span from export","Triggers an alert"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#record-exception",e:"RecordException adds an 'exception' event with standard attributes (type, message, stacktrace). It does NOT automatically set the span status to Error — you must call SetStatus(Error) separately."},
{q:"What is Cumulative temporality in metrics?",o:["Each export contains only the change since last export","Each export contains the total since process start","Values are averaged over time","Only the last value is kept"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/data-model/#temporality",e:"Cumulative temporality means each data point includes the total accumulated value since process start. The receiver is stateless — it always has the full picture. Delta temporality sends only changes since last export (receiver must be stateful)."},
{q:"Prometheus supports which metric temporality?",o:["Delta only","Cumulative only","Both Delta and Cumulative","Neither — Prometheus has its own model"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/data-model/#temporality",e:"Prometheus only supports Cumulative temporality. Its pull model means each scrape gets the total value. The OTLP exporter defaults to Cumulative for counters to match Prometheus expectations."},
{q:"How many total metric instrument types does OTel define (sync + async)?",o:["4","5","6","7"],a:3,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/metrics/api/",e:"7 instruments: Sync — Counter, UpDownCounter, Histogram (3). Async — ObservableCounter, ObservableUpDownCounter, ObservableGauge (3). Plus Gauge was added as the 7th (sync gauge is newer). Total = 7."},
{q:"The Tracer's 'name' parameter should be set to?",o:["The service name","The instrumentation library name","The backend vendor name","Any unique string"],a:1,cat:"OTel API & SDK",u:"https://opentelemetry.io/docs/specs/otel/trace/api/#get-a-tracer",e:"The Tracer name should be the instrumentation library name (e.g., '@opentelemetry/instrumentation-http'). This identifies the InstrumentationScope. Service name belongs in the Resource, not the Tracer."},

// ─── NEW: OTel Collector quiz questions ───
{q:"What is the OpenTelemetry Collector Builder (ocb) used for?",o:["Building dashboards","Creating custom Collector distributions with selected components","Compiling OTLP protobuf","Generating SDK code"],a:1,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/custom-collector/",e:"ocb (OpenTelemetry Collector Builder) creates custom Collector binaries with only the components you need. Smaller binary, reduced attack surface, no unnecessary dependencies. Used when Contrib has too many or too few components."},
{q:"How do you validate a Collector config file without starting the Collector?",o:["otelcol check config.yaml","otelcol validate --config=config.yaml","otelcol --dry-run config.yaml","otelcol lint config.yaml"],a:1,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/",e:"'otelcol validate --config=config.yaml' checks syntax and semantic validity. It catches typos, missing required fields, invalid component references. Run this in CI/CD before deploying config changes."},
{q:"What syntax does the Collector use for environment variables in YAML config?",o:["$VAR","{{VAR}}","${env:VAR}","%VAR%"],a:2,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/#environment-variables",e:"Collector uses ${env:VAR_NAME} syntax with optional defaults: ${env:PORT:-4317}. Also supports ${file:path} to read secrets from files. This avoids hardcoding sensitive values in config."},
{q:"Which Collector component acts as BOTH an exporter and a receiver?",o:["Processor","Extension","Connector","Bridge"],a:2,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/connectors/",e:"Connectors are exporters from one pipeline and receivers into another. They bridge pipelines, enabling cross-signal workflows like counting spans to generate metrics (spanmetrics connector)."},
{q:"What does the Collector's 'resource' processor do?",o:["Limits CPU resources","Modifies resource attributes on telemetry","Creates new resources","Monitors resource usage"],a:1,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/",e:"The resource processor adds, updates, or deletes resource attributes (like service.name, deployment.environment). Different from the attributes processor which modifies span/metric attributes, not resource-level ones."},
{q:"For mTLS in the Collector, which three files are needed?",o:["cert_file, key_file, ca_file","public_key, private_key, root_cert","ssl_cert, ssl_key, ssl_ca","tls.crt, tls.key, tls.ca"],a:0,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/",e:"mTLS requires: cert_file (public certificate), key_file (private key), ca_file (CA certificate for verifying the peer). All three must be configured on both the receiver and exporter for mutual TLS authentication."},
{q:"Which receiver would you use to collect CPU and memory metrics from the host OS?",o:["prometheus","otlp","hostmetrics","systemd"],a:2,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/configuration/",e:"The hostmetrics receiver collects system-level metrics: CPU, memory, disk, network, filesystem, processes. It runs scrapers at configurable intervals. No external agent needed — the Collector collects directly from the OS."},
{q:"What is the difference between Core and Contrib Collector distributions?",o:["Core is open-source, Contrib is commercial","Core has minimal stable components, Contrib has community-maintained extras","Core is for traces, Contrib is for metrics","Core is newer, Contrib is legacy"],a:1,cat:"OTel Collector",u:"https://opentelemetry.io/docs/collector/distributions/",e:"Core contains minimal, well-tested components (otlp receiver/exporter, batch/memory_limiter processors). Contrib adds community receivers (kafka, filelog), processors (transform, tail_sampling), and exporters (datadog, splunk). Use ocb for custom builds."},

// ─── NEW: Observability Fundamentals quiz questions ───
{q:"In OTel HTTP semantic conventions, what replaced 'http.method'?",o:["http.verb","http.request.method","http.type","request.method"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/semconv/http/",e:"Semantic conventions v1.20+ renamed http.method to http.request.method, http.status_code to http.response.status_code, etc. The new names are more descriptive and follow a consistent namespace pattern."},
{q:"Which DB semantic convention attribute contains the actual SQL query?",o:["db.query","db.sql","db.statement","db.command"],a:2,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/semconv/database/",e:"db.statement contains the database query text. It should be sanitized to remove sensitive data (parameters). Other DB attributes: db.system (mysql/postgres), db.name (database name), db.operation (SELECT/INSERT)."},
{q:"OpenTelemetry was formed by merging which two projects?",o:["Prometheus and Grafana","Jaeger and Zipkin","OpenTracing and OpenCensus","Istio and Envoy"],a:2,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/what-is-opentelemetry/",e:"OpenTracing (Uber, 2016) provided a tracing API standard. OpenCensus (Google, 2018) provided tracing + metrics with exporters. They merged in 2019 under CNCF to form OpenTelemetry, combining the best of both."},
{q:"What does 'Stable' mean in OTel's signal maturity model?",o:["The feature is complete and will never change","The API is frozen and backward-compatible changes only","The feature is ready for testing","The feature is deprecated"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/status/",e:"Stable means the API is frozen — only backward-compatible changes are allowed. Instrumentation against a Stable API will not break. Beta means it may change. Experimental means it will change. Each signal per language has its own stability level."},
{q:"Resource attributes describe what?",o:["The instrumentation library","The entity producing telemetry (service, host, pod)","The backend destination","The sampling configuration"],a:1,cat:"Observability Fundamentals",u:"https://opentelemetry.io/docs/specs/otel/resource/sdk/",e:"Resource describes the entity producing telemetry: service.name, service.version, host.name, k8s.pod.name, deployment.environment. Set once at SDK init. InstrumentationScope describes the instrumentation library, which is different."},

{q:"What is schema_url used for in OTel?",o:["URL to download the OTel SDK","Identifies which version of semantic conventions the telemetry uses","Database schema for storing traces","URL for the Collector config schema"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/specs/otel/schemas/",e:"schema_url identifies the semantic convention version used. Backends can use it to auto-transform old attribute names to new ones (e.g., http.method → http.request.method). Set on Resource and InstrumentationScope."},
{q:"When an OTLP exporter receives a 503 status, what should happen?",o:["Data is permanently dropped","Retry with exponential backoff","Alert the operator immediately","Switch to a different exporter"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/specs/otel/protocol/exporter/",e:"503 (Service Unavailable) is retryable. The exporter retries with exponential backoff. Non-retryable errors (400 Bad Request, 401 Unauthorized) cause data to be dropped. The retry behavior is built into OTLP exporters."},
{q:"What is the default port for the Collector health_check extension?",o:["8888","4317","13133","55679"],a:2,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/configuration/",e:"health_check extension defaults to port 13133. Returns 200 when healthy. Used for Kubernetes liveness/readiness probes. Port 8888 is self-metrics, 4317 is OTLP gRPC, 55679 is zPages."},
{q:"A sampler cannot see attributes added later in the span's lifetime because?",o:["Sampling decisions can be changed after the fact","The sampling decision is made at span creation time, before most attributes are added","Attributes are stored separately from sampling","The SDK doesn't track attributes"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/specs/otel/trace/sdk/",e:"Head-based sampling decides at span start. Attributes added during the span's lifetime (like http.response.status_code) aren't visible to the sampler. This is why tail sampling (in the Collector, after seeing the full trace) can sample on error status but head sampling cannot."},
{q:"If a span ends but the context is still active in the parent scope, what happens?",o:["The context is automatically cleaned up","The ended span remains in context but new child spans see it as ended — no new children are created under it","An error is thrown","The span is re-opened"],a:1,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/specs/otel/trace/api/",e:"Ending a span does not remove it from context. The span stays in context but is ended. If you create a new span while the ended span is still current context, the new span's parent will be the ended span. Always manage context scope carefully."},
{q:"Which Collector self-metric indicates export failures?",o:["otelcol_receiver_refused_spans","otelcol_processor_dropped_spans","otelcol_exporter_send_failed_spans","otelcol_pipeline_error_count"],a:2,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/troubleshooting/",e:"otelcol_exporter_send_failed_spans tracks spans that failed to export. Monitor this alongside otelcol_exporter_sent_spans. A spike in failures indicates backend issues, network problems, or auth failures."},
{q:"What is the correct pipeline order when processors include memory_limiter, batch, and attributes?",o:["batch, attributes, memory_limiter","attributes, memory_limiter, batch","memory_limiter, attributes, batch","memory_limiter, batch, attributes"],a:2,cat:"Pipeline Debugging",u:"https://opentelemetry.io/docs/collector/configuration/",e:"memory_limiter MUST be first to prevent OOM before any processing. Then attribute modification (attributes), then batching (batch) right before export. Batch should typically be last processor since it groups data for efficient export."}
];
