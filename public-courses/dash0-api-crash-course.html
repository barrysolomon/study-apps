<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dash0 API Crash Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}.header small{font-size:12px;color:#6b7280}
.badge{background:rgba(16,185,129,.15);color:#6ee7b7;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
.card{border-radius:16px;padding:20px;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;-webkit-user-select:none}
.card.question{background:#1f2937;border:2px solid #374151}
.card.answer{background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.card-text{font-size:17px;line-height:1.5}
.card-hint{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1;filter:none}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#1f2937;color:#d1d5db}.btn-secondary:hover{background:#374151}
.btn-danger{background:rgba(239,68,68,.2);border:2px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:rgba(16,185,129,.2);border:2px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn-full{width:100%;padding:14px;font-size:15px}
.progress-bar{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{width:100%;background:#1f2937;border-radius:999px;height:8px}
.progress-fill{background:#10b981;height:8px;border-radius:999px;transition:width .5s}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.pill.active{background:#10b981;color:#fff}.pill:not(.active){background:#1f2937;color:#9ca3af}
.quiz-option{text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.quiz-option.correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.dimmed{background:rgba(31,41,55,.5);border-color:#1f2937;color:#4b5563}
.scenario-box{border-radius:16px;padding:20px;margin-bottom:16px}
.scenario-q{background:rgba(239,68,68,.08);border:2px solid rgba(153,27,27,.4)}
.scenario-a{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3)}
.scenario-reveal{background:#1f2937;border:2px solid #374151;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.timer{font-size:28px;font-family:monospace;font-weight:700}
.timer.green{color:#10b981}.timer.yellow{color:#f59e0b}.timer.red{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}.stat-val{font-size:20px;font-weight:700}.stat-label{font-size:11px;color:#6b7280}
.focus-box{background:#1f2937;border-radius:16px;padding:16px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
.results-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.grade{font-size:56px;font-weight:700;text-align:center;margin-bottom:8px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:50vh}
.mgmt-section{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:16px}
.mgmt-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#d1d5db}
.mgmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.mgmt-row:last-child{border-bottom:none}
.mgmt-row .label{font-size:13px;color:#9ca3af}
.mgmt-row .value{font-size:13px;font-weight:600;color:#fff}
.btn-outline{background:transparent;border:2px solid #374151;color:#9ca3af;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#6b7280;color:#d1d5db}
.btn-danger-solid{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-danger-solid:hover{background:#b91c1c}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-box{background:#1f2937;border:2px solid #374151;border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151;font-size:12px}
.history-item:last-child{border-bottom:none}
.export-box{background:#0d1117;border:1px solid #374151;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#6ee7b7;word-break:break-all;max-height:120px;overflow-y:auto;margin-top:8px}
.source-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.source-link:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.source-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.res-group{margin-bottom:20px}
.res-group h4{font-size:13px;font-weight:600;color:#6ee7b7;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.res-link{display:block;padding:10px 12px;border-radius:10px;background:#1f2937;margin-bottom:6px;text-decoration:none;color:#93c5fd;font-size:13px;font-weight:500;border:1px solid #374151;transition:all .2s}
.res-link:hover{background:#374151;border-color:#4b5563}
.res-link small{display:block;color:#6b7280;font-size:11px;font-weight:400;margin-top:2px}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.lesson-card{background:#1f2937;border-radius:16px;padding:16px;cursor:pointer;border:2px solid #374151;transition:all .2s}
.lesson-card:hover{border-color:#4b5563}
.lesson-card.completed{border-color:rgba(16,185,129,.3)}
.lesson-num{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.lesson-title{font-size:15px;font-weight:600;margin:4px 0}
.lesson-meta{font-size:12px;color:#6b7280;display:flex;gap:12px}
.lesson-body{padding:0}
.lesson-section{margin-bottom:20px}
.lesson-section h4{font-size:13px;font-weight:600;color:#6ee7b7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lesson-text{font-size:14px;color:#d1d5db;line-height:1.7}
.lesson-text p{margin-bottom:10px}
.lesson-highlight{background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:10px 14px;border-radius:0 10px 10px 0;margin:10px 0;font-size:13px;color:#d1fae5;line-height:1.5}
.lesson-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.lesson-compare-item{background:#0d1117;border-radius:10px;padding:10px;font-size:12px;line-height:1.5}
.lesson-compare-item .compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.exercise-box{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.exercise-box .ex-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.exercise-box .ex-task{font-size:13px;color:#ddd6fe;line-height:1.5;margin-bottom:8px}
.exercise-box .ex-hint{font-size:12px;color:#6b7280;font-style:italic}
.exercise-check{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
.exercise-check .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #374151;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.exercise-check .checkbox.checked{background:#10b981;border-color:#10b981}
.exercise-check .ex-text{font-size:13px;color:#d1d5db}
.ex-steps-toggle{background:none;border:1px solid rgba(139,92,246,.25);color:#a78bfa;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;margin-top:6px;font-family:inherit;transition:all .2s}
.ex-steps-toggle:hover{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.4)}
.ex-steps{display:none;margin-top:8px;padding:10px 12px;background:rgba(139,92,246,.04);border-radius:8px;border:1px solid rgba(139,92,246,.12)}
.ex-steps.open{display:block}
.ex-steps ol{margin:0;padding-left:20px;font-size:13px;color:#c4b5fd;line-height:1.7}
.ex-steps li{margin-bottom:4px}
.ex-steps code{background:#1f2937;padding:2px 6px;border-radius:4px;font-size:12px;color:#a5f3fc}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}
.sched-item{background:#1f2937;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #374151;transition:all .2s}
.sched-item.today{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.sched-item.past{opacity:.5}
.sched-item.done{border-color:rgba(16,185,129,.3);opacity:.7}
.sched-item .si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sched-item .si-date{font-size:11px;color:#6b7280;font-weight:600}
.sched-item .si-dur{font-size:10px;color:#4b5563;background:#0d1117;padding:2px 8px;border-radius:6px}
.sched-item .si-title{font-size:14px;font-weight:600;color:#e5e7eb;margin-bottom:2px}
.sched-item .si-desc{font-size:12px;color:#9ca3af;line-height:1.4}
.sched-item .si-actions{display:flex;gap:6px;margin-top:8px}
.sched-item .si-actions button{padding:6px 10px;border-radius:8px;border:none;font-size:11px;font-weight:500;cursor:pointer}
.cp-item{background:rgba(251,191,36,.06);border:2px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;margin-bottom:8px}
.cp-item.hit{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.cp-item .cp-target{font-size:14px;font-weight:600;color:#fde68a}
.cp-item.hit .cp-target{color:#6ee7b7;text-decoration:line-through}
.cp-item .cp-date{font-size:11px;color:#6b7280}
.form-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.form-sheet{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.form-sheet h3{font-size:16px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:14px;font-family:inherit}
.form-field textarea{min-height:60px;resize:vertical}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#10b981}
.ask-box{background:rgba(139,92,246,.06);border:2px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;margin-top:16px}
.ask-box .ask-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ask-box .ask-row{display:flex;gap:8px}
.ask-box input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:13px;font-family:inherit}
.ask-box input:focus{outline:none;border-color:#a78bfa}
.ask-box input::placeholder{color:#4b5563}
.ask-box button{padding:10px 14px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ask-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(124,58,237,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ics-panel{background:#111827;border:2px solid #374151;border-radius:16px;padding:16px;margin-bottom:16px}
.ics-panel h4{font-size:13px;font-weight:600;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ics-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ics-filters button{padding:5px 10px;border-radius:8px;border:2px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.ics-filters button.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#93c5fd}
.ics-list{max-height:320px;overflow-y:auto;margin-bottom:12px}
.ics-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.ics-item:last-child{border-bottom:none}
.ics-check{width:20px;height:20px;border-radius:5px;border:2px solid #374151;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:12px;color:transparent}
.ics-check.on{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.ics-item-info{flex:1;min-width:0}
.ics-item-title{font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ics-item-date{font-size:11px;color:#6b7280}
.ics-actions{display:flex;gap:8px;margin-top:4px}
.ics-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.ics-dl{background:#3b82f6;color:#fff}
.ics-dl:hover{background:#2563eb}
.ics-count{font-size:12px;color:#6b7280;margin-bottom:8px}
@media(min-width:600px){
body{max-width:960px;padding:0 24px}
.header{padding:20px 0 12px}
.header h1{font-size:22px}
.content{padding:20px 0 100px}
.nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}
.nav button{min-width:auto;padding:8px 14px;font-size:12px;flex-direction:row;gap:6px;border-radius:10px}
.nav button span{font-size:16px;margin-bottom:0}
.stat-grid{grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{padding:16px}
.stat-val{font-size:22px}
.card{max-width:640px;margin:0 auto;min-height:240px;padding:28px}
.card-text{font-size:18px}
.quiz-option{font-size:15px;padding:16px 20px}
.scenario-box{max-width:700px}
.lesson-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.lesson-card{margin-bottom:0}
.mgmt-section{max-width:700px}
.form-sheet{max-width:560px;border-radius:20px;margin:auto}
.form-overlay{align-items:center}
.res-group{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.res-group h4{grid-column:1/-1}
.focus-box{max-width:700px}
.sched-item{max-width:700px}
.ics-panel{max-width:700px}
.cp-item{max-width:700px}
.pills{flex-wrap:wrap}
.ask-box{max-width:640px;margin:16px auto 0}
.confirm-box{max-width:400px}
.source-links{justify-content:flex-start}
}
@media(min-width:800px){
body{max-width:1100px}
.nav{max-width:1100px}
.stat-grid{grid-template-columns:repeat(4,1fr)}
.lesson-grid{grid-template-columns:repeat(3,1fr)}
.card{max-width:700px}
.res-group{grid-template-columns:repeat(3,1fr)}
}
.role-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.role-picker{max-width:520px;width:92%;padding:28px 20px;text-align:center}
.role-picker h2{font-size:22px;font-weight:700;margin-bottom:6px}
.role-picker .rp-sub{font-size:14px;color:#9ca3af;margin-bottom:24px;line-height:1.5}
.role-cards{display:flex;flex-direction:column;gap:12px}
.role-card{background:#1f2937;border:2px solid #374151;border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;text-align:left}
.role-card:hover{border-color:#10b981;background:#263040}
.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-badge.core{background:rgba(16,185,129,.15);color:#6ee7b7}
.role-badge.bonus{background:rgba(107,114,128,.15);color:#6b7280}
.role-current{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:#1f2937;border:1px solid #374151;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:#d1d5db}
.role-current:hover{border-color:#10b981;background:#263040}
.fs-s .card-text,.fs-s .lesson-text,.fs-s .quiz-option,.fs-s .scenario-box,.fs-s .scenario-q,.fs-s .scenario-a,.fs-s .focus-text{font-size:13px}
.fs-m .card-text,.fs-m .lesson-text,.fs-m .quiz-option,.fs-m .scenario-box,.fs-m .scenario-q,.fs-m .scenario-a,.fs-m .focus-text{font-size:15px}
.fs-l .card-text,.fs-l .lesson-text,.fs-l .quiz-option,.fs-l .scenario-box,.fs-l .scenario-q,.fs-l .scenario-a,.fs-l .focus-text{font-size:17px}
.fs-xl .card-text,.fs-xl .lesson-text,.fs-xl .quiz-option,.fs-xl .scenario-box,.fs-xl .scenario-q,.fs-xl .scenario-a,.fs-xl .focus-text{font-size:20px}
.code-block{position:relative;background:#0d1117;border:1px solid #374151;border-radius:10px;padding:14px 16px;margin:10px 0;font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:13px;line-height:1.6;color:#e6edf3;overflow-x:auto;white-space:pre;-webkit-overflow-scrolling:touch}
.code-block:hover .code-copy{opacity:1}

const FLASHCARDS=[
// Fundamentals (8)
{f:"What are the three API categories in Dash0?",b:"1. OTLP Ingestion (traces/metrics/logs via gRPC/HTTP)\n2. Prometheus Query API (PromQL over HTTP)\n3. Management API (dashboards, check-rules, datasets — CRUD)",c:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What transport protocols does Dash0 support for OTLP ingestion?",b:"Both gRPC (port 4317) and HTTP (port 4318). HTTP uses JSON or Protobuf payloads. gRPC uses Protobuf. Both require TLS.",c:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the base domain pattern for Dash0 region endpoints?",b:"ingress.<region>.dash0.com — e.g. ingress.eu-west-1.dash0.com for EU West. Each region has its own endpoint for ingestion and API calls.",c:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/key-concepts/endpoints"},
{f:"What signal types can be sent to the Dash0 OTLP HTTP endpoint?",b:"Three signals:\n• /v1/traces — distributed traces\n• /v1/metrics — metrics\n• /v1/logs — logs\nAll at https://ingress.<region>.dash0.com",c:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How does Dash0 relate to the OpenTelemetry standard?",b:"Dash0 is a native OTel backend. It accepts OTLP (OpenTelemetry Protocol) directly — no proprietary agent or SDK required. Any OTel-instrumented app can send data to Dash0 immediately.",c:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What query language does the Dash0 query API use?",b:"PromQL (Prometheus Query Language). Dash0 exposes a Prometheus-compatible query API, so existing PromQL knowledge and tooling (Grafana, recording rules, etc.) works natively.",c:"Fundamentals",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What format does the Dash0 Management API use for dashboards?",b:"Perses — an open-source dashboard format. Dashboards are defined as JSON/YAML objects following the Perses schema, enabling version control and GitOps workflows.",c:"Fundamentals",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is observability-as-code in the Dash0 context?",b:"Storing dashboards, alert rules, and dataset configs as YAML/JSON in Git. Use the Management API (or CLI) to apply/sync them — enabling CI/CD, code review, and reproducible observability infrastructure.",c:"Fundamentals",d:2,u:"https://www.dash0.com/documentation/dash0/api"},

// Auth & Endpoints (7)
{f:"What HTTP header is used for authentication when sending OTLP data to Dash0?",b:"Authorization: Bearer <token>\nExample:\ncurl -H 'Authorization: Bearer ds0_...' https://ingress.eu-west-1.dash0.com/v1/logs",c:"Auth & Endpoints",d:1,u:"https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens"},
{f:"Where are Dash0 auth tokens created?",b:"In the Dash0 UI under Settings > Auth Tokens. Tokens are scoped per organization and can have different permissions. They look like ds0_<random>.",c:"Auth & Endpoints",d:1,u:"https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens"},
{f:"What is the OTLP gRPC endpoint and port for Dash0 EU West?",b:"Host: ingress.eu-west-1.dash0.com\nPort: 4317 (gRPC)\nPort: 4318 (HTTP)\nAlways TLS. Set via OTEL_EXPORTER_OTLP_ENDPOINT env var.",c:"Auth & Endpoints",d:1,u:"https://www.dash0.com/documentation/dash0/key-concepts/endpoints"},
{f:"What environment variables configure the OTel SDK to send to Dash0?",b:"OTEL_EXPORTER_OTLP_ENDPOINT=https://ingress.eu-west-1.dash0.com\nOTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer ds0_...\nOTEL_SERVICE_NAME=my-service",c:"Auth & Endpoints",d:1,u:"https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens"},
{f:"What is the difference between the ingestion endpoint and the API endpoint?",b:"Ingestion endpoint (ingress.<region>.dash0.com): receives OTLP telemetry data\nAPI endpoint (api.<region>.dash0.com): Management API for dashboards/rules, Prometheus query API. Different auth header format may apply.",c:"Auth & Endpoints",d:2,u:"https://www.dash0.com/documentation/dash0/key-concepts/endpoints"},
{f:"How do you authenticate to the Dash0 Prometheus query API?",b:"Authorization: Bearer <token> header — same token type as OTLP ingestion. Example:\ncurl -H 'Authorization: Bearer ds0_...' 'https://api.eu-west-1.dash0.com/prometheus/api/v1/query?query=up'",c:"Auth & Endpoints",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What should you do if an API call returns 401 Unauthorized?",b:"Check: 1) Token is valid and not expired. 2) Token has correct permissions for the operation. 3) Correct Authorization: Bearer header format. 4) Right regional endpoint being used.",c:"Auth & Endpoints",d:2,u:"https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens"},

// OTLP Ingestion (10)
{f:"What is the OTLP HTTP path for sending traces to Dash0?",b:"POST https://ingress.eu-west-1.dash0.com/v1/traces\nContent-Type: application/json (JSON-encoded OTLP) or application/x-protobuf (binary Protobuf)",c:"OTLP Ingestion",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the OTLP HTTP path for sending metrics to Dash0?",b:"POST https://ingress.eu-west-1.dash0.com/v1/metrics\nSame auth header pattern. Metrics use OTLP MetricsExportRequest format.",c:"OTLP Ingestion",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the OTLP HTTP path for sending logs to Dash0?",b:"POST https://ingress.eu-west-1.dash0.com/v1/logs\nLogs use OTLP LogsExportRequest. Useful for structured log ingestion alongside traces.",c:"OTLP Ingestion",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How do you send a test log to Dash0 via curl?",b:"curl -X POST https://ingress.eu-west-1.dash0.com/v1/logs \\\n  -H 'Authorization: Bearer ds0_YOUR_TOKEN' \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"resourceLogs\":[{\"resource\":{\"attributes\":[{\"key\":\"service.name\",\"value\":{\"stringValue\":\"test\"}}]},\"scopeLogs\":[{\"logRecords\":[{\"body\":{\"stringValue\":\"hello from curl\"}}]}]}]}'",c:"OTLP Ingestion",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the difference between gRPC and HTTP OTLP ingestion?",b:"gRPC (port 4317): binary Protobuf, multiplexed streams, lower overhead, best for high-volume production.\nHTTP (port 4318): JSON or Protobuf, easier to debug with curl, works through HTTP proxies and firewalls.",c:"OTLP Ingestion",d:2,u:"https://opentelemetry.io/docs/specs/otlp/"},
{f:"What OTel Collector exporter config targets Dash0?",b:"exporters:\n  otlp:\n    endpoint: ingress.eu-west-1.dash0.com:4317\n    headers:\n      Authorization: Bearer ds0_YOUR_TOKEN\n    tls:\n      insecure: false",c:"OTLP Ingestion",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What HTTP status code does Dash0 return on successful OTLP ingestion?",b:"HTTP 200 OK with an empty ExportResponse body ({}). Any non-2xx response indicates an error — check auth (401), payload format (400), or rate limits (429).",c:"OTLP Ingestion",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What resource attributes should you always include in OTLP payloads?",b:"At minimum: service.name (required for proper routing/display). Recommended: service.version, service.namespace, deployment.environment, host.name, telemetry.sdk.name, telemetry.sdk.version.",c:"OTLP Ingestion",d:2,u:"https://opentelemetry.io/docs/specs/semconv/resource/"},
{f:"How does Prometheus remote_write send metrics to Dash0?",b:"Configure Prometheus remote_write:\nremote_write:\n  - url: https://ingress.eu-west-1.dash0.com/prometheus/remote/write\n    authorization:\n      credentials: ds0_YOUR_TOKEN",c:"OTLP Ingestion",d:3,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the OTLP Protobuf content type for HTTP ingestion?",b:"Content-Type: application/x-protobuf\nAccept: application/x-protobuf\nThis is more efficient than JSON but requires Protobuf serialization. Most OTel SDKs use Protobuf by default.",c:"OTLP Ingestion",d:3,u:"https://opentelemetry.io/docs/specs/otlp/"},

// Prometheus Queries (9)
{f:"What is the Dash0 Prometheus instant query endpoint?",b:"GET/POST https://api.eu-west-1.dash0.com/prometheus/api/v1/query\nParams: query=<PromQL>, time=<unix-timestamp>\nReturns current value at a point in time.",c:"Prometheus Queries",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the Dash0 Prometheus range query endpoint?",b:"GET/POST https://api.eu-west-1.dash0.com/prometheus/api/v1/query_range\nParams: query=<PromQL>, start=<ts>, end=<ts>, step=<duration>\nReturns a time series matrix.",c:"Prometheus Queries",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"Write a curl command for an instant PromQL query against Dash0.",b:"curl -G 'https://api.eu-west-1.dash0.com/prometheus/api/v1/query' \\\n  -H 'Authorization: Bearer ds0_YOUR_TOKEN' \\\n  --data-urlencode 'query=up' \\\n  --data-urlencode 'time=1700000000'",c:"Prometheus Queries",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What does the Prometheus API response envelope look like?",b:"{\"status\":\"success\",\"data\":{\"resultType\":\"vector\",\"result\":[{\"metric\":{\"__name__\":\"up\",\"job\":\"myapp\"},\"value\":[1700000000,\"1\"]}]}}\nresultType can be: vector, matrix, scalar, string",c:"Prometheus Queries",d:2,u:"https://prometheus.io/docs/prometheus/latest/querying/api/"},
{f:"How do you query label names and values via the Dash0 Prometheus API?",b:"Label names: GET /prometheus/api/v1/labels\nLabel values: GET /prometheus/api/v1/label/<name>/values\nBoth support start/end time params and match[] series selectors.",c:"Prometheus Queries",d:2,u:"https://prometheus.io/docs/prometheus/latest/querying/api/"},
{f:"What PromQL function calculates per-second rate from a counter?",b:"rate(metric_name[5m]) — computes average per-second rate over 5-minute window. Use irate() for instant rate. Always use rate/irate with counters, never raw values.",c:"Prometheus Queries",d:2,u:"https://prometheus.io/docs/prometheus/latest/querying/functions/"},
{f:"How do you filter a PromQL query by label in a Dash0 API call?",b:"Use label matchers in the query: http_requests_total{service=\"checkout\",status_code=\"200\"}\nEncode the full query string URL-safe: --data-urlencode 'query=http_requests_total{service=\"checkout\"}'",c:"Prometheus Queries",d:2,u:"https://prometheus.io/docs/prometheus/latest/querying/basics/"},
{f:"What is the Prometheus API /series endpoint used for?",b:"GET /prometheus/api/v1/series — returns all time series matching a given selector.\nParams: match[]={job=\"myapp\"}, start, end\nUseful for discovering what metrics exist.",c:"Prometheus Queries",d:3,u:"https://prometheus.io/docs/prometheus/latest/querying/api/"},
{f:"How do you run a range query to plot HTTP error rate over the last hour?",b:"curl -G 'https://api.eu-west-1.dash0.com/prometheus/api/v1/query_range' \\\n  -H 'Authorization: Bearer ds0_...' \\\n  --data-urlencode 'query=rate(http_requests_total{status=~\"5..\"}[5m])' \\\n  --data-urlencode 'start=<now-3600>' \\\n  --data-urlencode 'end=<now>' \\\n  --data-urlencode 'step=60'",c:"Prometheus Queries",d:3,u:"https://www.dash0.com/documentation/dash0/api"},

// Management API (9)
{f:"What does the Dash0 Management API manage?",b:"Dashboards (Perses format), check rules (alerting/SLO rules), and dataset configuration. All CRUD operations over REST — GET, POST, PUT, DELETE.",c:"Management API",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What HTTP method and path lists all dashboards in Dash0?",b:"GET https://api.eu-west-1.dash0.com/api/v1/dashboards\nReturns an array of dashboard objects in Perses JSON format.",c:"Management API",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How do you create a new dashboard via the Management API?",b:"POST https://api.eu-west-1.dash0.com/api/v1/dashboards\nContent-Type: application/json\nBody: Perses dashboard JSON\nReturns created dashboard with assigned ID.",c:"Management API",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the Perses dashboard format?",b:"Open-source dashboard specification from CNCF. Dashboards are JSON objects with metadata, spec.display, spec.panels, and spec.variables. Panels reference data sources and use PromQL queries.",c:"Management API",d:2,u:"https://perses.dev/perses/docs/overview/"},
{f:"How do you update an existing dashboard via the Management API?",b:"PUT https://api.eu-west-1.dash0.com/api/v1/dashboards/<dashboard-id>\nBody: full updated Perses JSON. Returns the updated dashboard. Use GET first to retrieve current state.",c:"Management API",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is a check rule in Dash0?",b:"An alerting rule (similar to Prometheus alerting rules). Defined with a PromQL expression, threshold, duration, and labels/annotations. When expression fires, it triggers an alert.",c:"Management API",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What HTTP path manages check rules in the Dash0 API?",b:"GET/POST /api/v1/check-rules — list/create\nGET/PUT/DELETE /api/v1/check-rules/<id> — read/update/delete\nPayload uses Prometheus alerting rule format.",c:"Management API",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"Write a minimal Dash0 check rule creation request.",b:"POST /api/v1/check-rules\n{\n  \"metadata\":{\"name\":\"high-error-rate\"},\n  \"spec\":{\n    \"expr\":\"rate(http_errors_total[5m]) > 0.05\",\n    \"for\":\"2m\",\n    \"labels\":{\"severity\":\"warning\"},\n    \"annotations\":{\"summary\":\"High error rate detected\"}\n  }\n}",c:"Management API",d:3,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How do you delete a dashboard via the Management API?",b:"DELETE https://api.eu-west-1.dash0.com/api/v1/dashboards/<dashboard-id>\nReturns 204 No Content on success. Irreversible — export the JSON first if you need a backup.",c:"Management API",d:3,u:"https://www.dash0.com/documentation/dash0/api"},

// Observability-as-Code (7)
{f:"What is the GitOps workflow for Dash0 dashboards?",b:"Store dashboard JSON/YAML in Git. In CI/CD pipeline: 1) Validate schema, 2) GET existing dashboard, 3) PUT (update) or POST (create) via Management API. Use branch-based review for dashboard changes.",c:"Observability-as-Code",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How do you export all dashboards for backup or migration?",b:"Script a GET /api/v1/dashboards call, iterate the response array, and write each dashboard JSON to a file. Use the dashboard metadata.name as the filename.",c:"Observability-as-Code",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What tool can deploy Dash0 resources as code alongside infrastructure?",b:"The Dash0 Terraform provider (registry.terraform.io/providers/dash0hq/dash0). Manages dashboards and check-rules as Terraform resources — integrates with existing IaC workflows.",c:"Observability-as-Code",d:2,u:"https://registry.terraform.io/providers/dash0hq/dash0"},
{f:"How would you script a dashboard deployment in bash?",b:"DASHBOARD_JSON=$(cat dashboard.json)\ncurl -X PUT \\\n  https://api.eu-west-1.dash0.com/api/v1/dashboards/my-dashboard \\\n  -H 'Authorization: Bearer ds0_...' \\\n  -H 'Content-Type: application/json' \\\n  -d \"$DASHBOARD_JSON\"",c:"Observability-as-Code",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How does the Dash0 CLI relate to the Management API?",b:"The CLI is a thin wrapper over the Management API. Every dash0 apply, dash0 get, dash0 delete command maps to a corresponding REST API call. The CLI adds convenience: YAML support, diffing, dry-run.",c:"Observability-as-Code",d:2,u:"https://github.com/dash0hq/dash0-cli"},
{f:"What is the benefit of version-controlling Dash0 dashboards in Git?",b:"Enables: code review for dashboard changes, rollback via git revert, environment promotion (dev → staging → prod), disaster recovery, and team collaboration on observability configurations.",c:"Observability-as-Code",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How do you implement a CI/CD check for dashboard schema validity?",b:"Use the Perses CLI or JSON Schema validation. In GitHub Actions: install perses CLI, run perses lint dashboard.json. This catches broken PromQL or invalid panel configs before deployment.",c:"Observability-as-Code",d:3,u:"https://perses.dev/perses/docs/overview/"},

// Integrations (8)
{f:"How does Grafana connect to Dash0 as a data source?",b:"Add a Prometheus data source in Grafana. URL: https://api.eu-west-1.dash0.com/prometheus\nAuth: Bearer token in Custom HTTP Headers: Authorization: Bearer ds0_...\nAll PromQL queries then run against Dash0.",c:"Integrations",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is Prometheus remote_write and how does it integrate with Dash0?",b:"Prometheus remote_write streams metrics from a local Prometheus server to a remote backend. Point it at Dash0's remote_write endpoint with Bearer auth to ship all Prometheus metrics to Dash0.",c:"Integrations",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How does an OpenTelemetry Collector send to Dash0?",b:"Use the otlp exporter:\nexporters:\n  otlp:\n    endpoint: ingress.eu-west-1.dash0.com:4317\n    headers:\n      Authorization: Bearer ds0_...\nRoute pipelines to this exporter.",c:"Integrations",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the Dash0 Operator for Kubernetes?",b:"A Kubernetes operator that automatically instruments workloads with OpenTelemetry and configures them to send telemetry to Dash0. No manual SDK setup required — just annotate namespaces or pods.",c:"Integrations",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How do you configure a Node.js app to send traces to Dash0 without code changes?",b:"Use the Dash0 Kubernetes Operator (zero-code injection) or set environment variables:\nOTEL_EXPORTER_OTLP_ENDPOINT=https://ingress.eu-west-1.dash0.com\nOTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer ds0_...\nOTEL_SERVICE_NAME=my-node-app\nThen use @opentelemetry/auto-instrumentations-node.",c:"Integrations",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How does the Perses Grafana plugin relate to Dash0?",b:"Dash0 uses the Perses dashboard format. A Perses Grafana plugin allows rendering Perses dashboards inside Grafana. This means Dash0 dashboards can be viewed in Grafana without re-creating them.",c:"Integrations",d:3,u:"https://perses.dev/perses/docs/overview/"},
{f:"What SDK languages have auto-instrumentation support for Dash0?",b:"Any OTel-supported language works: Java, Node.js, Python, Go, .NET, Ruby, PHP. Use official OpenTelemetry auto-instrumentation packages — Dash0 is a standard OTLP backend, no proprietary SDK needed.",c:"Integrations",d:2,u:"https://opentelemetry.io/docs/instrumentation/"},
{f:"How does alerting integrate with external systems via Dash0?",b:"Dash0 check rules fire alerts that can be routed via notification channels (PagerDuty, Slack, email, webhooks). Configure notification channels in Dash0 settings — the Management API manages the rules, the UI manages routing.",c:"Integrations",d:3,u:"https://www.dash0.com/documentation/dash0/api"},

// Pitch & Positioning (7)
{f:"How do you explain Dash0's API-first approach to a prospect?",b:"Every Dash0 action is API-accessible. Teams can automate dashboard deployment, manage alert rules in Git, and query metrics programmatically — making observability a first-class part of the software delivery pipeline.",c:"Pitch & Positioning",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"Why is Dash0's native OTLP support a competitive advantage?",b:"No vendor lock-in. Teams use standard OpenTelemetry SDKs and can switch backends without re-instrumenting. Compared to Datadog/New Relic which require proprietary agents, Dash0's OTLP-native approach means zero migration cost.",c:"Pitch & Positioning",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How does Dash0's Prometheus compatibility help existing customers?",b:"Teams already running Prometheus can point remote_write at Dash0 and immediately get long-term storage, better UI, and alerting — without replacing their existing Prometheus setup or rewriting queries.",c:"Pitch & Positioning",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What is the value proposition of the Dash0 Management API vs. UI-only tools?",b:"API access enables: GitOps for dashboards, automated dashboard promotion across environments, integration into existing DevOps pipelines, and programmatic audit/compliance. UI-only tools create config drift and manual toil.",c:"Pitch & Positioning",d:1,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How do you position Dash0 against Datadog's API?",b:"Datadog has a large API surface but requires proprietary agents and charges per host/metric volume. Dash0 uses open standards (OTLP, PromQL, Perses), has simpler pricing, and provides equal API power without lock-in.",c:"Pitch & Positioning",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"What story does the Dash0 API enable for platform/DevOps teams?",b:"Platform teams can build internal developer platforms where observability configuration (dashboards, alerts) is versioned alongside application code — deployed, reviewed, and rolled back just like application infrastructure.",c:"Pitch & Positioning",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
{f:"How does Dash0's open standards approach reduce onboarding time?",b:"Engineers already know OTel, PromQL, and YAML. Zero proprietary concepts to learn. A team can start sending telemetry in minutes using existing knowledge, vs. weeks learning a proprietary observability platform's SDK and query language.",c:"Pitch & Positioning",d:2,u:"https://www.dash0.com/documentation/dash0/api"},
];

// Fundamentals (6)
{q:"Which three API categories make up the Dash0 API surface?",o:["OTLP Ingestion, SQL Query, Management","OTLP Ingestion, Prometheus Query, Management","REST, gRPC, GraphQL","Metrics, Logs, Traces"],a:1,cat:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"Dash0 has three distinct API categories: OTLP Ingestion (for sending telemetry), Prometheus Query (PromQL-based querying), and Management API (dashboards, check-rules CRUD). 🟢 Dash0 angle: This three-API structure shows Dash0's open-standards architecture — no proprietary protocols."},
{q:"What format does Dash0 use for dashboard definitions?",o:["Grafana JSON Model","Perses","OpenDashboard YAML","Kibana saved objects"],a:1,cat:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"Dash0 uses Perses, an open-source CNCF dashboard format. This enables GitOps workflows and portability. 🟢 Dash0 angle: Using an open format means no vendor lock-in on dashboards — a key differentiator vs. proprietary formats."},
{q:"What query language does the Dash0 query API use?",o:["NRQL","DQL","PromQL","LogQL"],a:2,cat:"Fundamentals",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"PromQL (Prometheus Query Language). Dash0 exposes a Prometheus-compatible query API, meaning all existing PromQL knowledge and tools work. 🟢 Dash0 angle: Teams with Prometheus knowledge can query Dash0 immediately — zero learning curve."},
{q:"What does OTLP stand for?",o:["Open Telemetry Log Protocol","OpenTelemetry Protocol","Open Transport Layer Protocol","Observability Transfer Link Protocol"],a:1,cat:"Fundamentals",d:1,u:"https://opentelemetry.io/docs/specs/otlp/",e:"OTLP = OpenTelemetry Protocol. It is the wire format used to send traces, metrics, and logs between instrumented apps and backends like Dash0."},
{q:"What is the primary advantage of Dash0's native OTLP support?",o:["Faster ingestion than competitors","No proprietary agent or SDK required","Free tier is larger","Better compression ratios"],a:1,cat:"Fundamentals",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"Native OTLP support means any standard OpenTelemetry-instrumented application sends data directly to Dash0 without a proprietary agent. 🟢 Dash0 angle: This eliminates vendor lock-in and makes migration trivially easy for OTel-instrumented apps."},
{q:"In the context of observability-as-code, what does the Dash0 Management API enable?",o:["Real-time streaming dashboards","Version-controlled, API-driven deployment of dashboards and alert rules","Auto-scaling of ingestion capacity","ML-based anomaly detection"],a:1,cat:"Fundamentals",d:3,u:"https://www.dash0.com/documentation/dash0/api",e:"The Management API exposes full CRUD for dashboards and check-rules, enabling GitOps: store configs in Git, deploy via CI/CD, review changes as PRs, and roll back like any infrastructure code. 🟢 Dash0 angle: This is a major enterprise differentiator — observability treated as code, not manual UI work."},

// Auth & Endpoints (5)
{q:"What HTTP header authenticates OTLP requests to Dash0?",o:["X-API-Key: ds0_...","Auth-Token: ds0_...","Authorization: Bearer ds0_...","Dash0-Token: ds0_..."],a:2,cat:"Auth & Endpoints",d:1,u:"https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens",e:"Standard HTTP Bearer authentication: Authorization: Bearer <token>. This is the same format used for both OTLP ingestion and Management API calls."},
{q:"What is the correct OTLP gRPC port for Dash0?",o:["443","4318","4317","9090"],a:2,cat:"Auth & Endpoints",d:1,u:"https://www.dash0.com/documentation/dash0/key-concepts/endpoints",e:"Port 4317 is the standard OTLP/gRPC port (defined by OpenTelemetry spec). Port 4318 is for OTLP/HTTP. Both are TLS-required on Dash0."},
{q:"Which environment variable sets the Dash0 auth token for OTel SDKs?",o:["DASH0_API_KEY","OTEL_EXPORTER_OTLP_API_KEY","OTEL_EXPORTER_OTLP_HEADERS","DASH0_TOKEN"],a:2,cat:"Auth & Endpoints",d:2,u:"https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens",e:"OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer ds0_... is the standard OTel SDK environment variable for passing auth headers to the OTLP exporter."},
{q:"What HTTP status code does Dash0 return for an invalid auth token?",o:["400 Bad Request","403 Forbidden","401 Unauthorized","429 Too Many Requests"],a:2,cat:"Auth & Endpoints",d:2,u:"https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens",e:"401 Unauthorized is returned when the token is missing, malformed, or invalid. 403 Forbidden would indicate the token is valid but lacks permission for the requested operation."},
{q:"What is the hostname pattern for the Dash0 EU West ingestion endpoint?",o:["eu-west-1.ingress.dash0.com","ingest.eu-west-1.dash0.com","ingress.eu-west-1.dash0.com","api.eu-west-1.dash0.com"],a:2,cat:"Auth & Endpoints",d:3,u:"https://www.dash0.com/documentation/dash0/key-concepts/endpoints",e:"ingress.eu-west-1.dash0.com is the correct pattern. Note that api.eu-west-1.dash0.com is for the Management and query APIs — different subdomain from ingestion."},

// OTLP Ingestion (7)
{q:"What HTTP path receives distributed trace data in Dash0?",o:["/api/v1/traces","/v1/traces","/otlp/traces","/ingest/traces"],a:1,cat:"OTLP Ingestion",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"/v1/traces is the standard OTLP HTTP path defined by the OpenTelemetry specification. Dash0 follows this standard exactly."},
{q:"What Content-Type header is used for JSON-encoded OTLP data?",o:["application/json","application/otlp+json","application/x-protobuf","text/plain"],a:0,cat:"OTLP Ingestion",d:1,u:"https://opentelemetry.io/docs/specs/otlp/",e:"application/json is used for JSON-encoded OTLP payloads. application/x-protobuf is used for binary Protobuf payloads."},
{q:"Which OTel Collector component exports data to Dash0?",o:["otlphttp receiver","otlp exporter","dash0 exporter","prometheus exporter"],a:1,cat:"OTLP Ingestion",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"The otlp exporter (standard OpenTelemetry Collector component) handles all OTLP exports. No Dash0-specific exporter needed — Dash0 is a standard OTLP backend. 🟢 Dash0 angle: Works with any OTel Collector deployment without plugins."},
{q:"What is the minimum required resource attribute when sending OTLP data?",o:["host.name","deployment.environment","service.name","telemetry.sdk.name"],a:2,cat:"OTLP Ingestion",d:2,u:"https://opentelemetry.io/docs/specs/semconv/resource/",e:"service.name is the most critical resource attribute — it identifies which service the telemetry belongs to and is used for filtering and routing in Dash0's UI."},
{q:"What does Prometheus remote_write do with Dash0?",o:["Pulls metrics from Dash0","Pushes metrics from a local Prometheus server to Dash0","Queries Dash0 via PromQL","Syncs alert rules bidirectionally"],a:1,cat:"OTLP Ingestion",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"remote_write pushes metrics from a running Prometheus server to a remote storage backend (Dash0). This lets you keep your existing Prometheus setup while adding Dash0's storage and UI. 🟢 Dash0 angle: Low-friction migration path for Prometheus users."},
{q:"What HTTP response body does Dash0 return on successful OTLP ingestion?",o:["{\"received\":true}","{}","{\"status\":\"ok\"}","204 No Content"],a:1,cat:"OTLP Ingestion",d:3,u:"https://www.dash0.com/documentation/dash0/api",e:"An empty JSON object {} with HTTP 200 OK is the standard OTLP HTTP success response per the spec. This is lightweight by design."},
{q:"What is the OTLP HTTP port number?",o:["4317","4318","9090","443"],a:1,cat:"OTLP Ingestion",d:3,u:"https://opentelemetry.io/docs/specs/otlp/",e:"4318 is the OTLP/HTTP port. 4317 is OTLP/gRPC. These are OpenTelemetry-defined standard ports that Dash0 follows."},

// Prometheus Queries (6)
{q:"What is the difference between /query and /query_range in the Prometheus API?",o:["query is for metrics, query_range is for logs","query returns a point-in-time value, query_range returns a time series","query is read-only, query_range supports writes","query uses PromQL, query_range uses SQL"],a:1,cat:"Prometheus Queries",d:1,u:"https://prometheus.io/docs/prometheus/latest/querying/api/",e:"/query (instant query) returns the current value at a single timestamp. /query_range returns a series of values over a time window — used for graphing."},
{q:"What parameter in a range query controls the resolution of returned data points?",o:["interval","resolution","step","granularity"],a:2,cat:"Prometheus Queries",d:2,u:"https://prometheus.io/docs/prometheus/latest/querying/api/",e:"The step parameter controls how frequently data points are sampled within the range. Smaller step = more data points = finer resolution but larger response."},
{q:"What PromQL function is correct for computing request rate from a counter?",o:["delta()","increase()","rate()","avg_over_time()"],a:2,cat:"Prometheus Queries",d:2,u:"https://prometheus.io/docs/prometheus/latest/querying/functions/",e:"rate() computes the per-second average rate of increase of a counter over the specified window. increase() gives total increase. delta() is for gauges only."},
{q:"What does the resultType 'matrix' mean in a Prometheus API response?",o:["An error occurred","Query returned no data","A time series result from a range query","A single scalar value"],a:2,cat:"Prometheus Queries",d:2,u:"https://prometheus.io/docs/prometheus/latest/querying/api/",e:"resultType 'matrix' is returned by range queries (/query_range). It contains multiple timestamps per series. resultType 'vector' is returned by instant queries."},
{q:"How do you filter metrics to a specific service in a PromQL API call?",o:["Add ?service=myapp to the URL","Use label matchers: metric{service_name=\"myapp\"}","Use X-Filter header","Add /service/myapp/ to the path"],a:1,cat:"Prometheus Queries",d:3,u:"https://prometheus.io/docs/prometheus/latest/querying/basics/",e:"PromQL label matchers in curly braces filter results: http_requests_total{service_name=\"myapp\"}. The entire query is URL-encoded in the query parameter."},
{q:"What Prometheus API endpoint lists all available label names?",o:["/prometheus/api/v1/metadata","/prometheus/api/v1/labels","/prometheus/api/v1/label-names","/prometheus/api/v1/series/labels"],a:1,cat:"Prometheus Queries",d:3,u:"https://prometheus.io/docs/prometheus/latest/querying/api/",e:"/prometheus/api/v1/labels returns all label names present in the data. Use /prometheus/api/v1/label/<name>/values to get values for a specific label."},

// Management API (6)
{q:"What HTTP method creates a new dashboard via the Dash0 Management API?",o:["PUT","PATCH","GET","POST"],a:3,cat:"Management API",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"POST /api/v1/dashboards creates a new dashboard. PUT is used to update an existing dashboard by ID. GET lists or retrieves dashboards."},
{q:"What does a 204 response to a DELETE dashboard request mean?",o:["Dashboard was not found","Deletion is queued","Dashboard was successfully deleted","Authorization required"],a:2,cat:"Management API",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"HTTP 204 No Content is the standard success response for DELETE operations — the resource was deleted and there is no body to return."},
{q:"What is a check rule in Dash0?",o:["A dashboard validation rule","A rate limit policy","An alerting rule with a PromQL expression","An API authentication rule"],a:2,cat:"Management API",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"Check rules are alerting rules: a PromQL expression that, when it fires, creates an alert. They have expr, for (duration), labels, and annotations fields — similar to Prometheus alerting rules."},
{q:"What field in a check rule specifies how long the condition must be true before alerting?",o:["duration","delay","for","wait"],a:2,cat:"Management API",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"The 'for' field (same as Prometheus alerting rules) specifies a duration like '5m'. The alert only fires if the expression is continuously true for that duration — reduces false positives."},
{q:"How do you retrieve a single dashboard by its ID?",o:["POST /api/v1/dashboards with id in body","GET /api/v1/dashboards?id=<id>","GET /api/v1/dashboards/<id>","FETCH /api/v1/dashboards/<id>"],a:2,cat:"Management API",d:3,u:"https://www.dash0.com/documentation/dash0/api",e:"REST convention: GET /api/v1/dashboards/<id> retrieves a single resource by its ID. GET /api/v1/dashboards (no ID) lists all dashboards."},
{q:"Which open-source dashboard format does Dash0 use for the Management API?",o:["Grafana JSON Model","Kibana Lens","Perses","OpenMetrics Dashboard"],a:2,cat:"Management API",d:3,u:"https://perses.dev/perses/docs/overview/",e:"Perses is a CNCF sandbox project providing an open-source dashboard specification. Dash0 uses it to avoid vendor lock-in on dashboard format. 🟢 Dash0 angle: Perses adoption is growing — customers aren't locked into a proprietary format."},

// Observability-as-Code (5)
{q:"What is the main benefit of storing Dash0 dashboards in Git?",o:["Faster dashboard rendering","Version control, code review, and rollback for observability config","Automatic backup to the cloud","Reduced API rate limits"],a:1,cat:"Observability-as-Code",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"Git-stored dashboards get all the benefits of version control: history, blame, code review via PRs, rollback via revert, and environment promotion. 🟢 Dash0 angle: This enables treating observability as code — a major enterprise selling point."},
{q:"Which Dash0 product provides declarative IaC management of Dash0 resources?",o:["Dash0 CLI","Dash0 Terraform Provider","Dash0 Operator","Dash0 SDK"],a:1,cat:"Observability-as-Code",d:2,u:"https://registry.terraform.io/providers/dash0hq/dash0",e:"The Dash0 Terraform Provider allows dashboards and check-rules to be managed as Terraform resources — declarative, idempotent, and integrated with existing infrastructure workflows."},
{q:"In a CI/CD pipeline that deploys a dashboard, which API method is used to update an existing dashboard?",o:["POST","PATCH","PUT","MERGE"],a:2,cat:"Observability-as-Code",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"PUT /api/v1/dashboards/<id> replaces the entire dashboard. POST creates new ones. A typical CI script does GET (check if exists), then PUT (update) or POST (create)."},
{q:"What Perses tool can validate dashboard JSON schema before deployment?",o:["perses lint","perses validate","perses check","perses test"],a:0,cat:"Observability-as-Code",d:3,u:"https://perses.dev/perses/docs/overview/",e:"The perses CLI provides a lint command that validates dashboard JSON against the Perses schema. Use it in CI to catch errors before they reach production."},
{q:"What is the relationship between the Dash0 CLI and Management API?",o:["The CLI is completely independent","The CLI uses a separate binary protocol","The CLI is a wrapper that calls the Management API","The CLI uses GraphQL, the API uses REST"],a:2,cat:"Observability-as-Code",d:3,u:"https://github.com/dash0hq/dash0-cli",e:"The Dash0 CLI is built on top of the Management API. CLI commands like dash0 apply and dash0 delete are convenience wrappers that make the corresponding REST API calls with added features like YAML parsing and diffing."},

// Integrations (5)
{q:"How is Grafana configured to query Dash0 data?",o:["Install Dash0 Grafana plugin","Add a Prometheus data source pointing to Dash0's Prometheus endpoint","Use Dash0's native Grafana connector","Configure OTLP receiver in Grafana"],a:1,cat:"Integrations",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"Since Dash0 exposes a standard Prometheus API, Grafana's built-in Prometheus data source works directly. No special plugin needed. 🟢 Dash0 angle: Teams keep their existing Grafana dashboards — just change the data source URL."},
{q:"What Kubernetes component automatically instruments apps to send data to Dash0?",o:["Dash0 Sidecar","Dash0 DaemonSet","Dash0 Operator","Dash0 Admission Controller"],a:2,cat:"Integrations",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"The Dash0 Operator is a Kubernetes operator that handles auto-instrumentation via mutating admission webhooks. It injects OTel instrumentation into pods based on namespace/pod annotations."},
{q:"What OTel Collector exporter type do you use to send data to Dash0?",o:["dash0exporter","prometheusremotewrite","otlp","jaeger"],a:2,cat:"Integrations",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"The standard otlp exporter is used — no Dash0-specific exporter. Configure endpoint and Authorization header. This is a key advantage: Dash0 works with any standard OTel Collector."},
{q:"Which Prometheus integration allows existing Prometheus metrics to be stored long-term in Dash0?",o:["Prometheus federation","Prometheus remote_write","Prometheus pull scraping","Prometheus recording rules"],a:1,cat:"Integrations",d:3,u:"https://www.dash0.com/documentation/dash0/api",e:"remote_write continuously ships metrics from a local Prometheus server to Dash0 for long-term storage and better querying. Federation pulls a subset of metrics, which is different."},
{q:"What is the key advantage of the Dash0 Kubernetes Operator for instrumentation?",o:["It provides a custom metrics format","Zero-code instrumentation — no SDK changes needed in application code","It replaces the OTel Collector","It manages Kubernetes nodes automatically"],a:1,cat:"Integrations",d:3,u:"https://www.dash0.com/documentation/dash0/api",e:"The Operator uses mutating admission webhooks to inject OTel auto-instrumentation at pod creation time. Developers don't need to change application code. 🟢 Dash0 angle: Fastest path to production observability for k8s teams."},

// Pitch & Positioning (5)
{q:"What is the key message when positioning Dash0 against Datadog's API?",o:["Dash0's API has more endpoints","Dash0 uses open standards with no lock-in; Datadog requires proprietary agents","Dash0 has better documentation","Dash0 is cheaper per API call"],a:1,cat:"Pitch & Positioning",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"Dash0 uses OTLP, PromQL, and Perses — all open standards. Datadog requires proprietary agents and has a non-standard query language. This is vendor lock-in vs. open standards. 🟢 Dash0 angle: Switching from Datadog to Dash0 doesn't require re-instrumenting applications."},
{q:"How do you explain GitOps for observability to a DevOps prospect?",o:["It means dashboards are stored in a database","Dashboard and alert configs live in Git, deployed via CI/CD — same workflow as application code","It's a Dash0-specific feature with no open standard","It requires Kubernetes to work"],a:1,cat:"Pitch & Positioning",d:1,u:"https://www.dash0.com/documentation/dash0/api",e:"GitOps for observability means configuration (dashboards, alerts) is treated as code: versioned, reviewed, and deployed automatically. 🟢 Dash0 angle: Enabled by Dash0's Management API + open Perses format — not possible with UI-only tools."},
{q:"What makes Dash0 appealing to teams already using Prometheus?",o:["Dash0 replaces Prometheus completely","Dash0 uses a custom migration tool","Teams can remote_write existing Prometheus metrics to Dash0 and use the same PromQL queries","Dash0 reads Prometheus config files directly"],a:2,cat:"Pitch & Positioning",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"Prometheus remote_write is a zero-disruption migration path. Teams keep Prometheus running, add remote_write to Dash0, and immediately get better storage and UI — no query rewrites needed. 🟢 Dash0 angle: Low-risk expansion, not a rip-and-replace."},
{q:"What competitive advantage does Dash0's Management API give platform engineering teams?",o:["Faster UI rendering","Ability to manage observability configuration programmatically — dashboards as code, alerts as code","Lower storage costs","Automatic anomaly detection"],a:1,cat:"Pitch & Positioning",d:2,u:"https://www.dash0.com/documentation/dash0/api",e:"Platform teams can build internal developer portals where observability config is versioned, reviewed, and deployed like application infrastructure. This is a major maturity indicator for DevOps organizations. 🟢 Dash0 angle: Dash0's API-first design enables this; many competitors are UI-first with limited API access."},
{q:"How does Dash0's open-standards approach reduce TCO vs. proprietary observability platforms?",o:["Open source means no license cost","No proprietary SDK or agent vendor lock-in means zero migration cost and standard OTel investments are reusable","Open standards have fewer features","Dash0 gives more storage for free"],a:1,cat:"Pitch & Positioning",d:3,u:"https://www.dash0.com/documentation/dash0/api",e:"TCO includes migration costs, training, and lock-in risk. With Dash0, OTel instrumentation investments are reusable across backends, reducing vendor switching costs dramatically. 🟢 Dash0 angle: This is the core anti-lock-in value proposition."},

// Sales (4)
{q:"A prospect says 'We already have Datadog. Why would we add another tool?'",a:"Acknowledge the investment. Then reframe: Dash0 isn't a replacement fight today — it's about what happens when you want to grow. Datadog requires proprietary agents and charges per host. Dash0 uses standard OTel so your instrumentation works with both — you're not locked in. Many teams start by running Dash0 alongside Datadog for specific use cases, then expand as they see the value.",u:["https://www.dash0.com/documentation/dash0/api","https://www.dash0.com"]},
{q:"A prospect asks: 'What's the difference between your API and just using Prometheus directly?'",a:"Prometheus is a self-hosted time-series database with limited long-term storage and no SaaS management. Dash0 provides fully-managed long-term storage, a Prometheus-compatible query API (so your existing PromQL works), plus traces, logs, dashboards, and alert management — all in one platform. You get Prometheus familiarity without the operational burden.",u:["https://www.dash0.com/documentation/dash0/api"]},
{q:"A Sales Engineer needs to demo Dash0's API capabilities to a DevOps lead in 10 minutes. What do you show?",a:"Focus on the 'wow moments': 1) Show a curl to /v1/logs — data appears in the UI in seconds. 2) Run a PromQL query via the API and show the JSON response. 3) Export a dashboard as JSON with a GET call, edit it, re-apply with PUT — GitOps in 3 steps. These three demos prove the platform is API-native, not just API-adjacent.",u:["https://www.dash0.com/documentation/dash0/api"]},
{q:"A prospect's platform team says 'We want observability config in Git alongside our Terraform, is that possible?'",a:"Yes — this is a first-class Dash0 use case. The Management API enables full CRUD on dashboards and alert rules. We also have an official Terraform provider (registry.terraform.io/providers/dash0hq/dash0) so dashboards and check-rules can be managed as Terraform resources. Your existing IaC workflow, same tool.",u:["https://registry.terraform.io/providers/dash0hq/dash0","https://www.dash0.com/documentation/dash0/api"]},
// SA (4)
{q:"A customer asks how to configure their existing OTel Collector to send to Dash0 without any code changes.",a:"Add an otlp exporter to their existing collector config pointing to ingress.<region>.dash0.com:4317, with Authorization: Bearer <token> in the headers. Then route their existing traces/metrics/logs pipelines to this exporter. Zero application code changes — just a config update to collector.yaml. They can even run this alongside their existing backend by adding it to the exporters list.",u:["https://www.dash0.com/documentation/dash0/api"]},
{q:"A customer reports that their OTel data isn't appearing in Dash0 after configuration. How do you troubleshoot?",a:"Work through the checklist: 1) Test with curl — does POST /v1/logs with a minimal payload return 200? 2) Check auth: is Authorization: Bearer correct (not X-API-Key or other format)? 3) Verify the regional endpoint matches their Dash0 org's region. 4) Check service.name resource attribute is set — Dash0 uses this for routing. 5) Check OTel Collector logs for export errors. 6) Verify TLS — Dash0 requires HTTPS/TLS.",u:["https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens","https://www.dash0.com/documentation/dash0/key-concepts/endpoints"]},
{q:"A customer wants to set up automated dashboard deployment in their CI/CD pipeline. Walk them through the approach.",a:"Here's the pattern: 1) Store dashboard JSON files in Git. 2) In CI: GET the existing dashboard to check if it exists. 3) If exists: PUT /api/v1/dashboards/<id> with the updated JSON. If new: POST /api/v1/dashboards. 4) Optionally run perses lint in CI to validate schema before deployment. 5) Use environment-specific tokens so dev/staging/prod dashboards are deployed independently. This is exactly how the Dash0 CLI does it internally.",u:["https://www.dash0.com/documentation/dash0/api"]},
{q:"A customer asks how to build a PromQL-based SLO alert in Dash0. Walk through the API call.",a:"Create a check rule via POST /api/v1/check-rules with the body: { metadata: { name: 'slo-error-rate' }, spec: { expr: 'rate(http_errors_total[5m]) / rate(http_requests_total[5m]) > 0.01', for: '5m', labels: { severity: 'critical', slo: 'checkout-99.9' }, annotations: { summary: 'SLO breach: error rate above 1%' } } }. The 'for: 5m' ensures transient spikes don't trigger false alerts.",u:["https://www.dash0.com/documentation/dash0/api"]},
// Technical (4)
{q:"You need to backfill a week of Prometheus metrics from a local Prometheus server into Dash0. What approach do you use?",a:"Use Prometheus remote_write backfill approach: configure remote_write in Prometheus to point at Dash0's remote_write endpoint with the auth header. If Prometheus is still running, remote_write will start streaming current and optionally catch up with the WAL. For historical backfill, look at tools like prometheus-backfill or promtool that can replay TSDB data via remote_write. Always test with a small time window first.",u:["https://www.dash0.com/documentation/dash0/api"]},
{q:"Write a bash script that exports all Dash0 dashboards to local JSON files.",a:"#!/bin/bash\nTOKEN=\"ds0_your_token\"\nENDPOINT=\"https://api.eu-west-1.dash0.com\"\nDATA=$(curl -s -H \"Authorization: Bearer $TOKEN\" $ENDPOINT/api/v1/dashboards)\necho $DATA | jq -c '.[]' | while read -r dash; do\n  NAME=$(echo $dash | jq -r '.metadata.name')\n  echo $dash > \"dashboard-${NAME}.json\"\n  echo \"Exported: $NAME\"\ndone",u:["https://www.dash0.com/documentation/dash0/api"]},
{q:"A developer asks how to instrument their Go service to send traces to Dash0 with zero code changes in production.",a:"Use the Dash0 Kubernetes Operator if they're on k8s: annotate the namespace with dash0.com/instrumentation=enabled, and the operator automatically injects OTel instrumentation. If not on k8s, use OTEL_EXPORTER_OTLP_ENDPOINT and OTEL_EXPORTER_OTLP_HEADERS env vars with go.opentelemetry.io/contrib/instrumentation packages for auto-instrumentation. The endpoint and auth are injected via environment, not code.",u:["https://www.dash0.com/documentation/dash0/api"]},

const LESSONS=[
{id:"lesson-1",title:"What is the Dash0 API?",time:"8 min read",week:1,icon:"🌐",
sources:["https://www.dash0.com/documentation/dash0/api","https://opentelemetry.io/docs/specs/otlp/"],
exercises:[
{task:"Draw the three Dash0 API categories and their use cases from memory.",hint:"OTLP Ingestion, Prometheus Query, Management. What flows in each direction?"},
{task:"Find the Dash0 API documentation page and identify the endpoint for EU West.",hint:"Look for ingress.<region>.dash0.com patterns.",url:"https://www.dash0.com/documentation/dash0/api"},
],
body:`<div class="lesson-section"><h4>Three API Categories</h4><div class="lesson-text"><p>The Dash0 platform exposes three distinct API surfaces, each serving a different purpose:</p><p><strong>1. OTLP Ingestion</strong> — Receives telemetry data (traces, metrics, logs) from instrumented applications. Uses standard OpenTelemetry Protocol over HTTP (port 4318) or gRPC (port 4317). This is the write path.</p><p><strong>2. Prometheus Query API</strong> — Exposes a Prometheus-compatible HTTP API for querying stored metrics via PromQL. This is the read path for metrics.</p><p><strong>3. Management API</strong> — RESTful CRUD API for dashboards, check-rules (alerts), and configuration. This is the control plane.</p></div></div>
<div class="lesson-highlight">Key insight: Every Dash0 action you can do in the UI is also available via API. This makes Dash0 automation-friendly and GitOps-ready from day one.</div>
<div class="lesson-section"><h4>Architecture Overview</h4><div class="lesson-text"><p>All three API categories share a common auth model (Bearer tokens) but use different hostnames and paths. Ingestion traffic goes to <code class="code-inline">ingress.&lt;region&gt;.dash0.com</code>. Query and Management traffic goes to <code class="code-inline">api.&lt;region&gt;.dash0.com</code>.</p><p>Dash0 is built on open standards throughout: OTLP is the OpenTelemetry standard, PromQL is the Prometheus query standard, and Perses is an open CNCF dashboard format. No proprietary protocols means your existing tooling works.</p></div></div>`},

{id:"lesson-2",title:"Authentication & Endpoints",time:"7 min read",week:1,icon:"🔐",
sources:["https://www.dash0.com/documentation/dash0/key-concepts/auth-tokens","https://www.dash0.com/documentation/dash0/key-concepts/endpoints"],
exercises:[
{task:"Create a test auth token in the Dash0 UI and note the token prefix.",hint:"Navigate to Settings > Auth Tokens. Tokens start with ds0_",url:"https://app.dash0.com"},
{task:"Run this curl command substituting your token and verify a 200 response.",hint:"If you get 401, check the Bearer format exactly.",
steps:["Replace ds0_YOUR_TOKEN with your actual token","Run: curl -X POST https://ingress.eu-west-1.dash0.com/v1/logs -H 'Authorization: Bearer ds0_YOUR_TOKEN' -H 'Content-Type: application/json' -d '{\"resourceLogs\":[]}'","A 200 response confirms auth is working"]},
],
body:`<div class="lesson-section"><h4>Auth Token Format</h4><div class="lesson-text"><p>All Dash0 API requests use Bearer token authentication. Tokens are created in the Dash0 UI under <strong>Settings &gt; Auth Tokens</strong> and have the format <code class="code-inline">ds0_&lt;random&gt;</code>.</p><p>The header is always: <code class="code-inline">Authorization: Bearer ds0_...</code></p></div></div>
<div class="lesson-section"><h4>Region Endpoints</h4><div class="lesson-text"><p>Dash0 is region-specific. Two endpoint types per region:</p></div></div>
<div class="lesson-highlight">Ingestion: ingress.eu-west-1.dash0.com (port 4317 gRPC, 4318 HTTP)<br>API/Query: api.eu-west-1.dash0.com</div>
<div class="lesson-section"><h4>OTel SDK Environment Variables</h4><div class="lesson-text"><p>Configure OTel SDKs via environment variables — no code changes needed:</p></div></div>
<div class="code-block">OTEL_EXPORTER_OTLP_ENDPOINT=https://ingress.eu-west-1.dash0.com
OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer ds0_YOUR_TOKEN
OTEL_SERVICE_NAME=my-service
OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production</div>
<div class="lesson-text"><p>These three variables are all you need to send telemetry from any OTel-instrumented application to Dash0.</p></div>`},

{id:"lesson-3",title:"OTLP Ingestion",time:"10 min read",week:1,icon:"📡",
sources:["https://www.dash0.com/documentation/dash0/api","https://opentelemetry.io/docs/specs/otlp/"],
exercises:[
{task:"Send a test log entry to Dash0 using curl and verify it appears in the UI.",hint:"Use the /v1/logs endpoint with a minimal resourceLogs payload.",
steps:["Set TOKEN=ds0_your_actual_token","Run the curl command from the lesson","Open Dash0 UI and check the logs view","Filter by service.name='curl-test'"]},
{task:"Configure an OTel Collector to send to Dash0 alongside an existing backend.",hint:"Add the otlp exporter and include it in the exporters list of your existing pipelines — pipelines support multiple exporters."},
],
body:`<div class="lesson-section"><h4>OTLP HTTP Paths</h4><div class="lesson-text"><p>Three paths, one for each signal type:</p></div></div>
<div class="lesson-highlight">POST https://ingress.eu-west-1.dash0.com/v1/traces<br>POST https://ingress.eu-west-1.dash0.com/v1/metrics<br>POST https://ingress.eu-west-1.dash0.com/v1/logs</div>
<div class="lesson-section"><h4>Sending a Test Log with curl</h4></div>
<div class="code-block">curl -X POST https://ingress.eu-west-1.dash0.com/v1/logs \\
  -H 'Authorization: Bearer ds0_YOUR_TOKEN' \\
  -H 'Content-Type: application/json' \\
  -d '{
    "resourceLogs": [{
      "resource": {
        "attributes": [{
          "key": "service.name",
          "value": {"stringValue": "curl-test"}
        }]
      },
      "scopeLogs": [{
        "logRecords": [{
          "body": {"stringValue": "Hello from Dash0 API lesson!"},
          "severityText": "INFO"
        }]
      }]
    }]
  }'</div>
<div class="lesson-section"><h4>OTel Collector Config</h4><div class="lesson-text"><p>Add the otlp exporter to an existing collector config:</p></div></div>
<div class="code-block">exporters:
  otlp/dash0:
    endpoint: ingress.eu-west-1.dash0.com:4317
    headers:
      Authorization: "Bearer ds0_YOUR_TOKEN"
    tls:
      insecure: false

service:
  pipelines:
    traces:
      exporters: [existing_exporter, otlp/dash0]
    metrics:
      exporters: [existing_exporter, otlp/dash0]
    logs:
      exporters: [existing_exporter, otlp/dash0]</div>`},

{id:"lesson-4",title:"Prometheus Query API",time:"9 min read",week:2,icon:"📊",
sources:["https://www.dash0.com/documentation/dash0/api","https://prometheus.io/docs/prometheus/latest/querying/api/"],

{task:"Run an instant query against Dash0's Prometheus API to see what metrics exist.",hint:"Use /prometheus/api/v1/query?query={job!=''}  to see a sample of all series.",
steps:["curl -G 'https://api.eu-west-1.dash0.com/prometheus/api/v1/query' -H 'Authorization: Bearer ds0_...' --data-urlencode 'query=up'","Inspect the JSON response structure","Note the resultType field — should be 'vector'"]},
{task:"Run a range query to get HTTP request counts for the last 30 minutes.",hint:"Use query_range with step=60 and set start/end to Unix timestamps.",steps:["Calculate now=$(date +%s) and start=$((now - 1800))","Run the query_range call with these timestamps","Compare the resultType — should be 'matrix'"]},
],
body:`<div class="lesson-section"><h4>Two Query Endpoints</h4><div class="lesson-text"><p><strong>Instant query</strong> — returns the current value at a point in time:</p></div></div>
<div class="code-block">GET /prometheus/api/v1/query?query=up&time=1700000000</div>
<div class="lesson-text"><p><strong>Range query</strong> — returns a time series over a window:</p></div>
<div class="code-block">GET /prometheus/api/v1/query_range?query=up&start=1699996400&end=1700000000&step=60</div>
<div class="lesson-section"><h4>Full curl Example</h4></div>
<div class="code-block">curl -G 'https://api.eu-west-1.dash0.com/prometheus/api/v1/query' \\
  -H 'Authorization: Bearer ds0_YOUR_TOKEN' \\
  --data-urlencode 'query=rate(http_requests_total{service_name="checkout"}[5m])' \\
  --data-urlencode "time=$(date +%s)"</div>
<div class="lesson-section"><h4>Response Structure</h4><div class="lesson-text"><p>All responses follow the Prometheus envelope:</p></div></div>
<div class="code-block">{
  "status": "success",
  "data": {
    "resultType": "vector",  // or "matrix" for range queries
    "result": [{
      "metric": {"__name__": "up", "job": "myapp"},
      "value": [1700000000, "1"]
    }]
  }
}</div>
<div class="lesson-highlight">Pro tip: Use --data-urlencode for PromQL queries in curl — label matchers with curly braces and quotes need URL encoding.</div>`},
