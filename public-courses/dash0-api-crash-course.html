{id:"lesson-6",title:"Management API: Check Rules",time:"8 min read",week:2,icon:"🔔",
sources:["https://www.dash0.com/documentation/dash0/api","https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/"],
exercises:[
{task:"Create a check rule that alerts when HTTP error rate exceeds 5% for 2 minutes.",hint:"Use rate(http_errors_total[5m]) / rate(http_requests_total[5m]) > 0.05 as the expr.",
steps:["Write the check rule JSON to a file","POST it to /api/v1/check-rules","Verify it appears in the Dash0 Alerts section"]},
{task:"List all existing check rules and identify their severity labels.",hint:"GET /api/v1/check-rules and look at spec.labels.severity in each item."},
],
body:`<div class="lesson-section"><h4>What are Check Rules?</h4><div class="lesson-text"><p>Check rules are alerting rules defined with PromQL expressions. When the expression is continuously true for a specified duration, Dash0 fires an alert. They follow the Prometheus alerting rule format.</p></div></div>
<div class="lesson-section"><h4>Check Rule API Paths</h4></div>
<div class="lesson-highlight">GET /api/v1/check-rules — list all<br>POST /api/v1/check-rules — create<br>GET /api/v1/check-rules/&lt;id&gt; — get one<br>PUT /api/v1/check-rules/&lt;id&gt; — update<br>DELETE /api/v1/check-rules/&lt;id&gt; — delete</div>
<div class="lesson-section"><h4>Creating a Check Rule</h4></div>
<div class="code-block">curl -X POST https://api.eu-west-1.dash0.com/api/v1/check-rules \\
  -H 'Authorization: Bearer ds0_YOUR_TOKEN' \\
  -H 'Content-Type: application/json' \\
  -d '{
    "metadata": {"name": "high-error-rate"},
    "spec": {
      "expr": "rate(http_errors_total[5m]) / rate(http_requests_total[5m]) > 0.05",
      "for": "2m",
      "labels": {
        "severity": "warning",
        "team": "backend"
      },
      "annotations": {
        "summary": "High HTTP error rate detected",
        "description": "Error rate is {{ $value | humanizePercentage }} over last 5m"
      }
    }
  }'</div>
<div class="lesson-highlight">The <strong>for</strong> field is critical — it prevents false alerts from transient spikes. A 2-minute window means the condition must be continuously true for 2 minutes before firing.</div>`},

{id:"lesson-7",title:"Observability-as-Code Patterns",time:"10 min read",week:3,icon:"🔄",
sources:["https://www.dash0.com/documentation/dash0/api","https://registry.terraform.io/providers/dash0hq/dash0","https://github.com/dash0hq/dash0-cli"],
exercises:[
{task:"Write a bash script that syncs a local dashboard.json file to Dash0.",hint:"Check if dashboard exists (GET), then POST or PUT accordingly. Use jq to extract the ID.",
steps:["Script should GET /api/v1/dashboards and check for name match","If found: PUT /api/v1/dashboards/<id>","If not found: POST /api/v1/dashboards","Test with a real dashboard JSON file"]},
{task:"Look up the Dash0 Terraform provider and identify the resource type for dashboards.",hint:"search for 'dash0' at registry.terraform.io/providers",url:"https://registry.terraform.io/providers/dash0hq/dash0"},
],
body:`<div class="lesson-section"><h4>The GitOps Pattern for Dashboards</h4><div class="lesson-text"><p>Store all dashboard JSON files in a Git repository. Use a CI/CD pipeline to deploy changes automatically:</p></div></div>
<div class="code-block">#!/bin/bash
# deploy-dashboards.sh
TOKEN="${DASH0_TOKEN}"
ENDPOINT="https://api.eu-west-1.dash0.com"

for file in dashboards/*.json; do
  NAME=$(jq -r '.metadata.name' "$file")
  
  # Check if dashboard exists
  EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \\
    -H "Authorization: Bearer $TOKEN" \\
    "$ENDPOINT/api/v1/dashboards/$NAME")
  
  if [ "$EXISTING" = "200" ]; then
    # Update existing
    curl -s -X PUT "$ENDPOINT/api/v1/dashboards/$NAME" \\
      -H "Authorization: Bearer $TOKEN" \\
      -H "Content-Type: application/json" \\
      -d @"$file"
    echo "Updated: $NAME"
  else
    # Create new
    curl -s -X POST "$ENDPOINT/api/v1/dashboards" \\
      -H "Authorization: Bearer $TOKEN" \\
      -H "Content-Type: application/json" \\
      -d @"$file"
    echo "Created: $NAME"
  fi
done</div>
<div class="lesson-section"><h4>Terraform Integration</h4><div class="lesson-text"><p>Use the official Dash0 Terraform provider to manage dashboards and check-rules as IaC:</p></div></div>
<div class="code-block">resource "dash0_dashboard" "service_overview" {
  metadata = {
    name    = "service-overview"
    project = "default"
  }
  spec_json = file("dashboards/service-overview.json")
}</div>
<div class="lesson-highlight">Terraform manages the full lifecycle: create, update, delete. Combine with Terraform workspaces to manage dev/staging/prod dashboards separately.</div>`},

{id:"lesson-8",title:"Competitive Positioning",time:"8 min read",week:3,icon:"🏆",
sources:["https://www.dash0.com","https://www.dash0.com/documentation/dash0/api"],

{task:"For each competitor (Datadog, Grafana Cloud, Dynatrace), identify one API-specific weakness vs. Dash0.",hint:"Think about: proprietary formats, lock-in, migration cost, open standards support."},
{task:"Practice the 'Why Dash0 API?' pitch in under 60 seconds. Cover: open standards, GitOps, no lock-in.",hint:"Structure: problem → Dash0 approach → benefit. Keep each point to one sentence."},
],
body:`<div class="lesson-section"><h4>Dash0 vs. Datadog</h4><div class="lesson-text"><p><strong>Datadog:</strong> Requires proprietary agents, custom SDK wrappers, and has a proprietary query language (NRQL). API is extensive but dashboard format is proprietary JSON — not portable.</p><p><strong>Dash0:</strong> Native OTLP — standard OTel SDKs work directly. PromQL — existing query knowledge applies. Perses — open dashboard format. Zero lock-in at every layer.</p></div></div>
<div class="lesson-highlight">The lock-in question: "What happens if you want to switch?" With Datadog, you re-instrument. With Dash0, you point your OTel exporters at a new endpoint.</div>
<div class="lesson-section"><h4>Dash0 vs. Grafana Cloud</h4><div class="lesson-text"><p><strong>Grafana Cloud:</strong> Open source friendly but complex multi-component architecture (Loki, Mimir, Tempo, Grafana). API surface is fragmented across services. Requires operational expertise.</p><p><strong>Dash0:</strong> Single unified platform with one API surface. OTLP in, PromQL out, Management API for config. Simpler operational model with the same open standards.</p></div></div>
<div class="lesson-section"><h4>Dash0 vs. Dynatrace</h4><div class="lesson-text"><p><strong>Dynatrace:</strong> Powerful but highly proprietary — OneAgent, DQL query language, proprietary dashboard format. Deep auto-discovery comes with deep lock-in.</p><p><strong>Dash0:</strong> The Dash0 Operator provides similar auto-instrumentation for Kubernetes without proprietary agents. You get automation without the lock-in.</p></div></div>
<div class="lesson-section"><h4>The 30-Second API Pitch</h4></div>
<div class="lesson-highlight">"Dash0's API is built entirely on open standards — OTLP for ingestion, PromQL for querying, Perses for dashboards. This means your existing OTel instrumentation, Grafana dashboards, and PromQL queries work with Dash0 today. And your team can manage all observability configuration as code in Git — version-controlled, reviewed, and deployed like application infrastructure."</div>`},

// ─── CLOUD SYNC ENGINE (offline-resilient) ───
let syncStatus='idle',lastSyncAt=null,syncPending=false;
function syncEnabled(){return typeof SYNC_SHEET_URL==='string'&&SYNC_SHEET_URL.length>10}
function getSyncKey(){return SYNC_USER_ID?(SYNC_USER_ID+'/'+STORAGE_KEY):STORAGE_KEY}
function isOnline(){return typeof navigator!=='undefined'?navigator.onLine:true}
async function cloudSave(){
if(!syncEnabled()){syncPending=false;return}
if(!isOnline()){syncStatus='offline';syncPending=true;updateSyncUI();return}
syncStatus='syncing';updateSyncUI();
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
await fetch(SYNC_SHEET_URL+'?action=save&key='+encodeURIComponent(getSyncKey()),{
method:'POST',headers:{'Content-Type':'text/plain'},
body:JSON.stringify({data,savedAt:data.savedAt})
});
syncStatus='synced';lastSyncAt=new Date().toISOString();syncPending=false;
}catch(e){
syncStatus=isOnline()?'error':'offline';syncPending=true;
console.warn('Cloud sync save failed:',e);
}
updateSyncUI();
}
async function cloudLoad(){
if(!syncEnabled())return null;
if(!isOnline()){syncStatus='offline';updateSyncUI();return null}
syncStatus='syncing';updateSyncUI();
try{

function copyCode(btn){
  var block=btn.parentElement;
  var text=block.textContent.replace(/^Copy/,'').replace(/^Copied!/,'').trim();
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  });
}
function highlightCode(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/(#.*$)/gm,'<span style="color:#6b7280">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|\'(?:[^\'\\]|\\.)*\')/g,'<span style="color:#a5f3fc">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|while|true|false|null|import|from|export|class|extends|new|this|async|await)\b/g,'<span style="color:#f97316">$1</span>');
}
function codeBlock(code){
  return '<div class="code-block"><button class="code-copy" onclick="copyCode(this)">Copy</button>'+highlightCode(code)+'</div>';
}
function fcRate(rating){
  var cards=fcGetCards();
  if(!cards.length)return;
  var card=cards[fcIdx%cards.length];
  cardRatings[card.f]=rating;
  stats.cards=(stats.cards||0)+1;
  saveState();
  fcFlipped=false;
  // advance to next card
  var next=fcGetCards();
  if(next.length>0)fcIdx=(fcIdx+1)%next.length;
  render();
}

function fcWeightedShuffle(){
  var cards=fcGetCards();
  if(!cards.length)return;
  var weighted=[];
  cards.forEach(function(c,i){
    var r=cardRatings[c.f];
    var w=r==='missed'?3:r==='unsure'?2:1;
    for(var j=0;j<w;j++)weighted.push(i);
  });
  fcIdx=weighted[Math.floor(Math.random()*weighted.length)];
  fcFlipped=false;
  render();
}

let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Upcoming</div>`;
upcoming.forEach(s=>{

h+=`<div class="sched-item${isToday?' today':''}${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min${s.phase?' · Phase '+s.phase:''}</div></div>

<div class="si-desc">${s.desc}</div>
<div class="si-actions">
${!done?`<button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Done</button>`:`<button style="background:#374151;color:#6ee7b7" onclick="unmarkSession('${s.id}')">✓ Done</button>`}
<button style="background:#374151;color:#9ca3af" onclick="openSessionForm('${s.id}')">Edit</button>
<button style="background:#374151;color:#fca5a5" onclick="deleteSession('${s.id}')">Del</button>
</div></div>`});
}
if(past.length){
h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px">Past</div>`;
past.slice(0,5).forEach(s=>{
const done=sessionsDone[s.id];
h+=`<div class="sched-item past${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min</div></div>
<div class="si-title">${s.title}</div>
${!done?`<div class="si-actions"><button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Mark Done</button></div>`:
`<div style="font-size:11px;color:#6ee7b7;margin-top:4px">✓ Completed</div>`}
</div>`});
if(past.length>5)h+=`<div style="text-align:center;color:#4b5563;font-size:12px;padding:8px">+ ${past.length-5} more past sessions</div>`;
}
return h;
}

h+=`<div class="cp-item${hit?' hit':''}">

</div>
</div>
<div class="cp-date">${hit?'Achieved!':'Target by '+fmtDate(cp.by)} · Current: ${val}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''} / ${cp.threshold}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''}</div>

// ─── ASK CLAUDE ───
function askClaudeBox(context){
return`<div class="ask-box">
<div class="ask-label">🔍 Go deeper — ask Claude</div>
<div class="ask-row">
<input type="text" id="askInput" placeholder="e.g., How does Workload Identity actually work?" onkeydown="if(event.key==='Enter')askClaude('${context.replace(/'/g,"\\'")}')">
<button onclick="askClaude('${context.replace(/'/g,"\\'")}')">Ask</button>
</div>
</div>`}
function askClaude(context){
const input=document.getElementById('askInput');
if(!input||!input.value.trim())return;
const q=input.value.trim();
const prompt=`I'm studying the Dash0 API (as a Solutions Architect / Engineer at Dash0, an observability company). I'm currently studying: ${context}\n\nMy question: ${q}\n\nPlease give me a clear, practical answer. Include specific details, curl examples, or comparisons where helpful. If this relates to Dash0, OTLP, PromQL, or observability APIs, include relevant technical context.`;
navigator.clipboard.writeText(prompt).then(()=>{
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
}).catch(()=>{
const ta=document.createElement('textarea');ta.value=prompt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
});
input.value='';
}
function showToast(msg){
const existing=document.querySelector('.ask-toast');if(existing)existing.remove();
const t=document.createElement('div');t.className='ask-toast';t.textContent=msg;document.body.appendChild(t);
setTimeout(()=>t.remove(),3000);
}
// ─── ICS EXPORT ───
function toggleIcsPanel(){
icsOpen=!icsOpen;
if(icsOpen){icsSelected=new Set();icsPhaseFilter='all';schedule.forEach(s=>icsSelected.add(s.id))}
render();
}
function icsFilterPhase(p){
icsPhaseFilter=p;
icsSelected=new Set();
const filtered=p==='all'?schedule:schedule.filter(s=>s.phase==p);
filtered.forEach(s=>icsSelected.add(s.id));
render();
}
function icsToggle(id){if(icsSelected.has(id))icsSelected.delete(id);else icsSelected.add(id);render()}
function icsSelectAll(){const visible=icsVisibleSessions();visible.forEach(s=>icsSelected.add(s.id));render()}
function icsSelectNone(){icsSelected.clear();render()}
function icsVisibleSessions(){return icsPhaseFilter==='all'?[...schedule]:schedule.filter(s=>s.phase==icsPhaseFilter)}
function renderIcsPanel(){
if(!icsOpen)return'';
const visible=icsVisibleSessions().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const phases=[...new Set(schedule.map(s=>s.phase).filter(Boolean))].sort();
let h=`<div class="ics-panel">
<h4>📅 Export to Calendar</h4>
<div class="ics-filters">
<button class="${icsPhaseFilter==='all'?'active':''}" onclick="icsFilterPhase('all')">All Sessions</button>
${phases.map(p=>`<button class="${icsPhaseFilter==p?'active':''}" onclick="icsFilterPhase(${p})">Phase ${p}</button>`).join('')}
</div>
<div style="display:flex;gap:8px;margin-bottom:8px">
<button style="background:none;border:none;color:#3b82f6;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectAll()">Select all</button>
<span style="color:#374151;font-size:12px">|</span>
<button style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectNone()">Select none</button>
</div>
<div class="ics-count">${icsSelected.size} of ${visible.length} session${visible.length!==1?'s':''} selected</div>
<div class="ics-list">`;
visible.forEach(s=>{
const on=icsSelected.has(s.id);
h+=`<div class="ics-item" onclick="icsToggle('${s.id}')">
<div class="ics-check${on?' on':''}">${on?'✓':''}</div>
<div class="ics-item-info"><div class="ics-item-title">${s.title}</div><div class="ics-item-date">${fmtDate(s.date)} · ${s.time} · ${s.dur} min</div></div>
</div>`});
h+=`</div>
<div class="ics-actions">
<button class="btn btn-secondary" onclick="toggleIcsPanel()">Cancel</button>
<button class="ics-dl" ${icsSelected.size===0?'disabled style="opacity:.4;cursor:default" ':''}onclick="${icsSelected.size?'downloadIcs()':''}">Download .ics (${icsSelected.size})</button>
</div></div>`;
return h;
}
function downloadIcs(){
const selected=schedule.filter(s=>icsSelected.has(s.id)).sort((a,b)=>a.date.localeCompare(b.date));
if(!selected.length)return;
const pad=n=>(n<10?'0':'')+n;
const toIcsDate=(d,t,dur)=>{
const[y,m,dy]=d.split('-').map(Number);
const[h,mi]=(t||'09:00').split(':').map(Number);
const start=new Date(y,m-1,dy,h,mi);
const end=new Date(start.getTime()+dur*60000);
const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
return{start:fmt(start),end:fmt(end)};
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
let cal=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CrashCourse//StudyApp//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:Study Sessions\r\n`;
selected.forEach(s=>{
const{start,end}=toIcsDate(s.date,s.time,s.dur);
const desc=(s.desc||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
cal+=`BEGIN:VEVENT\r\nUID:${uid()}@crashcourse\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:${s.title.replace(/,/g,'\\,')}\r\nDESCRIPTION:${desc}\r\n`;
if(s.phase)cal+=`CATEGORIES:Phase ${s.phase}\r\n`;
cal+=`STATUS:CONFIRMED\r\nBEGIN:VALARM\r\nTRIGGER:-PT10M\r\nACTION:DISPLAY\r\nDESCRIPTION:Study session starting soon\r\nEND:VALARM\r\nEND:VEVENT\r\n`;
});
cal+=`END:VCALENDAR`;
const blob=new Blob([cal],{type:'text/calendar;charset=utf-8'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='study-sessions.ics';a.click();
URL.revokeObjectURL(url);
showToast(`Downloaded ${selected.length} session${selected.length!==1?'s':''} as .ics`);
icsOpen=false;render();
}
// ─── INIT ───
render();
</script>
