// ─── Sales (4) ───
{q:"We already have Datadog APM auto-instrumentation. Why switch to an operator?",a:"Acknowledge what they have, then pivot to what they're missing. Datadog's auto-instrumentation is proprietary — instrumentation code is Datadog-specific, and if you ever leave Datadog, you start from zero. The Dash0 Operator instruments workloads using 100% upstream OpenTelemetry agents (Java OTel agent, Node.js OTel SDK). Your investment in instrumentation is portable.\n\nSecond, cost model. Datadog charges per APM host or per ingested span — as microservices scale, costs can become unpredictable. Dash0 has transparent, volume-based pricing without per-host fees. For a 200-service environment that's a meaningful difference.\n\nThird, the operator goes beyond traces. One install gives you traces, metrics (including Prometheus scraping), logs (filelog from pods), and profiling — all correlated in one place with no separate agents. Datadog requires separate agents and integrations for each signal.\n\nThe ask: ask them to run the Dash0 Operator alongside Datadog for one namespace, zero risk. Compare signal quality and time-to-insight. The OTel agents the Dash0 Operator injects are the same ones Datadog's tracing SDKs are built on.",u:["https://github.com/dash0hq/dash0-operator","https://www.dash0.com/blog"]},
{q:"Our security team won't allow anything that modifies our pods automatically.",a:"This is a common and valid concern. Address it head-on with specifics. The Dash0 Operator uses a Kubernetes mutating admission webhook — a standard, auditable Kubernetes pattern used by every major operator (Istio, Cert-Manager, Datadog, etc.). The webhook's behavior is fully deterministic and can be inspected in advance.\n\nKnob one: opt-in mode. Set instrumentWorkloads.mode to 'none' at the namespace level, and only workloads explicitly labeled dash0.com/enable=true will have the init container injected. Nothing touches anything without an explicit label. This gives security the equivalent of a per-workload allowlist.\n\nKnob two: RBAC. The webhook operates with a tightly scoped service account. Reviewable with kubectl get clusterrolebinding -l app.kubernetes.io/name=dash0-operator. All permissions are standard and listed in the Helm chart.\n\nKnob three: what the init container actually does. It copies agent binaries (a JAR, a Node module) to /__otel_auto_instrumentation/agents/ and sets environment variables — JAVA_TOOL_OPTIONS, NODE_OPTIONS. No kernel modules, no eBPF, no network proxying. The application process is unmodified.\n\nThe close: offer a security review session with their team. Share the webhook configuration YAML in advance. Most security teams approve once they see how bounded the blast radius is.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://kubernetes.io/docs/reference/access-authn-authz/admission-controllers/"]},
{q:"We have 200 microservices — how do we roll this out without disrupting production?",a:"This is an execution question disguised as an objection — they're interested, they just need a safe rollout path. Walk through the staged approach.\n\nPhase 1: Install the operator without enabling monitoring on any namespace. helm install sets up the operator in dash0-system; no webhooks fire, no pods restart. Verify operator health: kubectl get pods -n dash0-system.\n\nPhase 2: Enable monitoring namespace by namespace, starting with dev/staging. Apply a Dash0Monitoring resource with instrumentWorkloads.mode=created-and-updated. This means existing pods are NOT restarted — instrumentation only applies to new or updated deployments. Zero immediate disruption.\n\nPhase 3: Once you have confidence in dev, flip one production namespace. Use instrumentWorkloads.mode=created-and-updated initially. Instrumentation rolls in naturally with your next deploy cycle.\n\nPhase 4: When ready for a clean sweep, change mode to 'all' in a maintenance window. Use the rate-limiting Helm flags (operator.instrumentation.delayAfterEachWorkloadMillis) to stagger pod restarts across the namespace.\n\nOptional: use the dash0.com/enable=false label on any service you want to exclude entirely — high-traffic, sensitive, or externally managed workloads.\n\nThe result: 200 services instrumented over 2-4 weeks with no big-bang cutover and full rollback capability at every phase.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://github.com/dash0hq/dash0-operator"]},
{q:"We're already running the OTel Collector manually. What does your operator add?",a:"Validate what they have, then explain the layered value. Running a Collector manually is great — it means they understand OTel. The operator builds on that foundation rather than replacing it.\n\nLayer one: workload instrumentation. A Collector receives telemetry but doesn't create it. The operator's mutating webhook auto-injects OTel agents into Java, Node.js, .NET, and Python workloads, generating traces without any code changes. Their manual Collector setup doesn't do this.\n\nLayer two: Collector lifecycle management. With a manual Collector, every config change requires an edit + redeploy + test cycle. The operator manages Collector configuration as Kubernetes-native CRDs — changes to Dash0Monitoring spec automatically reconcile the Collector config. No more YAML hand-editing.\n\nLayer three: Kubernetes context enrichment. The operator's managed Collectors automatically add k8s.namespace.name, k8s.pod.name, k8s.node.name, k8s.deployment.name resource attributes. Their manual Collector would need a separate k8sattributes processor configured.\n\nLayer four: GitOps integration. Dashboards (PersesDashboard), alert rules (PrometheusRule), synthetic checks, and views are all Kubernetes CRDs — manageable via ArgoCD or Flux.\n\nThe pitch: offer to set up the Dash0 Operator alongside their existing Collector (it can send to both via multiple exports). Let them compare management overhead after 30 days.",u:["https://github.com/dash0hq/dash0-operator","https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md"]},
// ─── SA / Demo (4) ───
{q:"Customer wants to see zero-code instrumentation: demo a sample app getting instrumented on a live cluster.",a:"Structure this demo in three acts to maximize impact. Act 1 (2 min): show the 'before' state. Deploy a plain Java Spring Boot app with no OTel SDK added. Hit an endpoint, show that no traces exist in Dash0. Reinforce: no code changes, no SDK, no config.\n\nAct 2 (3 min): install the operator and create a Dash0Monitoring resource. Run helm install dash0-operator dash0-operator/dash0-operator --namespace dash0-system --create-namespace --set operator.dash0Export.endpoint=... --set operator.dash0Export.token=... then kubectl apply the Dash0Monitoring manifest with mode=all. Show operator pods coming up: kubectl get pods -n dash0-system.\n\nAct 3 (2 min): generate traffic, open Dash0. Hit the app endpoint 3-4 times. Switch to Dash0 → Tracing. Traces appear with full span detail, resource attributes (k8s.deployment.name, k8s.namespace.name), and service map. No code was changed.\n\nKey demo tip: pre-warm the operator in a different namespace so install time looks fast. Have the Dash0 Monitoring YAML ready as a kubectl apply -f. The money shot is seeing the trace within 30 seconds of the monitoring resource being applied.\n\nAnticipated question: 'What did you actually change about my app?' Answer: nothing in the application image. The operator injected an init container that added JAVA_TOOL_OPTIONS=-javaagent:/__otel_auto_instrumentation/agents/javaagent.jar.",u:["https://github.com/dash0hq/dash0-operator","https://www.dash0.com/documentation"]},
{q:"Customer asks how to handle multi-tenant observability — different teams own different namespaces and want separate Dash0 organizations.",a:"This is a first-class use case and worth walking through the full architecture. The key insight: Dash0Monitoring is namespace-scoped, and each resource can override the global export config from Dash0OperatorConfiguration.\n\nSetup: one operator install (dash0-system), one Dash0OperatorConfiguration with a default export. Then, per team, create a Dash0Monitoring in their namespace with an exports[] override pointing to their own Dash0 organization endpoint + token. Team A's telemetry goes to org A; Team B's to org B. No cross-pollination.\n\nFor teams that want to opt out entirely: set instrumentWorkloads.mode=none and logCollection.enabled=false in their Dash0Monitoring. The operator deploys to that namespace but collects nothing.\n\nFor teams that want to manage their own namespace: give them RBAC to create/update Dash0Monitoring in their namespace only. They control their own instrumentation settings without touching the cluster-wide operator config.\n\nFor billing separation: each team's Dash0 organization handles its own ingestion billing. The platform team that runs the operator pays nothing per-namespace — they provision the operator once.\n\nPro tip: use autoMonitorNamespaces.enabled=true with a default monitoring template (mode=created-and-updated, no overrides) to bootstrap every new namespace automatically. Teams that need custom settings apply their own Dash0Monitoring to replace the auto-created one.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://www.dash0.com/documentation"]},
{q:"Customer wants to migrate their existing Prometheus alerting rules to Dash0 using the operator.",a:"Good news: this is almost a zero-effort migration. Walk through the three-step process.\n\nStep 1: enable Prometheus CRD support. Re-helm-upgrade the operator with --set operator.prometheusCrdSupportEnabled=true and --set operator.dash0Export.apiEndpoint=https://api.*.dash0.com. The operator now watches PrometheusRule resources across all monitored namespaces.\n\nStep 2: ensure metrics are flowing. If they already have prometheus.io/* annotations on their pods, prometheus scraping starts immediately when Dash0Monitoring is applied. For ServiceMonitor/PodMonitor CRDs, the Target Allocator handles discovery automatically.\n\nStep 3: apply existing PrometheusRule resources — no changes needed to the YAML. The operator's controller watches for PrometheusRule resources and calls the Dash0 API to create corresponding check rules. The rule YAML is the same format they already have. kubectl apply -f existing-rules/ is all it takes.\n\nAudit: after applying, check Dash0 → Alerting to see the synced rules. The operator logs will show sync status: kubectl logs -n dash0-system deployment/dash0-operator-controller-manager | grep PrometheusRule.\n\nEdge case: PrometheusRule resources with the label dash0.com/enable=false are explicitly excluded from sync — useful for rules that don't yet have corresponding metrics in Dash0.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://prometheus-operator.dev/docs/api-reference/api/#monitoring.coreos.com/v1.PrometheusRule"]},
{q:"Customer asks about dashboard-as-code workflow — they want dashboards in Git, reviewed via PRs, and deployed via ArgoCD.",a:"This is exactly what the PersesDashboard CRD is built for. Walk them through the full workflow.\n\nStep 1: operator config. Ensure the operator has apiEndpoint set (required for CRD sync). Enable PersesDashboard sync — it's on by default (synchronizePersesDashboards=true). Install the Perses operator CRDs in the cluster (the Dash0 operator watches for them).\n\nStep 2: create dashboards as code. A PersesDashboard is a Kubernetes CR in your Git repo. It's the same Perses dashboard JSON/YAML that you'd configure in the Dash0 UI, wrapped in a Kubernetes resource. Drop it in your k8s/dashboards/ folder alongside your Deployment manifests.\n\nStep 3: GitOps flow. PR → review → merge → ArgoCD syncs the PersesDashboard to the cluster → the Dash0 operator detects the new/updated resource → calls the Dash0 API to create/update the dashboard in Dash0. No manual UI steps.\n\nStep 4: rollback. If a dashboard update breaks something, git revert → ArgoCD syncs the old PersesDashboard → operator updates Dash0. Full version history in Git.\n\nBonus: combine with PrometheusRule and Dash0SyntheticCheck CRDs for a fully declarative observability config: dashboards, alert rules, and synthetic monitors all managed as Kubernetes CRDs in the same GitOps repo as the application code.",u:["https://github.com/dash0hq/dash0-operator","https://www.dash0.com/documentation"]},
// ─── Deep Technical (4) ───
{q:"Engineer needs opt-in instrumentation only: instrument specific workloads, leave everything else alone.",a:"Two-layer approach: namespace-level mode + per-workload labels.\n\nLayer 1 — set Dash0Monitoring mode to 'none' at the namespace level. This tells the operator: do not instrument anything in this namespace by default.\n\nspec:\n  instrumentWorkloads:\n    mode: none\n\nWith mode=none, no pods are touched regardless of what labels they have.\n\nLayer 2 — for workloads you DO want instrumented, use a labelSelector in the Dash0Monitoring v1beta1 API instead of mode=none:\n\nspec:\n  instrumentWorkloads:\n    mode: created-and-updated\n    labelSelector:\n      matchLabels:\n        dash0.com/enable: 'true'\n\nNow only pods with the label dash0.com/enable=true are instrumented. Add this label to specific Deployments:\n\nmetadata:\n  labels:\n    dash0.com/enable: 'true'\n\nVerification: kubectl describe pod <pod-name> | grep JAVA_TOOL_OPTIONS — should be present on labeled pods and absent on unlabeled ones.\n\nAlternative: use the global mode=all + per-workload dash0.com/enable=false (opt-OUT model). Choose based on your team's security posture — opt-in is safer for regulated environments.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md"]},
{q:"Engineer debugging: Java app not being instrumented after operator install. No traces in Dash0.",a:"Systematic debug runbook. Work through these steps in order.\n\nStep 1: Is the Dash0Monitoring resource present? kubectl get dash0monitoring -n <namespace>. If absent, create one with mode=all. This is the most common cause.\n\nStep 2: Is the workload excluded? kubectl get deployment <name> -n <namespace> -o jsonpath='{.metadata.labels}'. If dash0.com/enable=false is present, remove it.\n\nStep 3: Is the init container being injected? kubectl describe pod <pod-name> | grep -A5 'Init Containers'. Look for the dash0-instrumentation init container. If absent, the webhook isn't firing.\n\nStep 4: Is the webhook active? kubectl get mutatingwebhookconfigurations | grep dash0. If absent or if namespaceSelector doesn't match, the webhook is skipped.\n\nStep 5: Check JAVA_TOOL_OPTIONS. kubectl exec <pod> -- env | grep JAVA_TOOL_OPTIONS. Should be -javaagent:/__otel_auto_instrumentation/agents/javaagent.jar. If absent, the init container ran but didn't write env vars — check init container logs.\n\nStep 6: Is the JVM picking it up? kubectl logs <pod> | grep 'OpenTelemetry'. Look for [otel.javaagent] startup lines. If present, the agent loaded. If not, JAVA_TOOL_OPTIONS may be getting overridden by the container's env block.\n\nStep 7: Network — can the pod reach the collector? kubectl exec <pod> -- curl -v http://dash0-operator-opentelemetry-collector.dash0-system:4318/v1/traces. HTTP 200/405 means the collector is reachable. If unreachable, check NetworkPolicy.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://github.com/dash0hq/dash0-operator"]},
{q:"Engineer needs to configure OTTL filters to drop high-cardinality metrics (e.g., per-pod HTTP metrics with URL path as a dimension).",a:"Use the spec.filter field in the Dash0Monitoring resource. High-cardinality metric filtering is a metric datapoint-level operation.\n\nExample: drop all datapoints where the http.url attribute contains a UUID (high-cardinality path like /api/users/abc123/orders):\n\nspec:\n  filter:\n    metrics:\n      datapoint:\n        - 'IsMatch(attributes[\"http.url\"], \".*/[0-9a-f]{8}-.*\")'\n\nExample: drop the entire http.server.request.duration metric for a specific service:\n\n  metrics:\n    metric:\n      - 'name == \"http.server.request.duration\" and resource.attributes[\"service.name\"] == \"payment-service\"'\n\nExample: keep only p50/p95/p99 percentiles, drop p5/p10/p25 from histograms:\n\n  metrics:\n    datapoint:\n      - 'metric.type == METRIC_DATA_TYPE_HISTOGRAM and attributes[\"le\"] == \"0.005\"'\n\nOTTL conditions in the list are OR'd — any condition match drops the item. For AND logic, combine conditions in a single expression using &&.\n\nAfter applying, verify with kubectl logs -n dash0-system daemonset/dash0-operator-opentelemetry-collector | grep -i error to confirm no OTTL parse errors. Check Dash0 metric cardinality to confirm reduction.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://opentelemetry.io/docs/collector/transforming-telemetry/"]},
{q:"Engineer needs to export telemetry to both Dash0 AND their existing Grafana/Loki/Tempo stack simultaneously.",a:"Multi-export is a first-class feature. Use the exports[] array in Dash0OperatorConfiguration.\n\nStep 1: define both exports in the config:\n\napiVersion: operator.dash0.com/v1alpha1\nkind: Dash0OperatorConfiguration\nspec:\n  exports:\n    - dash0:\n        endpoint: ingress.eu-west-1.aws.dash0.com:4317\n        authorization:\n          token: your-dash0-token\n    - grpc:\n        endpoint: tempo.monitoring.svc.cluster.local:4317\n    - http:\n        endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp\n        encoding: proto\n\nStep 2: for per-namespace overrides (e.g., only certain namespaces export to Grafana), add exports[] to the Dash0Monitoring resource for those namespaces.\n\nStep 3: verify both pipelines receive data. For Dash0: check Tracing in the Dash0 UI. For Tempo: kubectl exec -n monitoring tempo-0 -- wget -qO- 'http://localhost:3200/api/search' | jq '.traces[0]'.\n\nCaveats: multiple exports increase network egress from the collector pods. Monitor collector resource usage (kubectl top pods -n dash0-system) after enabling. The dash0 export type supports CRD sync (dashboards, check rules); grpc/http exports do not — they only receive telemetry data.",u:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://github.com/dash0hq/dash0-operator"]},
];

const LESSONS=[
{id:"lesson-1",title:"What is the Dash0 Operator?",time:"15m",week:1,icon:"🏗️",sources:["https://github.com/dash0hq/dash0-operator","https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md"],
body:`<div class="lesson-section"><h4>What Problem It Solves</h4><div class="lesson-text"><p>Getting OpenTelemetry traces, metrics, logs, and profiles out of a Kubernetes cluster traditionally requires per-service SDK instrumentation, manual Collector deployment, and ongoing config maintenance. The Dash0 Operator automates all of this through Kubernetes-native CRDs.</p><p>Install the operator once via Helm. Apply one YAML per namespace. Every eligible workload gets auto-instrumented — no application code changes, no SDK upgrades, no Dockerfile modifications required.</p></div></div><div class="lesson-section"><h4>The CRD Hierarchy</h4><div class="lesson-text"><p>The operator exposes three layers of configuration through Kubernetes Custom Resource Definitions:</p></div><div class="lesson-highlight"><strong>Dash0OperatorConfiguration</strong> (cluster-scoped, one per cluster) — sets the global OTLP export target, auth, API endpoint, and cluster-wide feature flags. This is your "master config."</div><div class="lesson-highlight"><strong>Dash0Monitoring</strong> (namespace-scoped, one per namespace) — enables telemetry collection for that namespace. Controls instrumentation mode, log collection, Prometheus scraping, OTTL filters, and can override the global export target.</div><div class="lesson-highlight"><strong>Workloads</strong> (Deployments, DaemonSets, StatefulSets, Jobs, CronJobs, Pods) — the leaf nodes. Controlled via the Dash0Monitoring resource above them, with per-workload opt-out via the <code class="code-inline">dash0.com/enable: "false"</code> label.</div></div><div class="lesson-section"><h4>Beyond Telemetry: GitOps CRDs</h4><div class="lesson-text"><p>The operator also manages four additional CRD types that sync to the Dash0 platform via the Dash0 REST API:</p><ul style="margin-left:20px;margin-top:8px;line-height:2;font-size:13px;color:#d1d5db"><li><strong>PersesDashboard</strong> — dashboard definitions, synced to Dash0</li><li><strong>PrometheusRule</strong> — Prometheus alert rules, synced as Dash0 check rules</li><li><strong>Dash0SyntheticCheck</strong> — synthetic monitors (uptime, API probes)</li><li><strong>Dash0View</strong> — saved views on traces, logs, resources</li></ul><p style="margin-top:12px">This makes the Dash0 Operator a complete GitOps observability controller — not just a telemetry collector.</p></div></div>`,
exercises:[{task:"Explore the operator CRDs in your cluster",hint:"Use kubectl to list all Dash0 CRDs and describe the key ones",steps:["kubectl get crds | grep dash0","kubectl explain Dash0OperatorConfiguration","kubectl explain Dash0Monitoring.spec","kubectl get dash0operatorconfiguration -A","kubectl get dash0monitoring -A"]}]},

{id:"lesson-2",title:"Installation & Helm Configuration",time:"20m",week:1,icon:"⚙️",sources:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md"],
body:`<div class="lesson-section"><h4>Adding the Helm Repository</h4><div class="lesson-text"><p>The Dash0 Operator is distributed as a Helm chart. Add the repo before installing:</p></div><div class="code-block">helm repo add dash0-operator https://dash0hq.github.io/dash0-operator
helm repo update dash0-operator</div></div><div class="lesson-section"><h4>Minimal Install Command</h4><div class="lesson-text"><p>The two mandatory values are the OTLP/gRPC endpoint and an authorization token. The namespace <code class="code-inline">dash0-system</code> is created automatically:</p></div><div class="code-block">helm install \
  dash0-operator \
  dash0-operator/dash0-operator \
  --namespace dash0-system \
  --create-namespace \
  --set operator.dash0Export.enabled=true \
  --set operator.dash0Export.endpoint=ingress.eu-west-1.aws.dash0.com:4317 \
  --set operator.dash0Export.token=YOUR_AUTH_TOKEN \
  --set operator.dash0Export.apiEndpoint=https://api.eu-west-1.aws.dash0.com</div></div><div class="lesson-section"><h4>Key Helm Values</h4><div class="lesson-text"><p>Beyond the mandatory values, these are the most important configuration knobs:</p></div><div class="lesson-highlight"><strong>operator.dash0Export.secretRef</strong> — reference a Kubernetes Secret instead of an inline token. Preferred for production security.</div><div class="lesson-highlight"><strong>operator.selfMonitoring.enabled</strong> (default: true) — sends operator health metrics/logs to Dash0. Useful for monitoring the operator itself.</div><div class="lesson-highlight"><strong>operator.telemetryCollection.enabled</strong> (default: true) — set false for IaC-only mode (CRD sync without deploying collectors).</div><div class="lesson-highlight"><strong>gke.autopilot.enabled=true</strong> — enables GKE Autopilot compatibility mode.</div><div class="lesson-highlight"><strong>operator.prometheusCrdSupportEnabled=true</strong> — enables ServiceMonitor/PodMonitor/ScrapeConfig support.</div></div><div class="lesson-section"><h4>Enabling a Namespace</h4><div class="lesson-text"><p>After operator install, apply a Dash0Monitoring resource to each namespace you want to monitor:</p></div><div class="code-block">apiVersion: operator.dash0.com/v1alpha1
kind: Dash0Monitoring
metadata:
  name: dash0-monitoring
  namespace: my-app
spec:
  instrumentWorkloads:
    mode: created-and-updated
  logCollection:
    enabled: true</div></div>`,
exercises:[{task:"Install the Dash0 Operator in a test cluster and verify it starts",hint:"Use a kind or minikube cluster; substitute your real endpoint and token",steps:["helm repo add dash0-operator https://dash0hq.github.io/dash0-operator","helm repo update dash0-operator","helm install dash0-operator dash0-operator/dash0-operator --namespace dash0-system --create-namespace --set operator.dash0Export.enabled=true --set operator.dash0Export.endpoint=YOUR_ENDPOINT --set operator.dash0Export.token=YOUR_TOKEN","kubectl get pods -n dash0-system -w","kubectl get dash0operatorconfiguration"]}]},

{id:"lesson-3",title:"Auto-Instrumentation Deep Dive",time:"25m",week:1,icon:"💉",sources:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://github.com/dash0hq/dash0-operator"],
body:`<div class="lesson-section"><h4>How It Works: Webhook + Init Container</h4><div class="lesson-text"><p>When a pod is created or updated in a monitored namespace, Kubernetes routes the pod spec through the Dash0 mutating admission webhook before storing it in etcd. The webhook modifies the pod spec to:</p><ol style="margin-left:20px;line-height:2;font-size:13px;color:#d1d5db"><li>Inject a <code class="code-inline">dash0-instrumentation</code> init container</li><li>Mount a shared volume at <code class="code-inline">/__otel_auto_instrumentation/</code></li><li>Add environment variables: <code class="code-inline">JAVA_TOOL_OPTIONS</code>, <code class="code-inline">NODE_OPTIONS</code>, <code class="code-inline">CORECLR_ENABLE_PROFILING</code>, etc.</li><li>Add <code class="code-inline">OTEL_EXPORTER_OTLP_ENDPOINT</code> pointing to the on-node DaemonSet collector</li></ol><p style="margin-top:8px">The init container copies agent binaries to <code class="code-inline">/__otel_auto_instrumentation/agents/</code> before the app container starts. The app container's JVM (or Node.js runtime) automatically loads the agent via the injected environment variable.</p></div></div><div class="lesson-section"><h4>Supported Runtimes</h4><div class="lesson-highlight"><strong>Java 8+</strong> — upstream OpenTelemetry Java agent (javaagent.jar). Covers Spring, Micronaut, Quarkus, and hundreds of libraries via -javaagent flag.</div><div class="lesson-highlight"><strong>Node.js 16+</strong> — Dash0's own Node.js OTel distribution (enhanced upstream SDK). Injected via NODE_OPTIONS=--require.</div><div class="lesson-highlight"><strong>.NET</strong> — OTel .NET auto-instrumentation via CLR profiler env vars. Supports .NET 6+.</div><div class="lesson-highlight"><strong>Python 3.9+ (beta)</strong> — requires Helm flag <code class="code-inline">operator.instrumentation.enablePythonAutoInstrumentation=true</code>. Uses http/protobuf protocol only.</div></div><div class="lesson-section"><h4>Instrumentation Modes</h4><div class="lesson-text"><p>The <code class="code-inline">instrumentWorkloads.mode</code> field (v1beta1 Dash0Monitoring) controls when the webhook fires:</p></div><div class="code-block">mode: all              # Instrument ALL workloads immediately (restarts existing pods)
mode: created-and-updated  # Only new/changed workloads (safe for production)
mode: none             # Disable instrumentation entirely in this namespace</div><div class="lesson-text" style="margin-top:10px"><p>For granular control, use <code class="code-inline">labelSelector</code> to target only specific workloads:</p></div><div class="code-block">spec:
  instrumentWorkloads:
    mode: created-and-updated
    labelSelector:
      matchLabels:
        dash0.com/enable: "true"</div></div>`,
exercises:[{task:"Deploy a sample app and verify auto-instrumentation is applied",hint:"Check for the init container and environment variables",steps:["kubectl apply -f https://raw.githubusercontent.com/open-telemetry/opentelemetry-demo/main/kubernetes/opentelemetry-demo.yaml -n my-app","kubectl describe pod -n my-app -l app.kubernetes.io/name=frontend | grep -A10 'Init Containers'","kubectl exec -n my-app <pod-name> -- env | grep -E 'JAVA_TOOL_OPTIONS|NODE_OPTIONS|OTEL'","kubectl logs -n my-app <pod-name> -c dash0-instrumentation"]}]},

{id:"lesson-4",title:"Export Configuration Patterns",time:"25m",week:2,icon:"📤",sources:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md"],
body:`<div class="lesson-section"><h4>Three Export Types</h4><div class="lesson-text"><p>The Dash0OperatorConfiguration supports three export types in the <code class="code-inline">exports[]</code> array. You can mix and match in a single config:</p></div><div class="code-block">spec:
  exports:
    # Type 1: Dash0 (recommended — enables CRD sync)
    - dash0:
        endpoint: ingress.eu-west-1.aws.dash0.com:4317
        authorization:
          token: your-token           # inline (less secure)
          # OR:
          secretRef:
            name: dash0-secret        # Kubernetes Secret name
            key: token                # Secret key
        dataset: production           # optional, defaults to "default"

    # Type 2: Generic gRPC (any OTLP/gRPC backend)
    - grpc:
        endpoint: tempo.monitoring.svc:4317
        headers:
          - name: Authorization
            value: Bearer grafana-token

    # Type 3: HTTP/OTLP (Loki, Jaeger, custom backends)
    - http:
        endpoint: http://loki.monitoring.svc:3100/otlp
        encoding: proto               # or "json"</div></div><div class="lesson-section"><h4>Per-Namespace Export Override</h4><div class="lesson-text"><p>A Dash0Monitoring resource can override the cluster-wide exports for its namespace. This enables multi-tenant setups where different teams route telemetry to different Dash0 organizations:</p></div><div class="code-block">apiVersion: operator.dash0.com/v1alpha1
kind: Dash0Monitoring
metadata:
  name: dash0-monitoring
  namespace: team-alpha
spec:
  exports:
    - dash0:
        endpoint: ingress.us-east-1.aws.dash0.com:4317
        authorization:
          secretRef:
            name: team-alpha-dash0-secret
            key: token</div></div><div class="lesson-section"><h4>Security: secretRef vs token</h4><div class="lesson-highlight">Using <strong>token</strong>: the value is rendered into a Kubernetes ConfigMap — readable by anyone with cluster API access or cluster-admin rights. Acceptable in dev/test.</div><div class="lesson-highlight">Using <strong>secretRef</strong>: the token is stored in a Kubernetes Secret. K8s Secrets are base64-encoded (not encrypted) by default — pair with KMS envelope encryption (EKS KMS, GCP CKMS) for true at-rest encryption in production.</div></div>`,
exercises:[{task:"Configure dual export: send telemetry to both Dash0 and a local OTLP collector simultaneously",hint:"Edit the Dash0OperatorConfiguration to add a second export entry",steps:["kubectl edit dash0operatorconfiguration dash0-operator-configuration-auto-resource","Add a grpc or http export entry pointing to your local collector (e.g., otel-collector.monitoring.svc:4317)","kubectl logs -n dash0-system daemonset/dash0-operator-opentelemetry-collector | tail -50","Verify data appears in both backends"]}]},

{id:"lesson-5",title:"Telemetry Pipeline Architecture",time:"25m",week:2,icon:"🔀",sources:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md"],
body:`<div class="lesson-section"><h4>Two Collector Roles</h4><div class="lesson-text"><p>The Dash0 Operator deploys two types of OpenTelemetry Collector instances, each with a distinct role:</p></div><div class="lesson-highlight"><strong>DaemonSet Collector</strong> — runs on every node. Responsible for: collecting pod logs via filelog receiver (tails /var/log/pods/), node-level metrics (kubelet, node_exporter), and receiving traces/metrics from workloads on the same node via OTLP (localhost). Low latency, local routing.</div><div class="lesson-highlight"><strong>Deployment Collector</strong> — runs as a single (or replicated) deployment. Responsible for: cluster-level metrics (kube-state-metrics, Kubernetes API server events), cross-node trace aggregation, and CRD-driven configuration. Acts as the cluster "gateway."</div></div><div class="lesson-section"><h4>OTTL Filter & Transform</h4><div class="lesson-text"><p>The Dash0Monitoring spec supports OTTL-based filtering and transformation at the namespace level. Changes are reconciled into the collector config without a collector restart (config reloader watches for changes).</p></div><div class="code-block">spec:
  # Drop health check spans
  filter:
    traces:
      span:
        - 'attributes["http.route"] == "/health"'
        - 'attributes["http.route"] == "/ready"'
    metrics:
      datapoint:
        - 'metric.name == "http.server.request.duration" and attributes["http.route"] =~ "/internal/.*"'

  # Enrich spans with a custom attribute
  transform:
    trace_statements:
      - context: span
        statements:
          - 'set(attributes["environment"], "production")'</div></div><div class="lesson-section"><h4>Log Collection & Filelog Offset Sync</h4><div class="lesson-text"><p>The DaemonSet collector uses the filelog receiver with checkpoint offsets stored on the node — so if the collector pod restarts, it resumes reading from where it left off, preventing duplicate log delivery. Enable or disable per-namespace via:</p></div><div class="code-block">spec:
  logCollection:
    enabled: true   # default; set false to disable for this namespace</div></div>`,
exercises:[{task:"Inspect the collector pods and their configurations",hint:"The operator generates OTel collector configs as ConfigMaps in dash0-system",steps:["kubectl get pods -n dash0-system","kubectl logs -n dash0-system daemonset/dash0-operator-opentelemetry-collector | head -50","kubectl get configmap -n dash0-system | grep collector","kubectl describe configmap -n dash0-system <collector-config-map>","kubectl top pods -n dash0-system"]}]},

{id:"lesson-6",title:"Prometheus & Perses Integration",time:"20m",week:2,icon:"📊",sources:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://prometheus-operator.dev/docs/api-reference/api/"],
body:`<div class="lesson-section"><h4>Three Ways to Collect Prometheus Metrics</h4><div class="lesson-highlight"><strong>1. Annotation scraping</strong> — add <code class="code-inline">prometheus.io/scrape: "true"</code> + <code class="code-inline">prometheus.io/port: "8080"</code> to any pod. The operator's collector discovers and scrapes automatically. No CRDs needed. Enabled per-namespace via <code class="code-inline">spec.prometheusScraping.enabled=true</code>.</div><div class="lesson-highlight"><strong>2. Prometheus CRDs</strong> — for teams already using ServiceMonitor/PodMonitor/ScrapeConfig. Enable at install time: <code class="code-inline">--set operator.prometheusCrdSupportEnabled=true</code>. The Target Allocator handles CRD discovery and assigns targets to the correct DaemonSet collector node.</div><div class="lesson-highlight"><strong>3. PrometheusRule sync</strong> — existing Prometheus alert rules (PrometheusRule CRDs) are watched by the operator and synced to Dash0 as check rules via the Dash0 API. Requires <code class="code-inline">apiEndpoint</code> to be configured.</div></div><div class="lesson-section"><h4>Creating a ServiceMonitor</h4><div class="lesson-text"><p>After enabling Prometheus CRD support, ServiceMonitors work exactly as they do in a Prometheus Operator setup:</p></div><div class="code-block">apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: my-app-monitor
  namespace: my-app
spec:
  selector:
    matchLabels:
      app: my-app
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics</div></div><div class="lesson-section"><h4>Perses Dashboard Sync</h4><div class="lesson-text"><p>PersesDashboard CRDs (from the Perses operator) are watched by the Dash0 operator and synced to Dash0 dashboards via the API. This enables full GitOps dashboard management:</p></div><div class="code-block">apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: my-service-dashboard
  namespace: my-app
spec:
  # ... Perses dashboard JSON spec
  # Same format as Dash0 UI dashboard export</div><div class="lesson-text" style="margin-top:8px"><p>To exclude a specific resource from sync, add the label <code class="code-inline">dash0.com/enable: "false"</code> to the PrometheusRule or PersesDashboard resource.</p></div></div>`,
exercises:[{task:"Create a ServiceMonitor and verify metrics flow into Dash0",hint:"Requires prometheusCrdSupportEnabled=true and a running app with a /metrics endpoint",steps:["Ensure operator.prometheusCrdSupportEnabled=true is set (helm upgrade if needed)","kubectl apply -f your-servicemonitor.yaml","kubectl get servicemonitor -n my-app","kubectl logs -n dash0-system deployment/dash0-operator-target-allocator | grep -i scrape","Check Dash0 → Metrics for your service metrics"]}]},

{id:"lesson-7",title:"Advanced Operations",time:"25m",week:3,icon:"🔧",sources:["https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md","https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/values.yaml"],
body:`<div class="lesson-section"><h4>Self-Monitoring</h4><div class="lesson-text"><p>The operator sends its own telemetry (metrics, logs, traces about the operator itself) to the configured Dash0 backend. This is enabled by default and works even if <code class="code-inline">telemetryCollection.enabled=false</code> — it bypasses the managed collectors and sends directly. Monitor for: controller reconciliation latency, webhook errors, CRD sync failures.</p></div></div><div class="lesson-section"><h4>Auto-Namespace Monitoring</h4><div class="lesson-text"><p>For clusters with many namespaces, enable auto-namespace monitoring instead of creating Dash0Monitoring resources manually:</p></div><div class="code-block">operator:
  autoMonitorNamespaces:
    enabled: true
  monitoringTemplate:
    spec:
      instrumentWorkloads:
        mode: created-and-updated
      logCollection:
        enabled: true</div><div class="lesson-text" style="margin-top:8px"><p>The operator auto-creates a Dash0Monitoring resource for every existing and new namespace. To exclude a namespace: <code class="code-inline">kubectl label namespace kube-monitoring dash0.com/enable=false</code>. The namespaces kube-system, kube-node-lease, kube-public, and dash0-system are always excluded.</p></div></div><div class="lesson-section"><h4>Profiling (Opt-In)</h4><div class="lesson-text"><p>Continuous profiling (CPU, memory, goroutine profiles) is disabled by default. Enable cluster-wide:</p></div><div class="code-block">helm upgrade dash0-operator dash0-operator/dash0-operator \
  --set profilingEnabled=true \
  --reuse-values</div></div><div class="lesson-section"><h4>Rate Limiting & Staged Rollouts</h4><div class="lesson-text"><p>When using <code class="code-inline">mode=all</code> to instrument an existing cluster with many workloads, stagger the pod restarts to avoid overwhelming the API server:</p></div><div class="code-block">operator:
  instrumentation:
    delayAfterEachWorkloadMillis: 500    # 0.5s between each workload
    delayAfterEachNamespaceMillis: 2000  # 2s between namespaces
    debug: true                          # verbose init container logs</div></div><div class="lesson-section"><h4>Troubleshooting Checklist</h4><div class="lesson-highlight">No traces? → Check Dash0Monitoring exists → check dash0.com/enable label → check webhook → check init container → check OTEL env vars → check network to collector.</div><div class="lesson-highlight">No metrics? → Check prometheusScraping.enabled → check prometheus.io annotations → check Target Allocator logs.</div><div class="lesson-highlight">No logs? → Check logCollection.enabled → check DaemonSet collector pod health → check /var/log/pods permissions.</div></div>`,
exercises:[{task:"Enable profiling and verify operator self-monitoring metrics appear in Dash0",hint:"Check operator metrics endpoint and Dash0 infrastructure dashboards",steps:["helm upgrade dash0-operator dash0-operator/dash0-operator --set profilingEnabled=true --reuse-values","kubectl get pods -n dash0-system -w","kubectl logs -n dash0-system deployment/dash0-operator-controller-manager | grep -i profil","Open Dash0 → Infrastructure → filter by service.name=dash0-operator"]}]},

{id:"lesson-8",title:"Competitive Positioning",time:"20m",week:3,icon:"🏆",sources:["https://github.com/dash0hq/dash0-operator","https://www.dash0.com/blog"],
body:`<div class="lesson-section"><h4>vs. Datadog Operator</h4><div class="lesson-text"><p>Datadog's Kubernetes operator auto-injects their proprietary APM tracer. The instrumentation code is Datadog-specific — switching later means re-instrumenting. Datadog charges per APM host, making costs unpredictable at scale. Their operator is closed source.</p></div><div class="lesson-highlight">Dash0 advantage: OTel-native (open standards, portable), no per-host licensing, full source visibility on GitHub. If you leave Dash0, your OTel instrumentation stays intact.</div></div><div class="lesson-section"><h4>vs. Grafana Alloy</h4><div class="lesson-text"><p>Grafana Alloy (formerly Grafana Agent) is a powerful collector but it's a collector only — it collects existing telemetry signals but does not auto-instrument workloads. Teams must still add OTel SDKs manually to get traces.</p></div><div class="lesson-highlight">Dash0 advantage: zero-code trace generation via the mutating webhook. Alloy + Dash0 Operator are complementary — Alloy for existing log pipelines, Dash0 Operator for auto-instrumentation.</div></div><div class="lesson-section"><h4>vs. Dynatrace OneAgent</h4><div class="lesson-text"><p>Dynatrace OneAgent uses a proprietary instrumentation approach with a DaemonSet that injects into every process. Powerful, but entirely proprietary — the agent protocol, the data format, the backend are all Dynatrace. High switching cost.</p></div><div class="lesson-highlight">Dash0 advantage: OpenTelemetry protocol end-to-end. Same OTel SDKs, same OTLP wire format. Extending to a second backend (Grafana, Honeycomb) is trivial — add an export entry.</div></div><div class="lesson-section"><h4>vs. Manual OTel Setup</h4><div class="lesson-text"><p>Manual OTel setup means per-service SDK instrumentation, hand-crafted Collector YAML, per-namespace ConfigMaps, and no CRD-based management. It works but has high operational overhead. Every config change is a YAML edit + deploy cycle.</p></div><div class="lesson-highlight">Dash0 advantage: Kubernetes-native lifecycle management. CRDs for everything. Config changes reconcile automatically. Auto-instrumentation eliminates per-service SDK work. Teams get observability without being OTel experts.</div></div><div class="lesson-section"><h4>The Core Value Proposition</h4><div class="lesson-text"><p>Dash0 Operator = zero-code observability + GitOps-native config + 100% OpenTelemetry. One Helm install, one YAML per namespace, traces/metrics/logs/profiles flowing in minutes. No vendor lock-in. Existing Prometheus investments reused. Runs alongside existing tooling.</p></div></div>`,
exercises:[{task:"Build a 2-minute competitive pitch: Dash0 Operator vs. Datadog",hint:"Focus on: OTel-native, no lock-in, Prometheus reuse, cost model",steps:["Write out the 3 strongest differentiation points on paper","Practice out loud: acknowledge what Datadog does well, then pivot to OTel portability","Add the Prometheus compatibility angle: ServiceMonitor/PodMonitor support","Close with the 'run both' ask: pilot Dash0 alongside Datadog in one namespace"]}]},
];

// ─── PERSISTENCE ───
// TODO: Change storage key to something unique for your course
const STORAGE_KEY="dash0-operator-cc";
function saveState(){
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}catch(e){}
debouncedCloudSave();
}
function loadState(){
try{
const raw=localStorage.getItem(STORAGE_KEY);
if(!raw)return null;
return JSON.parse(raw);
}catch(e){return null}
}
function exportState(){
try{return localStorage.getItem(STORAGE_KEY)||"{}"}catch(e){return"{}"}
}
function importState(json){
try{
const data=JSON.parse(json);
if(data.stats){stats={...stats,...data.stats}}
if(data.history){sessionHistory=data.history}
saveState();render();return true;
}catch(e){return false}
}
// ─── CLOUD SYNC ENGINE (offline-resilient) ───
let syncStatus='idle',lastSyncAt=null,syncPending=false;
function syncEnabled(){return typeof SYNC_SHEET_URL==='string'&&SYNC_SHEET_URL.length>10}
function getSyncKey(){return SYNC_USER_ID?(SYNC_USER_ID+'/'+STORAGE_KEY):STORAGE_KEY}
function isOnline(){return typeof navigator!=='undefined'?navigator.onLine:true}
async function cloudSave(){
if(!syncEnabled()){syncPending=false;return}
if(!isOnline()){syncStatus='offline';syncPending=true;updateSyncUI();return}
syncStatus='syncing';updateSyncUI();
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
await fetch(SYNC_SHEET_URL+'?action=save&key='+encodeURIComponent(getSyncKey()),{
method:'POST',headers:{'Content-Type':'text/plain'},
body:JSON.stringify({data,savedAt:data.savedAt})
});
syncStatus='synced';lastSyncAt=new Date().toISOString();syncPending=false;
}catch(e){
syncStatus=isOnline()?'error':'offline';syncPending=true;
console.warn('Cloud sync save failed:',e);
}
updateSyncUI();
}
async function cloudLoad(){
if(!syncEnabled())return null;
if(!isOnline()){syncStatus='offline';updateSyncUI();return null}
syncStatus='syncing';updateSyncUI();
try{
const resp=await fetch(SYNC_SHEET_URL+'?action=load&key='+encodeURIComponent(getSyncKey()));
const json=await resp.json();
syncStatus='synced';lastSyncAt=new Date().toISOString();updateSyncUI();
if(json.ok&&json.data)return json;
return null;
}catch(e){syncStatus=isOnline()?'error':'offline';updateSyncUI();console.warn('Cloud sync load failed:',e);return null}
}
function updateSyncUI(){
const el=document.getElementById('sync-badge');
if(!el)return;
const icons={idle:'☁️',syncing:'⟳',synced:'✓',error:'✕',offline:'⏸'};
const colors={idle:'#6b7280',syncing:'#f59e0b',synced:'#10b981',error:'#ef4444',offline:'#6b7280'};
const titles={idle:'Cloud sync ready',syncing:'Syncing...',synced:'Synced'+(lastSyncAt?' '+new Date(lastSyncAt).toLocaleTimeString():''),error:'Sync error — will retry when online',offline:'Offline — will sync when reconnected'};
el.textContent=icons[syncStatus]||'☁️';el.style.color=colors[syncStatus]||'#6b7280';el.title=titles[syncStatus]||'';
}
let syncTimer=null;
function debouncedCloudSave(){
if(!syncEnabled())return;
if(syncTimer)clearTimeout(syncTimer);
syncTimer=setTimeout(()=>cloudSave(),2000);
}
function saveSyncSettings(url,userId){
SYNC_SHEET_URL=url.trim();
SYNC_USER_ID=(userId||'').trim();
try{
if(SYNC_SHEET_URL)localStorage.setItem(STORAGE_KEY+'-sync-url',SYNC_SHEET_URL);
else localStorage.removeItem(STORAGE_KEY+'-sync-url');
if(SYNC_USER_ID)localStorage.setItem(STORAGE_KEY+'-sync-user',SYNC_USER_ID);
else localStorage.removeItem(STORAGE_KEY+'-sync-user');
}catch(e){}
updateSyncUI();
if(syncEnabled())cloudLoad().then(cloud=>{
if(cloud&&cloud.data){
const local=loadState();
const localTime=local&&local.savedAt?new Date(local.savedAt).getTime():0;
const cloudTime=cloud.savedAt?new Date(cloud.savedAt).getTime():0;
if(cloudTime>localTime){
const d=cloud.data;
if(d.stats){stats={...stats,...d.stats};if(!stats.quizScores)stats.quizScores={}}
if(d.history)sessionHistory=d.history;
if(d.exercisesDone)exercisesDone=d.exercisesDone;
if(d.schedule)schedule=d.schedule;
if(d.checkpoints)checkpoints=d.checkpoints;
if(d.sessionsDone)sessionsDone=d.sessionsDone;
if(d.userRole)userRole=d.userRole;
if(d.fcFavs)fcFavs=new Set(d.fcFavs);
if(d.lastCard){fcCat=d.lastCard.cat||"All";fcIdx=d.lastCard.idx||0}
if(d.cardRatings)cardRatings=d.cardRatings;
saveState();
}
render();
}
});
}
// Auto-sync when coming back online
if(typeof window!=='undefined'){
window.addEventListener('online',()=>{
if(syncEnabled()&&syncPending){console.log('☁️ Back online — syncing pending changes');cloudSave()}
else if(syncEnabled()){syncStatus='idle';updateSyncUI()}
});
window.addEventListener('offline',()=>{
if(syncEnabled()){syncStatus='offline';updateSyncUI()}
});
}

stats={quizzes:0,bestQuiz:0,cards:0,scenarios:0,rapid:0,bestRapid:0};
sessionHistory=[];exercisesDone={};schedule=JSON.parse(JSON.stringify(DEFAULT_SESSIONS));checkpoints=JSON.parse(JSON.stringify(DEFAULT_CHECKPOINTS));sessionsDone={};userRole=null;cardRatings={};
try{localStorage.removeItem(STORAGE_KEY)}catch(e){}
showConfirm=false;mode="dashboard";render();

else if(key==="cards"){stats.cards=0;cardRatings={}}
else if(key==="scenarios"){stats.scenarios=0}
else if(key==="rapid"){stats.rapid=0;stats.bestRapid=0}
else if(key==="exercises"){exercisesDone={}}

let mode="dashboard",fcCat="All",fcDiff="All Levels",fcIdx=0,fcFlipped=false,fcSeen=new Set(),fcFavs=new Set();
let qzQs=[],qzIdx=0,qzSel=null,qzShow=false,qzScore=0,qzDone=false,qzMode=null; // qzMode: null=picker, category string, or "final"

let learnView="list",learnIdx=0,exercisesDone={};
let schedule=[],checkpoints=[],sessionsDone={},showForm=null,editId=null,formData={};

// ─── LOAD SAVED STATE ───
(function(){
const saved=loadState();
if(saved){
if(saved.stats){stats={...stats,...saved.stats};if(!stats.quizScores)stats.quizScores={}}
if(saved.history)sessionHistory=saved.history;
if(saved.exercisesDone)exercisesDone=saved.exercisesDone;
if(saved.schedule)schedule=saved.schedule;
if(saved.checkpoints)checkpoints=saved.checkpoints;
if(saved.sessionsDone)sessionsDone=saved.sessionsDone;
if(saved.userRole)userRole=saved.userRole;
if(saved.fcFavs)fcFavs=new Set(saved.fcFavs);
if(saved.lastCard){fcCat=saved.lastCard.cat||"All";fcIdx=saved.lastCard.idx||0}
if(saved.cardRatings)cardRatings=saved.cardRatings;
}
if(!schedule.length)schedule=JSON.parse(JSON.stringify(DEFAULT_SESSIONS));
if(!checkpoints.length)checkpoints=JSON.parse(JSON.stringify(DEFAULT_CHECKPOINTS));
try{const syncUrl=localStorage.getItem(STORAGE_KEY+'-sync-url');if(syncUrl)SYNC_SHEET_URL=syncUrl;const syncUser=localStorage.getItem(STORAGE_KEY+'-sync-user');if(syncUser)SYNC_USER_ID=syncUser}catch(e){}
try{const fs=localStorage.getItem(STORAGE_KEY+'-fontsize');const validFs=['fs-s','fs-m','fs-l','fs-xl'];const applyFs=validFs.includes(fs)?fs:'fs-m';document.body.classList.remove(...validFs);document.body.classList.add(applyFs)}catch(e){document.body.classList.add('fs-m')}
})();
// ─── CLOUD SYNC ON LOAD ───
(async function(){
if(!syncEnabled())return;
const cloud=await cloudLoad();
if(!cloud||!cloud.data)return;
const local=loadState();
const localTime=local&&local.savedAt?new Date(local.savedAt).getTime():0;
const cloudTime=cloud.savedAt?new Date(cloud.savedAt).getTime():0;
if(cloudTime>localTime){
const d=cloud.data;
if(d.stats){stats={...stats,...d.stats};if(!stats.quizScores)stats.quizScores={}}
if(d.history)sessionHistory=d.history;
if(d.exercisesDone)exercisesDone=d.exercisesDone;
if(d.schedule)schedule=d.schedule;
if(d.checkpoints)checkpoints=d.checkpoints;
if(d.sessionsDone)sessionsDone=d.sessionsDone;
if(d.userRole)userRole=d.userRole;
if(d.fcFavs)fcFavs=new Set(d.fcFavs);
if(d.lastCard){fcCat=d.lastCard.cat||"All";fcIdx=d.lastCard.idx||0}
if(d.cardRatings)cardRatings=d.cardRatings;
saveState();render();
console.log('☁️ Loaded newer state from cloud ('+cloud.savedAt+')');
}
})();

function setFontSize(size){document.body.classList.remove('fs-s','fs-m','fs-l','fs-xl');document.body.classList.add(size);try{localStorage.setItem(STORAGE_KEY+'-fontsize',size)}catch(e){};render()}
function copyCode(btn){
  var block=btn.parentElement;
  var text=block.textContent.replace(/^Copy/,'').replace(/^Copied!/,'').trim();
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  });
}
function highlightCode(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/(#.*$)/gm,'<span style="color:#6b7280">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|\'(?:[^\'\\]|\\.)*\')/g,'<span style="color:#a5f3fc">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|while|true|false|null|import|from|export|class|extends|new|this|async|await)\b/g,'<span style="color:#f97316">$1</span>');
}
function codeBlock(code){
  return '<div class="code-block"><button class="code-copy" onclick="copyCode(this)">Copy</button>'+highlightCode(code)+'</div>';
}
function fcRate(rating){
  var cards=fcGetCards();
  if(!cards.length)return;
  var card=cards[fcIdx%cards.length];
  cardRatings[card.f]=rating;
  stats.cards=(stats.cards||0)+1;
  saveState();
  fcFlipped=false;
  // advance to next card
  var next=fcGetCards();
  if(next.length>0)fcIdx=(fcIdx+1)%next.length;
  render();
}

function fcWeightedShuffle(){
  var cards=fcGetCards();
  if(!cards.length)return;
  var weighted=[];
  cards.forEach(function(c,i){
    var r=cardRatings[c.f];
    var w=r==='missed'?3:r==='unsure'?2:1;
    for(var j=0;j<w;j++)weighted.push(i);
  });
  fcIdx=weighted[Math.floor(Math.random()*weighted.length)];
  fcFlipped=false;
  render();
}

if(hdr)hdr.innerHTML=userRole?`<span class="role-current" onclick="showRolePicker=true;render()">${ROLE_CONFIG[userRole].icon} ${ROLE_CONFIG[userRole].label.split(' ')[0]}</span>`:'';

// Append role picker overlay if needed
if(overlayHtml){const d=document.createElement('div');d.id='role-overlay-wrap';d.innerHTML=overlayHtml;const ex=document.getElementById('role-overlay-wrap');if(ex)ex.remove();document.body.appendChild(d)}else{const ex=document.getElementById('role-overlay-wrap');if(ex)ex.remove()}
}

const focus=(stats.quizzes||0)===0
?"Start with Learn mode to build your foundation"

el.innerHTML=`
<div style="text-align:center;margin-bottom:24px">
<div style="font-size:20px;font-weight:700;color:#e5e7eb">${COURSE_TITLE||'TODO: Course Title'}</div>
<div style="font-size:14px;color:#6b7280;margin-top:6px">Pick a mode to start &rarr; learn &rarr; quiz &rarr; drills</div>
</div>
<div class="stat-grid">
<div class="stat-card" onclick="setMode('quiz')" style="cursor:pointer"><div class="stat-num">${stats.quizzes||0}</div><div class="stat-label">Quizzes Taken</div></div>
<div class="stat-card" onclick="setMode('quiz')" style="cursor:pointer"><div class="stat-num">${stats.bestQuiz?stats.bestQuiz+'%':'—'}</div><div class="stat-label">Best Quiz</div></div>
<div class="stat-card" onclick="setMode('flashcards')" style="cursor:pointer"><div class="stat-num">${stats.cards||0}</div><div class="stat-label">Cards Flipped</div></div>
<div class="stat-card" onclick="setMode('scenarios')" style="cursor:pointer"><div class="stat-num">${stats.scenarios||0}</div><div class="stat-label">Scenarios Done</div></div>
<div class="stat-card" onclick="setMode('rapid')" style="cursor:pointer"><div class="stat-num">${stats.rapid||0}</div><div class="stat-label">Rapid Rounds</div></div>
<div class="stat-card" onclick="setMode('rapid')" style="cursor:pointer"><div class="stat-num">${stats.bestRapid||'—'}</div><div class="stat-label">Best Rapid</div></div>
<div class="stat-card" onclick="setMode('learn')" style="cursor:pointer"><div class="stat-num">${Object.keys(exercisesDone).length}/${LESSONS.reduce((s,l)=>s+l.exercises.length,0)}</div><div class="stat-label">Exercises</div></div>
<div class="stat-card" onclick="mode='flashcards';fcCat='⚠ Weak';render()" style="cursor:pointer"><div class="stat-num" style="color:#f59e0b">${weakCount}</div><div class="stat-label">Weak Cards</div></div>
</div>
<div class="focus-box"><div class="focus-title">Your Focus</div><div class="focus-text">${focus}</div></div>
${renderDashSchedule()}`;
}
function renderDashSchedule(){
const today=new Date().toISOString().slice(0,10);
const nextSession=schedule.filter(s=>s.date>=today&&!sessionsDone[s.id]).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time))[0];
const nextCp=checkpoints.filter(cp=>{
const met=getMetricVal(cp.metric);return met<cp.threshold&&cp.by>=today;
}).sort((a,b)=>a.by.localeCompare(b.by))[0];
const doneCount=Object.keys(sessionsDone).length;
let h=`<div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">`;
if(nextCp){
h+=`<div style="background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;display:flex;justify-content:space-between;align-items:center">
<div><div style="font-size:11px;color:#fbbf24;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Next Checkpoint</div><div style="font-size:14px;font-weight:600;color:#fde68a;margin-top:2px">${nextCp.target}</div></div>
<div style="text-align:right"><div style="font-size:11px;color:#6b7280">by ${fmtDate(nextCp.by)}</div><div style="font-size:13px;font-weight:600;color:#fff">${getMetricVal(nextCp.metric)}${nextCp.metric.includes('uiz')||nextCp.metric.includes('apid')||nextCp.metric==='exercises'?'%':''} / ${nextCp.threshold}${nextCp.metric.includes('uiz')||nextCp.metric.includes('apid')||nextCp.metric==='exercises'?'%':''}</div></div></div>`;
}
if(nextSession){
const isToday=nextSession.date===today;
h+=`<div style="background:#1f2937;border:1px solid ${isToday?'rgba(16,185,129,.4)':'#374151'};border-radius:12px;padding:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="setMode('manage');schedView='schedule';render()">
<div><div style="font-size:11px;color:${isToday?'#10b981':'#6b7280'};font-weight:600">${isToday?'TODAY':'NEXT UP'} · ${fmtDate(nextSession.date)} · ${nextSession.time}</div><div style="font-size:14px;font-weight:600;color:#e5e7eb;margin-top:2px">${nextSession.title}</div></div>
<div style="font-size:11px;color:#6b7280;white-space:nowrap">${nextSession.dur} min →</div></div>`;
}
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">
<div style="font-size:12px;color:#6b7280">${doneCount}/${schedule.length} sessions done</div>
<button style="background:none;border:none;color:#10b981;font-size:12px;font-weight:600;cursor:pointer" onclick="setMode('manage');schedView='schedule';render()">Full schedule →</button>
</div></div>`;
return h;
}
function schedItemHtml(s,isToday){
const done=sessionsDone[s.id];
return`<div class="sched-item${isToday?' today':''}${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min</div></div>
<div class="si-title">${s.title}</div>
<div class="si-desc">${s.desc}</div>
${!done?`<div class="si-actions"><button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Done</button></div>`:`<div style="font-size:11px;color:#6ee7b7;margin-top:4px">✓ Completed</div>`}
</div>`}
function fmtDate(d){const dt=new Date(d+"T12:00:00");return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function markSessionDone(id){sessionsDone[id]=Date.now();saveState();render()}
function getMetricVal(m){
if(m==="bestQuiz")return stats.bestQuiz||0;
if(m==="bestRapid")return stats.bestRapid||0;
if(m==="cards")return stats.cards||0;
if(m==="scenarios")return stats.scenarios||0;
if(m==="exercises"){const t=LESSONS.reduce((s,l)=>s+l.exercises.length,0);return t?Math.round(Object.keys(exercisesDone).length/t*100):0}
return 0;
}
// ─── FLASHCARDS ───
function fcGetCards(){let cards=fcCat==="★ Favorites"?FLASHCARDS.filter(c=>fcFavs.has(c.f)):fcCat==='⚠ Weak'?FLASHCARDS.filter(function(c){return cardRatings[c.f]==='missed'||cardRatings[c.f]==='unsure'}):(fcCat==="All"?FLASHCARDS:FLASHCARDS.filter(c=>c.c===fcCat));if(fcDiff!=='All Levels')cards=cards.filter(function(c){return DIFF_LABELS[c.d]===fcDiff});return cards}
function renderFlashcards(el){
const allCards=FLASHCARDS.filter(function(c){return fcDiff==='All Levels'||DIFF_LABELS[c.d]===fcDiff});
const weakCount=allCards.filter(function(c){return cardRatings[c.f]==='missed'||cardRatings[c.f]==='unsure'}).length;
const cards=fcGetCards();
if(!cards.length&&fcCat==="★ Favorites"){el.innerHTML='<div style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:16px">&#11088;</div><div style="font-size:17px;font-weight:600;margin-bottom:8px">No favorites yet</div><div style="font-size:14px;color:#6b7280;line-height:1.5">Tap the &#9733; on any flashcard to save it here for focused review.</div><button class="btn btn-primary" style="margin-top:20px" onclick="fcSetCat(\'All\')">Browse All Cards</button></div>';return}
if(!cards.length&&fcCat==='⚠ Weak'){
const roleCats=getRoleCategories();
const favCount=fcFavs.size;
const favPill=favCount?'<button class="pill '+(fcCat==="★ Favorites"?'active':'')+'" onclick="fcSetCat(\'★ Favorites\')" style="'+(fcCat!=="★ Favorites"?'background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)':'')+'">★ Favorites ('+favCount+')</button>':'';
const weakPill='<button class="pill active" onclick="fcSetCat(\'⚠ Weak\')" style="background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)">⚠ Weak ('+weakCount+')</button>';
el.innerHTML='<div class="pills">'+favPill+weakPill+roleCats.map(c=>'<button class="pill '+(fcCat===c?'active':'')+'" onclick="fcSetCat(\''+c+'\')">'+c+(c!=='All'&&userRole?(isCoreCat(c)?' ★':''):'')+'</button>').join("")+'</div>'
+'<div style="text-align:center;padding:40px;color:#9ca3af">No weak cards! Rate flashcards to see them here.</div>';
return;
}
if(fcIdx>=cards.length)fcIdx=0;
const card=cards[fcIdx];
const isFav=fcFavs.has(card.f);
const roleCats=getRoleCategories();
const favCount=fcFavs.size;
const favPill=favCount?'<button class="pill '+(fcCat==="★ Favorites"?'active':'')+'" onclick="fcSetCat(\'★ Favorites\')" style="'+(fcCat!=="★ Favorites"?'background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)':'')+'">★ Favorites ('+favCount+')</button>':'';
const weakPill=weakCount||fcCat==='⚠ Weak'?'<button class="pill '+(fcCat==='⚠ Weak'?'active':'')+'" onclick="fcSetCat(\'⚠ Weak\')" style="'+(fcCat!=='⚠ Weak'?'background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25)':'')+'">⚠ Weak ('+weakCount+')</button>':'';
el.innerHTML='<div class="pills">'+favPill+weakPill+roleCats.map(c=>'<button class="pill '+(fcCat===c?'active':'')+'" onclick="fcSetCat(\''+c+'\')">'+c+(c!=='All'&&userRole?(isCoreCat(c)?' ★':''):'')+'</button>').join("")+'</div>'
+'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'+['All Levels','Beginner','Intermediate','Advanced'].map(function(d){return '<button class="pill'+(fcDiff===d?' pill-active':'')+'" onclick="fcDiff=\''+d+'\';fcIdx=0;render()">'+d+'</button>';}).join('')+'</div>'
+'<div class="progress-bar"><div class="progress-label"><span>'+(fcCat==="★ Favorites"?'Favorites':fcCat==='⚠ Weak'?'Weak cards':'Cards seen')+'</span><span>'+(fcCat==="★ Favorites"||(fcCat==='⚠ Weak')?(fcIdx+1)+'/'+cards.length:fcSeen.size+'/'+cards.length)+'</span></div><div class="progress-track"><div class="progress-fill" style="width:'+Math.round(cards.length?(fcCat==="★ Favorites"||(fcCat==='⚠ Weak')?(fcIdx+1):fcSeen.size)/cards.length*100:0)+'%"></div></div></div>'
+'<div class="card '+(fcFlipped?'answer':'question')+'" onclick="fcFlip()" style="position:relative">'
+'<button class="fav-btn '+(isFav?'active':'')+'" onclick="event.stopPropagation();fcToggleFav('+fcIdx+')" title="'+(isFav?'Remove from favorites':'Add to favorites')+'">'+(isFav?'★':'☆')+'</button>'
+'<div class="card-label">'+(fcFlipped?'Answer':'Question')+' — '+card.c+(card.d?'<span style="background:'+DIFF_COLORS[card.d]+';color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:600">'+DIFF_LABELS[card.d]+'</span>':'')+'</div>'
+'<div class="card-text">'+(fcFlipped?card.b:card.f)+'</div>'
+(!fcFlipped?'<div class="card-hint">tap to flip</div>':'')
+(fcFlipped&&card.u?'<a class="source-link" href="'+card.u+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">📖 Read the docs</a>':'')
+(fcFlipped?'<div style="display:flex;gap:8px;justify-content:center;margin-top:14px">'
+'<button onclick="event.stopPropagation();fcRate(\'missed\')" style="flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;background:#ef4444;color:#fff;font-weight:600">Missed</button>'
+'<button onclick="event.stopPropagation();fcRate(\'unsure\')" style="flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;background:#f59e0b;color:#fff;font-weight:600">Unsure</button>'
+'<button onclick="event.stopPropagation();fcRate(\'known\')" style="flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;background:#10b981;color:#fff;font-weight:600">Know it</button>'
+'</div>':'')
+'</div>'
+(fcFlipped?askClaudeBox('Flashcard: '+card.f):'')
+'<div class="btn-row"><button class="btn btn-secondary" onclick="fcPrev()">Prev</button><button class="btn btn-secondary" onclick="fcWeightedShuffle()">Shuffle</button><button class="btn btn-primary" onclick="fcNext()">Next</button></div>';
}
function fcSetCat(c){fcCat=c;fcIdx=0;fcFlipped=false;if(c!=="★ Favorites")fcSeen=new Set();saveState();render()}
function fcFlip(){fcFlipped=!fcFlipped;if(fcFlipped){stats.cards++;fcSeen.add(fcIdx);saveState()}render()}
function fcNext(){fcFlipped=false;const cards=fcGetCards();fcIdx=(fcIdx+1)%cards.length;saveState();render()}
function fcPrev(){fcFlipped=false;const cards=fcGetCards();fcIdx=(fcIdx-1+cards.length)%cards.length;saveState();render()}
function fcShuffle(){fcFlipped=false;const cards=fcGetCards();fcIdx=Math.floor(Math.random()*cards.length);saveState();render()}
function fcToggleFav(idx){const cards=fcGetCards();const card=cards[idx];if(!card)return;if(fcFavs.has(card.f))fcFavs.delete(card.f);else fcFavs.add(card.f);if(fcCat==="★ Favorites"&&!fcFavs.has(card.f)){const nc=fcGetCards();if(fcIdx>=nc.length)fcIdx=Math.max(0,nc.length-1)}saveState();render()}
// ─── QUIZ ───
const QUIZ_CATS=[...new Set(QUIZ.map(q=>q.cat))];
function getQuizCatIcon(cat){return{['Category A']:'📗',['Category B']:'📘',['Category C']:'📙'}[cat]||'📝'}
function startQuiz(catOrFinal){
if(catOrFinal==='final'){qzMode='final';qzQs=[...QUIZ].sort(()=>Math.random()-.5).slice(0,10)}
else{qzMode=catOrFinal;qzQs=QUIZ.filter(q=>q.cat===catOrFinal).sort(()=>Math.random()-.5)}
qzIdx=0;qzSel=null;qzShow=false;qzScore=0;qzDone=false;render()}
function backToQuizPicker(){qzMode=null;qzQs=[];qzDone=false;render()}
function renderQuiz(el){
// Quiz picker screen
if(qzMode===null){
const cats=QUIZ_CATS.map(cat=>{const cnt=QUIZ.filter(q=>q.cat===cat).length;const best=stats.quizScores[cat];const bestStr=best!=null?`<span style="color:#10b981;font-size:12px">${best}%</span>`:'<span style="color:#4b5563;font-size:12px">Not taken</span>';
return`<div style="background:#1f2937;border:2px solid #374151;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s" onclick="startQuiz('${cat}')" onmouseover="this.style.borderColor='#10b981'" onmouseout="this.style.borderColor='#374151'">
<div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${getQuizCatIcon(cat)}</span><div><div style="font-weight:600;font-size:15px">${cat}</div><div style="color:#6b7280;font-size:12px;margin-top:2px">${cnt} questions</div>${(function(){var qs=QUIZ.filter(q=>q.cat===cat);var counts=[1,2,3].map(function(d){return{d:d,n:qs.filter(function(q){return q.d===d}).length}}).filter(function(x){return x.n>0});return counts.length?'<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">'+counts.map(function(x){return'<span style="background:'+DIFF_COLORS[x.d]+';color:#fff;font-size:10px;padding:1px 6px;border-radius:8px">'+DIFF_LABELS[x.d]+' '+x.n+'</span>'}).join('')+"</div>":''})()}</div></div></div><div style="text-align:right">${bestStr}</div></div></div>`}).join('');
const finalBest=stats.quizScores['final'];const finalStr=finalBest!=null?`<span style="color:#10b981;font-size:12px">${finalBest}%</span>`:'<span style="color:#4b5563;font-size:12px">Not taken</span>';
el.innerHTML=`<div style="margin-bottom:20px"><div style="font-size:20px;font-weight:700;margin-bottom:4px">Quizzes</div><div style="color:#6b7280;font-size:13px;margin-bottom:16px">Test yourself by section or take the final exam</div></div>
<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">${cats}</div>
<div style="background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(59,130,246,.12));border:2px solid rgba(16,185,129,.3);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s" onclick="startQuiz('final')" onmouseover="this.style.borderColor='#10b981'" onmouseout="this.style.borderColor='rgba(16,185,129,.3)'">
<div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:24px">🎓</span><div><div style="font-weight:700;font-size:16px">Final Exam</div><div style="color:#9ca3af;font-size:12px;margin-top:2px">10 random questions across all sections</div></div></div><div style="text-align:right">${finalStr}</div></div></div>`;return}
// Results screen
if(qzDone){
const pct=Math.round(qzScore/qzQs.length*100);
stats.quizzes++;if(pct>stats.bestQuiz)stats.bestQuiz=pct;
const scoreKey=qzMode==='final'?'final':qzMode;
if(!stats.quizScores[scoreKey]||pct>stats.quizScores[scoreKey])stats.quizScores[scoreKey]=pct;
const label=qzMode==='final'?'Final Exam':qzMode;
logSession("quiz",label+" — Score: "+pct+"%");
const g=pct>=90?"A":pct>=80?"B":pct>=70?"C":pct>=60?"D":"F";
const c=pct>=70?"#10b981":pct>=50?"#f59e0b":"#ef4444";
const m=pct>=90?"You're ready for Next.":pct>=70?"Getting there. Run it again.":"Keep studying. You've got time.";
el.innerHTML=`<div class="center"><div style="font-size:13px;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${qzMode==='final'?'🎓 Final Exam':getQuizCatIcon(qzMode)+' '+qzMode}</div><div class="grade" style="color:${c}">${g}</div><div style="font-size:24px;font-weight:600;margin-bottom:4px">${qzScore}/${qzQs.length}</div><div style="color:#6b7280;margin-bottom:24px">${m}</div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button class="btn btn-primary" onclick="startQuiz('${qzMode==='final'?'final':qzMode}')">Try Again</button><button class="btn btn-secondary" onclick="backToQuizPicker()">All Quizzes</button></div></div>`;return}
// Question screen
const q=qzQs[qzIdx];
const headerLabel=qzMode==='final'?'🎓 Final Exam':getQuizCatIcon(qzMode)+' '+qzMode;
el.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:12px;color:#6b7280;cursor:pointer" onclick="backToQuizPicker()">← All Quizzes</span><span style="font-size:12px;color:#9ca3af">${headerLabel}</span></div>
<div class="progress-bar"><div class="progress-label"><span>Score: ${qzScore}/${qzIdx}</span><span>Q${qzIdx+1}/${qzQs.length}</span></div><div class="progress-track"><div class="progress-fill" style="width:${qzIdx/qzQs.length*100}%"></div></div></div>
<div style="font-size:17px;font-weight:500;margin-bottom:20px;line-height:1.4">${q.q}</div>
${q.o.map((o,i)=>{
let cls="quiz-option";let prefix=String.fromCharCode(65+i)+'. ';
if(qzShow){if(i===q.a){cls+=" correct";prefix='✓ '}else if(i===qzSel){cls+=" wrong";prefix='✗ '}else cls+=" dimmed"}
return`<button class="${cls}" onclick="qzSelect(${i})">${prefix}${o}</button>`}).join("")}
${qzShow&&q.e?`<div style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:12px;padding:14px;margin:12px 0"><div style="font-size:11px;color:#6ee7b7;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${qzSel===q.a?'Why this is correct':'Explanation'}</div><div style="font-size:13px;color:#d1d5db;line-height:1.6">${q.e}</div></div>`:''}
${qzShow&&q.u?`<a class="source-link" href="${q.u}" target="_blank" rel="noopener" style="margin-bottom:12px">📖 Learn more</a>`:''}
${qzShow?askClaudeBox('Quiz question: '+q.q):''}
${qzShow?`<button class="btn btn-primary btn-full" onclick="qzNext()">${qzIdx+1>=qzQs.length?"See Results":"Next Question"}</button>`:''}`;
}
function qzSelect(i){if(qzShow)return;qzSel=i;qzShow=true;if(i===qzQs[qzIdx].a)qzScore++;render()}
function qzNext(){if(qzIdx+1>=qzQs.length){qzDone=true}else{qzIdx++;qzSel=null;qzShow=false}render()}
// ─── SCENARIOS ───
function renderScenarios(el){
const s=SCENARIOS[scIdx];
el.innerHTML=`
<div class="progress-bar"><div class="progress-label"><span>Scenarios practiced</span><span>${scPracticed.size}/${SCENARIOS.length}</span></div><div class="progress-track"><div class="progress-fill" style="width:${SCENARIOS.length?Math.round(scPracticed.size/SCENARIOS.length*100):0}%"></div></div></div>
<div class="card-label">Prospect says:</div>
<div class="scenario-box scenario-q"><div style="color:#fca5a5;font-size:17px;line-height:1.5;font-style:italic">"${s.q}"</div></div>
<div style="font-size:12px;color:#6b7280;margin-bottom:8px">Think through your answer first, then reveal.</div>
${!scRevealed?`<div class="scenario-box scenario-reveal" onclick="scReveal()"><div style="color:#9ca3af;font-size:14px">Tap to reveal suggested response</div></div>`
:`<div class="scenario-box scenario-a"><div class="card-label" style="color:#6ee7b7">Suggested response:</div><div style="color:#d1fae5;font-size:14px;line-height:1.6">${s.a}</div>${s.u?`<div class="source-links">${s.u.map(link=>`<a class="source-link" href="${link}" target="_blank" rel="noopener">📖 ${new URL(link).hostname.replace('www.','')}</a>`).join('')}</div>`:''}</div>`}
${scRevealed?askClaudeBox('Scenario objection: '+s.q):''}
<div class="btn-row"><button class="btn btn-secondary" onclick="scPrev()">Prev</button><button class="btn btn-secondary" onclick="scShuf()">Shuffle</button><button class="btn btn-primary" onclick="scNext()">Next</button></div>`;
}
function scReveal(){scRevealed=true;stats.scenarios++;scPracticed.add(scIdx);logSession("scenarios","Practiced: "+SCENARIOS[scIdx].q.slice(0,40));render()}
function scNext(){scRevealed=false;scIdx=(scIdx+1)%SCENARIOS.length;render()}
function scPrev(){scRevealed=false;scIdx=(scIdx-1+SCENARIOS.length)%SCENARIOS.length;render()}
function scShuf(){scRevealed=false;scIdx=Math.floor(Math.random()*SCENARIOS.length);render()}
// ─── RAPID FIRE ───
function renderRapid(el){
if(rfState==="ready"){
el.innerHTML=`<div class="center"><div style="font-size:40px;margin-bottom:16px">⏱</div><div style="font-size:20px;font-weight:600;margin-bottom:8px">Rapid Fire Mode</div><div style="color:#6b7280;max-width:280px;margin-bottom:24px;font-size:14px;line-height:1.5">Question + countdown. Think fast, then rate yourself.</div><button class="btn btn-primary" style="font-size:16px;padding:14px 32px" onclick="rfStart()">Start Round</button></div>`;return}
if(rfState==="done"){
const n=rfResults.filter(r=>r.ok).length;const pct=Math.round(n/rfResults.length*100);
stats.rapid++;if(pct>stats.bestRapid)stats.bestRapid=pct;logSession("rapid","Score: "+pct+"%");
const c=pct>=80?"#10b981":pct>=60?"#f59e0b":"#ef4444";
const m=pct>=80?"Fast and confident.":pct>=60?"Decent, drill the weak ones.":"Re-read the material.";
el.innerHTML=`<div class="center"><div class="grade" style="color:${c}">${n}/${rfResults.length}</div><div style="color:#6b7280;margin-bottom:16px">${m}</div><div style="width:100%;max-width:320px;margin-bottom:24px">${rfResults.map(r=>`<div class="results-item" style="color:${r.ok?'#6ee7b7':'#fca5a5'}">${r.ok?'✔':'✘'} <span style="color:#d1d5db">${r.q}</span></div>`).join("")}</div><button class="btn btn-primary" onclick="rfStart()">Go Again</button></div>`;return}
const q=rfQs[rfIdx];const tc=rfTimer<=3?"red":rfTimer<=5?"yellow":"green";
el.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:12px;color:#6b7280">Q${rfIdx+1}/${rfQs.length}</span><span class="timer ${tc}">${rfState==="revealed"?"—":rfTimer+"s"}</span></div>
<div class="card question" style="margin-bottom:16px;cursor:default"><div style="font-size:19px;font-weight:500">${q.q}</div></div>
${rfState==="active"?`<div class="center" style="min-height:30vh"><div style="color:#6b7280;font-size:14px;margin-bottom:16px">Think of your answer...</div><button class="btn btn-secondary" onclick="rfReveal()">I've got my answer</button></div>`
:`<div class="scenario-box scenario-a" style="margin-bottom:16px"><div class="card-label" style="color:#6ee7b7">Answer:</div><div style="color:#d1fae5;line-height:1.5">${q.a}</div>${q.u?`<a class="source-link" href="${q.u}" target="_blank" rel="noopener" style="margin-top:10px">📖 Read the docs</a>`:''}</div>
${askClaudeBox('Rapid fire: '+q.q)}
<div style="text-align:center;font-size:14px;color:#6b7280;margin:12px 0">Did you nail it?</div>
<div style="display:flex;gap:12px"><button class="btn btn-danger" style="flex:1;padding:14px" onclick="rfRate(false)">Nope</button><button class="btn btn-success" style="flex:1;padding:14px" onclick="rfRate(true)">Nailed it</button></div>`}`;
}
function rfStart(){rfQs=[...RAPID].sort(()=>Math.random()-.5);rfIdx=0;rfResults=[];rfState="active";rfTimer=rfQs[0].t;clearInterval(rfInterval);rfInterval=setInterval(rfTick,1000);render()}
function rfTick(){if(rfState!=="active")return;rfTimer--;if(rfTimer<=0){rfState="revealed";clearInterval(rfInterval)}render()}
function rfReveal(){clearInterval(rfInterval);rfState="revealed";render()}
function rfRate(ok){rfResults.push({q:rfQs[rfIdx].q,ok});if(rfIdx+1>=rfQs.length){rfState="done";clearInterval(rfInterval)}else{rfIdx++;rfTimer=rfQs[rfIdx].t;rfState="active";rfInterval=setInterval(rfTick,1000)}render()}

el.innerHTML=`

function lessonCard(l,idx){
const exDone=l.exercises.filter((_,i)=>exercisesDone[l.id+"-"+i]).length;
const allDone=exDone===l.exercises.length;
const core=isCoreLesson(l.id);
return`<div class="lesson-card${allDone?' completed':''}" onclick="openLesson(${idx})"${!core?' style="opacity:.7"':''}>
<div style="display:flex;justify-content:space-between;align-items:center">
<div class="lesson-num">${l.icon} Lesson ${idx+1}</div>
<div style="display:flex;gap:6px;align-items:center">
${userRole?`<span class="role-badge ${core?'core':'bonus'}">${core?'Core':'Bonus'}</span>`:''}
${allDone?'<span style="font-size:11px;color:#10b981;font-weight:600">✓</span>':`<span style="font-size:11px;color:#6b7280">${exDone}/${l.exercises.length}</span>`}
</div>
</div>
<div class="lesson-title">${l.title}</div>
<div class="lesson-meta"><span>${l.time}</span><span>Week ${l.week}</span></div>
</div>`}
function openLesson(idx){learnIdx=idx;learnView="detail";render()}
function backToLessons(){learnView="list";render()}
function renderLessonDetail(el){
