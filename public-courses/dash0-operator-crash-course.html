<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dash0 Operator Crash Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}.header small{font-size:12px;color:#6b7280}
.badge{background:rgba(16,185,129,.15);color:#6ee7b7;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
.card{border-radius:16px;padding:20px;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;-webkit-user-select:none}
.card.question{background:#1f2937;border:2px solid #374151}
.card.answer{background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.card-text{font-size:17px;line-height:1.5}
.card-hint{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1;filter:none}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#1f2937;color:#d1d5db}.btn-secondary:hover{background:#374151}
.btn-danger{background:rgba(239,68,68,.2);border:2px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:rgba(16,185,129,.2);border:2px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn-full{width:100%;padding:14px;font-size:15px}
.progress-bar{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{width:100%;background:#1f2937;border-radius:999px;height:8px}
.progress-fill{background:#10b981;height:8px;border-radius:999px;transition:width .5s}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.pill.active{background:#10b981;color:#fff}.pill:not(.active){background:#1f2937;color:#9ca3af}
.quiz-option{text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.quiz-option.correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.dimmed{background:rgba(31,41,55,.5);border-color:#1f2937;color:#4b5563}
.scenario-box{border-radius:16px;padding:20px;margin-bottom:16px}
.scenario-q{background:rgba(239,68,68,.08);border:2px solid rgba(153,27,27,.4)}
.scenario-a{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3)}
.scenario-reveal{background:#1f2937;border:2px solid #374151;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.timer{font-size:28px;font-family:monospace;font-weight:700}
.timer.green{color:#10b981}.timer.yellow{color:#f59e0b}.timer.red{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}.stat-val{font-size:20px;font-weight:700}.stat-label{font-size:11px;color:#6b7280}
.focus-box{background:#1f2937;border-radius:16px;padding:16px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
.results-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.grade{font-size:56px;font-weight:700;text-align:center;margin-bottom:8px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:50vh}
.mgmt-section{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:16px}
.mgmt-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#d1d5db}
.mgmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.mgmt-row:last-child{border-bottom:none}
.mgmt-row .label{font-size:13px;color:#9ca3af}
.mgmt-row .value{font-size:13px;font-weight:600;color:#fff}
.btn-outline{background:transparent;border:2px solid #374151;color:#9ca3af;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#6b7280;color:#d1d5db}
.btn-danger-solid{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-danger-solid:hover{background:#b91c1c}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-box{background:#1f2937;border:2px solid #374151;border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151;font-size:12px}
.history-item:last-child{border-bottom:none}
.export-box{background:#0d1117;border:1px solid #374151;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#6ee7b7;word-break:break-all;max-height:120px;overflow-y:auto;margin-top:8px}
.source-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.source-link:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.source-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.res-group{margin-bottom:20px}
.res-group h4{font-size:13px;font-weight:600;color:#6ee7b7;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.res-link{display:block;padding:10px 12px;border-radius:10px;background:#1f2937;margin-bottom:6px;text-decoration:none;color:#93c5fd;font-size:13px;font-weight:500;border:1px solid #374151;transition:all .2s}
.res-link:hover{background:#374151;border-color:#4b5563}
.res-link small{display:block;color:#6b7280;font-size:11px;font-weight:400;margin-top:2px}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.lesson-card{background:#1f2937;border-radius:16px;padding:16px;cursor:pointer;border:2px solid #374151;transition:all .2s}
.lesson-card:hover{border-color:#4b5563}
.lesson-card.completed{border-color:rgba(16,185,129,.3)}
.lesson-num{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.lesson-title{font-size:15px;font-weight:600;margin:4px 0}
.lesson-meta{font-size:12px;color:#6b7280;display:flex;gap:12px}
.lesson-body{padding:0}
.lesson-section{margin-bottom:20px}
.lesson-section h4{font-size:13px;font-weight:600;color:#6ee7b7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lesson-text{font-size:14px;color:#d1d5db;line-height:1.7}
.lesson-text p{margin-bottom:10px}
.lesson-highlight{background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:10px 14px;border-radius:0 10px 10px 0;margin:10px 0;font-size:13px;color:#d1fae5;line-height:1.5}
.lesson-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.lesson-compare-item{background:#0d1117;border-radius:10px;padding:10px;font-size:12px;line-height:1.5}
.lesson-compare-item .compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.exercise-box{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.exercise-box .ex-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.exercise-box .ex-task{font-size:13px;color:#ddd6fe;line-height:1.5;margin-bottom:8px}
.exercise-box .ex-hint{font-size:12px;color:#6b7280;font-style:italic}
.exercise-check{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
.exercise-check .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #374151;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.exercise-check .checkbox.checked{background:#10b981;border-color:#10b981}
.exercise-check .ex-text{font-size:13px;color:#d1d5db}
.ex-steps-toggle{background:none;border:1px solid rgba(139,92,246,.25);color:#a78bfa;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;margin-top:6px;font-family:inherit;transition:all .2s}
.ex-steps-toggle:hover{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.4)}
.ex-steps{display:none;margin-top:8px;padding:10px 12px;background:rgba(139,92,246,.04);border-radius:8px;border:1px solid rgba(139,92,246,.12)}
.ex-steps.open{display:block}
.ex-steps ol{margin:0;padding-left:20px;font-size:13px;color:#c4b5fd;line-height:1.7}
.ex-steps li{margin-bottom:4px}
.ex-steps code{background:#1f2937;padding:2px 6px;border-radius:4px;font-size:12px;color:#a5f3fc}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}
.sched-item{background:#1f2937;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #374151;transition:all .2s}
.sched-item.today{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.sched-item.past{opacity:.5}
.sched-item.done{border-color:rgba(16,185,129,.3);opacity:.7}
.sched-item .si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sched-item .si-date{font-size:11px;color:#6b7280;font-weight:600}
.sched-item .si-dur{font-size:10px;color:#4b5563;background:#0d1117;padding:2px 8px;border-radius:6px}
.sched-item .si-title{font-size:14px;font-weight:600;color:#e5e7eb;margin-bottom:2px}
.sched-item .si-desc{font-size:12px;color:#9ca3af;line-height:1.4}
.sched-item .si-actions{display:flex;gap:6px;margin-top:8px}
.sched-item .si-actions button{padding:6px 10px;border-radius:8px;border:none;font-size:11px;font-weight:500;cursor:pointer}
.cp-item{background:rgba(251,191,36,.06);border:2px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;margin-bottom:8px}
.cp-item.hit{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.cp-item .cp-target{font-size:14px;font-weight:600;color:#fde68a}
.cp-item.hit .cp-target{color:#6ee7b7;text-decoration:line-through}
.cp-item .cp-date{font-size:11px;color:#6b7280}
.form-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.form-sheet{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.form-sheet h3{font-size:16px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:14px;font-family:inherit}
.form-field textarea{min-height:60px;resize:vertical}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#10b981}
.ask-box{background:rgba(139,92,246,.06);border:2px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;margin-top:16px}
.ask-box .ask-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ask-box .ask-row{display:flex;gap:8px}
.ask-box input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:13px;font-family:inherit}
.ask-box input:focus{outline:none;border-color:#a78bfa}
.ask-box input::placeholder{color:#4b5563}
.ask-box button{padding:10px 14px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ask-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(124,58,237,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ics-panel{background:#111827;border:2px solid #374151;border-radius:16px;padding:16px;margin-bottom:16px}
.ics-panel h4{font-size:13px;font-weight:600;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ics-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ics-filters button{padding:5px 10px;border-radius:8px;border:2px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.ics-filters button.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#93c5fd}
.ics-list{max-height:320px;overflow-y:auto;margin-bottom:12px}
.ics-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.ics-item:last-child{border-bottom:none}
.ics-check{width:20px;height:20px;border-radius:5px;border:2px solid #374151;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:12px;color:transparent}
.ics-check.on{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.ics-item-info{flex:1;min-width:0}
.ics-item-title{font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ics-item-date{font-size:11px;color:#6b7280}
.ics-actions{display:flex;gap:8px;margin-top:4px}
.ics-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.ics-dl{background:#3b82f6;color:#fff}
.ics-dl:hover{background:#2563eb}
.ics-count{font-size:12px;color:#6b7280;margin-bottom:8px}
@media(min-width:600px){

.header{padding:20px 0 12px}
.header h1{font-size:22px}
.content{padding:20px 0 100px}
.nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}

.role-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

.role-cards{display:flex;flex-direction:column;gap:12px}

.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-badge.core{background:rgba(16,185,129,.15);color:#6ee7b7}
.role-badge.bonus{background:rgba(107,114,128,.15);color:#6b7280}

<script>
// ─── DATA ───
const FLASHCARDS=[
// ─── Fundamentals (8) ───
{f:"What is the Dash0 Operator?",b:"A Kubernetes operator that makes observability easy. Install it into your cluster and it automatically collects OpenTelemetry traces, metrics, logs, and profiles from workloads, sending data to Dash0 with no manual SDK setup.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator",d:1},
{f:"What are the two cluster-scoped vs namespace-scoped CRDs?",b:"Dash0OperatorConfiguration is cluster-scoped (one per cluster, sets global exports & features). Dash0Monitoring is namespace-scoped (one per namespace, enables monitoring for that namespace).",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What Kubernetes version does the Dash0 Operator require?",b:"Kubernetes 1.25.16 or later, with Helm >= 3.x for installation.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What namespace does the Dash0 Operator install into?",b:"dash0-system (created automatically with --create-namespace during helm install).",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What four telemetry signals does the Dash0 Operator collect?",b:"Traces (auto-instrumentation), Metrics (Kubernetes infrastructure + Prometheus scraping), Logs (filelog receiver from pods), and Profiles (OTLP profiling, opt-in).",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator",d:1},
{f:"What additional CRDs does the Dash0 Operator support beyond monitoring?",b:"Dash0SyntheticCheck (synthetic monitoring), Dash0View (views on tracing/logging/resource data), PersesDashboard (synced to Dash0 dashboards), PrometheusRule (synced to Dash0 check rules).",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator",d:2},
{f:"What does spec.telemetryCollection.enabled=false do?",b:"Disables all telemetry collection — the operator will NOT deploy any OpenTelemetry collectors. Useful when using the operator purely for infrastructure-as-code (dashboards, check rules) without collector deployment.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What happens when only the operator is installed but no Dash0Monitoring resource exists?",b:"The operator's collector still collects Kubernetes infrastructure metrics that are not namespace-scoped (e.g. node-level metrics), as long as an operator configuration with export settings exists. No workload instrumentation or log collection occurs.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},

// ─── Installation & Helm (7) ───
{f:"What are the two mandatory Helm values for a basic Dash0 Operator install?",b:"operator.dash0Export.endpoint (OTLP/gRPC ingress URL, format: ingress.*.dash0.com:4317) and either operator.dash0Export.token (auth token) or operator.dash0Export.secretRef.name+key.",c:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What Helm command adds the Dash0 operator repository?",b:"helm repo add dash0-operator https://dash0hq.github.io/dash0-operator && helm repo update dash0-operator",c:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What is the format of the Dash0 OTLP/gRPC endpoint?",b:"Always starts with 'ingress.' and ends with 'dash0.com:4317'. Example: ingress.eu-west-1.aws.dash0.com:4317. Protocol prefix (https://) is optional.",c:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What is operator.dash0Export.apiEndpoint used for?",b:"The Dash0 REST API endpoint (format: https://api.*.dash0.com). Used for managing dashboards, check rules, synthetic checks, and views via the operator — NOT for telemetry export. Without it, CRD sync features don't work.",c:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What is the name of the auto-created operator configuration resource when using Helm?",b:"dash0-operator-configuration-auto-resource. If a resource with any OTHER name already exists, the operator refuses to overwrite it. Manual changes to this auto resource are overwritten on operator restart.",c:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"How do you enable GKE Autopilot support in the Dash0 Operator?",b:"Set gke.autopilot.enabled=true. This deploys an AllowlistSynchronizer and disables kubelet metrics collection (not available in GKE Autopilot). By default, also deploys the AllowlistSynchronizer (gke.autopilot.deployAllowlistSynchronizer=true).",c:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/values.yaml",d:2},
{f:"How do you enable Prometheus CRD support at install time?",b:"Add --set operator.prometheusCrdSupportEnabled=true to helm install. Requires ServiceMonitor, PodMonitor, and ScrapeConfig CRDs to be pre-installed in the cluster.",c:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},

// ─── Auto-Instrumentation (10) ───
{f:"What runtimes does the Dash0 Operator support for auto-instrumentation?",b:"Java 8+ (upstream OpenTelemetry Java agent), Node.js 16+ (Dash0 Node.js OTel distribution), .NET, and Python 3.9+ (beta, opt-in via Helm flag).",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What mechanism does the Dash0 Operator use to inject instrumentation into pods?",b:"A mutating admission webhook intercepts pod creation/updates and injects an init container that copies OTel agent files to /__otel_auto_instrumentation/agents/ before the application container starts.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What are the three values for instrumentWorkloads.mode in v1beta1?",b:"'all' — instruments existing + new workloads (causes pod restarts for existing). 'created-and-updated' — instruments only new/changed workloads (no restarts for existing). 'none' — no instrumentation at all.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What label disables auto-instrumentation for a specific workload?",b:"dash0.com/enable: \"false\" on the workload (Deployment, DaemonSet, etc.). Applies even when the namespace has instrumentWorkloads.mode=all.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What workload types does the Dash0 Operator auto-instrument?",b:"Deployments, DaemonSets, StatefulSets, ReplicaSets, Jobs, CronJobs, and Pods.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"How does v1alpha1 Dash0Monitoring differ from v1beta1 for instrumentWorkloads?",b:"In v1alpha1, instrumentWorkloads is a string (all/created-and-updated/none). In v1beta1, it's a struct with mode (string), labelSelector (for fine-grained targeting), and traceContext.propagators fields.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"How do you enable Python auto-instrumentation?",b:"Set operator.instrumentation.enablePythonAutoInstrumentation=true via Helm. Python 3.9+ required. Only works with http/protobuf OTLP protocol. Incompatible with already-instrumented workloads — Dash0 detects and safely skips double-instrumentation.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What is spec.instrumentWorkloads.traceContext.propagators used for?",b:"Sets the OTEL_PROPAGATORS env var on all instrumented workloads in the namespace. Useful when interacting with services using non-W3C trace context (e.g. AWS X-Ray uses X-Amzn-Trace-Id). Value is a comma-separated list of valid OTel propagators.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What happens when you change instrumentWorkloads.mode from 'none' to 'all' on an existing Dash0Monitoring resource?",b:"The operator instruments all existing uninstrumented workloads — their pods are restarted to apply instrumentation. Conversely, changing to 'none' removes instrumentation and restarts pods to unapply it.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},
{f:"What is the init container path for OTel agent files?",b:"/__otel_auto_instrumentation/agents/ — the init container copies runtime-specific agent binaries here, which are then referenced by the application container via mounted volumes and environment variables.",c:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},

// ─── Export Configuration (9) ───
{f:"What are the three export types supported in Dash0OperatorConfiguration?",b:"1) dash0 — endpoint + Dash0 auth (token or secretRef) + optional apiEndpoint. 2) grpc — endpoint + custom headers. 3) http — endpoint + custom headers + encoding (proto or json).",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"Can you send telemetry to multiple backends simultaneously with the Dash0 Operator?",b:"Yes. You can define multiple exports in the exports[] array of Dash0OperatorConfiguration. Telemetry is fanned out to all defined exports. CRD sync (dashboards, check rules, views, synthetic checks) goes to all Dash0 export targets.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What are the two authorization options for a Dash0 export?",b:"1) token: inline auth token string (rendered in a ConfigMap — visible to anyone with cluster API access). 2) secretRef: reference to an existing Kubernetes secret (name + key) in the operator's namespace. Prefer secretRef for security.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"How do you override the global export config for a specific namespace?",b:"Add an exports[] field to the Dash0Monitoring resource for that namespace. This replaces (not merges with) the default global exports from Dash0OperatorConfiguration for that namespace only.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What does the dash0Export.dataset Helm value do?",b:"Sets the target dataset for telemetry in Dash0. Defaults to 'default' if omitted. Allows routing telemetry from different clusters to different datasets within the same Dash0 organization.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/values.yaml",d:2},
{f:"Why should you prefer secretRef over token for Dash0 auth?",b:"When using token, the value is rendered verbatim into a Kubernetes ConfigMap, readable by anyone with cluster API access. secretRef stores the token in a Kubernetes Secret. Note: K8s secrets are unencrypted by default — additional steps (e.g. KMS) are needed for true encryption.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What format does a gRPC export use for custom headers?",b:"Headers are key-value pairs in the grpc export config. Example: {name: Authorization, value: Bearer my-token}. Used for sending to non-Dash0 OTLP/gRPC backends that require custom authentication headers.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What encoding options does the HTTP export support?",b:"'proto' (binary Protobuf, default and recommended) or 'json' (human-readable JSON). Maps to Content-Type: application/x-protobuf or application/json in OTLP HTTP requests.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},
{f:"What is the relationship between dash0Export.enabled and manual Dash0OperatorConfiguration creation?",b:"dash0Export.enabled=true is a convenience shortcut — the operator auto-creates 'dash0-operator-configuration-auto-resource' at startup. You can skip it and manually kubectl apply a Dash0OperatorConfiguration resource instead, giving you full manual control.",c:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},

// ─── Telemetry Pipeline (9) ───
{f:"What two collector deployment types does the Dash0 Operator deploy?",b:"1) DaemonSet collector — runs on every node, collects pod logs via filelog receiver and node-level metrics. 2) Deployment collector — cluster-level collector handling cluster metrics, traces gateway, and Kubernetes events.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What collector receiver does the Dash0 Operator use for log collection?",b:"The filelog receiver, which tails pod log files on the host filesystem (/var/log/pods/...). Log collection is enabled by default per namespace via spec.logCollection.enabled=true in the Dash0Monitoring resource.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What is the spec.filter field in Dash0Monitoring used for?",b:"Drops telemetry before export using OTTL conditions. Supports traces (span/spanevent), metrics (metric/datapoint), logs (log_record), and profiles (profile). Conditions within a list are implicitly OR'd — if any is true, the item is dropped.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What is the spec.transform field in Dash0Monitoring used for?",b:"Applies OTTL transformations to telemetry before export. Supports trace_statements, metric_statements, log_statements, and profile_statements. Compatible with both basic and advanced OTel collector transform processor config styles.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What happens when filter and transform are both configured for the same namespace?",b:"Filter executes BEFORE transform. You cannot assume transformations have been applied when writing filter rules. Both are namespace-scoped — telemetry from other namespaces is unaffected.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"How does Kubernetes pod label/annotation collection work?",b:"When collectPodLabelsAndAnnotations.enabled=true (default), all pod labels and annotations are converted to resource attributes, prefixed with k8s.pod.label. or k8s.pod.annotation. respectively, added to all spans, metrics, and log records.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What OTTL filter syntax drops all /ready and /metrics health check spans?",b:"spec.filter.traces.span: ['attributes[\"http.route\"] == \"/ready\"', 'attributes[\"http.route\"] == \"/metrics\"']. Each condition is OR'd — either route match causes the span to be dropped.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},
{f:"What happens if different namespaces specify different OTTL error_mode values?",b:"The filter and transform statements from all namespaces are aggregated into a single processor in the collector config. If different error_modes are specified, the 'most severe' is used: propagate > ignore > silent.",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},
{f:"What is spec.eventCollection.enabled used for?",b:"Controls whether Kubernetes events (kubectl get events) are collected and exported. Enabled by default when using automatic namespace monitoring. Separate from log collection (spec.logCollection.enabled).",c:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},

// ─── Prometheus & Perses (7) ───
{f:"What Prometheus annotations does the Dash0 Operator scrape?",b:"The standard prometheus.io/* annotations: prometheus.io/scrape=true, prometheus.io/port, prometheus.io/path, and prometheus.io/scheme. Controlled per-namespace by spec.prometheusScraping.enabled in Dash0Monitoring.",c:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What Prometheus CRDs does the Dash0 Operator support?",b:"ServiceMonitor, PodMonitor, and ScrapeConfig (with kubernetesSDConfigs). Requires prometheusCrdSupport.enabled=true on Dash0OperatorConfiguration and the CRDs pre-installed in the cluster.",c:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What component handles Prometheus CRD target discovery?",b:"The OpenTelemetry Target Allocator — deployed by the Dash0 Operator when prometheusCrdSupport is enabled. It watches Prometheus CRDs and assigns scrape targets to the collector on the same node as the monitored workload.",c:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What does the Dash0 Operator do with PrometheusRule resources?",b:"When synchronizePrometheusRules=true (default), the operator watches PrometheusRule CRs in the namespace and creates corresponding check rules in Dash0 via the Dash0 API. Requires apiEndpoint to be configured.",c:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What does the Dash0 Operator do with PersesDashboard resources?",b:"When synchronizePersesDashboards=true (default), the operator watches PersesDashboard CRs (from the Perses operator) and creates/updates corresponding dashboards in Dash0 via the Dash0 API. Requires apiEndpoint to be configured.",c:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"How do you secure Target Allocator to collector communication for auth-protected Prometheus endpoints?",b:"Enable mTLS via operator.targetAllocator.mTls.enabled=true with serverCertSecretName and clientCertSecretName. Use cert-manager to generate certificates. Both certs must be signed by the same CA. Secrets must be in the dash0-system namespace.",c:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},
{f:"How do you opt out a specific PersesDashboard or PrometheusRule from Dash0 sync?",b:"Set the label dash0.com/enable=false on the individual PersesDashboard or PrometheusRule resource. This provides per-resource control even when namespace-wide synchronization is enabled.",c:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},

// ─── Advanced Operations (8) ───
{f:"What is self-monitoring in the Dash0 Operator?",b:"The operator sends its own telemetry (metrics, logs, traces about the operator itself) to the configured Dash0 backend. Enabled by default (spec.selfMonitoring.enabled=true). Does NOT require the collector to be deployed — bypasses telemetryCollection.enabled.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"How do you enable profiling support in the Dash0 Operator?",b:"Set profilingEnabled=true via Helm (or spec.profiling.enabled=true in Dash0OperatorConfiguration). This configures the collectors to accept and process profiling data via OTLP. Disabled by default.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"What is automatic namespace monitoring and when is it useful?",b:"Setting autoMonitorNamespaces.enabled=true makes the operator auto-create a Dash0Monitoring resource for every existing and new namespace. Useful when you want to monitor all or most namespaces without manual per-namespace setup. The default excludes kube-system, kube-node-lease, kube-public, and the operator's namespace.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"How do you configure the default settings for auto-monitored namespaces?",b:"Use operator.monitoringTemplate.spec in Helm values. Supports all Dash0Monitoring spec fields except per-namespace exports. Example: set instrumentWorkloads.mode=none to collect only logs/events without instrumentation.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"How do you opt a namespace OUT of automatic namespace monitoring?",b:"Label the namespace with dash0.com/enable=false. The default autoMonitorNamespaces.labelSelector is 'dash0.com/enable!=false' — so namespaces with this label are excluded. You can also use a custom labelSelector for an opt-in model.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What are the Helm flags for controlling instrumentation rate limiting?",b:"operator.instrumentation.delayAfterEachWorkloadMillis — adds a delay between processing each workload. operator.instrumentation.delayAfterEachNamespaceMillis — adds a delay between namespaces. Used to stagger API requests and avoid overloading the cluster during mass instrumentation.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/values.yaml",d:3},
{f:"What namespaces are NEVER auto-monitored even when autoMonitorNamespaces.enabled=true?",b:"kube-system, kube-node-lease, kube-public, and the Dash0 operator's own namespace (dash0-system). You can still deploy Dash0Monitoring resources to these namespaces manually.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:3},
{f:"What is the instrumentation.debug Helm flag used for?",b:"operator.instrumentation.debug=true enables verbose output from the init container during workload instrumentation. Useful for troubleshooting why a workload isn't being instrumented or diagnosing agent injection failures.",c:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/values.yaml",d:3},

// ─── Pitch & Positioning (7) ───
{f:"What is the Dash0 Operator's core value proposition?",b:"Zero-code observability for Kubernetes. One Helm install and one YAML per namespace gives you traces, metrics, logs, and profiles — no SDK changes, no application code modifications required. Powered by OpenTelemetry.",c:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator",d:1},
{f:"How does the Dash0 Operator reduce time-to-observability compared to manual OTel setup?",b:"Manual OTel setup requires per-service SDK instrumentation, collector deployment/configuration, and ongoing maintenance. The Dash0 Operator handles all of this automatically — one helm install, then just run workloads normally. Typical time-to-telemetry: minutes instead of days.",c:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator",d:1},
{f:"What does 'opt-out by default' mean in the context of Dash0 auto-instrumentation?",b:"By default, all eligible workloads in a monitored namespace ARE instrumented — you don't have to explicitly opt in. Teams who don't want instrumentation must add dash0.com/enable=false. This maximizes observability coverage with minimal friction.",c:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"How does the Dash0 Operator handle multi-tenancy or multi-team clusters?",b:"Per-namespace Dash0Monitoring resources allow different teams to have different export targets, instrumentation modes, filters, and transforms. Teams can opt out entirely (mode=none) or route telemetry to their own backend (per-namespace exports override).",c:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:1},
{f:"How does Dash0 support existing Prometheus investments?",b:"Three layers: 1) Scrapes prometheus.io/* annotation endpoints. 2) Supports ServiceMonitor/PodMonitor/ScrapeConfig CRDs via Target Allocator. 3) Syncs PrometheusRule alerts to Dash0 check rules. No need to rip-and-replace existing Prometheus setups.",c:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",d:2},
{f:"What is the operator's story for GitOps / infrastructure-as-code teams?",b:"CRDs for everything: Dash0OperatorConfiguration, Dash0Monitoring, PersesDashboard, PrometheusRule, Dash0SyntheticCheck, Dash0View are all Kubernetes resources that can be managed via ArgoCD, Flux, or Terraform. telemetryCollection.enabled=false allows IaC-only mode (no collectors).",c:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator",d:2},
{f:"How does the Dash0 Operator position against Datadog/New Relic agents?",b:"No vendor lock-in: built on OpenTelemetry. No per-host licensing: K8s operator model. No SDK changes needed. Existing Prometheus investments reused. Dash0 extends OTel rather than replacing it — if you leave Dash0, your OTel investment stays.",c:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator",d:2},
];

// ─── Fundamentals (6: 3B/2I/1A) ───
{q:"What is the scope of the Dash0OperatorConfiguration CRD?",o:["Namespace-scoped — one per namespace","Cluster-scoped — one per cluster","Node-scoped — one per node","Pod-scoped — one per pod"],a:1,cat:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Dash0OperatorConfiguration is cluster-scoped and acts as the global settings resource (exports, features). Dash0Monitoring is namespace-scoped and enables monitoring per namespace. 🟢 Dash0 angle: This separation lets platform teams control global export security centrally while dev teams manage per-namespace monitoring themselves.",d:1},
{q:"Which telemetry signals does the Dash0 Operator collect out of the box?",o:["Traces and metrics only","Traces, metrics, and logs","Traces, metrics, logs, and profiles","Metrics and logs only"],a:2,cat:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator",e:"The Dash0 Operator collects all four OTel signals: traces (via auto-instrumentation), metrics (infrastructure + Prometheus), logs (filelog receiver), and profiles (opt-in beta via OTLP). 🟢 Dash0 angle: Four signals from one helm install — no additional agent or SDK required.",d:1},
{q:"What is the minimum Kubernetes version required by the Dash0 Operator?",o:["1.20.0","1.23.0","1.25.16","1.28.0"],a:2,cat:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The Dash0 Operator requires Kubernetes 1.25.16 or later, along with Helm 3.x for installation.",d:1},
{q:"What happens when spec.telemetryCollection.enabled is set to false in Dash0OperatorConfiguration?",o:["Only traces are disabled","The operator is uninstalled from the cluster","No OTel collectors are deployed — workloads are not instrumented","Only log collection is disabled"],a:2,cat:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Setting telemetryCollection.enabled=false disables all collector deployments. The operator still runs and can manage CRD-based resources (dashboards, check rules, synthetic checks) — useful for pure IaC/GitOps usage without collector overhead. 🟢 Dash0 angle: Lets GitOps teams use Dash0 as an API-only platform without any collector footprint.",d:2},
{q:"Which additional CRDs does the Dash0 Operator support for infrastructure-as-code use cases?",o:["ConfigMap and Secret","Dash0SyntheticCheck, Dash0View, PersesDashboard, PrometheusRule","HorizontalPodAutoscaler and VPA","ServiceAccount and ClusterRole"],a:1,cat:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator",e:"Beyond telemetry collection, the operator supports Dash0SyntheticCheck (synthetic monitoring), Dash0View (views on traces/logs/resources), PersesDashboard (dashboard sync), and PrometheusRule (alert rule sync to Dash0). All are GitOps-manageable Kubernetes resources.",d:2},
{q:"A team installs the Dash0 Operator with a valid Dash0OperatorConfiguration but creates NO Dash0Monitoring resources. What telemetry is collected?",o:["Nothing — no telemetry is collected without Dash0Monitoring","Only node-level metrics (not namespace-scoped) are collected","All workloads in all namespaces are auto-instrumented","Only logs from the kube-system namespace"],a:1,cat:"Fundamentals",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Without Dash0Monitoring resources, no namespace-scoped collection (logs, workload instrumentation) occurs. However, the collector still scrapes node-level and cluster-level infrastructure metrics because these are not namespace-gated. Workload auto-instrumentation requires at least one Dash0Monitoring resource.",d:3},

// ─── Installation & Helm (5: 2B/2I/1A) ───
{q:"Which two Helm values are mandatory for a minimal functional Dash0 Operator install?",o:["operator.image.tag and operator.replicas","operator.dash0Export.endpoint and operator.dash0Export.token (or secretRef)","operator.namespace and operator.logLevel","operator.dash0Export.apiEndpoint and operator.dash0Export.dataset"],a:1,cat:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The endpoint (OTLP/gRPC ingress URL in format ingress.*.dash0.com:4317) and authentication (token or secretRef) are the only required values. Without them, telemetry has nowhere to go. 🟢 Dash0 angle: Two values and you're shipping production telemetry — the lowest barrier to entry in the market.",d:1},
{q:"What is the format of the Dash0 OTLP/gRPC endpoint URL?",o:["https://ingest.*.dash0.com/v1/traces","grpc://collector.*.dash0.com","ingress.*.dash0.com:4317","otel.*.dash0.com:443"],a:2,cat:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The endpoint always starts with 'ingress.' and ends with 'dash0.com:4317'. Example: ingress.eu-west-1.aws.dash0.com:4317. No https:// prefix is needed (though it is tolerated).",d:1},
{q:"What is the purpose of operator.dash0Export.apiEndpoint in the Helm chart?",o:["It overrides the OTLP gRPC telemetry ingress endpoint","It sets the REST API endpoint used for managing dashboards, check rules, synthetic checks, and views","It configures where the operator's own logs are shipped","It sets the target allocator's HTTP endpoint"],a:1,cat:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"apiEndpoint (format: https://api.*.dash0.com) is used for CRD sync features — PersesDashboard, PrometheusRule, Dash0SyntheticCheck, Dash0View. Without it, only telemetry collection works; dashboard and check rule sync do not.",d:2},
{q:"How do you enable Prometheus ServiceMonitor/PodMonitor CRD support when installing the Dash0 Operator?",o:["Add --set operator.prometheusCrdSupportEnabled=true and ensure the CRDs are pre-installed","It is enabled by default — no flag needed","Set spec.prometheusScraping.enabled=true in Dash0Monitoring","Install the Prometheus Operator first; the Dash0 Operator detects it automatically"],a:0,cat:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Prometheus CRD support requires both the Helm flag (--set operator.prometheusCrdSupportEnabled=true) and the ServiceMonitor, PodMonitor, and ScrapeConfig CRDs already present in the cluster (usually installed by the Prometheus Operator or prometheus-operator CRD chart).",d:2},
{q:"An engineer runs helm upgrade on the Dash0 Operator and notices the 'dash0-operator-configuration-auto-resource' was reverted to Helm-chart defaults, discarding manual changes. What is the root cause?",o:["The operator's RBAC permissions are incorrect","The auto-resource name is reserved — manual edits to it are overwritten on operator restart by design","The Dash0Monitoring resource in the namespace conflicted","The Helm chart version changed the CRD schema"],a:1,cat:"Installation & Helm",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The name 'dash0-operator-configuration-auto-resource' is owned by the Helm chart. Any manual edits are overwritten when the operator restarts. To manage it permanently outside Helm, create a resource with a DIFFERENT name — the operator will refuse to overwrite it.",d:3},

// ─── Auto-Instrumentation (7: 2B/3I/2A) ───
{q:"What mechanism does the Dash0 Operator use to inject instrumentation into application pods?",o:["A sidecar container that attaches to the running process","A mutating admission webhook plus an init container","Direct eBPF probes on the node","A DaemonSet that patches running containers"],a:1,cat:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The operator registers a mutating admission webhook. When a pod is created or updated, the webhook injects an init container that copies OTel agent binaries to /__otel_auto_instrumentation/agents/ before the app container starts. 🟢 Dash0 angle: Zero code changes — instrumentation is injected at the Kubernetes layer, not in application code.",d:1},
{q:"Which label do you add to a Deployment to opt it OUT of Dash0 auto-instrumentation?",o:["otel.io/instrument: 'false'","dash0.com/enabled: 'no'","dash0.com/enable: 'false'","instrumentation.dash0.com/skip: 'true'"],a:2,cat:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The label dash0.com/enable: \"false\" on any workload (Deployment, DaemonSet, StatefulSet, etc.) disables auto-instrumentation for that workload, even when the namespace has instrumentWorkloads.mode=all.",d:1},
{q:"In the Dash0Monitoring v1beta1 API, what is the difference between instrumentWorkloads.mode=all and mode=created-and-updated?",o:["'all' only applies to Deployments; 'created-and-updated' applies to all workload types","'all' instruments existing workloads (causing pod restarts); 'created-and-updated' only instruments new or changed workloads (no restarts for currently running pods)","'all' includes Python workloads; 'created-and-updated' excludes them","'all' sends traces and metrics; 'created-and-updated' sends only traces"],a:1,cat:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"mode=all causes the operator to actively instrument all existing uninstrumented workloads, triggering pod restarts. mode=created-and-updated is less disruptive — only newly created or modified workloads get instrumented. Existing running pods are left unchanged.",d:2},
{q:"What is the key difference between v1alpha1 and v1beta1 Dash0Monitoring for the instrumentWorkloads field?",o:["v1alpha1 supports labelSelector; v1beta1 does not","v1alpha1 is a string (all/created-and-updated/none); v1beta1 is a struct with mode, labelSelector, and traceContext.propagators","v1alpha1 supports Python; v1beta1 does not","v1beta1 dropped the 'none' mode entirely"],a:1,cat:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"API version v1alpha1 used a plain string for instrumentWorkloads. v1beta1 promoted it to a struct enabling fine-grained targeting via labelSelector (instrument only pods matching specific labels) and custom propagator configuration via traceContext.propagators.",d:2},
{q:"What additional Helm flag is required to enable Python auto-instrumentation?",o:["operator.instrumentation.pythonEnabled=true","operator.instrumentation.enablePythonAutoInstrumentation=true","operator.python.beta=true","spec.runtimes.python.enabled=true in Dash0Monitoring"],a:1,cat:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Python auto-instrumentation is opt-in (beta). It requires the Helm flag operator.instrumentation.enablePythonAutoInstrumentation=true. Additional constraints: Python 3.9+, http/protobuf OTLP protocol only, and the operator safely skips already-instrumented workloads to avoid double-instrumentation.",d:2},
{q:"A developer sets OTEL_EXPORTER_OTLP_ENDPOINT manually in their container spec and then the Dash0 Operator instruments the workload. What happens to the developer's env var?",o:["It is silently deleted by the init container","The operator detects an existing OTLP endpoint and skips instrumentation entirely for safety","The operator's injected value takes precedence and overrides the developer's setting","Both values are merged in a comma-separated list"],a:1,cat:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The Dash0 Operator is designed to detect already-instrumented or manually configured workloads and safely skip them to avoid double-instrumentation conflicts. This same safety check applies for Python (beta runtime) — preventing silent data duplication or broken traces.",d:3},
{q:"What init container path holds the OTel agent binaries injected by the Dash0 Operator, and why does this matter?",o:["/__otel_auto_instrumentation/agents/ — mounted as a shared volume so the app container can reference the agents","/opt/dash0/agents/ — symlinked to the app container's PATH","/.dash0/ — injected as a ConfigMap volume","/etc/otel/ — mounted read-only from a cluster-wide PersistentVolume"],a:0,cat:"Auto-Instrumentation",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The init container writes agent binaries to /__otel_auto_instrumentation/agents/ via a shared emptyDir volume. The app container then references this path through injected environment variables (e.g., JAVA_TOOL_OPTIONS, NODE_OPTIONS) that are also set by the webhook.",d:3},

// ─── Export Configuration (6: 1B/3I/2A) ───
{q:"What are the three export types supported in Dash0OperatorConfiguration?",o:["dash0, prometheus, loki","grpc, http, kafka","dash0, grpc, http","otlp, jaeger, zipkin"],a:2,cat:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The three export types are: dash0 (endpoint + Dash0 auth token or secretRef, plus optional apiEndpoint), grpc (endpoint + custom headers for any OTLP/gRPC backend), and http (endpoint + custom headers + encoding: proto or json). 🟢 Dash0 angle: grpc and http types let customers send to any OTel-compatible backend alongside Dash0, with no lock-in.",d:1},
{q:"A security team requires that Dash0 auth tokens never appear in Kubernetes ConfigMaps. Which export auth method should they use?",o:["Use the token field — it is always encrypted","Use secretRef pointing to a pre-existing Kubernetes Secret","Use an environment variable in the operator Deployment","Use the apiEndpoint field instead of the auth token"],a:1,cat:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The token field renders the value into a Kubernetes ConfigMap (readable by anyone with cluster API access). secretRef stores the token in a Kubernetes Secret, which is a separate resource. Note: K8s Secrets are base64-encoded, not encrypted — additional KMS or sealed-secrets measures are needed for true at-rest encryption.",d:2},
{q:"How do you route a specific namespace's telemetry to a different Dash0 organization than the cluster default?",o:["Set a different SYNC_SHEET_URL in that namespace's ConfigMap","Add an exports[] field to that namespace's Dash0Monitoring resource","Label the namespace with dash0.com/dataset=custom","Edit the Dash0OperatorConfiguration's namespaceSelector"],a:1,cat:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Dash0Monitoring resources can include their own exports[] array. This replaces (not merges with) the global exports for that namespace. Use this pattern for multi-tenant clusters where different teams or business units ship to different Dash0 organizations or datasets.",d:2},
{q:"What does the dash0Export.dataset Helm value control?",o:["The OTel collector's internal buffer dataset","The Kubernetes namespace used for the collector DaemonSet","The target dataset within a Dash0 organization that receives the telemetry","The Prometheus scrape dataset name"],a:2,cat:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The dataset value routes telemetry to a specific named dataset within the Dash0 organization. Defaults to 'default'. Different clusters or namespaces can write to different datasets, enabling logical separation of environments (e.g., prod vs. staging) within a single Dash0 org.",d:2},
{q:"What encoding formats does an HTTP OTLP export support in Dash0OperatorConfiguration?",o:["json and xml","proto and json","base64 and json","gzip and snappy"],a:1,cat:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"HTTP OTLP exports support 'proto' (binary Protobuf, default and recommended for efficiency) or 'json' (human-readable, useful for debugging). This maps to Content-Type: application/x-protobuf or application/json in the OTLP HTTP request.",d:3},
{q:"A platform team manually creates a Dash0OperatorConfiguration named 'my-config' before installing the Dash0 Operator via Helm with dash0Export.enabled=true. What happens?",o:["The operator deletes 'my-config' and creates its own auto-resource","The operator detects 'my-config' exists and refuses to create the auto-resource, preserving the manual config","Both configs are merged into a single effective config","The Helm install fails with a CRD conflict error"],a:1,cat:"Export Configuration",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The auto-created resource is named 'dash0-operator-configuration-auto-resource'. If ANY Dash0OperatorConfiguration resource already exists with a different name, the operator will NOT create the auto-resource. This lets teams pre-create configs in GitOps pipelines before the operator is installed.",d:3},

// ─── Telemetry Pipeline (6: 1B/3I/2A) ───
{q:"What two collector deployment types does the Dash0 Operator manage?",o:["Deployment (logs) and StatefulSet (metrics)","DaemonSet (per-node: logs and node metrics) and Deployment (cluster metrics and traces gateway)","Single Deployment handling all signals","DaemonSet (traces) and CronJob (metrics)"],a:1,cat:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The DaemonSet collector runs on every node and collects pod logs via the filelog receiver plus node-level metrics. The Deployment collector is cluster-wide and handles cluster metrics, trace aggregation, and Kubernetes events. Together they cover all four signals. 🟢 Dash0 angle: Purpose-built topology — no single bottleneck, no missed node-local telemetry.",d:1},
{q:"What OTTL construct in Dash0Monitoring drops all spans matching either of two HTTP routes?",o:["spec.exclude.traces: ['/ready','/metrics']","spec.filter.traces.span: ['attributes[\"http.route\"]==\"/ready\"','attributes[\"http.route\"]==\"/metrics\"']","spec.drop.traces.routes: [\"/ready\",\"/metrics\"]","spec.transform.trace_statements: [{context: span, statements: ['delete_key(attributes,\"http.route\")']}]"],a:1,cat:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The spec.filter.traces.span field accepts a list of OTTL conditions. Conditions within the list are OR'd — if any condition is true, the span is dropped. This is the correct way to drop health-check and metrics-scrape spans before they leave the cluster.",d:2},
{q:"In what order are spec.filter and spec.transform applied to telemetry in Dash0Monitoring?",o:["transform first, then filter","They run in parallel with no guaranteed order","filter first, then transform","The order depends on which field appears first in the YAML"],a:0,cat:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Filter executes BEFORE transform. This means you cannot rely on transformations being applied when writing filter conditions. A common mistake: filtering on an attribute that a transform would have set — the attribute won't exist yet at filter time.",d:2},
{q:"What does setting collectPodLabelsAndAnnotations.enabled=true do in Dash0Monitoring?",o:["Adds pod labels as Prometheus metric labels only","Converts all pod labels and annotations to resource attributes (prefixed k8s.pod.label. / k8s.pod.annotation.) on all spans, metrics, and logs","Exports pod labels to a separate Kubernetes ConfigMap for debugging","Enables label-based instrumentation targeting only"],a:1,cat:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"When enabled, all pod labels are added as resource attributes prefixed with k8s.pod.label. and all pod annotations with k8s.pod.annotation. These attributes appear on every span, metric data point, and log record originating from that pod, enabling rich filtering in Dash0.",d:2},
{q:"An operator serves two namespaces: namespace A sets filter error_mode=propagate and namespace B sets error_mode=ignore. What effective error_mode does the collector use?",o:["ignore — the least severe wins to avoid breaking pipelines","propagate — the most severe wins and is applied globally","Each namespace gets its own isolated collector pipeline","The operator rejects the conflicting configuration and logs an error"],a:1,cat:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"When filter/transform statements from multiple namespaces are aggregated into a single processor, conflicting error_mode values are resolved by selecting the most severe: propagate > ignore > silent. This ensures no namespace can silently suppress OTTL errors that another namespace expects to be reported.",d:3},
{q:"What is the difference between spec.logCollection.enabled and spec.eventCollection.enabled in Dash0Monitoring?",o:["They are aliases for the same setting","logCollection controls pod stdout/stderr log files; eventCollection controls Kubernetes API events (kubectl get events)","logCollection controls application logs; eventCollection controls operator audit logs","eventCollection is only available in v1beta1; logCollection works in both API versions"],a:1,cat:"Telemetry Pipeline",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"logCollection.enabled controls whether the filelog receiver tails pod log files from /var/log/pods/. eventCollection.enabled controls whether Kubernetes API events (pod scheduling, OOMKills, backoffs) are collected. Both are enabled by default with autoMonitorNamespaces but are independently configurable.",d:3},

// ─── Prometheus & Perses (5: 1B/2I/2A) ───
{q:"Which standard Prometheus annotations does the Dash0 Operator use to discover scrape targets?",o:["metrics.k8s.io/scrape, metrics.k8s.io/port, metrics.k8s.io/path","prometheus.io/scrape, prometheus.io/port, prometheus.io/path, prometheus.io/scheme","otel.io/scrape=true, otel.io/port, otel.io/path","dash0.com/metrics-port, dash0.com/metrics-path"],a:1,cat:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The operator respects the de-facto standard prometheus.io/* annotation set used by the Prometheus Operator. Annotation scraping is controlled per-namespace by spec.prometheusScraping.enabled in Dash0Monitoring. 🟢 Dash0 angle: Existing Prometheus-annotated services work immediately — zero migration effort.",d:1},
{q:"What component does the Dash0 Operator deploy to support ServiceMonitor and PodMonitor CRD-based scraping?",o:["A dedicated Prometheus Operator replica","The OpenTelemetry Target Allocator","A custom CRD controller in the dash0-system namespace","An additional DaemonSet with a Prometheus agent"],a:1,cat:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The OpenTelemetry Target Allocator is deployed when prometheusCrdSupport is enabled. It watches ServiceMonitor, PodMonitor, and ScrapeConfig resources, discovers targets, and assigns scrape work to the collector DaemonSet pod on the same node as the monitored workload.",d:2},
{q:"What Dash0 API capability is required for PrometheusRule and PersesDashboard sync to work?",o:["The telemetry collection must be enabled (telemetryCollection.enabled=true)","The apiEndpoint must be configured in Dash0OperatorConfiguration","The Perses Operator must be installed first","The Target Allocator must be running"],a:1,cat:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"CRD sync features (PrometheusRule → Dash0 check rules, PersesDashboard → Dash0 dashboards) use the Dash0 REST API, not the telemetry pipeline. The apiEndpoint (format: https://api.*.dash0.com) must be configured. This works even when telemetryCollection.enabled=false.",d:2},
{q:"How do you prevent a specific PrometheusRule from being synced to Dash0 even when namespace-wide sync is enabled?",o:["Add an annotation prometheusrule.dash0.com/skip=true to the resource","Label the resource with dash0.com/enable=false","Delete the PrometheusRule and recreate it after disabling sync","Set synchronizePrometheusRules=false in the Dash0Monitoring resource"],a:1,cat:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The label dash0.com/enable=false on an individual PrometheusRule or PersesDashboard resource opts it out of sync, providing per-resource granularity even when namespace-wide synchronization is active.",d:3},
{q:"A cluster uses mTLS between the Target Allocator and the OTel collector DaemonSet. What prerequisites must be met?",o:["TLS termination at the ingress controller is sufficient","Both server and client certificates must be pre-created as Secrets in dash0-system and signed by the same CA; cert-manager is the recommended issuer","A self-signed certificate generated by the operator automatically","The Prometheus Operator must manage the certificate rotation"],a:1,cat:"Prometheus & Perses",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"mTLS for Target Allocator (operator.targetAllocator.mTls.enabled=true) requires pre-created Kubernetes Secrets in dash0-system containing server and client certificates signed by the same CA. cert-manager is the recommended way to provision and rotate these certs.",d:3},

// ─── Advanced Operations (5: 1B/3I/1A) ───
{q:"What does autoMonitorNamespaces.enabled=true do in the Dash0 Operator?",o:["Instruments every pod in the cluster without any Dash0Monitoring resources","Automatically creates a Dash0Monitoring resource for every namespace (new and existing), excluding the operator namespace and kube-* namespaces","Enables Prometheus annotation scraping for all namespaces","Deploys an additional collector DaemonSet per namespace"],a:1,cat:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"autoMonitorNamespaces.enabled=true creates Dash0Monitoring resources automatically. kube-system, kube-node-lease, kube-public, and dash0-system are always excluded. The default label selector (dash0.com/enable!=false) creates an opt-out model. 🟢 Dash0 angle: One flag to monitor an entire cluster — ideal for platform teams running multi-tenant environments.",d:1},
{q:"How do you set default instrumentation mode for all auto-monitored namespaces without manually creating Dash0Monitoring resources?",o:["Edit the Dash0OperatorConfiguration spec.instrumentWorkloads field","Set operator.monitoringTemplate.spec in Helm values — it acts as the template for all auto-created Dash0Monitoring resources","Label every namespace with dash0.com/mode=created-and-updated","Use a MutatingWebhookConfiguration that patches Dash0Monitoring resources on creation"],a:1,cat:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"operator.monitoringTemplate.spec is a Helm-level template that defines the default spec for every Dash0Monitoring resource the operator auto-creates. Supports all Dash0Monitoring spec fields except per-namespace exports. Example use: set instrumentWorkloads.mode=none to collect only logs and events without instrumentation.",d:2},
{q:"A DevOps team wants to opt one namespace out of autoMonitorNamespaces while keeping all others monitored. What is the correct approach?",o:["Delete the auto-created Dash0Monitoring resource in that namespace — it will not be recreated","Label the namespace with dash0.com/enable=false — the default label selector excludes it","Set instrumentWorkloads.mode=none in that namespace's Dash0Monitoring resource","Remove the namespace from the operator.autoMonitorNamespaces.includeNamespaces list in Helm values"],a:1,cat:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The default autoMonitorNamespaces label selector is 'dash0.com/enable!=false'. Labeling a namespace with dash0.com/enable=false causes the operator to skip it. If you delete the auto-created Dash0Monitoring resource without the label, the operator will simply recreate it.",d:2},
{q:"What is the purpose of operator.instrumentation.delayAfterEachWorkloadMillis and when should it be used?",o:["It controls how long to wait before re-instrumenting a workload after a pod restart","It adds a delay between processing each workload to rate-limit API requests during bulk instrumentation of large clusters","It sets the timeout for the mutating webhook to respond","It defines the interval between operator self-monitoring telemetry flushes"],a:1,cat:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"In large clusters, instrumenting hundreds of workloads simultaneously can overwhelm the Kubernetes API server. delayAfterEachWorkloadMillis (and delayAfterEachNamespaceMillis) staggers these requests. Use this in clusters with many workloads or strict API rate limits.",d:3},
{q:"Self-monitoring is enabled (spec.selfMonitoring.enabled=true) but spec.telemetryCollection.enabled=false. Does the operator send its own telemetry?",o:["No — self-monitoring depends on the collector, so it is also disabled","Yes — self-monitoring bypasses telemetryCollection and sends directly to the configured export target","Yes — but only metrics, not traces or logs","No — both settings must be true for any telemetry to flow"],a:1,cat:"Advanced Operations",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Self-monitoring (operator's own traces, metrics, and logs) is independent of telemetryCollection. The operator sends its own telemetry directly to the configured Dash0 export endpoint, bypassing the collector infrastructure entirely. This allows health monitoring of the operator even in IaC-only deployments.",d:1},

// ─── Pitch & Positioning (5: 2B/2I/1A) ───
{q:"What is the core differentiator of the Dash0 Operator's 'zero-code observability' story?",o:["It replaces OpenTelemetry SDKs with Dash0-proprietary agents","One helm install provides traces, metrics, logs, and profiles with no application code changes — powered by OpenTelemetry","It requires a custom Dockerfile base image from Dash0","It only works for JVM-based applications"],a:1,cat:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator",e:"The Dash0 Operator's headline value: install once, instrument everything. No SDK changes, no Dockerfile modifications, no per-service configuration. All four signals flow automatically. Built on OpenTelemetry — vendor-neutral by design. 🟢 Dash0 angle: Observability from day 0, not day 100.",d:1},
{q:"A prospect says 'we have a huge Prometheus investment — annotations, ServiceMonitors, and PrometheusRules everywhere.' How does the Dash0 Operator respond to this?",o:["Dash0 requires migrating away from Prometheus to use our stack","The operator has no Prometheus support","The operator supports all three Prometheus layers: annotation scraping, ServiceMonitor/PodMonitor CRDs via Target Allocator, and PrometheusRule sync to Dash0 check rules","Only annotation scraping is supported; CRDs require a full Prometheus Operator install"],a:2,cat:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"Dash0 supports the full Prometheus ecosystem: (1) prometheus.io/* annotation scraping, (2) ServiceMonitor/PodMonitor/ScrapeConfig CRDs via the Target Allocator, and (3) PrometheusRule sync to Dash0 alerting. No rip-and-replace needed. 🟢 Dash0 angle: Protect the Prometheus investment while gaining the full Dash0 observability experience.",d:1},
{q:"How does the Dash0 Operator support GitOps/IaC teams who want to manage observability configuration as code?",o:["Only the Helm chart values are GitOps-compatible — CRDs must be managed manually","All Dash0 resources (Dash0OperatorConfiguration, Dash0Monitoring, PersesDashboard, PrometheusRule, Dash0SyntheticCheck, Dash0View) are Kubernetes CRDs manageable via ArgoCD, Flux, or Terraform","Dashboards must be created in the Dash0 UI and exported manually","GitOps requires the Enterprise tier of Dash0"],a:1,cat:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator",e:"Every Dash0 resource is a first-class Kubernetes CRD. ArgoCD, Flux, or Terraform can manage the full observability stack declaratively. With telemetryCollection.enabled=false, the operator runs in pure IaC mode — no collectors deployed, just API-driven resource management. 🟢 Dash0 angle: Observability as code from the start.",d:2},
{q:"A prospect objects: 'We use Datadog — they have deep Kubernetes integrations too.' What is the strongest Dash0 Operator counter-argument?",o:["Dash0 has more dashboard templates than Datadog","Dash0 charges per seat; Datadog charges per host — Dash0 is cheaper in all cases","Dash0 is built on OpenTelemetry (no lock-in), reuses existing Prometheus investments, and requires no SDK changes — if you leave Dash0, your OTel instrumentation stays","Dash0 has a free tier; Datadog does not"],a:2,cat:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator",e:"The strongest objection-handling points: (1) No vendor lock-in — OTel-native, open standards. (2) No SDK changes — existing code is untouched. (3) Prometheus compatibility — existing investments reused. (4) Dash0 extends OTel; Datadog replaces it. 🟢 Dash0 angle: Switching costs are near-zero because you're investing in OpenTelemetry, not Dash0-specific APIs.",d:2},
{q:"A large enterprise runs 20 teams on a shared Kubernetes cluster. Each team wants separate observability billing, their own Dash0 organization, and the ability to opt out of instrumentation. How does the Dash0 Operator handle this?",o:["This is not possible — the operator supports only one export target per cluster","Per-namespace Dash0Monitoring resources support per-namespace export targets (separate Dash0 orgs/tokens), per-namespace instrumentWorkloads.mode (including none), and the dash0.com/enable=false label for individual workload opt-out","Each team must install their own operator in a separate cluster","The operator requires a single shared Dash0 organization with dataset-based separation"],a:1,cat:"Pitch & Positioning",u:"https://github.com/dash0hq/dash0-operator/blob/main/helm-chart/dash0-operator/README.md",e:"The Dash0 Operator's multi-tenancy model: per-namespace Dash0Monitoring resources can override exports (different Dash0 orgs, different tokens), set independent instrumentation modes, and teams can opt individual workloads out with dash0.com/enable=false. One operator, full multi-tenant control. 🟢 Dash0 angle: Platform teams and app teams each get exactly the control they need.",d:3},
];
