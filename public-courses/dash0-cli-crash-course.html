{id:"lesson-1",title:"What is the Dash0 CLI?",time:"15m",week:1,icon:"🛠️",
sources:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga","https://www.dash0.com/changelog/cli-agent-mode"],
body:`<div class="lesson-section"><h4>The Three Interfaces</h4><div class="lesson-text"><p>Dash0 exposes three interfaces to its platform: the <strong>UI</strong> (browser-based, human-visual), the <strong>API</strong> (HTTP REST, machine-to-machine), and the <strong>CLI</strong> (terminal-based, human-native). Each interface targets a different context and user.</p><p>The CLI is the "human-native" interface — it is designed for engineers and operators who live in the terminal. It wraps the same API used by the UI and exposes it as ergonomic shell commands with tab completion, human-readable table output, and interactive prompts where appropriate.</p></div></div><div class="lesson-section"><h4>What the CLI Does</h4><div class="lesson-text"><p>The Dash0 CLI has four capability areas:</p></div><div class="lesson-highlight"><strong>Asset Management:</strong> CRUD operations on dashboards, check rules, views, and synthetic checks. Export as YAML, import from YAML, accept PrometheusRule CRDs.<br><br><strong>GitOps Apply:</strong> <code class="code-inline">dash0 apply -f</code> — idempotent apply of YAML files, like <code class="code-inline">kubectl apply</code> for observability.<br><br><strong>Telemetry Querying:</strong> Query logs, spans, and metrics from the terminal. Filter by attributes, time ranges, output as CSV or JSON.<br><br><strong>Sending Telemetry:</strong> Send log lines and spans directly via OTLP. Test pipelines, annotate deployments, validate instrumentation from local dev.</div></div><div class="lesson-section"><h4>CLI vs API vs MCP</h4><div class="lesson-text"><p>Use the <strong>CLI</strong> when you are a human in a terminal: installing locally, running queries, demoing workflows, scripting one-off operations. Use the <strong>API</strong> when you are building an integration or automation: service-to-service calls, custom tooling, webhook handlers. Use the <strong>MCP server</strong> when you are in an AI coding environment: Claude Code, Cursor, or Windsurf connecting to Dash0 via the Model Context Protocol.</p><p>The CLI bridges all three worlds — it has native AI agent mode that makes it usable by AI coding agents without any configuration, and it wraps the same HTTP API that programmatic integrations use.</p></div></div><div class="lesson-section"><h4>Value Proposition</h4><div class="lesson-highlight">The Dash0 CLI lets developers manage observability infrastructure as code, query live telemetry from the terminal, and integrate Dash0 natively into any AI coding agent — with zero friction.</div></div>`,

{id:"lesson-2",title:"Installation & Profiles",time:"20m",week:1,icon:"⚙️",

body:`<div class="lesson-section"><h4>Installation Methods</h4><div class="lesson-text"><p>The Dash0 CLI supports three installation methods. Choose based on your environment and workflow.</p></div><div class="lesson-highlight"><strong>Homebrew (macOS/Linux — recommended for local use):</strong><br><div class="code-block">brew tap dash0hq/dash0-cli https://github.com/dash0hq/dash0-cli
brew install dash0</div><strong>Docker (CI/CD and containerized environments):</strong><br><div class="code-block">docker run ghcr.io/dash0hq/cli:latest [command]</div>Multi-arch: supports linux/amd64 and linux/arm64.<br><br><strong>Build from source (Go 1.22+ required):</strong><br><div class="code-block">git clone https://github.com/dash0hq/dash0-cli.git
cd dash0-cli && make install</div></div></div><div class="lesson-section"><h4>Profiles and Authentication</h4><div class="lesson-text"><p>Profiles are named configurations stored in <code class="code-inline">~/.dash0/</code>. Each profile holds an API URL, OTLP ingress URL, and auth token. Override the config directory with <code class="code-inline">DASH0_CONFIG_DIR</code>.</p></div><div class="code-block"># Create a profile
dash0 config profiles create dev \
  --api-url https://api.us-west-2.aws.dash0.com \
  --otlp-url https://ingress.us-west-2.aws.dash0.com \
  --auth-token auth_xxx

# List all profiles
dash0 config profiles list

# Switch profiles
dash0 config profiles select staging

# Show active config (partially masked token)
dash0 config show

# Delete a profile
dash0 config profiles delete old-profile</div></div><div class="lesson-section"><h4>Environment Variables</h4><div class="lesson-text"><p>All profile settings can be overridden at runtime via environment variables — useful for CI/CD where you can't rely on a persistent profile file:</p></div><div class="code-block">DASH0_CONFIG_DIR=/tmp/dash0-ci   # Override config directory
DASH0_AGENT_MODE=true             # Enable machine-readable output
DASH0_AUTH_TOKEN=auth_xxx         # Override auth token</div></div>`,

{id:"lesson-3",title:"Asset Management CRUD",time:"25m",week:1,icon:"📋",
sources:["https://www.dash0.com/changelog/cli-manage-assets","https://github.com/dash0hq/dash0-cli"],
body:`<div class="lesson-section"><h4>Four Asset Types, One Pattern</h4><div class="lesson-text"><p>The Dash0 CLI manages four asset types: <code class="code-inline">dashboards</code>, <code class="code-inline">check-rules</code>, <code class="code-inline">views</code>, and <code class="code-inline">synthetic-checks</code>. Every asset type uses the same five subcommands: <strong>list, get, create, update, delete</strong>. Learn the pattern once, apply it to all four.</p></div></div><div class="lesson-section"><h4>Core Commands</h4><div class="code-block"># List all assets of a type
dash0 dashboards list
dash0 check-rules list
dash0 views list
dash0 synthetic-checks list

# Get a single asset (output as YAML for version control)
dash0 dashboards get <id> -o yaml
dash0 check-rules get <id> -o json

# Create from a YAML file
dash0 dashboards create -f dashboard.yaml
dash0 check-rules create -f rule.yaml

# Update in place (ID from YAML file if omitted on CLI)
dash0 views update <id> -f view.yaml
dash0 dashboards update -f dashboard.yaml   # ID read from YAML

# Delete (use --force to skip confirmation in scripts)
dash0 synthetic-checks delete <id>
dash0 check-rules delete <id> --force</div></div><div class="lesson-section"><h4>Output Formats</h4><div class="lesson-text"><p>Use <code class="code-inline">-o</code> to control output format. <code class="code-inline">table</code> is the default for human reading. <code class="code-inline">yaml</code> and <code class="code-inline">json</code> are for version control and scripting. <code class="code-inline">wide</code> shows additional columns. <code class="code-inline">csv</code> is for exports.</p></div></div><div class="lesson-section"><h4>Prometheus CRD Import</h4><div class="lesson-highlight"><strong>Key differentiator:</strong> The CLI accepts PrometheusRule CRD files directly. No manual translation needed — it converts alerting rules to Dash0 check rules automatically.<br><div class="code-block">dash0 check-rules create -f prometheus-rules.yaml  # PrometheusRule CRD</div>This is a major migration accelerator for teams coming from Prometheus/Alertmanager.</div></div><div class="lesson-section"><h4>Edit Workflow Pattern</h4><div class="code-block"># Export current state
dash0 dashboards get <id> -o yaml > my-dashboard.yaml

# Edit locally (add panels, change thresholds, etc.)
vim my-dashboard.yaml

# Apply changes
dash0 dashboards update <id> -f my-dashboard.yaml
# OR use apply for idempotent create-or-update:
dash0 apply -f my-dashboard.yaml</div></div>`,

{id:"lesson-4",title:"GitOps with dash0 apply",time:"25m",week:2,icon:"🔄",
sources:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga"],
body:`<div class="lesson-section"><h4>Why dash0 apply?</h4><div class="lesson-text"><p><code class="code-inline">dash0 apply</code> is the GitOps command — the observability equivalent of <code class="code-inline">kubectl apply</code>. It takes YAML files as input and creates or updates resources as needed. It is <strong>idempotent</strong>: run it ten times with the same input and the result is the same as running it once.</p><p>This idempotency is what makes it safe to use in CI/CD pipelines. You don't need separate "create" and "update" stages — apply handles both automatically based on whether the resource exists.</p></div></div><div class="lesson-section"><h4>Core Apply Patterns</h4><div class="code-block"># Apply a single file
dash0 apply -f dashboard.yaml

# Apply all YAML files in a directory (recursive)
dash0 apply -f observability/

# Apply from stdin (pipe from template engine or generator)
cat generated-dashboard.yaml | dash0 apply -f -

# Dry run — validate without applying
dash0 apply -f observability/ --dry-run

# Multi-doc YAML (multiple resources in one file, separated by ---)
dash0 apply -f all-resources.yaml</div></div><div class="lesson-section"><h4>Create vs Update Detection</h4><div class="lesson-text"><p>Apply checks the <code class="code-inline">id</code> field in each YAML document against the Dash0 API. If a resource with that ID exists, it updates. If not, it creates. No flags needed — this is automatic.</p></div><div class="lesson-highlight"><strong>Contrast with explicit create/update:</strong><br><code class="code-inline">dash0 dashboards create -f</code> — fails if ID already exists<br><code class="code-inline">dash0 dashboards update -f</code> — fails if ID does not exist<br><code class="code-inline">dash0 apply -f</code> — always succeeds (creates or updates)</div></div><div class="lesson-section"><h4>GitOps Pipeline Integration</h4><div class="lesson-text"><p>The recommended GitOps pattern: store all Dash0 assets as YAML in a Git repository under <code class="code-inline">observability/</code>. Add two CI/CD steps:</p></div><div class="code-block"># On pull request — validate only
dash0 apply -f observability/ --dry-run

# On merge to main — deploy
DASH0_AGENT_MODE=true dash0 apply -f observability/</div><div class="lesson-text"><p>Use <code class="code-inline">DASH0_CONFIG_DIR</code> in CI to avoid relying on persistent profile files. Create the profile from secrets in each pipeline run. Use profile names to separate environments (dev/staging/prod).</p></div></div>`,
exercises:[
{task:"Set up a local observability/ directory and apply multiple assets.",hint:"Create at least two YAML files with different kinds and apply the directory.",steps:["Create: mkdir observability/","Export a dashboard: dash0 dashboards get <id> -o yaml > observability/dashboard.yaml","Export a check rule: dash0 check-rules get <id> -o yaml > observability/check-rule.yaml","Apply: dash0 apply -f observability/","Review output — should show 'updated' for each resource"]},
{task:"Use --dry-run to validate YAML before applying.",hint:"Introduce a deliberate YAML error and verify dry-run catches it.",steps:["Open observability/dashboard.yaml and remove the 'kind' field","Run: dash0 apply -f observability/ --dry-run","Observe the error — dry-run should report the schema problem","Fix the YAML and run dry-run again to confirm it passes","Then run apply (without --dry-run) to deploy the valid config"]},
{task:"Test multi-document YAML with dash0 apply.",hint:"Combine multiple resource definitions in one file with --- separators.",steps:["Create: combined.yaml with two resources separated by ---","Add a dashboard definition, then --- then a view definition","Run: dash0 apply -f combined.yaml","Verify both resources were created or updated in the Dash0 UI"]}
]},

{id:"lesson-5",title:"Querying Telemetry",time:"25m",week:2,icon:"🔍",
sources:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga"],
body:`<div class="lesson-section"><h4>Three Query Commands</h4><div class="lesson-text"><p>The Dash0 CLI provides three experimental querying commands — all require the <code class="code-inline">-X</code> flag. Metrics querying uses <code class="code-inline">dash0 metrics instant</code> (no <code class="code-inline">-X</code> required).</p></div><div class="lesson-highlight"><strong>Logs:</strong> <code class="code-inline">dash0 -X logs query</code><br><strong>Spans:</strong> <code class="code-inline">dash0 -X spans query</code><br><strong>Traces:</strong> <code class="code-inline">dash0 -X traces get &lt;trace-id&gt;</code><br><strong>Metrics (GA):</strong> <code class="code-inline">dash0 metrics instant --query 'promql'</code></div></div><div class="lesson-section"><h4>Log and Span Query Flags</h4><div class="code-block"># Filter by time range (relative timestamps)
dash0 -X logs query --from now-1h --to now
dash0 -X logs query --from now-30m

# Filter by OTel attributes
dash0 -X logs query --filter "service.name is payment-service"
dash0 -X logs query --filter "severity.text is ERROR"

# Multiple filters (ANDed together)
dash0 -X logs query \
  --from now-1h \
  --filter "service.name is checkout-service" \
  --filter "severity.text is ERROR"

# Limit results
dash0 -X logs query --limit 100

# Output formats
dash0 -X logs query -o json
dash0 -X logs query -o csv --column time --column service.name --column body

# Span queries use the same flags
dash0 -X spans query --from now-2h --filter "service.name is api-gateway"</div></div><div class="lesson-section"><h4>Trace Retrieval</h4><div class="code-block"># Get all spans for a trace
dash0 -X traces get <trace-id>

# Widen time window for older traces
dash0 -X traces get <trace-id> --from now-6h

# Follow span links across service boundaries
dash0 -X traces get <trace-id> --follow-span-links</div></div><div class="lesson-section"><h4>Metrics: PromQL via CLI</h4><div class="code-block"># Instant query (current value)
dash0 metrics instant --query 'sum(rate(http_requests_total[5m]))'

# Range query (time series)
dash0 metrics range \
  --query 'avg(cpu_usage_seconds_total)' \
  --from now-1h --to now --step 5m</div></div>`,
exercises:[
{task:"Query the last 30 minutes of logs for a specific service.",hint:"Use `dash0 -X logs query` with --from and --filter flags.",steps:["Run: dash0 -X logs query --from now-30m --limit 20","Add a service filter: --filter \"service.name is <your-service>\"","Try ERROR severity: add --filter \"severity.text is ERROR\"","Export to JSON: add -o json and pipe to jq for inspection"]},
{task:"Run a PromQL instant query against Dash0 metrics.",hint:"Use `dash0 metrics instant` — no -X flag needed.",steps:["Run: dash0 metrics instant --query 'up'","Try a more specific query: dash0 metrics instant --query 'sum by (service) (rate(http_requests_total[5m]))'","Compare to the Dash0 UI metrics explorer — results should match"]},
{task:"Retrieve a full trace by trace ID.",hint:"Find a trace ID from the Dash0 UI and use `dash0 -X traces get`.",steps:["Open Dash0 UI, find a trace with multiple spans, copy the trace ID","Run: dash0 -X traces get <trace-id>","If no results, widen: --from now-2h","Try: --follow-span-links to see if any linked traces are retrieved"]}
]},

{id:"lesson-6",title:"Sending Telemetry",time:"20m",week:2,icon:"📤",
sources:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga"],
body:`<div class="lesson-section"><h4>Why Send Telemetry from the CLI?</h4><div class="lesson-text"><p>The CLI can send logs and spans directly via OTLP — no application instrumentation required. This is useful for three scenarios: <strong>testing your ingestion pipeline</strong> (validate that data arrives correctly), <strong>annotating deployments</strong> (create searchable deployment markers in logs), and <strong>local dev validation</strong> (confirm OTel attributes are routed correctly before instrumenting production).</p></div></div><div class="lesson-section"><h4>Sending Logs</h4><div class="code-block"># Basic log send
dash0 logs send "Application started"

# With resource attributes (describe the entity)
dash0 logs send "Payment processed" \
  --resource-attribute service.name=payment-service \
  --resource-attribute service.version=2.1.0 \
  --resource-attribute deployment.environment=production

# With log attributes (describe the event)
dash0 logs send "Order created" \
  --resource-attribute service.name=order-service \
  --log-attribute order.id=12345 \
  --log-attribute customer.tier=premium

# With OTel severity
dash0 logs send "DB connection failed" \
  --resource-attribute service.name=api-gateway \
  --severity-text ERROR \
  --severity-number 17</div></div><div class="lesson-section"><h4>OTel Severity Reference</h4><div class="lesson-highlight">TRACE=1 | DEBUG=5 | INFO=9 | WARN=13 | ERROR=17 | FATAL=21<br>Always set both --severity-text and --severity-number for maximum compatibility.</div></div><div class="lesson-section"><h4>Sending Spans</h4><div class="code-block"># Basic span (requires -X experimental flag)
dash0 -X spans send \
  --name "GET /api/users" \
  --kind SERVER \
  --status-code OK \
  --duration 150ms \
  --resource-attribute service.name=api-gateway

# With span attributes
dash0 -X spans send \
  --name "process-payment" \
  --kind INTERNAL \
  --status-code OK \
  --duration 80ms \
  --resource-attribute service.name=payment-service \
  --span-attribute payment.method=credit_card \
  --span-attribute payment.amount=99.99</div></div><div class="lesson-section"><h4>Span Kinds</h4><div class="lesson-text"><p>Supported span kinds match the OTel SpanKind enum: <code class="code-inline">CLIENT</code> (outgoing requests), <code class="code-inline">SERVER</code> (incoming requests), <code class="code-inline">PRODUCER</code> (message sending), <code class="code-inline">CONSUMER</code> (message receiving), <code class="code-inline">INTERNAL</code> (internal operations).</p></div></div>`,
exercises:[
{task:"Send a test log with resource and log attributes to Dash0.",hint:"Use `dash0 logs send` with --resource-attribute and --log-attribute flags.",steps:["Run: dash0 logs send \"Test from CLI\" --resource-attribute service.name=test-service --severity-text INFO --severity-number 9","Open Dash0 UI, go to Logs — find the log with service.name=test-service","Add a log attribute: --log-attribute test.run=lesson-6","Verify the attribute appears in the log record detail view"]},
{task:"Send a CI/CD deployment annotation as a log event.",hint:"Simulate what a pipeline would do: send a log marking a deployment.",steps:["Run: dash0 logs send \"Deployment complete\" --resource-attribute service.name=my-app --resource-attribute service.version=v2.0.0 --log-attribute deployment.sha=abc123 --log-attribute deployment.env=staging --severity-text INFO --severity-number 9","Search Dash0 logs for service.name=my-app","Verify deployment.sha and deployment.env appear as filterable attributes"]},
{task:"Send a test span and verify it appears in Dash0 traces.",hint:"Use `dash0 -X spans send` with SERVER kind.",steps:["Run: dash0 -X spans send --name \"GET /test\" --kind SERVER --status-code OK --duration 200ms --resource-attribute service.name=test-service","Open Dash0 UI, go to Traces — find the span from test-service","Note: it will appear as a standalone span (no parent trace) — this is expected"]}
]},

{id:"lesson-7",title:"Agent Mode & CI/CD",time:"25m",week:3,icon:"🤖",
sources:["https://www.dash0.com/changelog/cli-agent-mode","https://www.dash0.com/changelog/dash0-cli-ga","https://github.com/dash0hq/dash0-cli"],
body:`<div class="lesson-section"><h4>What is Agent Mode?</h4><div class="lesson-text"><p>Agent mode makes the Dash0 CLI machine-readable. When active, it changes five behaviors to make the CLI suitable for consumption by programs — AI coding agents, CI/CD systems, and scripts — rather than humans.</p></div><div class="lesson-highlight"><strong>5 behavior changes in agent mode:</strong><br>1. JSON output by default (no --o flag needed)<br>2. --help returns structured JSON (not human text)<br>3. Errors emit as JSON on stderr: {"error":"...","hint":"..."}<br>4. No confirmation prompts (auto-confirm all operations)<br>5. No ANSI color codes (clean for log parsing)</div></div><div class="lesson-section"><h4>Enabling Agent Mode</h4><div class="code-block"># Explicit flag on any command
dash0 --agent-mode dashboards list

# Environment variable (recommended for CI/CD)
DASH0_AGENT_MODE=true dash0 apply -f observability/

# Disable explicitly (if auto-detected incorrectly)
DASH0_AGENT_MODE=false dash0 dashboards list</div></div><div class="lesson-section"><h4>Auto-Detection: Zero Config for AI Agents</h4><div class="lesson-text"><p>The CLI automatically activates agent mode when it detects these environments:</p></div><div class="lesson-highlight">Claude Code, Cursor, Windsurf, Cline, Aider, GitHub Copilot, OpenAI Codex, and any MCP server session (detected via MCP_SESSION_ID).<br><br>No user configuration needed — if you're in any of these tools, the CLI is already machine-readable.</div></div><div class="lesson-section"><h4>CI/CD Integration Pattern</h4><div class="code-block"># GitHub Actions: .github/workflows/dash0.yml
name: Deploy Observability Config
on:
  push:
    branches: [main]
    paths: ['observability/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Dash0 CLI
        run: |
          docker pull ghcr.io/dash0hq/cli:latest
      - name: Create profile
        env:
          DASH0_AUTH_TOKEN: \${{ secrets.DASH0_AUTH_TOKEN }}
          DASH0_API_URL: \${{ secrets.DASH0_API_URL }}
          DASH0_OTLP_URL: \${{ secrets.DASH0_OTLP_URL }}
        run: |
          export DASH0_CONFIG_DIR=/tmp/dash0-ci
          docker run -e DASH0_CONFIG_DIR -v /tmp/dash0-ci:/tmp/dash0-ci \
            ghcr.io/dash0hq/cli:latest config profiles create ci \
            --api-url $DASH0_API_URL --otlp-url $DASH0_OTLP_URL \
            --auth-token $DASH0_AUTH_TOKEN
      - name: Deploy
        run: |
          export DASH0_AGENT_MODE=true DASH0_CONFIG_DIR=/tmp/dash0-ci
          docker run -e DASH0_AGENT_MODE -e DASH0_CONFIG_DIR \
            -v /tmp/dash0-ci:/tmp/dash0-ci \
            -v $(pwd)/observability:/observability \
            ghcr.io/dash0hq/cli:latest apply -f /observability/</div></div>`,
exercises:[
{task:"Test agent mode JSON output locally.",hint:"Run a command with DASH0_AGENT_MODE=true and compare to normal output.",steps:["Normal output: dash0 dashboards list","Agent mode: DASH0_AGENT_MODE=true dash0 dashboards list","Observe: agent mode outputs JSON instead of a table","Try: DASH0_AGENT_MODE=true dash0 dashboards list | jq '.[0]' to inspect one record"]},
{task:"Test structured error output in agent mode.",hint:"Trigger an error (wrong profile or missing ID) and observe the JSON error format.",steps:["Run: DASH0_AGENT_MODE=true dash0 dashboards get nonexistent-id 2>&1","Observe the stderr JSON: should have 'error' and 'hint' fields","Compare: run the same command without agent mode to see the human-readable error","Note how the hint field gives actionable recovery steps"]},
{task:"Write a CI/CD validation step for a GitHub Actions workflow.",hint:"Create a .yml file that runs `dash0 apply --dry-run` on pull requests.",steps:["Create .github/workflows/validate-observability.yml","Add a trigger: on pull_request with paths: ['observability/**']","Add a step that installs the CLI and runs: DASH0_AGENT_MODE=true dash0 apply -f observability/ --dry-run","The step should fail the PR if --dry-run returns a non-zero exit code"]}
]},

{id:"lesson-8",title:"Competitive Positioning",time:"20m",week:3,icon:"🏆",
sources:["https://www.dash0.com/changelog/dash0-cli-ga","https://www.dash0.com/changelog/cli-agent-mode","https://www.dash0.com/changelog/cli-manage-assets"],
body:`<div class="lesson-section"><h4>The Competitive Landscape</h4><div class="lesson-text"><p>Several observability platforms have CLIs. Understanding the differences helps you position Dash0 CLI accurately in sales and SA conversations.</p></div></div><div class="lesson-section"><h4>Dash0 vs Competitors</h4><table class="lesson-compare"><tr><td class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Datadog CLI</div>ddtrace, dogwrap — focused on process wrapping and trace injection. Limited asset management (no dashboard-as-code CLI). No native AI agent mode. UI-first design philosophy.</td><td class="lesson-compare-item"><div class="compare-label" style="color:#10b981">Dash0 CLI</div>Full asset management (dashboards, rules, views, synthetics). GitOps apply. Live telemetry queries. Telemetry injection. Native AI agent mode with zero-config auto-detection.</td></tr><tr><td class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Grafana (grizzly)</div>Dashboard-as-code tool for Grafana. Limited to Grafana dashboards — no alerting rules, no synthetic checks. No telemetry querying or injection. Community-maintained, not first-party.</td><td class="lesson-compare-item"><div class="compare-label" style="color:#10b981">Dash0 CLI</div>First-party, maintained by Dash0. Covers the full observability asset lifecycle. Unified tool — one CLI for all operations. Agent mode purpose-built for AI workflows.</td></tr><tr><td class="lesson-compare-item"><div class="compare-label" style="color:#ef4444">Dynatrace Monaco</div>YAML-based configuration-as-code tool. Requires separate Monaco binary and config format learning. Complex configuration model. No live telemetry querying or injection from same tool.</td><td class="lesson-compare-item"><div class="compare-label" style="color:#10b981">Dash0 CLI</div>Single binary, familiar <code class="code-inline">kubectl apply</code> semantics. Direct YAML export from live resources. Apply, query, and send from the same tool. Prometheus CRD compatibility reduces migration friction.</td></tr></table></div><div class="lesson-section"><h4>Dash0 CLI Differentiators</h4><div class="lesson-highlight"><strong>1. Unified tool:</strong> Asset management + telemetry querying + telemetry injection in one binary. No competitors cover all three.<br><br><strong>2. GitOps-native:</strong> <code class="code-inline">dash0 apply</code> was designed for CI/CD from day one. Dry-run, multi-doc YAML, idempotent operations.<br><br><strong>3. AI agent mode:</strong> Auto-detects 8+ AI coding environments. JSON help schemas. Structured error hints. First-mover in AI-native observability.<br><br><strong>4. Prometheus compatibility:</strong> Accepts PrometheusRule CRDs directly — no rewrite needed when migrating alerting rules.</div></div><div class="lesson-section"><h4>Sales Objection Handling</h4><div class="lesson-text"><p><strong>"We&#39;re UI-only."</strong> — Start with backup and audit trail value. <code class="code-inline">dash0 dashboards get -o yaml</code> as a safety net requires zero CLI adoption day-to-day.<br><br><strong>"We use Terraform."</strong> — Complementary: Terraform for environment provisioning, CLI for asset management and live telemetry access.<br><br><strong>"We already have kubectl."</strong> — Same mental model (<code class="code-inline">apply</code> semantics), different layer. kubectl for workloads, Dash0 CLI for the observability layer alongside those workloads.</p></div></div>`,
exercises:[
{task:"Practice the three core competitive differentiators from memory.",hint:"Unified tool, GitOps-native, AI agent mode, Prometheus compatibility",steps:["Cover this page and recite the four differentiators","For each, name one concrete CLI command that demonstrates it","Unified: dash0 -X logs query (query) + dash0 apply (asset mgmt) + dash0 logs send (inject) — all one binary","GitOps: dash0 apply --dry-run on PR, apply on merge","AI: DASH0_AGENT_MODE auto-detected in Claude Code/Cursor/Windsurf","Prometheus: dash0 check-rules create -f prometheus-rules.yaml"]},
{task:"Prepare responses to the three main CLI objections.",hint:"UI-only, Terraform users, kubectl users",steps:["'UI-only': backup/audit trail first, then GitOps value for growing teams","'Terraform': complementary — Terraform provisions environments, CLI manages assets and queries telemetry day-to-day","'Already have kubectl': same apply semantics, different layer — workloads vs observability config","Practice delivering each response in under 60 seconds"]}
]}
];

{id:"s1",date:"2026-04-14",time:"09:00",dur:30,title:"CLI Foundations",desc:"Lessons 1-2. Install the CLI, set up profiles. Review fundamentals flashcards.",phase:1},
{id:"s2",date:"2026-04-15",time:"09:00",dur:30,title:"Asset Management",desc:"Lesson 3. CRUD dashboards, check rules, views, synthetic checks.",phase:1},

// ─── PERSISTENCE ───
// TODO: Change storage key to something unique for your course
const STORAGE_KEY="dash0-cli-cc";
function saveState(){
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}catch(e){}
debouncedCloudSave();
}
function loadState(){
try{
const raw=localStorage.getItem(STORAGE_KEY);
if(!raw)return null;
return JSON.parse(raw);
}catch(e){return null}
}
function exportState(){
try{return localStorage.getItem(STORAGE_KEY)||"{}"}catch(e){return"{}"}
}
function importState(json){
try{
const data=JSON.parse(json);
if(data.stats){stats={...stats,...data.stats}}
if(data.history){sessionHistory=data.history}
saveState();render();return true;
}catch(e){return false}
}
// ─── CLOUD SYNC ENGINE (offline-resilient) ───
let syncStatus='idle',lastSyncAt=null,syncPending=false;
function syncEnabled(){return typeof SYNC_SHEET_URL==='string'&&SYNC_SHEET_URL.length>10}
function getSyncKey(){return SYNC_USER_ID?(SYNC_USER_ID+'/'+STORAGE_KEY):STORAGE_KEY}
function isOnline(){return typeof navigator!=='undefined'?navigator.onLine:true}
async function cloudSave(){
if(!syncEnabled()){syncPending=false;return}
if(!isOnline()){syncStatus='offline';syncPending=true;updateSyncUI();return}
syncStatus='syncing';updateSyncUI();
try{
const data={stats,history:sessionHistory,exercisesDone,schedule,checkpoints,sessionsDone,userRole,fcFavs:[...fcFavs],lastCard:{cat:fcCat,idx:fcIdx},cardRatings:cardRatings,savedAt:new Date().toISOString(),version:8};
await fetch(SYNC_SHEET_URL+'?action=save&key='+encodeURIComponent(getSyncKey()),{
method:'POST',headers:{'Content-Type':'text/plain'},
body:JSON.stringify({data,savedAt:data.savedAt})
});
syncStatus='synced';lastSyncAt=new Date().toISOString();syncPending=false;
}catch(e){
syncStatus=isOnline()?'error':'offline';syncPending=true;
console.warn('Cloud sync save failed:',e);
}
updateSyncUI();
}
async function cloudLoad(){
if(!syncEnabled())return null;
if(!isOnline()){syncStatus='offline';updateSyncUI();return null}
syncStatus='syncing';updateSyncUI();
try{
const resp=await fetch(SYNC_SHEET_URL+'?action=load&key='+encodeURIComponent(getSyncKey()));
const json=await resp.json();
syncStatus='synced';lastSyncAt=new Date().toISOString();updateSyncUI();
if(json.ok&&json.data)return json;
return null;
}catch(e){syncStatus=isOnline()?'error':'offline';updateSyncUI();console.warn('Cloud sync load failed:',e);return null}
}
function updateSyncUI(){
const el=document.getElementById('sync-badge');
if(!el)return;
const icons={idle:'☁️',syncing:'⟳',synced:'✓',error:'✕',offline:'⏸'};
const colors={idle:'#6b7280',syncing:'#f59e0b',synced:'#10b981',error:'#ef4444',offline:'#6b7280'};
const titles={idle:'Cloud sync ready',syncing:'Syncing...',synced:'Synced'+(lastSyncAt?' '+new Date(lastSyncAt).toLocaleTimeString():''),error:'Sync error — will retry when online',offline:'Offline — will sync when reconnected'};
el.textContent=icons[syncStatus]||'☁️';el.style.color=colors[syncStatus]||'#6b7280';el.title=titles[syncStatus]||'';
}
let syncTimer=null;
function debouncedCloudSave(){
if(!syncEnabled())return;
if(syncTimer)clearTimeout(syncTimer);
syncTimer=setTimeout(()=>cloudSave(),2000);
}
function saveSyncSettings(url,userId){
SYNC_SHEET_URL=url.trim();
SYNC_USER_ID=(userId||'').trim();
try{

function copyCode(btn){
  var block=btn.parentElement;
  var text=block.textContent.replace(/^Copy/,'').replace(/^Copied!/,'').trim();
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='Copied!';
    showToast('Copied to clipboard');
    setTimeout(function(){btn.textContent='Copy'},1500);
  });
}
function highlightCode(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/(#.*$)/gm,'<span style="color:#6b7280">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|\'(?:[^\'\\]|\\.)*\')/g,'<span style="color:#a5f3fc">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|while|true|false|null|import|from|export|class|extends|new|this|async|await)\b/g,'<span style="color:#f97316">$1</span>');
}

function fcRate(rating){
  var cards=fcGetCards();
  if(!cards.length)return;
  var card=cards[fcIdx%cards.length];
  cardRatings[card.f]=rating;
  stats.cards=(stats.cards||0)+1;
  saveState();
  fcFlipped=false;
  // advance to next card
  var next=fcGetCards();
  if(next.length>0)fcIdx=(fcIdx+1)%next.length;
  render();
}

function fcWeightedShuffle(){
  var cards=fcGetCards();
  if(!cards.length)return;
  var weighted=[];
  cards.forEach(function(c,i){
    var r=cardRatings[c.f];
    var w=r==='missed'?3:r==='unsure'?2:1;
    for(var j=0;j<w;j++)weighted.push(i);
  });
  fcIdx=weighted[Math.floor(Math.random()*weighted.length)];
  fcFlipped=false;
  render();
}

let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

if(upcoming.length){
h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Upcoming</div>`;
upcoming.forEach(s=>{

h+=`<div class="sched-item${isToday?' today':''}${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min${s.phase?' · Phase '+s.phase:''}</div></div>

<div class="si-actions">
${!done?`<button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Done</button>`:`<button style="background:#374151;color:#6ee7b7" onclick="unmarkSession('${s.id}')">✓ Done</button>`}
<button style="background:#374151;color:#9ca3af" onclick="openSessionForm('${s.id}')">Edit</button>
<button style="background:#374151;color:#fca5a5" onclick="deleteSession('${s.id}')">Del</button>
</div></div>`});
}
if(past.length){
h+=`<div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px">Past</div>`;
past.slice(0,5).forEach(s=>{
const done=sessionsDone[s.id];
h+=`<div class="sched-item past${done?' done':''}">
<div class="si-top"><div class="si-date">${fmtDate(s.date)} · ${s.time}</div><div class="si-dur">${s.dur} min</div></div>
<div class="si-title">${s.title}</div>
${!done?`<div class="si-actions"><button style="background:#10b981;color:#fff" onclick="markSessionDone('${s.id}')">Mark Done</button></div>`:
`<div style="font-size:11px;color:#6ee7b7;margin-top:4px">✓ Completed</div>`}
</div>`});
if(past.length>5)h+=`<div style="text-align:center;color:#4b5563;font-size:12px;padding:8px">+ ${past.length-5} more past sessions</div>`;
}
return h;
}

h+=`<div class="cp-item${hit?' hit':''}">

</div>
</div>
<div class="cp-date">${hit?'Achieved!':'Target by '+fmtDate(cp.by)} · Current: ${val}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''} / ${cp.threshold}${cp.metric.includes('uiz')||cp.metric.includes('apid')||cp.metric==='exercises'?'%':''}</div>

function askClaude(context){
const input=document.getElementById('askInput');
if(!input||!input.value.trim())return;
const q=input.value.trim();
const prompt=`I'm studying for Google Cloud Next 2026 (preparing as a Solutions Architect at Dash0, an observability company). I'm currently studying: ${context}\n\nMy question: ${q}\n\nPlease give me a clear, practical answer. Include specific details, examples, or comparisons where helpful. If this relates to GKE, Dash0, or observability, include relevant context for my role.`;
navigator.clipboard.writeText(prompt).then(()=>{
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
}).catch(()=>{
const ta=document.createElement('textarea');ta.value=prompt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
showToast('Copied to clipboard — opening Claude...');
setTimeout(()=>{window.open('https://claude.ai/new','_blank')},800);
});
input.value='';
}
function showToast(msg){
const existing=document.querySelector('.ask-toast');if(existing)existing.remove();
const t=document.createElement('div');t.className='ask-toast';t.textContent=msg;document.body.appendChild(t);
setTimeout(()=>t.remove(),3000);
}
// ─── ICS EXPORT ───
function toggleIcsPanel(){
icsOpen=!icsOpen;
if(icsOpen){icsSelected=new Set();icsPhaseFilter='all';schedule.forEach(s=>icsSelected.add(s.id))}
render();
}
function icsFilterPhase(p){
icsPhaseFilter=p;
icsSelected=new Set();
const filtered=p==='all'?schedule:schedule.filter(s=>s.phase==p);
filtered.forEach(s=>icsSelected.add(s.id));
render();
}
function icsToggle(id){if(icsSelected.has(id))icsSelected.delete(id);else icsSelected.add(id);render()}
function icsSelectAll(){const visible=icsVisibleSessions();visible.forEach(s=>icsSelected.add(s.id));render()}
function icsSelectNone(){icsSelected.clear();render()}
function icsVisibleSessions(){return icsPhaseFilter==='all'?[...schedule]:schedule.filter(s=>s.phase==icsPhaseFilter)}
function renderIcsPanel(){
if(!icsOpen)return'';
const visible=icsVisibleSessions().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const phases=[...new Set(schedule.map(s=>s.phase).filter(Boolean))].sort();
let h=`<div class="ics-panel">
<h4>📅 Export to Calendar</h4>
<div class="ics-filters">
<button class="${icsPhaseFilter==='all'?'active':''}" onclick="icsFilterPhase('all')">All Sessions</button>
${phases.map(p=>`<button class="${icsPhaseFilter==p?'active':''}" onclick="icsFilterPhase(${p})">Phase ${p}</button>`).join('')}
</div>
<div style="display:flex;gap:8px;margin-bottom:8px">
<button style="background:none;border:none;color:#3b82f6;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectAll()">Select all</button>
<span style="color:#374151;font-size:12px">|</span>
<button style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:0" onclick="icsSelectNone()">Select none</button>
</div>
<div class="ics-count">${icsSelected.size} of ${visible.length} session${visible.length!==1?'s':''} selected</div>
<div class="ics-list">`;
visible.forEach(s=>{
const on=icsSelected.has(s.id);
h+=`<div class="ics-item" onclick="icsToggle('${s.id}')">
<div class="ics-check${on?' on':''}">${on?'✓':''}</div>
<div class="ics-item-info"><div class="ics-item-title">${s.title}</div><div class="ics-item-date">${fmtDate(s.date)} · ${s.time} · ${s.dur} min</div></div>
</div>`});
h+=`</div>
<div class="ics-actions">
<button class="btn btn-secondary" onclick="toggleIcsPanel()">Cancel</button>
<button class="ics-dl" ${icsSelected.size===0?'disabled style="opacity:.4;cursor:default" ':''}onclick="${icsSelected.size?'downloadIcs()':''}">Download .ics (${icsSelected.size})</button>
</div></div>`;
return h;
}
function downloadIcs(){
const selected=schedule.filter(s=>icsSelected.has(s.id)).sort((a,b)=>a.date.localeCompare(b.date));
if(!selected.length)return;
const pad=n=>(n<10?'0':'')+n;
const toIcsDate=(d,t,dur)=>{
const[y,m,dy]=d.split('-').map(Number);
const[h,mi]=(t||'09:00').split(':').map(Number);
const start=new Date(y,m-1,dy,h,mi);
const end=new Date(start.getTime()+dur*60000);
const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
return{start:fmt(start),end:fmt(end)};
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
let cal=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CrashCourse//StudyApp//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:Study Sessions\r\n`;
selected.forEach(s=>{
const{start,end}=toIcsDate(s.date,s.time,s.dur);
const desc=(s.desc||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
cal+=`BEGIN:VEVENT\r\nUID:${uid()}@crashcourse\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:${s.title.replace(/,/g,'\\,')}\r\nDESCRIPTION:${desc}\r\n`;
if(s.phase)cal+=`CATEGORIES:Phase ${s.phase}\r\n`;
cal+=`STATUS:CONFIRMED\r\nBEGIN:VALARM\r\nTRIGGER:-PT10M\r\nACTION:DISPLAY\r\nDESCRIPTION:Study session starting soon\r\nEND:VALARM\r\nEND:VEVENT\r\n`;
});
cal+=`END:VCALENDAR`;
const blob=new Blob([cal],{type:'text/calendar;charset=utf-8'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='study-sessions.ics';a.click();
URL.revokeObjectURL(url);
showToast(`Downloaded ${selected.length} session${selected.length!==1?'s':''} as .ics`);
icsOpen=false;render();
}
// ─── INIT ───
render();
</script>
