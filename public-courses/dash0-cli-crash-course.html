<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dash0 CLI Crash Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}.header small{font-size:12px;color:#6b7280}
.badge{background:rgba(16,185,129,.15);color:#6ee7b7;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.content{padding:16px;padding-bottom:100px;min-height:calc(100vh - 130px)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;background:rgba(10,10,15,.95);border-top:1px solid #1f2937;padding:8px;display:flex;justify-content:space-around;gap:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav button{display:flex;flex-direction:column;align-items:center;padding:6px 6px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;min-width:46px;flex:1}
.nav button.active{background:#10b981;color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.nav button span{font-size:18px;margin-bottom:2px}
.card{border-radius:16px;padding:20px;min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;-webkit-user-select:none}
.card.question{background:#1f2937;border:2px solid #374151}
.card.answer{background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.card-text{font-size:17px;line-height:1.5}
.card-hint{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px;line-height:1}
.fav-btn:hover{opacity:.7;transform:scale(1.2)}
.fav-btn.active{opacity:1;filter:none}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:#10b981;color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:#1f2937;color:#d1d5db}.btn-secondary:hover{background:#374151}
.btn-danger{background:rgba(239,68,68,.2);border:2px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:rgba(16,185,129,.2);border:2px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn-full{width:100%;padding:14px;font-size:15px}
.progress-bar{margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{width:100%;background:#1f2937;border-radius:999px;height:8px}
.progress-fill{background:#10b981;height:8px;border-radius:999px;transition:width .5s}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.pill.active{background:#10b981;color:#fff}.pill:not(.active){background:#1f2937;color:#9ca3af}
.quiz-option{text-align:left;padding:14px 16px;border-radius:12px;border:2px solid #374151;background:#1f2937;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s}
.quiz-option.correct{background:rgba(16,185,129,.15);border-color:#10b981;color:#6ee7b7}
.quiz-option.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.quiz-option.dimmed{background:rgba(31,41,55,.5);border-color:#1f2937;color:#4b5563}
.scenario-box{border-radius:16px;padding:20px;margin-bottom:16px}
.scenario-q{background:rgba(239,68,68,.08);border:2px solid rgba(153,27,27,.4)}
.scenario-a{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3)}
.scenario-reveal{background:#1f2937;border:2px solid #374151;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.timer{font-size:28px;font-family:monospace;font-weight:700}
.timer.green{color:#10b981}.timer.yellow{color:#f59e0b}.timer.red{color:#ef4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1f2937;border-radius:12px;padding:12px;text-align:center;transition:all .2s;border:2px solid transparent}
.stat-card:hover{border-color:#374151;background:#263040}
.stat-icon{font-size:24px;margin-bottom:4px}.stat-val{font-size:20px;font-weight:700}.stat-label{font-size:11px;color:#6b7280}
.focus-box{background:#1f2937;border-radius:16px;padding:16px}
.focus-title{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.focus-text{font-size:14px;color:#d1d5db;line-height:1.6}
.results-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0}
.grade{font-size:56px;font-weight:700;text-align:center;margin-bottom:8px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:50vh}
.mgmt-section{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:16px}
.mgmt-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#d1d5db}
.mgmt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.mgmt-row:last-child{border-bottom:none}
.mgmt-row .label{font-size:13px;color:#9ca3af}
.mgmt-row .value{font-size:13px;font-weight:600;color:#fff}
.btn-outline{background:transparent;border:2px solid #374151;color:#9ca3af;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#6b7280;color:#d1d5db}
.btn-danger-solid{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-danger-solid:hover{background:#b91c1c}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-box{background:#1f2937;border:2px solid #374151;border-radius:20px;padding:24px;max-width:320px;width:90%;text-align:center}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151;font-size:12px}
.history-item:last-child{border-bottom:none}
.export-box{background:#0d1117;border:1px solid #374151;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#6ee7b7;word-break:break-all;max-height:120px;overflow-y:auto;margin-top:8px}
.source-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.source-link:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.source-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.res-group{margin-bottom:20px}
.res-group h4{font-size:13px;font-weight:600;color:#6ee7b7;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.res-link{display:block;padding:10px 12px;border-radius:10px;background:#1f2937;margin-bottom:6px;text-decoration:none;color:#93c5fd;font-size:13px;font-weight:500;border:1px solid #374151;transition:all .2s}
.res-link:hover{background:#374151;border-color:#4b5563}
.res-link small{display:block;color:#6b7280;font-size:11px;font-weight:400;margin-top:2px}
.lesson-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
.lesson-card{background:#1f2937;border-radius:16px;padding:16px;cursor:pointer;border:2px solid #374151;transition:all .2s}
.lesson-card:hover{border-color:#4b5563}
.lesson-card.completed{border-color:rgba(16,185,129,.3)}
.lesson-num{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.lesson-title{font-size:15px;font-weight:600;margin:4px 0}
.lesson-meta{font-size:12px;color:#6b7280;display:flex;gap:12px}
.lesson-body{padding:0}
.lesson-section{margin-bottom:20px}
.lesson-section h4{font-size:13px;font-weight:600;color:#6ee7b7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lesson-text{font-size:14px;color:#d1d5db;line-height:1.7}
.lesson-text p{margin-bottom:10px}
.lesson-highlight{background:rgba(16,185,129,.08);border-left:3px solid #10b981;padding:10px 14px;border-radius:0 10px 10px 0;margin:10px 0;font-size:13px;color:#d1fae5;line-height:1.5}
.lesson-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.lesson-compare-item{background:#0d1117;border-radius:10px;padding:10px;font-size:12px;line-height:1.5}
.lesson-compare-item .compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.exercise-box{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.exercise-box .ex-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.exercise-box .ex-task{font-size:13px;color:#ddd6fe;line-height:1.5;margin-bottom:8px}
.exercise-box .ex-hint{font-size:12px;color:#6b7280;font-style:italic}
.exercise-check{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
.exercise-check .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #374151;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.exercise-check .checkbox.checked{background:#10b981;border-color:#10b981}
.exercise-check .ex-text{font-size:13px;color:#d1d5db}
.ex-steps-toggle{background:none;border:1px solid rgba(139,92,246,.25);color:#a78bfa;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;margin-top:6px;font-family:inherit;transition:all .2s}
.ex-steps-toggle:hover{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.4)}
.ex-steps{display:none;margin-top:8px;padding:10px 12px;background:rgba(139,92,246,.04);border-radius:8px;border:1px solid rgba(139,92,246,.12)}
.ex-steps.open{display:block}
.ex-steps ol{margin:0;padding-left:20px;font-size:13px;color:#c4b5fd;line-height:1.7}
.ex-steps li{margin-bottom:4px}
.ex-steps code{background:#1f2937;padding:2px 6px;border-radius:4px;font-size:12px;color:#a5f3fc}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:#1f2937;color:#9ca3af;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}
.sched-item{background:#1f2937;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #374151;transition:all .2s}
.sched-item.today{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.sched-item.past{opacity:.5}
.sched-item.done{border-color:rgba(16,185,129,.3);opacity:.7}
.sched-item .si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sched-item .si-date{font-size:11px;color:#6b7280;font-weight:600}
.sched-item .si-dur{font-size:10px;color:#4b5563;background:#0d1117;padding:2px 8px;border-radius:6px}
.sched-item .si-title{font-size:14px;font-weight:600;color:#e5e7eb;margin-bottom:2px}
.sched-item .si-desc{font-size:12px;color:#9ca3af;line-height:1.4}
.sched-item .si-actions{display:flex;gap:6px;margin-top:8px}
.sched-item .si-actions button{padding:6px 10px;border-radius:8px;border:none;font-size:11px;font-weight:500;cursor:pointer}
.cp-item{background:rgba(251,191,36,.06);border:2px solid rgba(251,191,36,.2);border-radius:12px;padding:12px;margin-bottom:8px}
.cp-item.hit{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.cp-item .cp-target{font-size:14px;font-weight:600;color:#fde68a}
.cp-item.hit .cp-target{color:#6ee7b7;text-decoration:line-through}
.cp-item .cp-date{font-size:11px;color:#6b7280}
.form-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.form-sheet{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.form-sheet h3{font-size:16px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:14px;font-family:inherit}
.form-field textarea{min-height:60px;resize:vertical}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#10b981}
.ask-box{background:rgba(139,92,246,.06);border:2px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;margin-top:16px}
.ask-box .ask-label{font-size:11px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ask-box .ask-row{display:flex;gap:8px}
.ask-box input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #374151;background:#1f2937;color:#fff;font-size:13px;font-family:inherit}
.ask-box input:focus{outline:none;border-color:#a78bfa}
.ask-box input::placeholder{color:#4b5563}
.ask-box button{padding:10px 14px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ask-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(124,58,237,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ics-panel{background:#111827;border:2px solid #374151;border-radius:16px;padding:16px;margin-bottom:16px}
.ics-panel h4{font-size:13px;font-weight:600;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ics-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ics-filters button{padding:5px 10px;border-radius:8px;border:2px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.ics-filters button.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#93c5fd}
.ics-list{max-height:320px;overflow-y:auto;margin-bottom:12px}
.ics-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1f2937;font-size:13px}
.ics-item:last-child{border-bottom:none}
.ics-check{width:20px;height:20px;border-radius:5px;border:2px solid #374151;background:#0d1117;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:12px;color:transparent}
.ics-check.on{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.ics-item-info{flex:1;min-width:0}
.ics-item-title{font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ics-item-date{font-size:11px;color:#6b7280}
.ics-actions{display:flex;gap:8px;margin-top:4px}
.ics-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.ics-dl{background:#3b82f6;color:#fff}
.ics-dl:hover{background:#2563eb}
.ics-count{font-size:12px;color:#6b7280;margin-bottom:8px}
@media(min-width:600px){
body{max-width:960px;padding:0 24px}
.header{padding:20px 0 12px}
.header h1{font-size:22px}
.content{padding:20px 0 100px}
.nav{padding:10px 16px;gap:8px;border-radius:16px 16px 0 0}
.nav button{min-width:auto;padding:8px 14px;font-size:12px;flex-direction:row;gap:6px;border-radius:10px}
.nav button span{font-size:16px;margin-bottom:0}
.stat-grid{grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{padding:16px}
.stat-val{font-size:22px}
.card{max-width:640px;margin:0 auto;min-height:240px;padding:28px}

.quiz-option{font-size:15px;padding:16px 20px}

@media(min-width:800px){
body{max-width:1100px}
.nav{max-width:1100px}
.stat-grid{grid-template-columns:repeat(4,1fr)}
.lesson-grid{grid-template-columns:repeat(3,1fr)}
.card{max-width:700px}
.res-group{grid-template-columns:repeat(3,1fr)}
}
.role-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.role-picker{max-width:520px;width:92%;padding:28px 20px;text-align:center}
.role-picker h2{font-size:22px;font-weight:700;margin-bottom:6px}
.role-picker .rp-sub{font-size:14px;color:#9ca3af;margin-bottom:24px;line-height:1.5}
.role-cards{display:flex;flex-direction:column;gap:12px}
.role-card{background:#1f2937;border:2px solid #374151;border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;text-align:left}
.role-card:hover{border-color:#10b981;background:#263040}
.role-card .rc-icon{font-size:28px;margin-bottom:8px}
.role-card .rc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.role-card .rc-desc{font-size:13px;color:#9ca3af;line-height:1.4}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-badge.core{background:rgba(16,185,129,.15);color:#6ee7b7}
.role-badge.bonus{background:rgba(107,114,128,.15);color:#6b7280}

// ── Fundamentals (8) ──
{f:"What is the Dash0 CLI?",b:"A command-line tool for managing Dash0 observability assets, querying telemetry, and sending data — the human-native interface to the Dash0 platform. It is open source and available on GitHub.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"What asset types can be managed with the Dash0 CLI?",b:"Four asset types: Dashboards, Check Rules, Views, and Synthetic Checks. The `apply` command also supports PersesDashboard.",c:"Fundamentals",u:"https://www.dash0.com/changelog/cli-manage-assets",d:1},
{f:"What are the four main capability areas of the Dash0 CLI?",b:"(1) Asset management (dashboards, check rules, views, synthetic checks), (2) GitOps-style `apply`, (3) Telemetry querying (logs, spans, metrics), (4) Sending telemetry (logs, spans).",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"Where are Dash0 CLI configuration profiles stored?",b:"In `~/.dash0/` — specifically `profiles.json` and `activeProfile`. The location can be overridden with the `DASH0_CONFIG_DIR` environment variable.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"What output formats does the Dash0 CLI support?",b:"Table, wide, json, yaml, and csv. Use the `-o` flag (e.g., `-o json`, `-o yaml`) on most commands. Agent mode defaults to JSON automatically.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"Which Dash0 CLI commands are currently experimental (require `-X`)?",b:"Logs querying, spans querying and sending, traces retrieval, and team/member management all require the `-X` flag (e.g., `dash0 -X logs query`).",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"What flag enables experimental commands in the Dash0 CLI?",b:"The `-X` flag, placed immediately after `dash0` (e.g., `dash0 -X logs query`). Experimental features may have API changes before becoming generally available.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"What are Dash0 config profiles used for?",b:"Profiles store API URL, OTLP ingress URL, and auth token for a specific environment. They let you switch between dev, staging, and production contexts with `dash0 config profiles select <name>`.",c:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",d:2},

// ── Installation & Setup (7) ──
{f:"How do you install the Dash0 CLI via Homebrew?",b:"`brew tap dash0hq/dash0-cli https://github.com/dash0hq/dash0-cli && brew install dash0`",c:"Installation & Setup",u:"https://github.com/dash0hq/dash0-cli#installation",d:1},
{f:"How do you run the Dash0 CLI using Docker?",b:"`docker run ghcr.io/dash0hq/cli:latest [command]`. Multi-architecture images are available for linux/amd64 and linux/arm64.",c:"Installation & Setup",u:"https://github.com/dash0hq/dash0-cli#installation",d:1},
{f:"How do you create a new Dash0 CLI config profile?",b:"`dash0 config profiles create dev --api-url https://api.us-west-2.aws.dash0.com --otlp-url https://ingress.us-west-2.aws.dash0.com --auth-token auth_xxx`",c:"Installation & Setup",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"How do you switch between Dash0 CLI profiles?",b:"`dash0 config profiles select <profile-name>`. Use `dash0 config profiles list` to see all profiles and `dash0 config show` to display the active configuration.",c:"Installation & Setup",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"How do you build the Dash0 CLI from source?",b:"Requires Go 1.22+. Run: `git clone https://github.com/dash0hq/dash0-cli.git && cd dash0-cli && make install`",c:"Installation & Setup",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you view the currently active Dash0 CLI configuration?",b:"`dash0 config show` — displays the active profile name, API URL, OTLP URL, and auth token (partially masked).",c:"Installation & Setup",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How can you override the Dash0 config directory location?",b:"Set the `DASH0_CONFIG_DIR` environment variable to point to a custom path. Useful in CI/CD pipelines where you can't write to `~/.dash0/`.",c:"Installation & Setup",u:"https://github.com/dash0hq/dash0-cli",d:2},

// ── Asset Management (10) ──
{f:"What subcommands are available for each asset type in the Dash0 CLI?",b:"Every asset type (dashboards, check-rules, views, synthetic-checks) supports: `list`, `get`, `create -f <file>`, `update [id] -f <file>`, and `delete <id>`.",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:1},
{f:"How do you list all dashboards with the Dash0 CLI?",b:"`dash0 dashboards list` — returns a table of all dashboards in the active profile's organization. Add `-o json` or `-o yaml` for machine-readable output.",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:1},
{f:"How do you export a dashboard as YAML using the Dash0 CLI?",b:"`dash0 dashboards get <id> -o yaml` — outputs the full dashboard definition as YAML, ready to commit to version control or re-apply elsewhere.",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"How do you create a new check rule from a YAML file?",b:"`dash0 check-rules create -f rule.yaml` — uploads and activates the alerting rule definition. The file must conform to the CheckRule resource schema.",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"How do you delete a synthetic check without a confirmation prompt?",b:"`dash0 synthetic-checks delete <id> --force` — skips the interactive confirmation. Useful in scripts and CI pipelines.",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"What Prometheus feature does the Dash0 CLI asset management support?",b:"The CLI accepts PrometheusRule CRD files directly and automatically converts alerting rules to Dash0 check rules — no manual translation needed.",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"How do you update an existing view using the Dash0 CLI?",b:"`dash0 views update [id] -f view.yaml` — if the ID is omitted, it is read from the YAML file. The command performs an in-place update.",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"What is the workflow for editing an existing Dash0 dashboard via CLI?",b:"Export with `dash0 dashboards get <id> -o yaml > dash.yaml`, edit the file locally, then update with `dash0 dashboards update <id> -f dash.yaml` (or use `dash0 apply`).",c:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"What asset types does `dash0 apply` recognize in YAML files?",b:"Dashboard, PersesDashboard, CheckRule, SyntheticCheck, and View. The type is inferred from the `kind` field in the YAML resource definition.",c:"Asset Management",u:"https://github.com/dash0hq/dash0-cli",d:3},
{f:"How do you pipe YAML content directly into the Dash0 CLI apply command?",b:"`cat assets.yaml | dash0 apply -f -` — the `-f -` flag reads from stdin, enabling dynamic generation of asset definitions in shell pipelines.",c:"Asset Management",u:"https://github.com/dash0hq/dash0-cli",d:3},

// ── GitOps & Apply (9) ──
{f:"What command applies observability config from YAML files?",b:"`dash0 apply -f <path>` — auto-detects whether to create or update each resource. The GitOps equivalent of `kubectl apply` for observability assets.",c:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"How does `dash0 apply` determine whether to create or update a resource?",b:"It checks if a resource with the same ID already exists in Dash0. If it does, it updates; if not, it creates. No separate create/update decision needed.",c:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you apply all YAML files in a directory?",b:"`dash0 apply -f dashboards/` — recursively processes all YAML files in the specified directory, applying each resource definition found.",c:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"What does the `--dry-run` flag do with `dash0 apply`?",b:"Validates and previews the changes that would be made without actually applying them. Useful for CI checks to catch configuration errors before deployment.",c:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you implement a GitOps workflow for Dash0 dashboards?",b:"Store dashboard YAML in a Git repo, then run `dash0 apply -f dashboards/` in a CI/CD pipeline on merge to main. Use `--dry-run` on PRs for validation.",c:"GitOps & Apply",u:"https://www.dash0.com/changelog/dash0-cli-ga",d:2},
{f:"What is the advantage of version-controlling Dash0 assets as YAML?",b:"Changes are auditable via Git history, rollbacks are trivial (revert + re-apply), and environments stay consistent. Observability config becomes part of the standard deployment process.",c:"GitOps & Apply",u:"https://www.dash0.com/changelog/dash0-cli-ga",d:2},
{f:"Can a single YAML file contain multiple Dash0 resource definitions?",b:"Yes — `dash0 apply` supports multi-document YAML (documents separated by `---`). A single file can define dashboards, check rules, and views together.",c:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",d:3},
{f:"How do you use `dash0 apply` in a GitHub Actions CI/CD pipeline?",b:"Set `DASH0_CONFIG_DIR` to a temp path, create a profile with secrets from env vars, then run `dash0 apply -f ./observability/`. Enable agent mode with `DASH0_AGENT_MODE=true` for clean JSON output.",c:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",d:3},
{f:"What is the difference between `dash0 dashboards create` and `dash0 apply`?",b:"`create` always creates a new resource and fails if it exists. `apply` is idempotent — it creates or updates depending on whether the resource exists, making it safe to run repeatedly.",c:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",d:3},

// ── Querying (9) ──
{f:"How do you query logs with the Dash0 CLI?",b:"`dash0 -X logs query` — the `-X` flag is required as this is an experimental feature. Returns recent log entries from the active profile's dataset.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"How do you filter log queries by time range?",b:"`dash0 -X logs query --from now-1h --to now` — supports relative timestamps like `now-1h`, `now-30m`, or absolute ISO 8601 timestamps.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you filter log queries by service name?",b:"`dash0 -X logs query --filter \"service.name is my-service\"` — the filter syntax uses OpenTelemetry attribute paths.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you limit the number of results returned by a log query?",b:"`dash0 -X logs query --limit 100` — caps the number of log entries returned. Combine with `--from` and `--to` for precise scoping.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you output log query results as CSV?",b:"`dash0 -X logs query -o csv` — outputs results in CSV format. Use `--column time --column service.name --column body` to select specific columns.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you query spans (traces) with the Dash0 CLI?",b:"`dash0 -X spans query` — supports the same flags as log queries: `--from`, `--to`, `--limit`, `--filter`, `-o csv`. Requires the `-X` experimental flag.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you retrieve a full trace by trace ID?",b:"`dash0 -X traces get <trace-id>` — retrieves all spans for the given trace. Use `--from now-2h` to widen the search window, or `--follow-span-links` to traverse linked traces.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:3},
{f:"How do you run a PromQL instant query with the Dash0 CLI?",b:"`dash0 metrics instant --query 'sum(rate(http_requests_total[5m]))'` — executes a PromQL expression against Dash0's metrics store and returns the result.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"What does `--follow-span-links` do in `dash0 -X traces get`?",b:"Traverses span links to retrieve related traces that are connected but have different trace IDs — useful for distributed systems where work hops across service boundaries.",c:"Querying",u:"https://github.com/dash0hq/dash0-cli",d:3},

// ── Sending Telemetry (7) ──
{f:"How do you send a log line with the Dash0 CLI?",b:"`dash0 logs send \"Application started\" --resource-attribute service.name=my-service` — sends a log entry directly to Dash0 via OTLP.",c:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",d:1},
{f:"How do you attach log attributes when sending a log with the Dash0 CLI?",b:"Use `--log-attribute key=value` for log-level attributes and `--resource-attribute key=value` for resource-level attributes (e.g., `service.name`, `host.name`).",c:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you set severity when sending a log with the Dash0 CLI?",b:"`dash0 logs send \"msg\" --severity-text INFO --severity-number 9` — uses OpenTelemetry log severity conventions (TRACE=1, DEBUG=5, INFO=9, WARN=13, ERROR=17, FATAL=21).",c:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"How do you send a span (trace) with the Dash0 CLI?",b:"`dash0 -X spans send --name \"GET /api/users\" --kind SERVER --status-code OK --duration 100ms --resource-attribute service.name=my-service`",c:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"What span kinds are supported when sending spans with the Dash0 CLI?",b:"Standard OpenTelemetry span kinds: CLIENT, SERVER, PRODUCER, CONSUMER, INTERNAL. Specified with `--kind <KIND>` when using `dash0 -X spans send`.",c:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",d:2},
{f:"What is a practical use case for `dash0 logs send` in CI/CD?",b:"Annotate deployments or pipeline stages by sending a log event with `service.name=ci-pipeline` and attributes like `deployment.version` — creates a searchable timeline in Dash0 logs.",c:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",d:3},
{f:"How does `dash0 logs send` know where to send the telemetry?",b:"It reads the OTLP ingress URL and auth token from the active config profile (`~/.dash0/`). The profile is created with `dash0 config profiles create` and selected with `profiles select`.",c:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",d:3},

// ── Agent Mode & CI/CD (8) ──
{f:"What is Dash0 CLI agent mode?",b:"A mode that makes the CLI machine-readable for AI coding agents: outputs JSON by default, returns structured errors, skips confirmation prompts, and suppresses ANSI colors.",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",d:1},
{f:"How do you enable Dash0 CLI agent mode manually?",b:"Use the `--agent-mode` flag on any command, or set the `DASH0_AGENT_MODE=true` environment variable. Disable with `DASH0_AGENT_MODE=false`.",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",d:1},
{f:"Which AI coding environments auto-activate Dash0 CLI agent mode?",b:"Agent mode auto-activates in: Claude Code, Cursor, Windsurf, Cline, Aider, GitHub Copilot, OpenAI Codex, and any MCP server session (detected via `MCP_SESSION_ID`).",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",d:2},
{f:"What five behaviors does Dash0 CLI agent mode change?",b:"(1) JSON output by default, (2) `--help` returns structured JSON, (3) errors emit as JSON on stderr with `error` and `hint` fields, (4) no confirmation prompts, (5) no ANSI color codes.",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",d:2},
{f:"How does agent mode handle `--help` differently from normal mode?",b:"In agent mode, `--help` returns a JSON object containing command metadata, available flags, subcommands, and usage patterns — enabling AI agents to programmatically discover the CLI's capabilities.",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",d:2},
{f:"Why is zero-configuration agent mode activation important for AI workflows?",b:"AI agents using the CLI don't need special setup — the CLI detects the agent environment automatically and adapts its output format, making it immediately usable from any AI coding tool.",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",d:2},
{f:"How do you use the Dash0 CLI in a CI/CD pipeline with multiple environments?",b:"Create named profiles per environment (dev/staging/prod). In CI, set `DASH0_CONFIG_DIR` to a temp dir, create the profile from secrets, then run commands. Use `DASH0_AGENT_MODE=true` for clean JSON.",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/dash0-cli-ga",d:3},
{f:"How are errors formatted in Dash0 CLI agent mode for programmatic handling?",b:"Errors are emitted as JSON on stderr with separate `error` and `hint` fields — e.g., `{\"error\": \"profile not found\", \"hint\": \"run dash0 config profiles create\"}`. This enables agents to extract actionable context.",c:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",d:3},

// ── Pitch & Positioning (7) ──
{f:"What is the Dash0 CLI value proposition in one sentence?",b:"The Dash0 CLI lets developers manage observability infrastructure as code, query live telemetry from the terminal, and integrate Dash0 natively into any AI coding agent — with zero friction.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-cli-ga",d:1},
{f:"How does the Dash0 CLI enable GitOps for observability?",b:"Teams can version-control dashboards, check rules, and synthetic checks as YAML in Git, then deploy them via `dash0 apply` in CI/CD — the same workflow used for infrastructure and application config.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-cli-ga",d:1},
{f:"Why does the Dash0 CLI matter for developer productivity?",b:"Developers stay in their terminal workflow — querying logs, sending test telemetry, and deploying observability config — without switching context to a browser UI.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-cli-ga",d:1},
{f:"What competitive advantage does Dash0's native agent mode provide?",b:"Most observability CLIs are human-only tools. Dash0 CLI auto-detects AI coding agents and provides machine-readable output, making it a first-class tool in agentic AI workflows without any configuration.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/cli-agent-mode",d:2},
{f:"How does the Dash0 CLI address the 'snowflake dashboard' problem?",b:"By making it easy to export dashboards as YAML and commit them to Git, the CLI prevents dashboards from diverging across environments. Everyone gets the same reviewed, versioned config.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"How does Dash0 CLI Prometheus integration reduce migration friction?",b:"The CLI accepts PrometheusRule CRD files directly and converts them to Dash0 check rules automatically — teams can migrate alerting rules without rewriting them.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/cli-manage-assets",d:2},
{f:"What is the 'observability as code' pitch for the Dash0 CLI?",b:"With the Dash0 CLI, observability config (dashboards, alerts, synthetic checks) lives in source control alongside application code. Changes go through code review, get tested in staging, and deploy automatically — treating observability with the same rigor as infrastructure.",c:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-cli-ga",d:3},
];

{q:"Which statement best describes the Dash0 CLI?",o:["A server-side agent that collects metrics from your infrastructure","A command-line tool for managing Dash0 assets, querying telemetry, and sending data","A browser extension that adds CLI-style shortcuts to the Dash0 UI","A Kubernetes operator that syncs dashboards to Dash0"],a:1,cat:"Fundamentals",u:"https://github.com/dash0hq/dash0-cli",e:"The Dash0 CLI is the human-native (and agent-native) interface to the Dash0 platform — it handles asset management, telemetry querying, and data ingestion from a single binary. 🟢 Dash0 angle: Unlike traditional observability CLIs that are read-only, the Dash0 CLI both reads and writes — you can manage dashboards, alerts, and synthetic checks from the same tool you use to query logs.",d:1},
{q:"Which four asset types can be managed with the Dash0 CLI?",o:["Dashboards, Alerts, SLOs, Synthetic Checks","Dashboards, Check Rules, Views, Synthetic Checks","Metrics, Traces, Logs, Profiles","Dashboards, Pipelines, Connectors, Views"],a:1,cat:"Fundamentals",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"The four asset types are Dashboards, Check Rules (alerting), Views, and Synthetic Checks. The `apply` command additionally supports PersesDashboard as a kind.",d:1},

// ── Asset Management (7) ──
{q:"Which subcommands are available for EVERY asset type (dashboards, check-rules, views, synthetic-checks)?",o:["list, get, create, update, delete","list, get, create, patch, remove","list, describe, apply, delete","list, get, put, post, delete"],a:0,cat:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"Every asset type exposes the same five subcommands: list, get, create -f <file>, update [id] -f <file>, and delete <id>. This consistent pattern means the same mental model applies to all asset types.",d:1},
{q:"You want to export a dashboard's configuration as YAML for version control. Which command achieves this?",o:["dash0 dashboards export <id>","dash0 dashboards get <id> -o yaml","dash0 dashboards dump <id> --format yaml","dash0 apply get dashboards/<id>"],a:1,cat:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"`dash0 dashboards get <id> -o yaml` outputs the full dashboard definition as YAML. Redirect to a file with `> dashboard.yaml` and commit it to Git to start version-controlling your dashboards.",d:2},
{q:"What happens if you omit the resource ID when running `dash0 views update -f view.yaml`?",o:["The command fails with a 'missing ID' error","The CLI prompts you to enter the ID interactively","The ID is read from the `id` field inside the YAML file","The command creates a new view instead of updating"],a:2,cat:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"When the ID is omitted from the command line, the CLI reads it from the YAML file's id field. This is convenient for update workflows where the YAML file already has the resource ID embedded.",d:2},
{q:"Which command deletes a synthetic check without showing a confirmation prompt?",o:["dash0 synthetic-checks delete <id> --yes","dash0 synthetic-checks delete <id> --no-confirm","dash0 synthetic-checks delete <id> --force","dash0 synthetic-checks remove <id> -f"],a:2,cat:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"The --force flag skips the interactive confirmation prompt. This is essential for scripted or CI/CD workflows where there's no user present to confirm the deletion.",d:2},
{q:"What special Prometheus feature does the Dash0 CLI support during asset import?",o:["Importing Grafana dashboards and converting them to Dash0 format","Converting Prometheus scrape configs to Dash0 synthetic checks","Accepting PrometheusRule CRD files and automatically converting them to Dash0 check rules","Pulling metrics from a Prometheus server and creating dashboards"],a:2,cat:"Asset Management",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"The CLI accepts PrometheusRule CRD files directly — no manual translation needed. This significantly reduces migration friction for teams moving from Prometheus alerting to Dash0. 🟢 Dash0 angle: Most platforms require you to rewrite all your alerting rules when migrating; Dash0 CLI does it automatically.",d:2},
{q:"What `kind` values does `dash0 apply` recognize when processing YAML resource files?",o:["Dashboard, Alert, SyntheticMonitor, View","Dashboard, PersesDashboard, CheckRule, SyntheticCheck, View","ObservabilityAsset, MonitoringRule, Visualization","DashboardV2, CheckRuleV1, SyntheticCheckV1, ViewV1"],a:1,cat:"Asset Management",u:"https://github.com/dash0hq/dash0-cli",e:"The `kind` field in the YAML resource determines the type. Supported kinds are: Dashboard, PersesDashboard, CheckRule, SyntheticCheck, and View. The CLI routes each resource to the appropriate API endpoint based on this field.",d:3},
{q:"How do you apply a dynamically generated Dash0 asset definition without writing it to disk first?",o:["dash0 apply --inline \"$(cat template.yaml)\"","echo '---\\nkind: Dashboard...' | dash0 apply --stdin","cat assets.yaml | dash0 apply -f -","dash0 apply --pipe < assets.yaml"],a:2,cat:"Asset Management",u:"https://github.com/dash0hq/dash0-cli",e:"The `-f -` flag tells `dash0 apply` to read from stdin. This enables shell pipelines where you generate YAML dynamically (e.g., from a template engine) and pipe it directly into the CLI.",d:3},

// ── GitOps & Apply (6) ──
{q:"How does `dash0 apply` decide whether to create or update a resource?",o:["You must specify --create or --update explicitly","It always creates and fails if the resource exists","It checks if a resource with the same ID already exists and creates or updates accordingly","It compares file checksums to determine if changes are needed"],a:2,cat:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",e:"Like kubectl apply, `dash0 apply` is idempotent — it creates resources that don't exist and updates those that do. This makes it safe to run repeatedly in CI/CD pipelines without side effects.",d:2},
{q:"You want to validate a set of Dash0 YAML files in a CI pull request without actually making changes. Which flag do you use?",o:["--validate","--check","--dry-run","--preview"],a:2,cat:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",e:"The --dry-run flag parses and validates the YAML and shows what would change, without making any API calls. Adding this to PR CI checks catches configuration errors before they reach production.",d:2},
{q:"How do you apply all YAML resource files in a directory at once?",o:["dash0 apply -f *.yaml","dash0 apply --dir dashboards/","dash0 apply -f dashboards/","dash0 apply -r dashboards/"],a:2,cat:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",e:"`dash0 apply -f <directory>` recursively processes all YAML files in the specified directory, applying each resource. This is how you'd deploy an entire observability asset library in a CI/CD pipeline.",d:2},
{q:"What is the key difference between `dash0 dashboards create -f` and `dash0 apply -f`?",o:["create is faster; apply validates first","create always creates (fails if exists); apply is idempotent (creates or updates)","apply requires a kind field; create does not","There is no practical difference — they are aliases"],a:1,cat:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",e:"`create` will fail if a resource with the same ID already exists. `apply` handles both cases safely — making it the right choice for GitOps workflows where resources may or may not exist in the target environment.",d:3},
{q:"What best describes the recommended GitOps workflow for Dash0 dashboards?",o:["Export dashboards nightly to S3, apply manually before releases","Store dashboard YAML in Git, run `dash0 apply --dry-run` on PRs and `dash0 apply` on merge to main","Use the Dash0 UI to make changes and export logs for audit purposes","Keep dashboards in the Dash0 UI and document them in a wiki"],a:1,cat:"GitOps & Apply",u:"https://www.dash0.com/changelog/dash0-cli-ga",e:"The GitOps pattern: version-control assets as YAML, validate on PRs with --dry-run, and auto-deploy on merge. This gives you code review, rollback via git revert, and environment consistency. 🟢 Dash0 angle: Dash0 CLI is purpose-built for this workflow, unlike UI-only observability tools.",d:2},
{q:"A single YAML file contains multiple resource definitions separated by `---`. How does `dash0 apply` handle this?",o:["It applies only the first document and ignores the rest","It fails with a 'multi-document YAML not supported' error","It processes each document independently, creating or updating each resource","It requires you to split the file first with `dash0 split`"],a:2,cat:"GitOps & Apply",u:"https://github.com/dash0hq/dash0-cli",e:"`dash0 apply` supports multi-document YAML — a single file can contain dashboards, check rules, and views all separated by `---`. This mirrors the Kubernetes pattern where a single manifest can define multiple resources.",d:3},

// ── Querying (6) ──
{q:"You need to query logs from the last 30 minutes for a service called `payment-service`. Which command would you use?",o:["dash0 logs query --service payment-service --window 30m","dash0 -X logs query --from now-30m --filter \"service.name is payment-service\"","dash0 logs search --service=payment-service --last 30m","dash0 query --type logs --service payment-service --minutes 30"],a:1,cat:"Querying",u:"https://github.com/dash0hq/dash0-cli",e:"Log queries require the -X experimental flag. The --from flag accepts relative timestamps like `now-30m` or `now-1h`. The --filter flag uses OTel attribute paths like `service.name is payment-service`.",d:2},
{q:"Which command executes a PromQL instant query against Dash0's metrics store?",o:["dash0 metrics query --promql 'sum(rate(http_requests_total[5m]))'","dash0 metrics instant --query 'sum(rate(http_requests_total[5m]))'","dash0 -X metrics query 'sum(rate(http_requests_total[5m]))'","dash0 prometheus query --expr 'sum(rate(http_requests_total[5m]))'"],a:1,cat:"Querying",u:"https://github.com/dash0hq/dash0-cli",e:"`dash0 metrics instant` runs a PromQL expression and returns the current value. Note that unlike logs and spans, the metrics command does not require the -X flag — it's generally available.",d:2},
{q:"How do you retrieve all spans belonging to a specific trace ID?",o:["dash0 spans get --trace-id <id>","dash0 -X traces get <trace-id>","dash0 query --trace <trace-id> --include-spans","dash0 -X spans query --trace-id <trace-id>"],a:1,cat:"Querying",u:"https://github.com/dash0hq/dash0-cli",e:"`dash0 -X traces get <trace-id>` retrieves all spans for the given trace. Use `--from now-2h` to widen the time window and `--follow-span-links` to also retrieve linked traces from other services.",d:2},
{q:"What does the `--follow-span-links` flag do in `dash0 -X traces get`?",o:["Follows HTTP redirects encountered during the trace retrieval API call","Traverses span links to retrieve related traces with different trace IDs","Shows all spans that link to the requested trace from other services","Displays the call graph in a tree format following parent-child links"],a:1,cat:"Querying",u:"https://github.com/dash0hq/dash0-cli",e:"Span links connect traces that are related but have different trace IDs — common in async messaging, batch jobs, and fan-out patterns. --follow-span-links lets you trace work across service boundaries even when trace context isn't propagated directly.",d:3},
{q:"You want to export log query results to a spreadsheet. Which output format and flag combination would you use?",o:["dash0 -X logs query -o json | jq -r '.[] | @csv'","dash0 -X logs query -o csv --column time --column service.name --column body","dash0 -X logs query --export csv --fields time,service,message","dash0 -X logs query --spreadsheet-export"],a:1,cat:"Querying",u:"https://github.com/dash0hq/dash0-cli",e:"The -o csv flag outputs results in CSV format. Use --column flags to select specific attributes like time, service.name, and body. This is the most direct path from Dash0 logs to a spreadsheet.",d:2},
{q:"Which flag caps the number of log entries returned by a query?",o:["--max","--count","--limit","--top"],a:2,cat:"Querying",u:"https://github.com/dash0hq/dash0-cli",e:"`--limit N` caps the result set. Combine with `--from` and `--to` for precise time-scoped sampling. Without a limit, large queries may return more data than expected.",d:1},

// ── Sending Telemetry (5) ──
{q:"Which command sends a log line to Dash0 and tags it with a service name?",o:["dash0 log push \"msg\" --service my-service","dash0 logs send \"msg\" --resource-attribute service.name=my-service","dash0 -X logs emit \"msg\" --service.name my-service","dash0 telemetry send log \"msg\" --tag service=my-service"],a:1,cat:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",e:"`dash0 logs send` sends a log entry via OTLP to the active profile's ingress URL. Use --resource-attribute for resource-level attributes like service.name and --log-attribute for log-record-level attributes.",d:1},
{q:"What is the difference between `--log-attribute` and `--resource-attribute` when sending logs?",o:["They are synonyms — both attach key-value pairs to the log record","--resource-attribute sets log-level metadata; --log-attribute sets trace context","--resource-attribute sets resource-level attributes (service, host); --log-attribute sets log-record-level attributes","--log-attribute is deprecated; --resource-attribute should always be used"],a:2,cat:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",e:"OTel data model: resource attributes describe the entity producing the data (service.name, host.name, cloud.region). Log attributes describe the individual log record. Using the right level matters for cardinality and querying.",d:2},
{q:"Using OTel severity conventions, what numeric severity should you pass for an INFO log?",o:["--severity-number 5","--severity-number 9","--severity-number 13","--severity-number 17"],a:1,cat:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",e:"OTel severity numbers: TRACE=1, DEBUG=5, INFO=9, WARN=13, ERROR=17, FATAL=21. Use both --severity-text INFO and --severity-number 9 for maximum compatibility with log viewers that filter on either field.",d:2},
{q:"Which command sends a server-side span to Dash0 with a 200ms duration?",o:["dash0 spans create --name 'GET /api' --kind SERVER --duration 200ms --resource-attribute service.name=api","dash0 -X spans send --name 'GET /api' --kind SERVER --status-code OK --duration 200ms --resource-attribute service.name=api","dash0 -X traces send --span 'GET /api' --type server --latency 200ms","dash0 telemetry span --name 'GET /api' --server --ms 200"],a:1,cat:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",e:"`dash0 -X spans send` requires the -X experimental flag. Supported --kind values are: CLIENT, SERVER, PRODUCER, CONSUMER, INTERNAL. This matches the standard OTel SpanKind enum.",d:2},
{q:"You want to annotate a CI/CD deployment event in Dash0 logs for later correlation. What is the best approach?",o:["Add a comment to the Dash0 dashboard manually after deployment","Use `dash0 logs send` in the pipeline with --resource-attribute deployment.version and service.name=ci-pipeline","Write a webhook to post the event to the Dash0 API","Create a synthetic check that fires on each deployment"],a:1,cat:"Sending Telemetry",u:"https://github.com/dash0hq/dash0-cli",e:"Sending deployment annotations as log events creates a searchable, correlatable record in Dash0. You can then filter logs by deployment.version to see what happened before and after each release. 🟢 Dash0 angle: Because the CLI sends real OTLP data, deployment markers appear in the same view as application logs — no separate annotation system needed.",d:3},

// ── Agent Mode & CI/CD (5) ──
{q:"What changes does Dash0 CLI agent mode make to its behavior?",o:["Runs in the background as a daemon, collecting metrics","Outputs JSON by default, returns structured errors, skips confirmation prompts, and suppresses ANSI colors","Connects to an AI model to auto-fix failing commands","Increases the API rate limit for automated workflows"],a:1,cat:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",e:"Agent mode makes the CLI machine-readable: JSON output by default, --help returns JSON schema, errors use structured {error, hint} JSON on stderr, no prompts, no color codes. This makes it usable by any program that calls the CLI.",d:1},
{q:"How does the Dash0 CLI automatically detect that it's running inside an AI coding agent?",o:["It checks for a .ai-session file in the working directory","It detects the CLAUDE_SESSION_ID or OPENAI_API_KEY environment variables","It detects agent environments via editor-specific environment variables and MCP_SESSION_ID","It monitors stdin for JSON-structured input and switches modes accordingly"],a:2,cat:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",e:"The CLI detects: Claude Code, Cursor, Windsurf, Cline, Aider, GitHub Copilot, OpenAI Codex, and any MCP server session via MCP_SESSION_ID. No user configuration needed — it just works in those environments. 🟢 Dash0 angle: This zero-config detection is a first-mover advantage; most observability CLIs require manual JSON flag configuration.",d:2},
{q:"In agent mode, how does the Dash0 CLI expose its command structure to AI agents?",o:["It generates a man page that AI agents can parse","The --help flag returns a structured JSON object with commands, flags, and usage patterns","It exposes a local REST API that agents can query for capability discovery","It writes a capabilities.json file to the working directory on first run"],a:1,cat:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",e:"In agent mode, --help outputs JSON instead of human-readable text — including available subcommands, flags, and usage patterns. This allows AI agents to programmatically discover what the CLI can do without parsing human text.",d:2},
{q:"You're setting up a GitHub Actions pipeline that deploys Dash0 dashboards. What is the recommended approach for authentication?",o:["Hardcode the auth token in the workflow YAML file","Use DASH0_CONFIG_DIR to point to a temp directory, create a profile from GitHub Secrets, then run dash0 apply","Store the auth token in a .dash0 file at the repo root and commit it","Use --auth-token inline on each command"],a:1,cat:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/dash0-cli-ga",e:"Set DASH0_CONFIG_DIR to a writable temp path (never the home dir in CI), create the profile from secrets env vars, then run commands. Using DASH0_AGENT_MODE=true ensures clean JSON output for the pipeline runner.",d:3},
{q:"How are errors reported in Dash0 CLI agent mode to help programmatic callers recover?",o:["Errors use HTTP status codes written to stdout","Errors are emitted as structured JSON on stderr with separate `error` and `hint` fields","Errors cause a non-zero exit code only; the message is suppressed","Errors write a structured log to ~/.dash0/error.log"],a:1,cat:"Agent Mode & CI/CD",u:"https://www.dash0.com/changelog/cli-agent-mode",e:"Agent mode errors look like: {\"error\": \"profile not found\", \"hint\": \"run dash0 config profiles create\"}. The hint field gives actionable next steps, making it easy for AI agents to self-recover without human intervention.",d:2},

// ── Pitch & Positioning (5) ──
{q:"A prospect says 'We already have a Grafana CLI for managing dashboards.' What is the strongest Dash0 CLI differentiator?",o:["The Dash0 CLI is faster and has a nicer UI","The Dash0 CLI manages dashboards AND check rules AND synthetic checks AND sends/queries telemetry — plus first-class AI agent support","The Dash0 CLI has more dashboard templates out of the box","The Dash0 CLI integrates with more CI/CD platforms"],a:1,cat:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-cli-ga",e:"Grafana's CLI focuses on dashboards. Dash0 CLI covers the full observability asset lifecycle (dashboards, alerts, synthetics, views), adds live telemetry querying, telemetry injection, and native AI agent mode — a much broader scope. 🟢 Dash0 angle: One CLI, all observability operations.",d:2},
{q:"What problem does the Dash0 CLI solve that is sometimes called the 'snowflake dashboard' problem?",o:["Dashboards that use too many unique panel types become hard to maintain","Dashboards diverge across dev/staging/prod because they're created manually in the UI with no version control","Some dashboards are slow to load because they have too many metrics","Dashboard permissions are inconsistent across environments"],a:1,cat:"Pitch & Positioning",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"Without a CLI, dashboards get created and tweaked manually in the UI and diverge across environments. With `dash0 dashboards get -o yaml` and Git, every dashboard change is reviewed, tracked, and reproducible. 🟢 Dash0 angle: The CLI is the key enabler of 'observability as code' — treating dashboards with the same rigor as infrastructure.",d:2},
{q:"Why is the Dash0 CLI's native AI agent mode a competitive advantage over other observability platforms?",o:["AI agents can replace human operators entirely, reducing headcount","Most observability CLIs require manual JSON flag configuration for agent use; Dash0 auto-detects and adapts with zero config","The Dash0 CLI AI mode generates dashboards from natural language automatically","AI agent mode enables real-time alerts that other CLIs cannot support"],a:1,cat:"Pitch & Positioning",u:"https://www.dash0.com/changelog/cli-agent-mode",e:"As AI coding agents become standard in engineering workflows, tools that natively support them gain adoption. Dash0 is early — auto-detection, JSON help schemas, and structured error hints mean AI agents can use the CLI effectively without any human tuning. 🟢 Dash0 angle: First-mover in AI-native observability tooling.",d:1},
{q:"How does Dash0's Prometheus import support reduce migration friction for new customers?",o:["It automatically rewrites PromQL queries to Dash0's native query language","It imports Prometheus scrape configurations and creates data connectors automatically","It accepts PrometheusRule CRD files and converts alerting rules to Dash0 check rules automatically","It imports Prometheus metrics as dashboards via the Grafana API"],a:2,cat:"Pitch & Positioning",u:"https://www.dash0.com/changelog/cli-manage-assets",e:"Teams switching from Prometheus alerting don't have to rewrite their rules — the Dash0 CLI accepts the same PrometheusRule CRD files and converts them automatically. This dramatically lowers the switching cost for Prometheus-heavy environments.",d:2},
{q:"Which one-sentence description best captures the 'observability as code' value proposition of the Dash0 CLI?",o:["The Dash0 CLI lets you run CLI commands instead of clicking in a UI, saving a few seconds per action","With the Dash0 CLI, observability config lives in source control alongside app code — changes go through code review, get tested in staging, and deploy automatically","The Dash0 CLI provides a backup mechanism for dashboards in case the UI becomes unavailable","The Dash0 CLI replaces the need for a dedicated observability team by automating dashboard creation"],a:1,cat:"Pitch & Positioning",u:"https://www.dash0.com/changelog/dash0-cli-ga",e:"'Observability as code' means treating dashboards, alerts, and synthetic checks with the same engineering rigor as application code — peer review, staging environments, automated deployment, and full change history. The CLI is the tool that makes this practical. 🟢 Dash0 angle: This positions Dash0 as a platform for engineering teams who take reliability seriously, not just a metrics dashboard.",d:1},

// ── Sales Scenarios (4) ──
{q:"A prospect says: 'We already manage everything through the Datadog UI. Why would we need a CLI?'",
a:"Great question — and it's worth exploring what 'managing through the UI' actually means long-term. When everything lives in a UI, dashboards become snowflakes: they drift between environments, changes aren't reviewed, and rollbacks require manual recreation. The Dash0 CLI solves this by treating observability config as code. You export dashboards as YAML, commit to Git, and deploy with `dash0 apply` in your CI/CD pipeline — the same workflow your team already uses for infrastructure.\n\nDatadog does have a limited CLI (dogwrap, ddtrace), but it's focused on process wrapping and trace injection — not managing the observability layer itself. There's no `datadog apply -f dashboards/` equivalent. With Dash0 CLI, every dashboard change goes through code review, gets tested in staging, and deploys automatically. That's a qualitatively different capability.\n\nFinally, ask where their team spends time when an alert fires at 2am. If they're clicking through the Datadog UI to find the right dashboard, that's friction. Dash0 CLI lets engineers query logs, spans, and metrics directly from the terminal without a browser — and it integrates natively with AI coding agents like Claude Code and Cursor for the next generation of on-call workflows.",
u:["https://www.dash0.com/changelog/dash0-cli-ga","https://www.dash0.com/changelog/cli-manage-assets"]},

{q:"A prospect asks: 'How is Dash0 CLI different from Terraform or Pulumi for managing dashboards?'",
a:"Terraform and Pulumi are excellent for infrastructure — compute, networking, databases. Dash0 CLI is purpose-built for the observability layer, and the distinction matters in practice. With Terraform, you write HCL to describe dashboards, but you're working with a provider that abstracts the actual YAML structure. With Dash0 CLI, you work directly with the dashboard definition format — export, edit, re-apply — no translation layer, no state file to manage, no `terraform plan` overhead.\n\nDash0 CLI is also much more than a deployment tool. You can query logs, run PromQL expressions, send test telemetry, and retrieve traces — all from the same binary. Terraform can't tell you why your service is erroring at 3am. Dash0 CLI can.\n\nThe positioning is complementary, not competing. Teams use Terraform to provision Dash0 environments (datasets, integrations), and Dash0 CLI to manage the observability assets within those environments. If a prospect is already a Terraform shop, the Dash0 Terraform provider + Dash0 CLI is a natural combination: Terraform for environment setup, CLI for day-2 asset management and live telemetry access.",
u:["https://www.dash0.com/changelog/dash0-cli-ga","https://github.com/dash0hq/dash0-cli"]},

{q:"A customer says: 'Our team doesn't use command-line tools — UI only. This isn't relevant to us.'",
a:"That's actually the most common starting point, and it's worth asking which parts of their workflow they'd want to keep in the UI. The UI is great for exploration, visualization, and building dashboards interactively. The CLI isn't a replacement — it's for the workflow that comes after: once a dashboard is built and validated, you want to version-control it, replicate it to staging and prod, and ensure it doesn't drift.\n\nFor a UI-only team, the immediate value of the CLI is actually simpler: backup and recovery. If someone accidentally deletes a dashboard or makes a breaking change, `dash0 dashboards get <id> -o yaml` before any change gives you an instant snapshot. That's a safety net that requires zero CLI adoption day-to-day.\n\nThe more compelling conversation is about what happens when they grow. As teams scale, manual UI management breaks down — multiple environments, multiple contributors, no audit trail. The CLI is how modern engineering teams address that. It also has first-class support for AI coding agents: Claude Code, Cursor, and other AI tools can use the Dash0 CLI natively, which becomes relevant as those workflows mature. Starting the conversation now ensures they're not re-platforming their observability workflow in 18 months.",
u:["https://www.dash0.com/changelog/cli-manage-assets","https://www.dash0.com/changelog/dash0-cli-ga"]},

{q:"A prospect says: 'We already have kubectl and Helm for our Kubernetes deployments. Why do we need another CLI?'",
a:"kubectl and Helm are the right tools for Kubernetes workloads — Dash0 CLI doesn't compete with them, it completes the picture. When kubectl deploys a service, the observability layer (dashboards, alerting rules, synthetic checks) for that service often lags behind or is never created at all. Dash0 CLI is how you deploy the observability config alongside the application config, in the same pipeline.\n\nThe mental model is the same one your team already knows: `kubectl apply -f deployment.yaml` for the application, `dash0 apply -f observability/` for the monitoring layer. Engineers already understand declarative apply semantics, idempotent operations, and YAML-in-Git. The CLI uses exactly that model.\n\nAdditionally, the Dash0 CLI covers capabilities kubectl doesn't touch: querying live telemetry (`dash0 -X logs query`), sending test spans from local dev (`dash0 -X spans send`), and native AI agent integration. For a Kubernetes-heavy team, the Dash0 Kubernetes operator handles auto-instrumentation, and the CLI handles the asset management and telemetry access layer. They work together.",
u:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga"]},

// ── SA/Demo Scenarios (4) ──
{q:"A customer wants to see a live dashboard-as-code workflow demo. Walk them through it.",
a:"Start by showing the 'before' state: a dashboard exists in the Dash0 UI, and it was created manually with no version history. Then demonstrate the full GitOps loop in three steps.\n\nFirst, export: `dash0 dashboards list` to find the ID, then `dash0 dashboards get <id> -o yaml > my-service-dashboard.yaml`. Open the file — show them it's readable YAML they could commit to a repo. Make a small change: add a new panel or update a threshold.\n\nSecond, apply: `dash0 apply -f my-service-dashboard.yaml`. Show the dashboard updated in the Dash0 UI in real time. Then demonstrate idempotency: run the same command again — no duplicate, no error.\n\nThird, show the CI/CD integration angle: here's a GitHub Actions workflow that runs `dash0 apply --dry-run` on pull requests (validation without changes) and `dash0 apply` on merge to main (deployment). The dashboard change goes through the same review process as the application code. Ask them: when was the last time a dashboard change caused an alert to miss a real incident? This workflow makes that auditable and reversible.",
u:["https://www.dash0.com/changelog/cli-manage-assets","https://www.dash0.com/changelog/dash0-cli-ga","https://github.com/dash0hq/dash0-cli"]},

{q:"A customer asks: 'Can you show me how to migrate our existing Prometheus alert rules to Dash0?'",
a:"This is one of the lowest-friction migration paths in the Dash0 ecosystem. If they have PrometheusRule CRD files (the standard Kubernetes alerting format), the Dash0 CLI can accept them directly — no translation needed.\n\nThe demo flow: take an existing PrometheusRule YAML file from their repo. Run `dash0 check-rules create -f prometheus-rules.yaml`. The CLI automatically detects the PrometheusRule format and converts the alerting rules to Dash0 check rules. Show the resulting check rules in the Dash0 UI.\n\nFor teams using plain Prometheus (not Kubernetes), the workflow is similar: their existing rule files can be applied directly. For teams using Alertmanager, walk through how Dash0 check rules map to notification channels.\n\nThe key message is: you don't have to rewrite anything. Your existing investment in alert rule authoring carries over. From there, you can manage those rules as code — `dash0 check-rules list`, export to YAML, commit to Git, and deploy changes through CI/CD. That's a better workflow than most teams have with Prometheus today.",
u:["https://www.dash0.com/changelog/cli-manage-assets","https://github.com/dash0hq/dash0-cli"]},

{q:"A customer wants to understand how `dash0 apply` fits into their GitOps pipeline. They use ArgoCD for application deployments.",
a:"The Dash0 CLI integrates at the CI/CD layer, not the GitOps operator layer — so it works alongside ArgoCD rather than replacing it. Here's the typical pattern: ArgoCD manages application manifests from Git. Dash0 CLI manages observability assets from the same (or a parallel) Git repository.\n\nThe practical setup: create an `observability/` directory in the application repo alongside `k8s/`. When a developer adds a new service, they add both `k8s/deployment.yaml` (picked up by ArgoCD) and `observability/dashboard.yaml` (picked up by a Dash0 CI/CD step). On merge to main, ArgoCD syncs the workload and a GitHub Actions step runs `dash0 apply -f observability/` to sync the observability config.\n\nFor preview environments, use `--dry-run` in PR pipelines to validate the observability config without applying it. This catches YAML schema errors before they reach production. Use profile switching (`dash0 config profiles select staging`) to deploy to the right environment.\n\nThe key advantage over ArgoCD-managed Dash0 configs: the CLI handles create-vs-update automatically (idempotent), understands multi-document YAML (one file can contain dashboards + check rules + synthetic checks), and has native agent mode for AI-assisted pipeline workflows.",
u:["https://www.dash0.com/changelog/dash0-cli-ga","https://github.com/dash0hq/dash0-cli"]},

{q:"A customer asks: 'How does the CLI handle multiple environments — dev, staging, and production?'",
a:"The Dash0 CLI uses named profiles to handle multiple environments. Each profile stores the API URL, OTLP ingress URL, and auth token for a specific Dash0 dataset or organization. You create profiles with `dash0 config profiles create` and switch with `dash0 config profiles select`.\n\nFor a demo: `dash0 config profiles list` shows all configured environments. `dash0 config profiles select production` switches context — all subsequent commands target production. `dash0 dashboards list` now shows production dashboards. This is exactly how you'd promote a dashboard change: apply to dev, validate, `profiles select staging`, apply again, validate, `profiles select production`, apply to prod.\n\nIn CI/CD pipelines, you don't use `profiles select` — instead, set `DASH0_CONFIG_DIR` to a temp directory and create the profile from environment secrets each run. This ensures the pipeline always uses the correct credentials for the target environment without relying on a persistent profile file.\n\nFor multi-environment YAML management, many teams use a directory structure: `observability/dev/`, `observability/staging/`, `observability/prod/` with environment-specific overrides, then `dash0 apply -f observability/prod/` with the production profile active. This gives full auditability: which config, which environment, which pipeline run.",
u:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga"]},

// ── Deep Technical Scenarios (4) ──
{q:"An engineer needs to query the last 1 hour of error logs filtered by service name 'checkout-service'. What is the exact command sequence?",
a:"This requires the experimental logs query feature. The full command is: `dash0 -X logs query --from now-1h --to now --filter \"service.name is checkout-service\" --filter \"severity.text is ERROR\"`\n\nBreaking it down: `-X` enables experimental mode (required for logs and spans). `--from now-1h` sets the start of the time window using a relative timestamp. `--to now` is optional since it defaults to the current time. `--filter` accepts OTel attribute path expressions — you can chain multiple filters and they are ANDed together. `severity.text is ERROR` matches log records with ERROR severity.\n\nTo limit the result set: add `--limit 500` to cap at 500 records. To export for analysis: add `-o csv --column time --column service.name --column severity.text --column body` for a spreadsheet-friendly format. To output as JSON for scripting: `-o json`.\n\nIf the service name contains a space or special character: quote it — `--filter \"service.name is 'my checkout service'\"`.\n\nFor debugging: if no results come back, verify the active profile points to the right dataset with `dash0 config show`, and widen the time window with `--from now-6h` in case logs are delayed.",
u:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga"]},

{q:"An engineer is setting up a CI/CD pipeline to automatically deploy observability config when changes merge to main. Walk through the complete setup.",
a:"The recommended pipeline pattern has four stages: validate on PR, deploy on merge, verify post-deploy, and annotate the deployment.\n\nFor GitHub Actions, set up three secrets: DASH0_AUTH_TOKEN, DASH0_API_URL, and DASH0_OTLP_URL. On pull request events, run the validation job: set DASH0_CONFIG_DIR to `/tmp/dash0-ci`, run `dash0 config profiles create ci --api-url $DASH0_API_URL --otlp-url $DASH0_OTLP_URL --auth-token $DASH0_AUTH_TOKEN`, then `dash0 apply -f observability/ --dry-run`. This validates YAML schema and API connectivity without making changes.\n\nOn merge to main, run the deployment job: same profile setup, then `DASH0_AGENT_MODE=true dash0 apply -f observability/` (agent mode gives clean JSON output for the pipeline log). For multi-environment pipelines, parameterize by environment using separate secret groups and profile names.\n\nPost-deploy annotation: `dash0 logs send \"Observability config deployed\" --resource-attribute service.name=ci-pipeline --log-attribute deployment.sha=$GITHUB_SHA --log-attribute deployment.env=production --severity-text INFO`. This creates a searchable deployment marker in Dash0 logs — when investigating incidents, you can filter to see what changed and when.\n\nFor Docker-based pipelines, use `docker run ghcr.io/dash0hq/cli:latest` instead of the binary, passing the same environment variables.",
u:["https://www.dash0.com/changelog/dash0-cli-ga","https://www.dash0.com/changelog/cli-agent-mode","https://github.com/dash0hq/dash0-cli"]},

{q:"An engineer wants to send test telemetry from their local dev environment to validate their OpenTelemetry pipeline. What commands should they use?",
a:"The Dash0 CLI can send both logs and spans directly via OTLP to the active profile's ingress URL — no instrumentation library or SDK required.\n\nFor validating log ingestion: `dash0 logs send \"Test log from dev\" --resource-attribute service.name=my-service --resource-attribute service.version=1.2.3 --resource-attribute deployment.environment=dev --log-attribute http.method=GET --log-attribute http.status_code=200 --severity-text INFO --severity-number 9`. Check the Dash0 UI — the log should appear with all attributes correctly mapped.\n\nFor validating trace ingestion: `dash0 -X spans send --name \"GET /api/users\" --kind SERVER --status-code OK --duration 150ms --resource-attribute service.name=my-service --resource-attribute deployment.environment=dev --span-attribute http.method=GET --span-attribute http.status_code=200`. Look for the span in the Dash0 traces view.\n\nFor end-to-end pipeline validation in CI: write a test script that sends a log with a unique trace ID, queries for it with `dash0 -X logs query --filter \"trace.id is <id>\" --from now-2m`, and asserts the result is non-empty. This gives you a synthetic test that validates the full ingestion pipeline.\n\nCommon issues: if telemetry doesn't appear, run `dash0 config show` to confirm the OTLP URL is set. The OTLP URL is separate from the API URL — it's the ingress endpoint, not the management API.",
u:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/dash0-cli-ga"]},

{q:"An engineer is debugging why `dash0 apply` isn't updating an existing dashboard — the command succeeds but the dashboard in the UI looks unchanged. What are the debugging steps?",
a:"This is a common debugging scenario. Work through these steps in order.\n\nFirst, verify you're targeting the right environment: `dash0 config show` — confirm the API URL matches where you expect the dashboard to live. A common mistake is running apply against the dev profile while looking at the production UI.\n\nSecond, verify the resource ID: the `kind` and `id` fields in your YAML must match the existing resource. Run `dash0 dashboards list -o json` and check the `id` field. If the YAML has a wrong or missing ID, `apply` will create a new resource rather than updating the existing one — you may have a duplicate dashboard you haven't found yet.\n\nThird, check what the apply actually sent: run with `-o json` to see the full response. If the API returned a 200 with the updated resource, the issue is a UI caching problem — refresh the browser.\n\nFourth, use the explicit update command to isolate the issue: `dash0 dashboards update <id> -f dashboard.yaml`. If this also fails silently, add `--verbose` if available, or pipe to `jq` to inspect the response.\n\nFifth, validate the YAML schema: try `dash0 apply -f dashboard.yaml --dry-run` and look carefully at the output. A malformed panel definition may be silently dropped by the API.\n\nIf all else fails, export the current state with `dash0 dashboards get <id> -o yaml`, diff it against your file to see what actually differs, and apply incrementally.",
u:["https://github.com/dash0hq/dash0-cli","https://www.dash0.com/changelog/cli-manage-assets"]}
];
